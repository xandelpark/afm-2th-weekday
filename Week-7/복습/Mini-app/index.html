<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Members Only — 멤버 콘텐츠 미니앱</title>
  <!--
    AFM Design System / Editorial Cream Palette (shadcn token)
    Members-only paid content mini-app.
    Mock 결제 (실제 결제 X) — localStorage로 유저/멤버십 상태 저장.
  -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&display=swap" rel="stylesheet">

  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
            popover: { DEFAULT: 'hsl(var(--popover))', foreground: 'hsl(var(--popover-foreground))' },
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
          },
          borderRadius: { lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' },
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'system-ui', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
          },
        }
      }
    };
  </script>
  <style>
    /* ==== Editorial Cream palette ==== */
    :root {
      --background: 36 33% 97%;
      --foreground: 0 0% 10%;
      --card: 0 0% 100%;
      --card-foreground: 0 0% 10%;
      --popover: 0 0% 100%;
      --popover-foreground: 0 0% 10%;
      --primary: 0 0% 10%;
      --primary-foreground: 36 33% 97%;
      --secondary: 36 25% 92%;
      --secondary-foreground: 0 0% 10%;
      --muted: 36 25% 92%;
      --muted-foreground: 22 9% 47%;
      --accent: 14 47% 59%;
      --accent-foreground: 0 0% 100%;
      --destructive: 0 70% 50%;
      --destructive-foreground: 0 0% 100%;
      --border: 36 22% 89%;
      --input: 36 22% 89%;
      --ring: 14 47% 59%;
      --radius: 0.75rem;
    }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }
    .num { font-feature-settings: 'tnum' 1; font-variant-numeric: tabular-nums; }
    .font-serif-italic { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; }
    .eyebrow { font-size: 10px; text-transform: uppercase; letter-spacing: 0.18em; }
    @keyframes softFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .anim-fade-in { animation: softFadeIn 0.28s ease-out; }
    /* 콘텐츠 카드 자물쇠 오버레이 */
    .lock-overlay {
      background: linear-gradient(180deg, hsl(var(--background) / 0.05) 0%, hsl(var(--background) / 0.85) 100%);
      backdrop-filter: blur(2px);
    }
    /* 잠긴 콘텐츠 텍스트 블러 */
    .blur-locked {
      filter: blur(5px);
      user-select: none;
      pointer-events: none;
    }

</head>
<body class="bg-background text-foreground">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef, createContext, useContext, useMemo } = React;
    const cn = (...c) => c.filter(Boolean).join(' ');

    // ========================================
    // 🎨 Design System Components (shadcn 토큰 기반)
    // ========================================
    function Button({ variant = "default", size = "default", className = "", ...p }) {
      const base = "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50";
      const variants = {
        default:     "bg-primary text-primary-foreground hover:bg-primary/90",
        destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/90",
        outline:     "border border-input bg-background hover:bg-accent hover:text-accent-foreground",
        secondary:   "bg-secondary text-secondary-foreground hover:bg-secondary/80",
        ghost:       "hover:bg-accent hover:text-accent-foreground",
        link:        "text-accent underline-offset-4 hover:underline",
      };
      const sizes = { default: "h-10 px-4 py-2", sm: "h-9 px-3", lg: "h-11 px-8", icon: "h-10 w-10" };
      return <button className={cn(base, variants[variant], sizes[size], className)} {...p} />;
    }
    function Input({ className = "", type = "text", ...p }) {
      return <input type={type} className={cn(
        "flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:opacity-50", className)} {...p} />;
    }
    function Label({ className = "", htmlFor, children }) {
      return <label htmlFor={htmlFor} className={cn("text-sm font-medium leading-none", className)}>{children}</label>;
    }
    function Card({ className = "", ...p }) { return <div className={cn("rounded-lg border bg-card text-card-foreground", className)} {...p} />; }
    function CardHeader({ className = "", ...p }) { return <div className={cn("flex flex-col space-y-1.5 p-6", className)} {...p} />; }
    function CardTitle({ className = "", ...p }) { return <h3 className={cn("font-serif-italic text-2xl leading-none tracking-tight text-foreground", className)} {...p} />; }
    function CardDescription({ className = "", ...p }) { return <p className={cn("text-sm text-muted-foreground", className)} {...p} />; }
    function CardContent({ className = "", ...p }) { return <div className={cn("p-6 pt-0", className)} {...p} />; }
    function CardFooter({ className = "", ...p }) { return <div className={cn("flex items-center p-6 pt-0", className)} {...p} />; }
    function Badge({ variant = "default", className = "", ...p }) {
      const base = "inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold";
      const variants = {
        default:     "border-transparent bg-accent text-accent-foreground",
        secondary:   "border-transparent bg-secondary text-secondary-foreground",
        destructive: "border-transparent bg-destructive text-destructive-foreground",
        outline:     "text-foreground",
      };
      return <div className={cn(base, variants[variant], className)} {...p} />;
    }
    function Separator({ className = "" }) { return <div className={cn("h-[1px] w-full bg-border", className)} />; }

    // 자물쇠 아이콘 (Lucide 스타일 SVG)
    function LockIcon({ className = "h-4 w-4" }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <rect width="18" height="11" x="3" y="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      );
    }
    function CheckIcon({ className = "h-4 w-4" }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
      );
    }

    // ========================================
    // 🔀 Hash Router (path + query string 분리)
    // ========================================
    const RouterContext = createContext({ path: '/', query: {}, navigate: () => {} });

    function parseHash(raw) {
      // raw 예: "/payment/success?paymentKey=xxx&orderId=yyy" or "/" or ""
      const full = raw || '/';
      const qIdx = full.indexOf('?');
      const path = qIdx === -1 ? full : full.slice(0, qIdx);
      const queryString = qIdx === -1 ? '' : full.slice(qIdx + 1);
      const query = {};
      if (queryString) {
        for (const pair of queryString.split('&')) {
          const [k, v] = pair.split('=');
          if (k) query[decodeURIComponent(k)] = v != null ? decodeURIComponent(v) : '';
        }
      }
      return { path: path || '/', query };
    }

    function Router({ children }) {
      const [{ path, query }, setState] = useState(() => parseHash(window.location.hash.slice(1)));
      useEffect(() => {
        const onHash = () => setState(parseHash(window.location.hash.slice(1)));
        window.addEventListener('hashchange', onHash);
        return () => window.removeEventListener('hashchange', onHash);
      }, []);
      const navigate = (to) => { window.location.hash = to; };
      return <RouterContext.Provider value={{ path, query, navigate }}>{children}</RouterContext.Provider>;
    }

    function useRouter() { return useContext(RouterContext); }

    function Link({ to, className = "", children, ...p }) {
      const { navigate } = useRouter();
      return <a href={`#${to}`} onClick={(e) => { e.preventDefault(); navigate(to); }} className={className} {...p}>{children}</a>;
    }

    // /content/:id 같은 동적 경로 매칭
    function matchRoute(pattern, path) {
      const ps = pattern.split('/').filter(Boolean);
      const xs = path.split('/').filter(Boolean);
      if (ps.length !== xs.length) return null;
      const params = {};
      for (let i = 0; i < ps.length; i++) {
        if (ps[i].startsWith(':')) params[ps[i].slice(1)] = xs[i];
        else if (ps[i] !== xs[i]) return null;
      }
      return params;
    }

    // ========================================
    // 📡 API 헬퍼 (JWT 토큰 자동 첨부)
    // ========================================
    const API_BASE = '/api';
    const TOKEN_KEY = 'mini_token';

    async function apiFetch(path, opts = {}) {
      const token = localStorage.getItem(TOKEN_KEY);
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(`${API_BASE}${path}`, { ...opts, headers });
      let body;
      try { body = await res.json(); } catch { body = {}; }
      if (!res.ok) {
        const err = new Error(body.error || `요청 실패 (${res.status})`);
        err.status = res.status;
        throw err;
      }
      return body;
    }

    // ========================================
    // 👤 Auth + Membership Context (JWT 기반)
    // ========================================
    const AuthContext = createContext(null);

    function AuthProvider({ children }) {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true); // 초기 토큰 검증 중

      // 앱 시작 시 토큰이 있으면 /api/me로 user 복원
      useEffect(() => {
        const token = localStorage.getItem(TOKEN_KEY);
        if (!token) { setLoading(false); return; }
        apiFetch('/me')
          .then(({ user }) => setUser(user))
          .catch(() => { localStorage.removeItem(TOKEN_KEY); setUser(null); })
          .finally(() => setLoading(false));
      }, []);

      const setSession = ({ token, user }) => {
        localStorage.setItem(TOKEN_KEY, token);
        setUser(user);
      };

      const login = async (email, password) => {
        const data = await apiFetch('/auth/login', {
          method: 'POST',
          body: JSON.stringify({ email, password }),
        });
        setSession(data);
        return data.user;
      };

      const signup = async (email, password, name) => {
        const data = await apiFetch('/auth/signup', {
          method: 'POST',
          body: JSON.stringify({ email, password, name }),
        });
        setSession(data);
        return data.user;
      };

      const logout = () => {
        localStorage.removeItem(TOKEN_KEY);
        setUser(null);
      };

      // 결제 인텐트 — 토스 위젯 호출 직전 서버에 주문 등록
      const createPaymentIntent = async (plan) => {
        return apiFetch('/payment/intent', {
          method: 'POST',
          body: JSON.stringify({ plan }),
        });
      };

      // 결제 승인 — successUrl 호출 후 클라이언트가 호출
      const confirmPayment = async ({ paymentKey, orderId, amount }) => {
        const { user, order } = await apiFetch('/payment/confirm', {
          method: 'POST',
          body: JSON.stringify({ paymentKey, orderId, amount }),
        });
        setUser(user);
        return { user, order };
      };

      const cancelMembership = async () => {
        const { user } = await apiFetch('/membership/cancel', { method: 'POST' });
        setUser(user);
        return user;
      };

      return (
        <AuthContext.Provider value={{
          user, loading,
          login, signup, logout,
          createPaymentIntent, confirmPayment,
          cancelMembership,
        }}>
          {children}
        </AuthContext.Provider>
      );
    }

    function useAuth() { return useContext(AuthContext); }

    // ========================================
    // 📚 Mock Content Data
    // ========================================
    const CONTENTS = [
      { id: '01', cat: 'Essay',     title: 'On Quiet Mornings',          excerpt: '하루의 첫 순간을 어떻게 다루느냐가, 그 하루의 톤을 정한다.',                tone: 'cream' },
      { id: '02', cat: 'Notes',     title: 'Behind the Routine',         excerpt: '루틴은 결국 자신과 맺는 작은 약속들의 묶음이다.',                            tone: 'terra' },
      { id: '03', cat: 'Letter',    title: 'First Light',                excerpt: '시작은 늘 빛이 들어오는 곳에서 비롯된다.',                                  tone: 'soft'  },
      { id: '04', cat: 'Field',     title: 'A Walk in October',          excerpt: '느린 보폭으로 도시를 다시 걷는다는 것.',                                    tone: 'cream' },
      { id: '05', cat: 'Interview', title: 'Conversation No. 04',        excerpt: '어떤 일을 오래 하는 사람들의 공통점에 대하여.',                              tone: 'terra' },
      { id: '06', cat: 'Essay',     title: 'On Reading Slowly',          excerpt: '천천히 읽는다는 것은 천천히 산다는 것의 다른 이름.',                          tone: 'soft'  },
      { id: '07', cat: 'Field',     title: 'Studio Visit — Vol. II',     excerpt: '작업하는 사람의 책상에서만 보이는 풍경이 있다.',                              tone: 'cream' },
      { id: '08', cat: 'Notes',     title: 'After the Storm',            excerpt: '폭풍이 지나간 자리에 남는 것은 늘 다음 챕터의 첫 문장이다.',                  tone: 'terra' },
    ];

    function ContentBody({ id }) {
      // 콘텐츠 본문은 mock — 같은 id에 대해 여러 단락 표시
      const c = CONTENTS.find(x => x.id === id);
      if (!c) return null;
      return (
        <div className="prose prose-stone max-w-none space-y-5 text-[15px] leading-[1.85] text-foreground/90">
          <p className="font-serif-italic text-[22px] leading-[1.6] text-foreground">"{c.excerpt}"</p>
          <p>새벽이 오기 전, 사물의 윤곽이 가장 또렷해지는 순간이 있다. 빛이 닿지 않는 어둠도, 빛 자체도 아닌, 그 둘의 경계가 가장 분명한 시간. 어쩌면 우리가 깨어 있어야 할 시간은 그때인지도 모른다.</p>
          <p>매일 같은 자리에서 같은 일을 반복한다는 것의 진짜 의미는, 같은 자리에서 매일 다른 자신을 발견한다는 것이다. 어제의 손은 오늘의 손이 아니다. 같은 일을 하지만 다른 깊이로 한다.</p>
          <p>이 글을 쓰는 동안에도 창밖에서는 바람이 한 차례 지나갔다. 우리는 같은 바람을 두 번 만날 수 없다. 그렇기에 한 번씩의 만남에 마음을 다해야 한다는 것을, 이 새벽에 다시 적어둔다.</p>
          <p className="text-muted-foreground text-sm">— Editor's Note</p>
        </div>
      );
    }

    // ========================================
    // 🧩 Layout: Header
    // ========================================
    function Header() {
      const { user, logout } = useAuth();
      const { path, navigate } = useRouter();
      return (
        <header className="px-6 py-5 border-b border-border bg-background/80 backdrop-blur-md sticky top-0 z-30">
          <div className="max-w-5xl mx-auto flex items-center justify-between">
            <Link to="/" className="flex items-baseline gap-2 hover:opacity-80 transition-opacity">
              <span className="font-serif-italic text-[20px] text-foreground">Members</span>
              <span className="eyebrow text-muted-foreground">Only</span>
            </Link>
            <nav className="flex items-center gap-1 sm:gap-2">
              <Link to="/library" className={cn(
                "px-3 py-2 text-sm rounded-md transition-colors",
                path.startsWith('/library') || path.startsWith('/content') ? "text-foreground font-medium" : "text-muted-foreground hover:text-foreground"
              )}>
                콘텐츠
              </Link>
              {user ? (
                <>
                  <Link to="/orders" className={cn(
                    "hidden sm:inline-block px-3 py-2 text-sm rounded-md transition-colors",
                    path === '/orders' ? "text-foreground font-medium" : "text-muted-foreground hover:text-foreground"
                  )}>
                    결제내역
                  </Link>
                  <Link to="/mypage" className={cn(
                    "px-3 py-2 text-sm rounded-md transition-colors",
                    path === '/mypage' ? "text-foreground font-medium" : "text-muted-foreground hover:text-foreground"
                  )}>
                    마이페이지
                  </Link>
                  {user.member && (
                    <Badge className="hidden sm:inline-flex">MEMBER</Badge>
                  )}
                  <Button variant="ghost" size="sm" onClick={() => { logout(); navigate('/'); }}>로그아웃</Button>
                </>
              ) : (
                <Button size="sm" onClick={() => navigate('/login')}>로그인</Button>
              )}
            </nav>
          </div>
        </header>
      );
    }

    function Footer() {
      return (
        <footer className="px-6 py-10 mt-20 border-t border-border">
          <div className="max-w-5xl mx-auto flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4">
            <div className="space-y-1">
              <div className="flex items-baseline gap-2">
                <span className="font-serif-italic text-[15px]">Members Only</span>
                <span className="eyebrow text-muted-foreground">미니앱</span>
              </div>
              <p className="text-xs text-muted-foreground">결제한 멤버만 접근 가능한 콘텐츠 라이브러리</p>
            </div>
            <div className="eyebrow text-muted-foreground num">Editorial · v0.1 · {new Date().getFullYear()}</div>
          </div>
        </footer>
      );
    }

    // ========================================
    // 🔒 ContentCard (그리드용)
    // ========================================
    const TONE_BG = {
      cream: 'bg-secondary',
      terra: 'bg-accent/15',
      soft:  'bg-muted',
    };
    function ContentCard({ item, locked }) {
      const { navigate } = useRouter();
      return (
        <button
          onClick={() => navigate(`/content/${item.id}`)}
          className="text-left group relative overflow-hidden rounded-lg border bg-card hover:border-accent/40 transition-all focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring"
        >
          <div className={cn("relative aspect-[4/3]", TONE_BG[item.tone])}>
            {/* 추상 placeholder 아트 */}
            <div className="absolute inset-0 flex items-center justify-center">
              <span className="font-serif-italic text-[64px] text-foreground/15 num">{item.id}</span>
            </div>
            {locked && (
              <div className="absolute inset-0 flex items-center justify-center lock-overlay">
                <div className="flex flex-col items-center gap-2 text-foreground/70">
                  <LockIcon className="h-7 w-7" />
                  <span className="eyebrow">Members Only</span>
                </div>
              </div>
            )}
          </div>
          <div className="p-5 space-y-2">
            <div className="flex items-center justify-between">
              <span className="eyebrow text-accent num">{item.cat}</span>
              <span className="eyebrow text-muted-foreground num">No. {item.id}</span>
            </div>
            <h4 className="font-serif-italic text-[20px] leading-tight">{item.title}</h4>
            <p className="text-sm text-muted-foreground line-clamp-2">{item.excerpt}</p>
          </div>
        </button>
      );
    }

    // ========================================
    // 📄 Page: Home (랜딩)
    // ========================================
    function HomePage() {
      const { user } = useAuth();
      const { navigate } = useRouter();
      const previewItems = CONTENTS.slice(0, 4);

      const ctaText = !user ? '지금 시작하기' : (user.member ? '콘텐츠 보러 가기' : '멤버 되기');
      const ctaHref = !user ? '/login' : (user.member ? '/library' : '/pay');

      return (
        <main className="anim-fade-in">
          {/* Hero */}
          <section className="px-6 pt-20 pb-16 border-b border-border">
            <div className="max-w-3xl mx-auto text-center space-y-6">
              <div className="eyebrow text-accent num">Members Only · Vol. 01</div>
              <h1 className="font-serif-italic text-[44px] sm:text-[58px] leading-[1.05] text-foreground">
                더 깊이,<br/>더 가까이.
              </h1>
              <p className="text-base sm:text-lg text-muted-foreground max-w-xl mx-auto leading-relaxed">

    // ========================================
    // 📄 Page: Login / Sign Up
    // ========================================
    function LoginPage() {
      const { login, signup } = useAuth();
      const { navigate } = useRouter();
      const [mode, setMode] = useState('login'); // login | signup
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [error, setError] = useState('');
      const [submitting, setSubmitting] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError('');
        if (!email.includes('@')) { setError('올바른 이메일 형식이 아니에요.'); return; }
        if (password.length < 4) { setError('비밀번호는 4자 이상이어야 해요.'); return; }

        setSubmitting(true);
        try {
          const user = mode === 'login'
            ? await login(email, password)
            : await signup(email, password, name);
          // 멤버면 라이브러리, 아니면 결제 페이지로
          navigate(user.member ? '/library' : '/pay');
        } catch (err) {
          setError(err.message || '오류가 발생했어요.');
        } finally {
          setSubmitting(false);
        }
      };

      return (
        <main className="anim-fade-in min-h-[calc(100vh-200px)] flex items-center justify-center px-6 py-12">
          <div className="w-full max-w-md space-y-6">
            <div className="text-center space-y-2">
              <div className="eyebrow text-accent num">Members Only</div>
              <h1 className="font-serif-italic text-[36px] leading-tight">
                {mode === 'login' ? '다시 만나서 반가워요.' : '시작해볼까요.'}
              </h1>
              <p className="text-sm text-muted-foreground">
                {mode === 'login' ? '이메일로 로그인' : '이메일로 회원가입 (모의)'}
              </p>
            </div>

            <Card>
              <CardContent className="pt-6 space-y-4">
                {/* 탭 */}
                <div className="grid grid-cols-2 gap-1 p-1 bg-secondary rounded-md">
                  <button onClick={() => setMode('login')} className={cn(
                    "py-2 text-sm rounded-sm transition-all",
                    mode === 'login' ? 'bg-background shadow-sm font-medium' : 'text-muted-foreground hover:text-foreground'
                  )}>로그인</button>
                  <button onClick={() => setMode('signup')} className={cn(
                    "py-2 text-sm rounded-sm transition-all",
                    mode === 'signup' ? 'bg-background shadow-sm font-medium' : 'text-muted-foreground hover:text-foreground'
                  )}>회원가입</button>
                </div>

                <form onSubmit={handleSubmit} className="space-y-4">
                  {mode === 'signup' && (
                    <div className="space-y-1.5">
                      <Label htmlFor="name">이름</Label>
                      <Input id="name" value={name} onChange={e => setName(e.target.value)} placeholder="홍길동" />
                    </div>
                  )}
                  <div className="space-y-1.5">
                    <Label htmlFor="email">이메일</Label>
                    <Input id="email" type="email" value={email} onChange={e => setEmail(e.target.value)} placeholder="you@example.com" required />
                  </div>
                  <div className="space-y-1.5">
                    <Label htmlFor="password">비밀번호</Label>
                    <Input id="password" type="password" value={password} onChange={e => setPassword(e.target.value)} placeholder="••••••••" required />
                  </div>
                  {error && <p className="text-xs text-destructive">{error}</p>}
                  <Button type="submit" className="w-full" size="lg" disabled={submitting}>
                    {submitting
                      ? '처리 중…'
                      : (mode === 'login' ? '로그인' : '가입하고 멤버십 보기')}
                  </Button>
                </form>

                <p className="text-xs text-center text-muted-foreground">
                  비밀번호는 bcrypt로 해시 저장되고 JWT 토큰이 발급돼요.
                </p>
              </CardContent>
            </Card>
          </div>
        </main>
      );
    }

    // ========================================
    // 📄 Page: Payment (모의 결제)
    // ========================================
    // ========================================
    // 📄 Page: Payment (TossPayments 위젯)
    // ========================================
    const PLANS = {
      monthly: { name: '월간 멤버십', price: 9900, desc: '매월 자동 결제, 언제든 해지' },
      yearly:  { name: '연간 멤버십', price: 99000, desc: '2개월 무료 — 가장 합리적인 선택' },
    };

    function PaymentPage() {
      const { user, createPaymentIntent } = useAuth();
      const { navigate } = useRouter();
      const [plan, setPlan] = useState('monthly');
      const [tossClientKey, setTossClientKey] = useState(null);
      const [requesting, setRequesting] = useState(false);
      const [error, setError] = useState('');

      const widgetsRef = useRef(null);
      const isRenderedRef = useRef(false);
      const ready = !!tossClientKey;

      useEffect(() => {
        if (!user) navigate('/login');
        else if (user.member) navigate('/library');
      }, [user]);

      // 클라이언트 키 가져오기
      useEffect(() => {
        apiFetch('/config').then(d => setTossClientKey(d.tossClientKey)).catch(() => {});
      }, []);

      // 위젯 초기화 + 한 번만 렌더링
      useEffect(() => {
        if (!ready || !user) return;
        if (typeof window.TossPayments !== 'function') {
          setError('토스 SDK 로딩에 실패했어요. 새로고침해주세요.');
          return;
        }
        const tossPayments = window.TossPayments(tossClientKey);
        const widgets = tossPayments.widgets({ customerKey: user.id });
        widgetsRef.current = widgets;

        (async () => {
          try {
            await widgets.setAmount({ currency: 'KRW', value: PLANS[plan].price });
            if (!isRenderedRef.current) {
              await widgets.renderPaymentMethods({ selector: '#payment-method', variantKey: 'DEFAULT' });
              await widgets.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' });
              isRenderedRef.current = true;
            }
          } catch (e) {
            console.error('[toss render]', e);
            setError('결제 위젯 렌더링에 실패했어요.');
          }
        })();
      }, [ready, user]);

      // 플랜 변경 시 setAmount만 호출 (재렌더 X)
      useEffect(() => {
        if (!widgetsRef.current || !isRenderedRef.current) return;
        widgetsRef.current.setAmount({ currency: 'KRW', value: PLANS[plan].price }).catch(() => {});
      }, [plan]);

      const handlePay = async () => {
        setError('');
        if (!widgetsRef.current) return;
        setRequesting(true);
        try {
          // 1) 서버에 주문 등록
          const intent = await createPaymentIntent(plan);
          // 2) 토스 결제 요청 (성공 시 successUrl로 redirect)
          const baseUrl = `${window.location.origin}${window.location.pathname}`;
          await widgetsRef.current.requestPayment({
            orderId: intent.orderId,
            orderName: intent.orderName,
            successUrl: `${baseUrl}#/payment/success`,
            failUrl: `${baseUrl}#/payment/fail`,
            customerEmail: intent.customerEmail,
            customerName: intent.customerName,
          });
        } catch (err) {
          if (err?.code === 'USER_CANCEL') {
            setError('결제를 취소했어요.');
          } else {
            setError(err.message || '결제 요청 중 오류가 발생했어요.');
          }
          setRequesting(false);
        }
      };

      if (!user) return null;

      return (
        <main className="anim-fade-in px-6 py-12">
          <div className="max-w-3xl mx-auto space-y-8">
            <div className="space-y-2">
              <div className="eyebrow text-accent num">Membership · Checkout</div>
              <h1 className="font-serif-italic text-[36px] leading-tight">결제하고 멤버 되기</h1>
              <p className="text-sm text-muted-foreground">테스트 환경 — 실제 결제는 발생하지 않아요. 토스 테스트 카드로 진행됩니다.</p>
            </div>

            <div className="grid lg:grid-cols-[1fr_360px] gap-6">
              {/* 좌측: 플랜 선택 + 토스 위젯 */}
              <div className="space-y-5">
                {/* 플랜 선택 */}
                <Card>
                  <CardHeader>
                    <CardTitle className="text-xl">플랜 선택</CardTitle>
                  </CardHeader>
                  <CardContent className="space-y-2.5">
                    {Object.entries(PLANS).map(([key, p]) => (
                      <button
                        key={key}
                        type="button"
                        onClick={() => setPlan(key)}
                        className={cn(
                          "w-full text-left p-4 rounded-md border-2 transition-all",
                          plan === key ? "border-accent bg-accent/5" : "border-border hover:border-accent/30"
                        )}
                      >
                        <div className="flex items-start justify-between gap-3">
                          <div className="space-y-1">
                            <div className="flex items-center gap-2">
                              <span className="font-medium">{p.name}</span>
                              {key === 'yearly' && <Badge>RECOMMENDED</Badge>}
                            </div>
                            <p className="text-xs text-muted-foreground">{p.desc}</p>
                          </div>
                          <div className="text-right">
                            <div className="font-serif-italic text-[24px] leading-none num">{p.price.toLocaleString()}</div>
                            <div className="eyebrow text-muted-foreground mt-1">원 / {key === 'monthly' ? '월' : '년'}</div>
                          </div>
                        </div>
                      </button>
                    ))}
                  </CardContent>
                </Card>

                {/* 토스 위젯: 결제수단 + 약관 */}
                <Card>
                  <CardHeader>
                    <CardTitle className="text-xl">결제 수단</CardTitle>
                    <CardDescription>토스페이먼츠 결제 위젯</CardDescription>
                  </CardHeader>
                  <CardContent className="space-y-4">
                    <div id="payment-method" />
                    <div id="agreement" />
                    {!ready && (
                      <p className="text-sm text-muted-foreground">결제 위젯을 불러오는 중…</p>
                    )}
                  </CardContent>
                </Card>

                {error && <p className="text-sm text-destructive">{error}</p>}
                <Button type="button" onClick={handlePay} size="lg" className="w-full" disabled={!ready || requesting}>
                  {requesting ? '결제 요청 중…' : `${PLANS[plan].price.toLocaleString()}원 결제하기`}
                </Button>
              </div>

              {/* 우측: 주문 요약 */}
              <aside className="lg:sticky lg:top-24 h-fit">
                <Card>
                  <CardHeader>
                    <CardTitle className="text-lg">주문 요약</CardTitle>
                  </CardHeader>
                  <CardContent className="space-y-4">
                    <div className="flex items-center justify-between text-sm">
                      <span className="text-muted-foreground">{PLANS[plan].name}</span>
                      <span className="num">{PLANS[plan].price.toLocaleString()}원</span>
                    </div>
                    <div className="flex items-center justify-between text-sm">
                      <span className="text-muted-foreground">VAT 포함</span>
                      <span className="num">—</span>
                    </div>
                    <Separator />
                    <div className="flex items-baseline justify-between">
                      <span className="text-sm font-medium">총 결제 금액</span>
                      <div className="text-right">
                        <div className="font-serif-italic text-[28px] leading-none num">{PLANS[plan].price.toLocaleString()}</div>
                        <div className="eyebrow text-muted-foreground mt-1">원</div>
                      </div>
                    </div>
                  </CardContent>
                  <CardFooter className="flex-col items-start gap-2">
                    <p className="text-xs text-muted-foreground">결제 후 즉시 모든 콘텐츠가 열려요.</p>
                    <p className="text-xs text-muted-foreground">테스트 카드: 아무 16자리 숫자, 미래 유효기간, 임의 CVC.</p>
                  </CardFooter>
                </Card>
              </aside>
            </div>
          </div>
        </main>
      );
    }

    // ========================================
    // 📄 Page: Payment Success (토스 redirect 후 confirm 호출)
    // ========================================
    function PaymentSuccessPage() {
      const { user, confirmPayment } = useAuth();
      const { query, navigate } = useRouter();
      const [status, setStatus] = useState('confirming'); // confirming | done | error
      const [error, setError] = useState('');
      const [order, setOrder] = useState(null);
      const calledRef = useRef(false);

      useEffect(() => {
        if (!user) { navigate('/login'); return; }
        if (calledRef.current) return;
        calledRef.current = true;

        const { paymentKey, orderId, amount } = query;
        if (!paymentKey || !orderId || !amount) {
          setStatus('error');
          setError('결제 정보가 누락되었어요.');
          return;
        }
        confirmPayment({ paymentKey, orderId, amount: Number(amount) })
          .then(({ order }) => { setOrder(order); setStatus('done'); })
          .catch(err => { setStatus('error'); setError(err.message || '결제 승인에 실패했어요.'); });
      }, [user]);

      return (
        <main className="anim-fade-in min-h-[calc(100vh-200px)] flex items-center justify-center px-6 py-12">
          <Card className="max-w-md w-full">
            <CardContent className="pt-8 pb-6 text-center space-y-5">
              {status === 'confirming' && (
                <>
                  <div className="eyebrow text-accent num">Confirming</div>
                  <h1 className="font-serif-italic text-[28px]">결제 승인 중…</h1>
                  <p className="text-sm text-muted-foreground">잠시만 기다려주세요.</p>
                </>
              )}
              {status === 'done' && order && (
                <>
                  <div className="mx-auto h-14 w-14 rounded-full bg-accent/15 flex items-center justify-center">
                    <CheckIcon className="h-7 w-7 text-accent" />
                  </div>
                  <div>
                    <div className="eyebrow text-accent num">Welcome, Member</div>
                    <h1 className="font-serif-italic text-[28px] mt-1">결제가 완료됐어요.</h1>
                  </div>
                  <div className="text-left bg-secondary rounded-md p-4 space-y-2 text-sm">
                    <div className="flex justify-between"><span className="text-muted-foreground">상품</span><span>{order.orderName}</span></div>
                    <div className="flex justify-between"><span className="text-muted-foreground">결제 금액</span><span className="num">{order.amount.toLocaleString()}원</span></div>
                    <div className="flex justify-between"><span className="text-muted-foreground">주문 번호</span><span className="num text-xs">{order.orderId}</span></div>
                  </div>
                  <div className="flex gap-2">
                    <Button onClick={() => navigate('/library')} className="flex-1">콘텐츠 보러 가기</Button>
                    <Button variant="outline" onClick={() => navigate('/orders')} className="flex-1">결제 내역</Button>
                  </div>
                </>
              )}
              {status === 'error' && (
                <>
                  <div className="eyebrow text-destructive num">Error</div>
                  <h1 className="font-serif-italic text-[28px]">결제 승인 실패</h1>
                  <p className="text-sm text-destructive">{error}</p>
                  <div className="flex gap-2">
                    <Button variant="outline" onClick={() => navigate('/pay')} className="flex-1">다시 결제</Button>
                    <Button onClick={() => navigate('/')} className="flex-1">홈으로</Button>
                  </div>
                </>
              )}
            </CardContent>
          </Card>
        </main>
      );
    }

      const { user } = useAuth();
      const { navigate } = useRouter();

      const [error, setError] = useState('');

      useEffect(() => {
        if (!user) { navigate('/login'); return; }
        apiFetch('/orders')
          .then(d => setOrders(d.orders))
          .catch(e => setError(e.message || '결제 내역을 불러오지 못했어요.'));

      if (!user) return null;

      return (
        <main className="anim-fade-in px-6 py-12">
          <div className="max-w-3xl mx-auto space-y-6">
            <div className="space-y-2">
              <div className="eyebrow text-accent num">Receipts</div>
              <h1 className="font-serif-italic text-[36px] leading-tight">결제 내역</h1>
              <p className="text-sm text-muted-foreground">{orders == null ? '불러오는 중…' : `총 ${orders.length}건의 결제 기록.`}</p>
            </div>

            {error && <p className="text-sm text-destructive">{error}</p>}

            {orders != null && orders.length === 0 && (
              <Card>
                <CardContent className="py-12 text-center space-y-4">
                  <p className="text-muted-foreground text-sm">아직 결제한 내역이 없어요.</p>
                  <Button onClick={() => navigate('/pay')}>멤버 되기</Button>
                </CardContent>
              </Card>
            )}

            {orders != null && orders.length > 0 && (
              <div className="space-y-3">
                {orders.map(o => (
                  <Card key={o.orderId} className="overflow-hidden">
                    <CardContent className="p-5 space-y-3">
                      <div className="flex items-start justify-between gap-3">
                        <div className="space-y-1">
                          <div className="flex items-center gap-2">
                            <span className="font-medium">{o.orderName}</span>
                            <Badge variant="secondary">결제 완료</Badge>
                          </div>
                          <div className="text-xs text-muted-foreground num">{new Date(o.approvedAt).toLocaleString('ko-KR')}</div>
                        </div>
                        <div className="text-right">
                          <div className="font-serif-italic text-[22px] leading-none num">{o.amount.toLocaleString()}</div>
                          <div className="eyebrow text-muted-foreground mt-1">원</div>
                        </div>
                      </div>
                      <Separator />
                      <div className="grid grid-cols-2 gap-3 text-xs">
                        <div>
                          <div className="eyebrow text-muted-foreground mb-0.5">주문번호</div>
                          <div className="num truncate">{o.orderId}</div>
                        </div>
                        <div>
                          <div className="eyebrow text-muted-foreground mb-0.5">결제수단</div>
                          <div>{o.method || '카드'}</div>
                        </div>
                      </div>
                      {o.receiptUrl && (
                        <div className="pt-1">
                          <a href={o.receiptUrl} target="_blank" rel="noreferrer" className="text-xs text-accent hover:underline">영수증 보기 →</a>
                        </div>
                      )}
                    </CardContent>
                  </Card>
                ))}
              </div>
            )}
          </div>
        </main>
      );
    }

    // ========================================
    // 📄 Page: Library (콘텐츠 그리드)
    // ========================================
    function LibraryPage() {
      const { user } = useAuth();
      const { navigate } = useRouter();
      const [filter, setFilter] = useState('All');

      const cats = useMemo(() => ['All', ...Array.from(new Set(CONTENTS.map(c => c.cat)))], []);
      const filtered = filter === 'All' ? CONTENTS : CONTENTS.filter(c => c.cat === filter);

      const isMember = user?.member;

      return (
        <main className="anim-fade-in px-6 py-12">
          <div className="max-w-5xl mx-auto space-y-8">
            <div className="flex items-end justify-between gap-4 flex-wrap">
              <div className="space-y-2">
                <div className="eyebrow text-accent num">Library</div>
                <h1 className="font-serif-italic text-[36px] leading-tight">전체 콘텐츠</h1>
                <p className="text-sm text-muted-foreground">{CONTENTS.length}편의 큐레이션 콘텐츠.</p>
              </div>
              {!isMember && (
                <Button onClick={() => navigate(user ? '/pay' : '/login')}>
                  <LockIcon /> 멤버 되고 전체 열람
                </Button>
              )}
            </div>

            {/* 필터 */}
            <div className="flex items-center gap-2 flex-wrap border-b border-border pb-4">
              {cats.map(c => (
                <button
                  key={c}
                  onClick={() => setFilter(c)}
                  className={cn(
                    "eyebrow px-3 py-1.5 rounded-full transition-colors",
                    filter === c ? "bg-foreground text-primary-foreground" : "text-muted-foreground hover:text-foreground"
                  )}
                >{c}</button>
              ))}
            </div>

            {/* 비멤버 안내 박스 */}
            {!isMember && (
              <div className="rounded-lg border border-dashed border-accent/40 bg-accent/5 p-5 flex items-start gap-3">
                <LockIcon className="h-5 w-5 text-accent mt-0.5 shrink-0" />
                <div className="space-y-1">
                  <p className="text-sm font-medium">멤버 전용 콘텐츠입니다</p>
                  <p className="text-xs text-muted-foreground">
                    카드를 클릭하면 미리보기를 볼 수 있어요. 전체 본문은 멤버십 가입 후 열람할 수 있어요.
                  </p>
                </div>
              </div>
            )}

            {/* 그리드 */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
              {filtered.map(item => (
                <ContentCard key={item.id} item={item} locked={!isMember} />
              ))}
            </div>
          </div>
        </main>
      );
    }

    // ========================================
    // 📄 Page: Content Detail
    // ========================================
    function ContentDetailPage({ id }) {
      const { user } = useAuth();
      const { navigate } = useRouter();
      const item = CONTENTS.find(c => c.id === id);
      const isMember = user?.member;

      if (!item) {
        return (
          <main className="anim-fade-in px-6 py-20 text-center space-y-4">
            <h1 className="font-serif-italic text-[28px]">콘텐츠를 찾지 못했어요.</h1>
            <Button onClick={() => navigate('/library')}>라이브러리로</Button>
          </main>
        );
      }

      return (
        <main className="anim-fade-in">
          {/* Hero */}
          <section className={cn("px-6 pt-16 pb-12 border-b border-border", TONE_BG[item.tone])}>
            <div className="max-w-3xl mx-auto space-y-5 text-center">
              <div className="flex items-center justify-center gap-3 eyebrow">
                <span className="text-accent num">{item.cat}</span>
                <span className="text-muted-foreground">·</span>
                <span className="text-muted-foreground num">No. {item.id}</span>
              </div>
              <h1 className="font-serif-italic text-[40px] sm:text-[52px] leading-[1.1]">{item.title}</h1>
              <p className="text-base text-muted-foreground max-w-xl mx-auto leading-relaxed">{item.excerpt}</p>
            </div>
          </section>

          {/* Body */}
          <section className="px-6 py-14">
            <div className="max-w-2xl mx-auto relative">
              {isMember ? (
                <ContentBody id={id} />
              ) : (
                <>
                  {/* 미리보기 일부만 보이고 나머지는 블러 */}
                  <div className="space-y-5 text-[15px] leading-[1.85]">
                    <p className="font-serif-italic text-[22px] leading-[1.6] text-foreground">"{item.excerpt}"</p>
                    <p className="text-foreground/90">새벽이 오기 전, 사물의 윤곽이 가장 또렷해지는 순간이 있다. 빛이 닿지 않는 어둠도, 빛 자체도 아닌, 그 둘의 경계가 가장 분명한 시간…</p>
                    <div className="blur-locked space-y-5 text-foreground/90">
                      <p>매일 같은 자리에서 같은 일을 반복한다는 것의 진짜 의미는 같은 자리에서 매일 다른 자신을 발견한다는 것이다. 어제의 손은 오늘의 손이 아니다.</p>
                      <p>이 글을 쓰는 동안에도 창밖에서는 바람이 한 차례 지나갔다. 우리는 같은 바람을 두 번 만날 수 없다.</p>
                    </div>
                  </div>
                  {/* CTA 카드 */}
                  <div className="mt-10 rounded-lg border-2 border-accent/30 bg-card p-8 text-center space-y-4 shadow-sm">
                    <LockIcon className="h-8 w-8 mx-auto text-accent" />
                    <div className="space-y-1.5">
                      <h3 className="font-serif-italic text-[24px]">멤버만 읽을 수 있는 글이에요</h3>
                      <p className="text-sm text-muted-foreground">
                        월 9,900원 · 모든 콘텐츠 무제한 열람 · 언제든 해지
                      </p>
                    </div>
                    <Button size="lg" onClick={() => navigate(user ? '/pay' : '/login')}>
                      {user ? '멤버 되기' : '로그인하고 시작하기'}
                    </Button>
                  </div>
                </>
              )}

              <div className="mt-12 pt-6 border-t border-border">
                <Link to="/library" className="text-sm text-accent hover:underline">← 모든 콘텐츠</Link>
              </div>
            </div>
          </section>
        </main>
      );
    }

    // ========================================
    // 📄 Page: My Page
    // ========================================
    function MyPage() {
      const { user, cancelMembership, logout } = useAuth();
      const { navigate } = useRouter();
      const [confirmCancel, setConfirmCancel] = useState(false);
      const [cancelling, setCancelling] = useState(false);
      const [cancelError, setCancelError] = useState('');

      useEffect(() => { if (!user) navigate('/login'); }, [user]);
      if (!user) return null;

      const handleCancel = async () => {
        setCancelling(true);
        setCancelError('');
        try {
          await cancelMembership();
          setConfirmCancel(false);
        } catch (err) {
          setCancelError(err.message || '해지에 실패했어요.');
        } finally {
          setCancelling(false);
        }
      };

      return (
        <main className="anim-fade-in px-6 py-12">
          <div className="max-w-2xl mx-auto space-y-6">
            <div className="space-y-2">
              <div className="eyebrow text-accent num">My Page</div>
              <h1 className="font-serif-italic text-[36px] leading-tight">{user.name} 님</h1>
              <p className="text-sm text-muted-foreground">{user.email}</p>
            </div>

            {/* 멤버십 상태 카드 */}
            <Card>
              <CardHeader>
                <div className="flex items-center justify-between">
                  <CardTitle className="text-xl">멤버십 상태</CardTitle>
                  {user.member ? <Badge>ACTIVE</Badge> : <Badge variant="outline">FREE</Badge>}
                </div>
              </CardHeader>
              <CardContent className="space-y-4">
                {user.member ? (
                  <>
                    <div className="grid grid-cols-2 gap-4 text-sm">
                      <div>
                        <div className="eyebrow text-muted-foreground mb-1">플랜</div>
                        <div className="font-medium">{user.plan === 'yearly' ? '연간 멤버십' : '월간 멤버십'}</div>
                      </div>
                      <div>
                        <div className="eyebrow text-muted-foreground mb-1">시작일</div>
                        <div className="num">{new Date(user.paidAt).toLocaleDateString('ko-KR')}</div>
                      </div>
                    </div>
                    <Separator />
                    <div className="flex flex-col sm:flex-row gap-2">
                      <Button onClick={() => navigate('/library')} className="flex-1">콘텐츠 보러 가기</Button>
                      <Button variant="outline" onClick={() => setConfirmCancel(true)} className="flex-1">멤버십 해지</Button>
                    </div>
                  </>
                ) : (
                  <>
                    <p className="text-sm text-muted-foreground">아직 멤버십에 가입하지 않으셨어요. 가입하면 모든 콘텐츠를 무제한으로 열람할 수 있어요.</p>
                    <Button onClick={() => navigate('/pay')} className="w-full">멤버 되기</Button>
                  </>
                )}
              </CardContent>
            </Card>

            {/* 결제 내역 */}
            {user.member && (
              <Card>
                <CardHeader>
                  <CardTitle className="text-xl">결제 내역</CardTitle>
                </CardHeader>
                <CardContent>
                  <div className="flex items-center justify-between py-3 border-b border-border last:border-0 text-sm">
                    <div>
                      <div className="font-medium">{user.plan === 'yearly' ? '연간 멤버십' : '월간 멤버십'}</div>
                      <div className="text-xs text-muted-foreground num mt-0.5">{new Date(user.paidAt).toLocaleString('ko-KR')}</div>
                    </div>
                    <div className="text-right">
                      <div className="num font-medium">{(user.plan === 'yearly' ? 99000 : 9900).toLocaleString()}원</div>
                      <div className="eyebrow text-muted-foreground mt-0.5">결제 완료</div>
                    </div>
                  </div>
                </CardContent>
              </Card>
            )}

            {/* 계정 */}
            <Card>
              <CardHeader>
                <CardTitle className="text-xl">계정</CardTitle>
              </CardHeader>
              <CardContent>
                <Button variant="outline" onClick={() => { logout(); navigate('/'); }} className="w-full">로그아웃</Button>
              </CardContent>
            </Card>
          </div>

          {/* 해지 확인 모달 */}
          {confirmCancel && (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-foreground/40 backdrop-blur-sm anim-fade-in"
                 onClick={() => setConfirmCancel(false)}>
              <Card className="max-w-md w-full" onClick={e => e.stopPropagation()}>
                <CardHeader>
                  <CardTitle className="text-xl">멤버십을 해지할까요?</CardTitle>
                  <CardDescription>해지 후에는 모든 콘텐츠 접근이 차단돼요.</CardDescription>
                </CardHeader>
                {cancelError && <p className="px-6 text-sm text-destructive">{cancelError}</p>}
                <CardFooter className="gap-2">
                  <Button variant="outline" className="flex-1" disabled={cancelling} onClick={() => setConfirmCancel(false)}>취소</Button>
                  <Button variant="destructive" className="flex-1" disabled={cancelling} onClick={handleCancel}>
                    {cancelling ? '처리 중…' : '해지하기'}
                  </Button>
                </CardFooter>
              </Card>
            </div>
          )}
        </main>
      );
    }

    // ========================================
    // 🚀 App + Router 매칭
    // ========================================
    function AppRoutes() {
      const { path } = useRouter();
      const detailParams = matchRoute('/content/:id', path);

      if (path === '/' || path === '') return <HomePage />;
      if (path === '/login') return <LoginPage />;
      if (path === '/pay') return <PaymentPage />;
      if (path === '/payment/success') return <PaymentSuccessPage />;
      if (path === '/payment/fail') return <PaymentFailPage />;
      if (path === '/library') return <LibraryPage />;
      if (path === '/mypage') return <MyPage />;
      if (path === '/orders') return <OrdersPage />;
      if (detailParams) return <ContentDetailPage id={detailParams.id} />;

      // 404
      return (
        <main className="anim-fade-in px-6 py-20 text-center space-y-4">
          <div className="eyebrow text-muted-foreground num">404</div>
          <h1 className="font-serif-italic text-[36px]">페이지를 찾지 못했어요.</h1>
          <Link to="/" className="text-accent hover:underline">홈으로</Link>
        </main>
      );
    }

    function AppShell() {
      const { loading } = useAuth();
      if (loading) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="text-center space-y-2 anim-fade-in">
              <div className="eyebrow text-muted-foreground num">Members Only</div>
              <p className="font-serif-italic text-[24px]">불러오는 중…</p>
            </div>
          </div>
        );
      }
      return (
        <Router>
          <div className="min-h-screen flex flex-col">
            <Header />
            <div className="flex-1">
              <AppRoutes />
            </div>
            <Footer />
          </div>
        </Router>
      );
    }

    function App() {
      return (
        <AuthProvider>
          <AppShell />
        </AuthProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
