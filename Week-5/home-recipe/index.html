<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>냉장고 레시피</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: { 50: '#fff7ed', 100: '#ffedd5', 200: '#fed7aa', 300: '#fdba74', 400: '#fb923c', 500: '#f97316', 600: '#ea580c', 700: '#c2410c' },
            warm: { 50: '#fef2f2', 100: '#fee2e2', 500: '#ef4444', 600: '#dc2626' },
          }
        }
      }
    }
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }
    .fade-up { animation: fadeUp 0.3s ease-out; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body class="bg-brand-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    // ========================================
    // 🚀 App Component
    // ========================================

    const SUGGESTIONS = ['계란', '김치', '두부', '양파', '감자', '당근', '파', '마늘', '고추장', '된장', '라면', '밥', '치즈', '햄', '버섯', '소시지', '참치캔', '떡'];

    function App() {
      const [ingredients, setIngredients] = useState([]);
      const [input, setInput] = useState('');
      const [recipes, setRecipes] = useState([]);
      const [selected, setSelected] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [searched, setSearched] = useState(false);

      const add = useCallback((item) => {
        setIngredients(prev => prev.includes(item) ? prev : [...prev, item]);
      }, []);
      const remove = useCallback((item) => {
        setIngredients(prev => prev.filter(i => i !== item));
      }, []);
      const handleAdd = () => { const t = input.trim(); if (t) { add(t); setInput(''); } };

      const search = async () => {
        if (ingredients.length === 0 || loading) return;
        setSearched(true);
        setLoading(true);
        setError(null);
        try {
          const res = await fetch('/api/recipe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ ingredients })
          });
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          const jsonMatch = data.content.match(/\[[\s\S]*\]/);
          if (!jsonMatch) throw new Error('레시피 파싱 실패');
          setRecipes(JSON.parse(jsonMatch[0]));
        } catch (err) {
          setError(err.message);
          setRecipes([]);
        } finally {
          setLoading(false);
        }
      };

      // ── Recipe Detail Page ──
      if (selected) {
        return (
          <div className="max-w-lg mx-auto px-4 py-6">
            <button onClick={() => setSelected(null)} className="text-brand-400 hover:text-brand-600 mb-4 text-sm font-medium">&larr; 뒤로가기</button>
            <div className="bg-white rounded-2xl border border-brand-100 overflow-hidden shadow-sm">
              <div className="bg-gradient-to-r from-brand-500 to-warm-500 px-6 py-5 text-center text-white">
                <span className="text-5xl block mb-2">{selected.emoji}</span>
                <h2 className="text-xl font-bold">{selected.name}</h2>
                <p className="text-white/80 text-sm mt-1">{selected.time} &middot; {selected.servings} &middot; {selected.difficulty}</p>
              </div>
              <div className="p-6 space-y-5">
                <div>
                  <h3 className="text-sm font-bold text-brand-600 mb-2">재료</h3>
                  <div className="flex flex-wrap gap-1.5">
                    {selected.ingredients.map((ing, i) => (
                      <span key={i} className="text-sm bg-brand-50 text-brand-700 px-2.5 py-1 rounded-full border border-brand-100">{ing}</span>
                    ))}
                  </div>
                </div>
                <div>
                  <h3 className="text-sm font-bold text-brand-600 mb-2">조리 순서</h3>
                  <ol className="space-y-2.5">
                    {selected.steps.map((step, i) => (
                      <li key={i} className="flex gap-3 text-sm text-gray-700">
                        <span className="shrink-0 w-6 h-6 bg-brand-500 text-white rounded-full flex items-center justify-center text-xs font-bold">{i + 1}</span>
                        <span className="pt-0.5">{step}</span>
                      </li>
                    ))}
                  </ol>
                </div>
                {selected.tip && (
                  <div className="bg-amber-50 border border-amber-200 text-amber-700 text-sm rounded-xl p-3.5">
                    💡 {selected.tip}
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      }

      // ── Main Page ──
      return (
        <div className="max-w-lg mx-auto px-4 py-6 space-y-5">
          {/* Header */}
          <div className="text-center py-2">
            <h1 className="text-3xl font-extrabold">
              <span className="bg-gradient-to-r from-brand-500 to-warm-500 bg-clip-text text-transparent">냉장고 레시피</span>
            </h1>
            <p className="text-sm text-gray-400 mt-1">AI가 재료에 맞는 레시피를 추천해드려요</p>
          </div>

          {/* Ingredient Input */}
          <div className="bg-white rounded-2xl border border-brand-100 p-4 space-y-3 shadow-sm">
            <div className="flex gap-2">
              <input
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={e => e.key === 'Enter' && handleAdd()}
                placeholder="재료 입력 (예: 계란)"
                className="flex-1 px-3.5 py-2.5 border border-gray-200 rounded-xl text-sm focus:outline-none focus:border-brand-400 focus:ring-1 focus:ring-brand-200"
              />
              <button onClick={handleAdd} disabled={!input.trim()} className="px-4 py-2.5 bg-brand-500 hover:bg-brand-600 text-white text-sm font-semibold rounded-xl disabled:opacity-40 transition-colors">추가</button>
            </div>

            {/* Quick add */}
            <div className="flex flex-wrap gap-1.5">
              {SUGGESTIONS.filter(s => !ingredients.includes(s)).map(s => (
                <button key={s} onClick={() => add(s)} className="px-2.5 py-1 text-xs bg-brand-50 hover:bg-brand-100 text-brand-600 rounded-lg border border-brand-100 transition-colors">
                  + {s}
                </button>
              ))}
            </div>

            {/* Selected */}
            {ingredients.length > 0 && (
              <div className="flex flex-wrap gap-1.5 pt-1 border-t border-gray-100">
                {ingredients.map(item => (
                  <span key={item} className="inline-flex items-center gap-1 px-2.5 py-1.5 bg-gradient-to-r from-brand-500 to-brand-400 text-white text-sm rounded-full font-medium shadow-sm">
                    {item}
                    <button onClick={() => remove(item)} className="text-white/70 hover:text-white ml-0.5">&times;</button>
                  </span>
                ))}
              </div>
            )}
          </div>

          {/* Search Button */}
          <button
            onClick={search}
            disabled={ingredients.length === 0 || loading}
            className="w-full py-3.5 bg-gradient-to-r from-brand-500 to-warm-500 hover:from-brand-600 hover:to-warm-600 text-white font-bold rounded-xl disabled:opacity-40 transition-all shadow-md hover:shadow-lg text-base"
          >
            {loading ? (
              <span className="inline-flex items-center gap-2">
                <svg className="w-4 h-4 spinner" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="3" opacity="0.3"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" strokeWidth="3" strokeLinecap="round"/></svg>
                AI가 레시피를 찾고 있어요...
              </span>
            ) : `🍳 ${ingredients.length}개 재료로 레시피 찾기`}
          </button>

          {/* Error */}
          {error && (
            <div className="bg-warm-50 border border-warm-100 rounded-xl p-3.5 text-sm text-warm-600 fade-up">
              오류: {error}
            </div>
          )}

          {/* Results */}
          {!loading && recipes.length > 0 && (
            <div className="space-y-2.5 fade-up">
              <p className="text-sm font-medium text-brand-600">{recipes.length}개의 레시피를 찾았어요!</p>
              {recipes.map((r, i) => (
                <button key={i} onClick={() => setSelected(r)} className="w-full text-left bg-white rounded-xl border border-brand-100 p-4 hover:border-brand-300 hover:shadow-md transition-all group">
                  <div className="flex items-center gap-3">
                    <span className="text-3xl group-hover:scale-110 transition-transform">{r.emoji}</span>
                    <div className="flex-1">
                      <h3 className="font-bold text-gray-800">{r.name}</h3>
                      <p className="text-xs text-gray-400 mt-0.5">{r.description} &middot; {r.time} &middot; {r.difficulty}</p>
                    </div>
                    <span className="text-brand-300 group-hover:text-brand-500 transition-colors">&rsaquo;</span>
                  </div>
                </button>
              ))}
            </div>
          )}

          {/* Loading skeleton */}
          {loading && (
            <div className="space-y-2.5">
              {[1,2,3].map(i => (
                <div key={i} className="bg-white rounded-xl border border-brand-100 p-4 animate-pulse">
                  <div className="flex items-center gap-3">
                    <div className="w-10 h-10 bg-brand-100 rounded-lg"></div>
                    <div className="flex-1 space-y-2">
                      <div className="h-4 bg-brand-100 rounded w-1/3"></div>
                      <div className="h-3 bg-brand-50 rounded w-2/3"></div>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}

          {/* Empty */}
          {!loading && searched && recipes.length === 0 && !error && (
            <div className="text-center py-10 text-gray-300 fade-up">
              <p className="text-4xl mb-2">🤔</p>
              <p className="text-sm">레시피를 찾지 못했어요. 다른 재료로 시도해보세요!</p>
            </div>
          )}

          {/* Initial */}
          {!searched && !loading && (
            <div className="text-center py-10 text-brand-200">
              <p className="text-5xl mb-3">🍽</p>
              <p className="text-sm">재료를 추가하고 레시피를 찾아보세요</p>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
