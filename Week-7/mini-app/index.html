    // ========================================
    // Auth + API Helpers
    // ========================================
    const TOKEN_KEY = 'auth_token';
    const getToken = () => localStorage.getItem(TOKEN_KEY) || '';
    const saveToken = (t) => localStorage.setItem(TOKEN_KEY, t);
    const clearToken = () => localStorage.removeItem(TOKEN_KEY);
    const formatPrice = (n) => `₩${n.toLocaleString('ko-KR')}`;

    const api = async (path, opts = {}) => {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...(opts.headers || {}) };
      if (token) headers['Authorization'] = `Bearer ${token}`;
      const res = await fetch(path, { ...opts, headers });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) {
        const err = new Error(data.error || `HTTP ${res.status}`);
        err.status = res.status;
        throw err;
      }
      return data;
    };

    // ========================================
    // Hash Router
    // ========================================
    const useHash = () => {
      const [hash, setHash] = useState(window.location.hash || '#/');
      useEffect(() => {
        const onChange = () => setHash(window.location.hash || '#/');
        window.addEventListener('hashchange', onChange);
        return () => window.removeEventListener('hashchange', onChange);
      }, []);
      return hash;
    };
    const navigate = (path) => { window.location.hash = path; };

    // ========================================
    // Design System Components
    // ========================================
    function Button({ children, variant = 'primary', size = 'md', disabled, onClick, className = '', ...rest }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-gray-500 disabled:opacity-50 disabled:cursor-not-allowed';
      const sizes = { sm: 'px-3 py-1.5 text-sm', md: 'px-4 py-2 text-sm', lg: 'px-5 py-3 text-base' };
      const variants = {
        primary: 'ink-bg text-white hover:bg-gray-800',
        secondary: 'bg-white border border-gray-300 text-gray-900 hover:bg-gray-50',
        ghost: 'text-gray-700 hover:bg-gray-100',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Badge({ children, className = '' }) {
      return (
        <span className={`inline-flex items-center px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-700 ${className}`}>
          {children}
        </span>
      );
    }

      return (
        <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-semibold ink-bg text-white">
          {formatPrice(price)}
        </span>
      );
    }

    function LockIcon({ className = 'w-4 h-4' }) {
      return (

          <path d="M8 11V7a4 4 0 1 1 8 0v4" />
        </svg>
      );
    }

    function CheckIcon({ className = 'w-4 h-4' }) {
      return (
        <svg className={className} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
          <path d="M5 13l4 4L19 7" />
        </svg>
      );
    }

    function Toast({ message, show }) {
      if (!show) return null;
      return (
        <div className="fixed bottom-6 left-1/2 -translate-x-1/2 z-[60] fade-in">
          <div className="ink-bg text-white px-4 py-2.5 rounded-lg shadow-lg text-sm flex items-center gap-2">
            <span className="inline-block w-3.5 h-3.5 border-2 border-white border-t-transparent rounded-full spinner"></span>
            {message}
          </div>
        </div>
      );
    }

    function Modal({ isOpen, onClose, children }) {
      useEffect(() => {
        if (!isOpen) return;
        const onKey = (e) => { if (e.key === 'Escape') onClose(); };
        document.addEventListener('keydown', onKey);
        return () => document.removeEventListener('keydown', onKey);
      }, [isOpen, onClose]);
      if (!isOpen) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4">
          <div className="absolute inset-0 bg-black/50" onClick={onClose}></div>
          <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-md fade-in">
            {children}
          </div>
        </div>
      );
    }

    // ========================================

    // ========================================

      const [menuOpen, setMenuOpen] = useState(false);

    // ========================================
    // Toss Payment Widget Modal — 결제 수단 선택 + 약관 동의 위젯
    // ========================================
    function TossWidgetModal({ content, order, user, onClose }) {
      const [widgets, setWidgets] = useState(null);
      const [loading, setLoading] = useState(true);
      const [paying, setPaying] = useState(false);
      const [err, setErr] = useState('');
      const initRef = useRef(false);

      useEffect(() => {
        if (initRef.current) return;
        initRef.current = true;
        (async () => {
          try {
            const config = await api('/api/config');
            const tp = TossPayments(config.clientKey);
            const w = tp.widgets({ customerKey: order.customerKey });
            await w.setAmount({ currency: 'KRW', value: order.amount });
            await Promise.all([
              w.renderPaymentMethods({ selector: '#payment-method', variantKey: 'DEFAULT' }),
              w.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' }),
            ]);
            setWidgets(w);
            setLoading(false);
          } catch (e) {
            console.error(e);
            setErr('결제 위젯 로딩 실패: ' + (e.message || e.code || '알 수 없는 오류'));
            setLoading(false);
          }
        })();
      }, []);

      const requestPay = async () => {
        if (!widgets) return;
        setPaying(true);
        setErr('');
        try {
          await widgets.requestPayment({
            orderId: order.orderId,
            orderName: content.title,
            successUrl: `${window.location.origin}/`,
            failUrl: `${window.location.origin}/`,
            customerEmail: user.email,
            customerName: user.email.split('@')[0],
          });
          setPaying(false);
        } catch (e) {
          setPaying(false);
          if (e.code === 'USER_CANCEL') return;
          setErr('결제 요청 실패: ' + (e.message || e.code));
        }
      };

      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4 overflow-y-auto">
          <div className="absolute inset-0 bg-black/50" onClick={paying ? null : onClose}></div>
          <div className="relative bg-white rounded-2xl shadow-xl w-full max-w-lg my-8 fade-in">
            <div className="p-5 sm:p-6">
              <div className="flex items-center justify-between mb-3">
                <h2 className="text-lg font-bold ink">결제 수단 선택</h2>
                <button onClick={onClose} disabled={paying} className="text-gray-400 hover:text-gray-700 disabled:opacity-40 text-2xl leading-none">×</button>
              </div>
              <div className="bg-gray-50 rounded-lg px-4 py-3 mb-4 flex items-center justify-between">
                <div>
                  <div className="text-xs text-gray-500">결제 상품</div>
                  <div className="text-sm ink font-medium line-clamp-1">{content.title}</div>
                </div>
                <div className="text-lg font-bold ink whitespace-nowrap ml-3">{formatPrice(order.amount)}</div>
              </div>
              {loading && <p className="text-gray-500 text-sm py-4 text-center">결제 위젯 로딩 중…</p>}
              {err && <div className="text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2 mb-3">{err}</div>}
              <div id="payment-method" className={loading ? 'hidden' : ''}></div>
              <div id="agreement" className={`mt-3 ${loading ? 'hidden' : ''}`}></div>
              {!loading && !err && (
                <Button size="lg" className="w-full mt-4" onClick={requestPay} disabled={paying}>
                  {paying ? '결제 진행 중…' : `${formatPrice(order.amount)} 결제하기`}
                </Button>
              )}
              <p className="text-[11px] text-gray-400 text-center mt-3">
                TossPayments 테스트 상점 · 실제 청구되지 않습니다
              </p>
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Auth Modal (login + signup)
    // ========================================
    function AuthModal({ isOpen, onClose, onAuth }) {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [busy, setBusy] = useState(false);
      const [err, setErr] = useState('');

      useEffect(() => {
        if (!isOpen) {
          setEmail(''); setPassword(''); setErr(''); setMode('login');
        }
      }, [isOpen]);

      const submit = async (e) => {
        e.preventDefault();
        setBusy(true); setErr('');
        try {
          const data = await api(`/api/${mode === 'login' ? 'login' : 'register'}`, {
            method: 'POST',
            body: JSON.stringify({ email, password }),
          });
          saveToken(data.token);
          onAuth(data.user);
          onClose();
        } catch (e) {
          setErr(e.message || '오류가 발생했습니다');
        } finally {
          setBusy(false);
        }
      };

      return (
        <Modal isOpen={isOpen} onClose={busy ? () => {} : onClose}>
          <div className="p-6 sm:p-8">
            <div className="flex gap-1 mb-6 bg-gray-100 rounded-lg p-1">
              <button type="button" onClick={() => { setMode('login'); setErr(''); }} className={`flex-1 py-2 rounded-md text-sm font-medium transition ${mode === 'login' ? 'bg-white shadow ink' : 'text-gray-500'}`}>로그인</button>
              <button type="button" onClick={() => { setMode('signup'); setErr(''); }} className={`flex-1 py-2 rounded-md text-sm font-medium transition ${mode === 'signup' ? 'bg-white shadow ink' : 'text-gray-500'}`}>회원가입</button>
            </div>
            <form onSubmit={submit} className="space-y-3">
              <div>
                <label className="block text-xs font-medium text-gray-700 mb-1">이메일</label>
                <input type="email" required autoFocus value={email} onChange={(e) => setEmail(e.target.value)}
                  className="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
                  placeholder="you@example.com" />
              </div>
              <div>
                <label className="block text-xs font-medium text-gray-700 mb-1">비밀번호</label>
                <input type="password" required minLength={6} value={password} onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-3 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-gray-900 focus:border-transparent"
                  placeholder="6자 이상" />
              </div>
              {err && <div className="text-xs text-red-600 bg-red-50 border border-red-200 rounded-lg px-3 py-2">{err}</div>}
              <Button type="submit" size="lg" className="w-full" disabled={busy}>
                {busy ? '처리 중...' : (mode === 'login' ? '로그인' : '회원가입 + 로그인')}
              </Button>
            </form>
            <p className="text-[11px] text-gray-400 text-center mt-4">
              {mode === 'login' ? '계정이 없으면 위에서 회원가입을 선택하세요.' : '이메일과 비밀번호만 있으면 가입할 수 있어요.'}
            </p>
          </div>
        </Modal>
      );
    }

      }
      const unlocked = unlockedIds.includes(content.id);

      return (
        <main className="max-w-3xl mx-auto px-4 sm:px-6 py-8 sm:py-12">
          <button onClick={() => navigate('/')} className="text-sm text-gray-500 hover:ink mb-6 inline-flex items-center gap-1">
            <span>←</span> 목록으로
          </button>

          <div className="flex items-center gap-2 mb-3">
            <Badge>{content.category}</Badge>
            <Badge>{content.duration}</Badge>
            {unlocked && (
              <span className="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-semibold ink-bg text-white">
                <CheckIcon className="w-3 h-3" /> 열람 가능
              </span>
            )}
          </div>

          <h1 className="text-2xl sm:text-3xl font-bold ink leading-tight mb-3">{content.title}</h1>
          <p className="text-gray-600 mb-6">{content.desc}</p>

          <div className="relative h-56 sm:h-72 rounded-2xl bg-gray-200 flex items-center justify-center mb-8 overflow-hidden">
            <img src={content.image} alt="" className="absolute inset-0 w-full h-full object-cover" />
            <div className="absolute inset-0 bg-black/25"></div>
            <div className="relative text-white text-xs uppercase tracking-[0.3em] drop-shadow">{content.category}</div>
          </div>

          <div className="relative">
            <article className={`prose prose-gray max-w-none space-y-5 text-[15px] leading-7 text-gray-800 ${unlocked ? '' : 'blur-content'}`}>
              {content.body.map((p, i) => (
                <p key={i}>{p}</p>
              ))}
            </article>

            {!unlocked && (
              <div className="absolute inset-0 flex items-start justify-center pt-16 sm:pt-24">
                <div className="bg-white border border-gray-200 rounded-2xl shadow-xl p-6 sm:p-8 max-w-sm w-full text-center">
                  <div className="w-12 h-12 mx-auto mb-4 rounded-full bg-gray-100 flex items-center justify-center ink">
                    <LockIcon className="w-5 h-5" />
                  </div>
                  <h3 className="font-bold ink mb-1">결제 후 열람 가능</h3>
                  <p className="text-sm text-gray-600 mb-5">
                    {formatPrice(content.price)} · 한 번 결제로 영구 열람
                  </p>
                  <Button size="lg" className="w-full" onClick={() => onUnlockClick(content)}>
                    결제하고 열람하기
                  </Button>
                </div>
              </div>
            )}
          </div>
        </main>
      );
    }

    // ========================================
    // App Root
    // ========================================
    function App() {
      const hash = useHash();
      const [user, setUser] = useState(null);
      const [unlockedIds, setUnlockedIds] = useState([]);
      const [authLoading, setAuthLoading] = useState(true);
      const [authModalOpen, setAuthModalOpen] = useState(false);
      const [modalContent, setModalContent] = useState(null);
      const [paying, setPaying] = useState(false);
      const [tossOrder, setTossOrder] = useState(null);
      const [toast, setToast] = useState({ show: false, message: '결제 진행 중…' });

      // Mount: load /api/me + handle Toss redirect query
      useEffect(() => {
        (async () => {
          const token = getToken();
          if (token) {
            try {
              const u = await api('/api/me');
              setUser(u);
              setUnlockedIds(u.unlocked || []);
            } catch (e) {
              if (e.status === 401) clearToken();
            }
          }
          setAuthLoading(false);

          // Toss redirect handling
          const params = new URLSearchParams(window.location.search);
          const paymentKey = params.get('paymentKey');
          const orderId = params.get('orderId');
          const amount = params.get('amount');
          const failCode = params.get('code');
          const failMsg = params.get('message');

          if (paymentKey && orderId && amount) {
            history.replaceState({}, '', '/');
            setToast({ show: true, message: '결제 승인 중…' });
            try {
              const data = await api('/api/payments/confirm', {
                method: 'POST',
                body: JSON.stringify({ paymentKey, orderId, amount: Number(amount) }),
              });
              const me = await api('/api/me');
              setUser(me);
              setUnlockedIds(me.unlocked || []);
              setToast({ show: false, message: '' });
              if (data.contentId) navigate(`/c/${data.contentId}`);
            } catch (e) {
              setToast({ show: false, message: '' });
              alert('결제 승인 실패: ' + e.message);
            }
          } else if (failCode) {
            history.replaceState({}, '', '/');
            alert('결제 실패: ' + (failMsg || failCode));
          }
        })();
      }, []);

      // Routing
      const route = useMemo(() => {
        const path = hash.replace(/^#/, '') || '/';
        if (path === '/admin') return { name: 'admin' };
        if (path === '/history') return { name: 'history' };
        const m = path.match(/^\/c\/([^/]+)$/);
        if (m) return { name: 'detail', id: m[1] };
        return { name: 'home' };
      }, [hash]);

      const handleCardClick = useCallback((content) => {
        if (user && unlockedIds.includes(content.id)) {
          navigate(`/c/${content.id}`);
        } else {
          setModalContent(content);
        }
      }, [user, unlockedIds]);

      const handleUnlockClick = useCallback((content) => {
        setModalContent(content);
      }, []);

      const closeModal = useCallback(() => {
        if (paying) return;
        setModalContent(null);
      }, [paying]);

      // 결제 시작 — 주문 생성 후 토스 위젯 모달 오픈
      const handlePay = useCallback(async () => {
        if (!modalContent) return;
        if (!user) {
          setModalContent(null);
          setAuthModalOpen(true);
          return;
        }
        setPaying(true);
        setToast({ show: true, message: '주문 생성 중…' });
        try {
          const order = await api('/api/orders', {
            method: 'POST',
            body: JSON.stringify({ contentId: modalContent.id, amount: modalContent.price }),
          });
          setToast({ show: false, message: '' });
          setTossOrder(order); // 위젯 모달 오픈
          setPaying(false);
        } catch (e) {
          setPaying(false);
          setToast({ show: false, message: '' });
          alert('주문 생성 실패: ' + (e.message || '알 수 없는 오류'));
        }
      }, [modalContent, user]);

      const closeTossWidget = useCallback(() => {
        setTossOrder(null);
        setModalContent(null);
      }, []);

      const handleAuth = useCallback((u) => {
        setUser(u);
        setUnlockedIds(u.unlocked || []);
      }, []);

      const handleLogout = useCallback(() => {
        clearToken();
        setUser(null);
        setUnlockedIds([]);
        navigate('/');
      }, []);

      if (authLoading) {
        return <div className="min-h-screen flex items-center justify-center text-gray-500 text-sm">불러오는 중…</div>;
      }

      const needsLogin = (route.name === 'history' || route.name === 'admin') && !user;
      const needsAdmin = route.name === 'admin' && user && user.role !== 'admin';

      return (
        <div className="min-h-screen flex flex-col">
          <Header user={user} unlockedCount={unlockedIds.length} onLogin={() => setAuthModalOpen(true)} onLogout={handleLogout} />

          {needsLogin && (
            <main className="max-w-3xl mx-auto px-4 py-20 text-center">
              <p className="text-gray-500 mb-4">이 페이지는 로그인 후 이용 가능합니다.</p>
              <Button size="lg" onClick={() => setAuthModalOpen(true)}>로그인</Button>
            </main>
          )}
          {needsAdmin && (
            <main className="max-w-3xl mx-auto px-4 py-20 text-center">
              <p className="text-gray-500 mb-4">관리자 권한이 필요합니다.</p>
              <Button onClick={() => navigate('/')} variant="secondary">홈으로</Button>
            </main>
          )}

          {!needsLogin && !needsAdmin && route.name === 'home' && (
            <HomePage unlockedIds={unlockedIds} onCardClick={handleCardClick} />
          )}
          {!needsLogin && !needsAdmin && route.name === 'detail' && (
            <DetailPage contentId={route.id} unlockedIds={unlockedIds} onUnlockClick={handleUnlockClick} />
          )}
          {!needsLogin && route.name === 'history' && <HistoryPage />}
          {!needsLogin && !needsAdmin && route.name === 'admin' && <AdminPage />}

          <footer className="mt-auto border-t border-gray-200 py-6">
            <div className="max-w-6xl mx-auto px-4 sm:px-6 text-xs text-gray-500 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
              <span>© Unlock — 결제 후 열람 미니앱 · TossPayments</span>
              <span>JWT 인증 / 단건 결제 / 영구 열람</span>
            </div>
          </footer>

          <PaymentModal
            content={!tossOrder ? modalContent : null}
            isOpen={!!modalContent && !tossOrder}
            onClose={closeModal}
            onPay={handlePay}
            paying={paying}
            needsLogin={!user}
          />
          {tossOrder && modalContent && user && (
            <TossWidgetModal
              content={modalContent}
              order={tossOrder}
              user={user}
              onClose={closeTossWidget}
            />
          )}
          <AuthModal
            isOpen={authModalOpen}
            onClose={() => setAuthModalOpen(false)}
            onAuth={handleAuth}
          />
          <Toast message={toast.message} show={toast.show} />
        </div>
      );
    }

    // ========================================
    // Render
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
