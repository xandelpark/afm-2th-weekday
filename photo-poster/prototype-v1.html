<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

  <title>Marian Wedding — Thank You Card</title>
  <!--
    AFM Design System / Marian Editorial Palette (shadcn token)
    프로젝트: SnapPoster (사진 스튜디오용 자동 포스터 합성)
    팔레트 선택 사유: 도메인이 "웨딩/포토 스튜디오/포트폴리오" — README 가이드의 마리안 권장 케이스.
  -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Great+Vibes&family=Noto+Serif+KR:wght@200;300;400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary:     { DEFAULT: 'hsl(var(--primary))',     foreground: 'hsl(var(--primary-foreground))' },
            secondary:   { DEFAULT: 'hsl(var(--secondary))',   foreground: 'hsl(var(--secondary-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            muted:       { DEFAULT: 'hsl(var(--muted))',       foreground: 'hsl(var(--muted-foreground))' },
            accent:      { DEFAULT: 'hsl(var(--accent))',      foreground: 'hsl(var(--accent-foreground))' },
            popover:     { DEFAULT: 'hsl(var(--popover))',     foreground: 'hsl(var(--popover-foreground))' },
            card:        { DEFAULT: 'hsl(var(--card))',        foreground: 'hsl(var(--card-foreground))' },
          },
          borderRadius: { lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' },
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', '"Helvetica Neue"', 'Helvetica', 'Arial', 'system-ui', 'sans-serif'],
            display: ['"Helvetica Neue"', 'Helvetica', 'Inter', 'Arial', 'sans-serif'],
            'serif-kr': ['"Noto Serif KR"', 'serif'],
            cormorant: ['"Cormorant Garamond"', 'serif'],
            playfair: ['"Playfair Display"', 'serif'],
            script: ['"Allura"', '"Great Vibes"', 'cursive'],
          },
        }
      }
    };
  </script>
  <style>
    /* ==== Marian Editorial palette ==== */
    :root {
      --background: 0 0% 100%;
      --foreground: 0 0% 13%;
      --card: 0 0% 100%;
      --card-foreground: 0 0% 13%;
      --popover: 0 0% 100%;
      --popover-foreground: 0 0% 13%;
      --primary: 224 75% 14%;          /* #091940 deep midnight navy */
      --primary-foreground: 0 0% 100%;
      --secondary: 0 0% 96%;
      --secondary-foreground: 0 0% 20%;
      --muted: 0 0% 96%;
      --muted-foreground: 0 0% 40%;
      --accent: 224 75% 14%;
      --accent-foreground: 0 0% 100%;
      --destructive: 0 70% 45%;
      --destructive-foreground: 0 0% 100%;
      --border: 0 0% 87%;
      --input: 0 0% 87%;
      --ring: 224 75% 14%;
      --radius: 0rem;
    }
    html, body { max-width: 100%; overflow-x: hidden; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', 'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .display-bold {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .eyebrow {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }
    /* 청첩장 스타일에서 사용하는 세로 디바이더 */
    .vline::after { content:''; display:block; width:1px; height:36px; background: currentColor; margin: 6px auto 0; opacity:.5; }
    /* 러블리 톤 — 누드 핑크 베이스 (강화) */
    .lovely-cream { background: linear-gradient(180deg, #fde2d8 0%, #fac9bd 100%); }
    .lovely-blush { background: linear-gradient(180deg, #fdd9cd 0%, #f9bcae 100%); }
    /* 손글씨 hero "thank you" */
    .font-script { font-family: 'Allura', 'Great Vibes', cursive; font-weight: 400; }
    /* 세로 조판 — 한국어 종서 (감성 카드용) */
    .vrl-up  { writing-mode: vertical-rl; text-orientation: upright; letter-spacing: 0.04em; }
    .vrl-mix { writing-mode: vertical-rl; text-orientation: mixed; }
    /* 어절 사이 전각공백을 살짝 키워서 띄어쓰기가 또렷하게 보이도록 */
    .vrl-up.has-em-space { word-spacing: 0.15em; }

    /* === 모바일 터치 최적화 === */
    /* 텍스트 블록·핸들에 touch-action: none → 드래그가 페이지 스크롤로 새지 않게 */
    [data-textblock] { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    [data-textblock] [data-resize-handle] { touch-action: none; }
    /* 포스터 surface 안 사진/배경 영역 클릭으로 선택 해제 시에도 터치 동작 안전 */
    .poster-surface { touch-action: pan-y; -webkit-tap-highlight-color: transparent; }
    /* iOS 사파리 자동 줌 방지 — 입력 폰트 16px 이상 권장 */
    input[type='text'], input[type='email'], input[type='password'], input[type='date'], input[type='number'], textarea, select {
      font-size: 16px;
    }
    /* 큰 화면에선 다시 축소 */
    @media (min-width: 640px) {
      input[type='text'], input[type='email'], input[type='password'], input[type='date'], input[type='number'], textarea, select {
        font-size: inherit;
      }
    }
    /* 슬라이더 — 손가락 친화 트랙/엄지 */
    input[type='range'] { height: 28px; -webkit-appearance: none; appearance: none; background: transparent; }
    input[type='range']::-webkit-slider-runnable-track { height: 4px; background: hsl(var(--border)); border-radius: 2px; }
    input[type='range']::-moz-range-track            { height: 4px; background: hsl(var(--border)); border-radius: 2px; }
    input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 18px; width: 18px; border-radius: 9999px; background: hsl(var(--primary)); margin-top: -7px; border: 2px solid hsl(var(--background)); box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
    input[type='range']::-moz-range-thumb     { height: 18px; width: 18px; border-radius: 9999px; background: hsl(var(--primary)); border: 2px solid hsl(var(--background)); }
    input[type='range']:disabled { opacity: 0.4; }

    /* iPhone safe-area */
    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 0px); }
  </style>
</head>
<body class="bg-background text-foreground">
  <div id="root"></div>
  <script>
    // 임시 디버그 — viewport 폭과 scrollWidth 화면에 표시 (캡쳐 후 제거 예정)
    if (location.search.includes('debug=1')) {
      window.addEventListener('load', () => {
        setTimeout(() => {
          const w = window.innerWidth;
          const sw = document.documentElement.scrollWidth;
          const tag = document.createElement('div');
          tag.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;background:#ff0066;color:white;padding:4px 8px;font:12px/1.2 monospace';
          tag.textContent = `vp:${w} sw:${sw} diff:${sw - w}`;
          document.body.appendChild(tag);
          // 가장 wide한 자식 element 찾기
          let widest = null, widestRight = 0;
          document.querySelectorAll('*').forEach(el => {
            const r = el.getBoundingClientRect();
            if (r.right > widestRight && r.width > 1) { widestRight = r.right; widest = el; }
          });
          if (widest && widestRight > w) {
            const tag2 = document.createElement('div');
            tag2.style.cssText = 'position:fixed;top:24px;left:0;z-index:9999;background:#0066ff;color:white;padding:4px 8px;font:11px/1.2 monospace;max-width:90vw';
            tag2.textContent = `widest right:${widestRight.toFixed(0)} <${widest.tagName}.${(widest.className||'').toString().slice(0,40)}>`;
            document.body.appendChild(tag2);
          }
        }, 800);
      });
    }
  </script>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo, useRef, useEffect, useContext, createContext } = React;
    const cn = (...c) => c.filter(Boolean).join(' ');

    // 캔바형 스냅 가이드 — surface가 자식 TextBlock의 드래그를 listen하고 가이드 라인을 그림
    const SurfaceContext = createContext(null);
    const SessionContext = createContext({ session: null, logout: () => {} });

    // ========================================
    // 🔐 Auth & Storage (localStorage 기반 — Phase 2에서 Supabase로 전환)
    // ========================================
    const STORAGE = { signups: 'marian.signups', session: 'marian.session' };
    const ADMIN_ID = 'marian';
    const ADMIN_PW = 'marian2026';
    function readSignups() {
      try { return JSON.parse(localStorage.getItem(STORAGE.signups) || '[]'); } catch { return []; }
    }
    function writeSignups(arr) {
      try { localStorage.setItem(STORAGE.signups, JSON.stringify(arr)); } catch {}
    }
    function readSession() {
      try { return JSON.parse(localStorage.getItem(STORAGE.session) || 'null'); } catch { return null; }
    }
    function writeSession(s) {
      try {
        if (s) localStorage.setItem(STORAGE.session, JSON.stringify(s));
        else   localStorage.removeItem(STORAGE.session);
      } catch {}
    }
    function PosterSurface({ className = '', children }) {
      const surfaceRef = useRef(null);
      const [guides, setGuides] = useState([]);
      return (
        <SurfaceContext.Provider value={{ surfaceRef, setGuides }}>
          <div ref={surfaceRef} className={cn('aspect-[4/5] w-full relative overflow-hidden poster-surface', className)}>
            {children}
            {guides.length > 0 && (
              <div className="pointer-events-none absolute inset-0 z-50">
                {guides.map((g, i) => g.type === 'v'
                  ? <div key={i} className="absolute top-0 bottom-0" style={{ left: g.pos, borderLeft: '1px dashed #ec4899' }} />
                  : <div key={i} className="absolute left-0 right-0" style={{ top: g.pos, borderTop: '1px dashed #ec4899' }} />
                )}
              </div>
            )}
          </div>
        </SurfaceContext.Provider>
      );
    }

    // ========================================
    // 🎨 Design System (shadcn 토큰 기반 — components.md 규약)
    // ========================================
    function Button({ variant = 'default', size = 'default', className = '', ...p }) {
      const base = 'inline-flex items-center justify-center gap-2 whitespace-nowrap text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50';
      const variants = {
        default:     'bg-primary text-primary-foreground hover:bg-primary/90 tracking-wider uppercase',
        destructive: 'bg-destructive text-destructive-foreground hover:bg-destructive/90 tracking-wider uppercase',
        outline:     'border border-foreground/30 bg-transparent text-foreground hover:bg-primary hover:border-primary hover:text-primary-foreground tracking-wider uppercase',
        secondary:   'bg-secondary text-secondary-foreground hover:bg-secondary/80 tracking-wider uppercase',
        ghost:       'text-foreground hover:bg-secondary',
        link:        'text-primary underline-offset-4 hover:underline',
      };
      const sizes = { default: 'h-11 px-6', sm: 'h-9 px-4 text-xs', lg: 'h-14 px-10 text-sm', icon: 'h-10 w-10' };
      return <button className={cn(base, variants[variant], sizes[size], className)} {...p} />;
    }
    function Input({ className = '', ...p }) {
      return <input className={cn('flex h-11 w-full border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring', className)} {...p} />;
    }
    function Select({ className = '', children, ...p }) {
      return <select className={cn('flex h-11 border border-input bg-background px-3 py-2 text-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring', className)} {...p}>{children}</select>;
    }
    function Label({ className = '', htmlFor, children }) {
      return <label htmlFor={htmlFor} className={cn('eyebrow text-foreground', className)}>{children}</label>;
    }
    function Card({ className = '', ...p })        { return <div className={cn('w-full min-w-0 box-border border border-border bg-card text-card-foreground', className)} {...p} />; }
    function CardHeader({ className = '', ...p })  { return <div className={cn('flex flex-col space-y-2 p-4 sm:p-6 border-b border-border', className)} {...p} />; }
    function CardTitle({ className = '', ...p })   { return <h3 className={cn('display-bold text-xl text-foreground', className)} {...p} />; }
    function CardDescription({ className = '', ...p }) { return <p className={cn('text-sm text-muted-foreground', className)} {...p} />; }
    function CardContent({ className = '', ...p }) { return <div className={cn('p-4 sm:p-6', className)} {...p} />; }
    function CardFooter({ className = '', ...p })  { return <div className={cn('flex items-center p-4 sm:p-6 pt-0 sm:pt-0', className)} {...p} />; }
    function Badge({ variant = 'default', className = '', ...p }) {
      const base = 'inline-flex items-center border px-2.5 py-0.5 eyebrow';
      const variants = {
        default:     'border-transparent bg-primary text-primary-foreground',
        secondary:   'border-transparent bg-secondary text-secondary-foreground',
        destructive: 'border-transparent bg-destructive text-destructive-foreground',
        outline:     'border-foreground/40 text-foreground',
      };
      return <span className={cn(base, variants[variant], className)} {...p} />;
    }
    function Separator({ className = '' }) { return <div className={cn('h-px w-full bg-border', className)} />; }

    // 캔바 라이트 — 텍스트 블록 (클릭 선택 + 드래그 이동 + 우하단 핸들로 scale + 스냅)
    // edit: { x, y, scale }  — x/y는 px 오프셋(베이스 레이아웃 기준), scale은 1.0 디폴트
    const SNAP_PX = 6;
    function TextBlock({ id, edit, selected, onSelect, onChange, className = '', anchor = 'top-left', children }) {
      const e = edit || { x: 0, y: 0, scale: 1 };
      const ref = useRef(null);
      const ctx = useContext(SurfaceContext);

      // 드래그 시 스냅 + 가이드 계산
      const computeSnap = (proposedX, proposedY) => {
        const surface = ctx?.surfaceRef?.current;
        const me = ref.current;
        if (!surface || !me) return { x: proposedX, y: proposedY, guides: [] };
        const sr = surface.getBoundingClientRect();
        const myR = me.getBoundingClientRect();
        const dx = proposedX - e.x;  // 현재 transform 대비 추가 변화량
        const dy = proposedY - e.y;
        const pr = {
          left:   myR.left - sr.left + dx,
          top:    myR.top  - sr.top  + dy,
          width:  myR.width,
          height: myR.height,
        };
        pr.right  = pr.left + pr.width;
        pr.bottom = pr.top  + pr.height;
        pr.cx     = pr.left + pr.width / 2;
        pr.cy     = pr.top  + pr.height / 2;

        // surface 기준점
        const targetsX = [
          { x: 0,            kind: 's-l' },
          { x: sr.width / 2, kind: 's-c' },
          { x: sr.width,     kind: 's-r' },
        ];
        const targetsY = [
          { y: 0,             kind: 's-t' },
          { y: sr.height / 2, kind: 's-m' },
          { y: sr.height,     kind: 's-b' },
        ];
        // 다른 형제 텍스트 블록 기준점
        surface.querySelectorAll('[data-textblock]').forEach(el => {
          if (el === me) return;
          const r = el.getBoundingClientRect();
          targetsX.push(
            { x: r.left  - sr.left,                   kind: 'b-l' },
            { x: r.left  - sr.left + r.width / 2,     kind: 'b-c' },
            { x: r.right - sr.left,                   kind: 'b-r' },
          );
          targetsY.push(
            { y: r.top    - sr.top,                   kind: 'b-t' },
            { y: r.top    - sr.top + r.height / 2,    kind: 'b-m' },
            { y: r.bottom - sr.top,                   kind: 'b-b' },
          );
        });

        const myXs = [pr.left, pr.cx, pr.right];
        const myYs = [pr.top,  pr.cy, pr.bottom];
        let bestX = null, bestY = null;
        myXs.forEach(my => targetsX.forEach(t => {
          const d = t.x - my;
          if (Math.abs(d) <= SNAP_PX && (!bestX || Math.abs(d) < Math.abs(bestX.delta))) {
            bestX = { delta: d, pos: t.x };
          }
        }));
        myYs.forEach(my => targetsY.forEach(t => {
          const d = t.y - my;
          if (Math.abs(d) <= SNAP_PX && (!bestY || Math.abs(d) < Math.abs(bestY.delta))) {
            bestY = { delta: d, pos: t.y };
          }
        }));

        const guides = [];
        if (bestX) guides.push({ type: 'v', pos: bestX.pos });
        if (bestY) guides.push({ type: 'h', pos: bestY.pos });
        return {
          x: proposedX + (bestX?.delta ?? 0),
          y: proposedY + (bestY?.delta ?? 0),
          guides,
        };
      };

      const onPointerDown = (ev) => {
        if (ev.button !== undefined && ev.button !== 0) return; // 좌클릭/터치만
        ev.stopPropagation();
        ev.preventDefault();
        onSelect?.(id);
        const target = ev.currentTarget;
        try { target.setPointerCapture(ev.pointerId); } catch {}
        const startX = ev.clientX, startY = ev.clientY;
        const base = { x: e.x, y: e.y };
        const move = (mv) => {
          const proposedX = base.x + (mv.clientX - startX);
          const proposedY = base.y + (mv.clientY - startY);
          const snap = computeSnap(proposedX, proposedY);
          ctx?.setGuides?.(snap.guides);
          onChange?.(id, { x: snap.x, y: snap.y });
        };
        const up = () => {
          try { target.releasePointerCapture(ev.pointerId); } catch {}
          ctx?.setGuides?.([]);
          target.removeEventListener('pointermove', move);
          target.removeEventListener('pointerup', up);
          target.removeEventListener('pointercancel', up);
        };
        target.addEventListener('pointermove', move);
        target.addEventListener('pointerup', up);
        target.addEventListener('pointercancel', up);
      };
      const onResizePointerDown = (ev) => {
        if (ev.button !== undefined && ev.button !== 0) return;
        ev.stopPropagation();
        ev.preventDefault();
        onSelect?.(id);
        const target = ev.currentTarget;
        try { target.setPointerCapture(ev.pointerId); } catch {}
        const startX = ev.clientX, startY = ev.clientY;
        const baseScale = e.scale ?? 1;
        const move = (mv) => {
          const delta = ((mv.clientX - startX) + (mv.clientY - startY)) / 200;
          const next = Math.max(0.4, Math.min(3, baseScale + delta));
          onChange?.(id, { scale: +next.toFixed(3) });
        };
        const up = () => {
          try { target.releasePointerCapture(ev.pointerId); } catch {}
          target.removeEventListener('pointermove', move);
          target.removeEventListener('pointerup', up);
          target.removeEventListener('pointercancel', up);
        };
        target.addEventListener('pointermove', move);
        target.addEventListener('pointerup', up);
        target.addEventListener('pointercancel', up);
      };
      const transform = `translate(${e.x}px, ${e.y}px) scale(${e.scale ?? 1})`;
      const origin = anchor === 'top-left' ? 'top left' : anchor === 'top-center' ? 'top center' : anchor === 'bottom-left' ? 'bottom left' : 'center';
      return (
        <div
          ref={ref}
          data-textblock={id}
          onPointerDown={onPointerDown}
          onClick={(ev) => ev.stopPropagation()}
          className={cn('relative select-none cursor-move', selected && 'outline outline-1 outline-dashed outline-primary outline-offset-4', className)}
          style={{ transform, transformOrigin: origin }}
        >
          {children}
          {selected && (
            <span
              data-resize-handle
              onPointerDown={onResizePointerDown}
              onClick={(ev) => ev.stopPropagation()}
              title="크기 조절"
              className="absolute -bottom-2 -right-2 w-5 h-5 bg-primary rounded-full border-2 border-white shadow cursor-nwse-resize"
            />
          )}
        </div>
      );
    }
    // 베이스 transform이 0인 helper
    function getTextEdit(texts, id) { return texts?.[id] || { x: 0, y: 0, scale: 1 }; }

    // 텍스트 블록 안의 편집 가능한 텍스트 필드 메타.
    // PosterX 컴포넌트가 getCopy(blockId, fieldKey, defaultText)로 사용한다.
    // 카드 밑 컨트롤 패널이 selected 블록의 fields를 input으로 노출한다.
    const TEXT_FIELDS = {
      wedding: {
        minimal: {
          thanks: [{ key: 'thanks_en', label: 'Thank you (영문)' }],
          korean: [{ key: 'korean',    label: '한국어' }],
          couple: [
            { key: 'couple_en',   label: '이름' },
            { key: 'couple_date', label: '날짜' },
          ],
        },

    // 사용자 업로드 사진 객체에서 img 스타일을 만든다 (translate + scale).
    // object-cover만으로는 사진 AR이 컨테이너 AR과 일치할 때 가로 overflow가 생기지 않아
    // objectPosition X가 무용해진다 → 항상 베이스 1.2x 줌을 깔고 translate로 패닝.
    // photo: { url, x, y, scale } | undefined
    function applyPhotoStyle(p) {
      if (!p) return undefined;
      const x = p.x ?? 50, y = p.y ?? 50, s = p.scale ?? 100;
      const totalScale = (s / 100) + 0.2; // 1.2 ~ 2.7 — 항상 overflow 보장
      const overflowPct = (totalScale - 1) * 50; // 한쪽 여유분 (% of element)
      const tx = -((x - 50) / 50) * overflowPct; // x=0 → +overflow, x=100 → -overflow
      const ty = -((y - 50) / 50) * overflowPct;
      return {
        objectFit: 'cover',
        transform: `translate(${tx}%, ${ty}%) scale(${totalScale})`,
        transformOrigin: 'center',
      };
    }

        try { return new URLSearchParams(window.location.search).get('demo') || ''; } catch { return ''; }
      })();
      // 사진 (카테고리별) — 단순 url만
      const [userPhotos, setUserPhotos] = useState({}); // { wedding: blobURL, ... }
      // 카드별 편집 상태: cardEdits[cat][style] = { photo: {x,y,scale}, texts: { [id]: {x,y,scale} } }
      const [cardEdits, setCardEdits] = useState(() => {
        if (demoMode === 'x') return { wedding: { minimal: { photo: { x: 50, y: 50, scale: 100 }, texts: { thanks: { x: 80, y: 0, scale: 1 } } } } };
        if (demoMode === 'y') return { wedding: { minimal: { photo: { x: 50, y: 50, scale: 100 }, texts: { thanks: { x: 0, y: -40, scale: 1 } } } } };
        if (demoMode === 's') return { wedding: { minimal: { photo: { x: 50, y: 50, scale: 100 }, texts: { thanks: { x: 0, y: 0, scale: 1.4 } } } } };
        return {};
      });
      // 선택된 항목: { cat, style, kind: 'text', id }  (사진은 항상 카드 컨트롤로 조정 — 선택 X)
      const [selected, setSelected] = useState(() => {
        if (demoMode) return { cat: 'wedding', style: 'minimal', kind: 'text', id: 'thanks' };
        return null;
      });

      const handleFile = (catKey, file) => {
        if (!file) return;
        const url = URL.createObjectURL(file);
        setUserPhotos(prev => ({ ...prev, [catKey]: url }));
      };
      const clearPhoto = (catKey) => {
        setUserPhotos(prev => {
          const u = prev[catKey];
          if (u) URL.revokeObjectURL(u);
          const { [catKey]: gone, ...rest } = prev;
          return rest;
        });
      };

      const getCardEdit = (cat, style) => cardEdits[cat]?.[style] || { photo: { x: 50, y: 50, scale: 100 }, texts: {}, copy: {} };
      const ensureCard = (prev, cat, style) => prev[cat]?.[style] || { photo: { x: 50, y: 50, scale: 100 }, texts: {}, copy: {} };
      const updateCardPhoto = (cat, style, patch) => {
        setCardEdits(prev => {
          const cur = ensureCard(prev, cat, style);
          return { ...prev, [cat]: { ...prev[cat], [style]: { ...cur, photo: { ...cur.photo, ...patch } } } };
        });
      };
      const updateCardText = (cat, style, id, patch) => {
        setCardEdits(prev => {
          const cur = ensureCard(prev, cat, style);
          const t = cur.texts?.[id] || { x: 0, y: 0, scale: 1 };
          return { ...prev, [cat]: { ...prev[cat], [style]: { ...cur, texts: { ...cur.texts, [id]: { ...t, ...patch } } } } };
        });
      };
      const updateCardCopy = (cat, style, key, value) => {
        setCardEdits(prev => {
          const cur = ensureCard(prev, cat, style);
          return { ...prev, [cat]: { ...prev[cat], [style]: { ...cur, copy: { ...(cur.copy||{}), [key]: value } } } };
        });
      };
      const resetCardPhoto = (cat, style) => updateCardPhoto(cat, style, { x: 50, y: 50, scale: 100 });
      const resetCardText  = (cat, style, id) => updateCardText(cat, style, id, { x: 0, y: 0, scale: 1 });

                  <div>
                    <span className="text-xs text-muted-foreground">X</span>
                    <input type="range" min={0} max={100} value={pos.x} onChange={e => setPos({...pos, x: +e.target.value})} className="w-full" />
                  </div>
                  <div>
                    <span className="text-xs text-muted-foreground">Y</span>
                    <input type="range" min={0} max={100} value={pos.y} onChange={e => setPos({...pos, y: +e.target.value})} className="w-full" />
                  </div>
                </div>
              </div>
            </CardContent>
          </Card>
        </div>
      );
    }

    // ========================================
    // 🔐 AuthGate — 회원가입 신청 / 신랑·신부 로그인 / 관리자 로그인
    // ========================================
    function AuthGate({ onLogin }) {
      const [mode, setMode] = useState('signup'); // signup | userLogin | adminLogin
      const [signupForm, setSignupForm] = useState({ name: '', weddingDate: '' });
      const [userForm, setUserForm] = useState({ name: '', weddingDate: '' });
      const [adminPw, setAdminPw] = useState('');
      const [msg, setMsg] = useState(null);

      const submitSignup = () => {
        const name = signupForm.name.trim();
        const weddingDate = signupForm.weddingDate;
        if (!name || !weddingDate) {
          setMsg({ type: 'error', text: '이름과 예식일자를 모두 입력해 주세요.' });
          return;
        }
        const all = readSignups();
        if (all.some(s => s.name === name && s.weddingDate === weddingDate)) {
          setMsg({ type: 'warn', text: '이미 같은 이름·예식일자로 신청한 내역이 있습니다.' });
          return;
        }
        const id = 'u-' + Date.now().toString(36);
        writeSignups([{ id, name, weddingDate, status: 'pending', appliedAt: new Date().toISOString() }, ...all]);
        setMsg({ type: 'ok', text: '신청 완료. 마리안 운영자 승인 후 로그인하실 수 있습니다.' });
        setSignupForm({ name: '', weddingDate: '' });
      };

      const submitUserLogin = () => {
        const name = userForm.name.trim();
        const weddingDate = userForm.weddingDate;
        if (!name || !weddingDate) {
          setMsg({ type: 'error', text: '이름과 예식일자를 입력해 주세요.' });
          return;
        }
        const found = readSignups().find(s => s.name === name && s.weddingDate === weddingDate);
        if (!found) {
          setMsg({ type: 'error', text: '신청 내역이 없습니다. 회원가입 신청을 먼저 진행해 주세요.' });
          return;
        }
        if (found.status === 'pending') {
          setMsg({ type: 'warn', text: '아직 승인되지 않았습니다. 마리안 운영자 승인 대기 중.' });
          return;
        }
        if (found.status === 'rejected') {
          setMsg({ type: 'error', text: '신청이 거절되었습니다. 마리안 웨딩에 문의해 주세요.' });
          return;
        }
        const sess = { role: 'user', userId: found.id, name: found.name, weddingDate: found.weddingDate };
        writeSession(sess);
        onLogin(sess);
      };

      const submitAdminLogin = () => {
        if (adminPw !== ADMIN_PW) {
          setMsg({ type: 'error', text: '비밀번호가 일치하지 않습니다.' });
          return;
        }
        const sess = { role: 'admin' };
        writeSession(sess);
        onLogin(sess);
      };

      const TABS = [
        { k: 'signup',     l: '회원가입' },
        { k: 'userLogin',  l: '로그인' },
        { k: 'adminLogin', l: '관리자' },
      ];

      return (
        <div className="min-h-screen flex items-center justify-center bg-background px-4 py-8">
          <Card className="w-full max-w-md">
            <CardHeader>
              <div className="eyebrow text-primary mb-2">Marian Wedding</div>
              <CardTitle className="text-2xl">땡큐카드 서비스</CardTitle>
              <CardDescription>
                마리안 웨딩이 우리 고객분들께 또 어떤 걸 해드릴 수 있을까 고민하다 만든
                자동 땡큐카드 생성기입니다. 결혼식 후 본식 스냅 한 장으로 3가지 톤의 감사 카드를 받아 보세요.
              </CardDescription>
            </CardHeader>
            <CardContent className="space-y-5">
              <div className="flex border border-border">
                {TABS.map(t => (
                  <button key={t.k} onClick={() => { setMode(t.k); setMsg(null); }}
                    className={cn('flex-1 h-10 text-xs eyebrow', mode === t.k ? 'bg-primary text-primary-foreground' : 'text-muted-foreground hover:bg-secondary')}>
                    {t.l}
                  </button>
                ))}
              </div>

              {mode === 'signup' && (
                <div className="space-y-3">
                  <div className="space-y-2">
                    <Label>이름 (신랑 또는 신부)</Label>
                    <Input value={signupForm.name} onChange={e => setSignupForm({ ...signupForm, name: e.target.value })} placeholder="홍길동" />
                  </div>
                  <div className="space-y-2">
                    <Label>예식일자</Label>
                    <Input type="date" value={signupForm.weddingDate} onChange={e => setSignupForm({ ...signupForm, weddingDate: e.target.value })} />
                  </div>
                  <Button className="w-full" onClick={submitSignup}>가입 신청</Button>
                  <p className="text-[11px] text-muted-foreground leading-relaxed">
                    신청 후 마리안 운영자의 승인을 거쳐 사용 가능합니다. 승인 시 입력하신 이름·예식일자로 로그인하세요.
                  </p>
                </div>
              )}

              {mode === 'userLogin' && (
                <div className="space-y-3">
                  <div className="space-y-2">
                    <Label>이름</Label>
                    <Input value={userForm.name} onChange={e => setUserForm({ ...userForm, name: e.target.value })} placeholder="홍길동" />
                  </div>
                  <div className="space-y-2">
                    <Label>예식일자</Label>
                    <Input type="date" value={userForm.weddingDate} onChange={e => setUserForm({ ...userForm, weddingDate: e.target.value })} />
                  </div>
                  <Button className="w-full" onClick={submitUserLogin}>로그인</Button>
                  <p className="text-[11px] text-muted-foreground">가입 신청 시 입력한 이름·예식일자로 로그인합니다.</p>
                </div>
              )}

              {mode === 'adminLogin' && (
                <div className="space-y-3">
                  <div className="space-y-2">
                    <Label>아이디</Label>
                    <Input value={ADMIN_ID} readOnly className="bg-secondary cursor-not-allowed" />
                  </div>
                  <div className="space-y-2">
                    <Label>비밀번호</Label>
                    <Input type="password" value={adminPw}
                      onChange={e => setAdminPw(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') submitAdminLogin(); }} />
                  </div>
                  <Button className="w-full" onClick={submitAdminLogin}>관리자 로그인</Button>
                  <p className="text-[11px] text-muted-foreground">마리안 운영자 전용 입구.</p>
                </div>
              )}

              {msg && (
                <div className={cn('text-xs p-3 border',
                  msg.type === 'error' ? 'border-destructive text-destructive bg-destructive/5' :
                  msg.type === 'warn'  ? 'border-amber-300 text-amber-700 bg-amber-50' :
                                         'border-primary text-primary bg-primary/5'
                )}>{msg.text}</div>
              )}
            </CardContent>
          </Card>
        </div>
      );
    }

    // ========================================
    // 📄 Page · Admin (마리안 운영자 — 회원가입 승인 큐)
    // ========================================
    function AdminScreen({ onNav }) {
      const [signups, setSignups] = useState(() => readSignups());
      const refresh = () => setSignups(readSignups());
      const update = (id, patch) => {
        const next = readSignups().map(s => s.id === id ? { ...s, ...patch } : s);
        writeSignups(next); setSignups(next);
      };
      const remove = (id) => {
        const next = readSignups().filter(s => s.id !== id);
        writeSignups(next); setSignups(next);
      };
      const approve = (id) => update(id, { status: 'approved', approvedAt: new Date().toISOString() });
      const reject  = (id) => update(id, { status: 'rejected' });
      const restore = (id) => update(id, { status: 'pending' });

      const pending  = signups.filter(s => s.status === 'pending');
      const approved = signups.filter(s => s.status === 'approved');
      const rejected = signups.filter(s => s.status === 'rejected');

      const Row = ({ s, actions }) => (
        <div className="px-6 py-4 flex items-center gap-4 text-sm">
          <div className="flex-1 min-w-0">
            <div className="truncate text-foreground">{s.name}</div>
            <div className="eyebrow text-muted-foreground mt-1">예식일 {s.weddingDate} · 신청 {(s.appliedAt||'').slice(0,10)}</div>
          </div>
          {actions}
        </div>
      );

      return (
        <div className="min-h-screen overflow-x-hidden">
          <TopNav active="admin" onNav={onNav} />
          <div className="w-full max-w-[860px] mx-auto px-4 sm:px-6 py-8 sm:py-12 space-y-8">
            <div>
              <div className="eyebrow text-primary mb-2">Marian Admin</div>
              <h1 className="display-bold text-3xl text-foreground">회원가입 승인 관리</h1>
              <p className="text-sm text-muted-foreground mt-2">
                마리안 웨딩에서 결혼식을 올리신 신랑·신부의 가입 신청을 검토하고 승인합니다.
                자유 가입 없음 — 운영자 승인을 받아야만 땡큐카드 도구를 사용할 수 있습니다.
              </p>
            </div>

            <Card>
              <CardHeader>
                <CardTitle className="text-lg">승인 대기 ({pending.length})</CardTitle>
                <CardDescription>마리안에서 결혼식을 올리신 부부가 맞는지 확인 후 승인해 주세요.</CardDescription>
              </CardHeader>
              <CardContent className="p-0">
                {pending.length === 0 ? (
                  <div className="px-6 py-8 text-center text-sm text-muted-foreground">대기 중인 신청이 없습니다.</div>
                ) : (
                  <div className="divide-y divide-border">
                    {pending.map(s => (
                      <Row key={s.id} s={s} actions={
                        <>
                          <Badge variant="outline">대기</Badge>
                          <Button size="sm" onClick={() => approve(s.id)}>승인</Button>
                          <Button variant="outline" size="sm" onClick={() => reject(s.id)}>거절</Button>
                        </>
                      } />
                    ))}
                  </div>
                )}
              </CardContent>
            </Card>

            <Card>
              <CardHeader>
                <CardTitle className="text-lg">승인 완료 ({approved.length})</CardTitle>
              </CardHeader>
              <CardContent className="p-0">
                {approved.length === 0 ? (
                  <div className="px-6 py-8 text-center text-sm text-muted-foreground">승인된 신청이 없습니다.</div>
                ) : (
                  <div className="divide-y divide-border">
                    {approved.map(s => (
                      <Row key={s.id} s={s} actions={
                        <>
                          <Badge>승인</Badge>
                          <Button variant="outline" size="sm" onClick={() => reject(s.id)}>비활성</Button>
                          <Button variant="ghost" size="sm" onClick={() => remove(s.id)}>삭제</Button>
                        </>
                      } />
                    ))}
                  </div>
                )}
              </CardContent>
            </Card>

            {rejected.length > 0 && (
              <Card>
                <CardHeader>
                  <CardTitle className="text-lg">거절/비활성 ({rejected.length})</CardTitle>
                </CardHeader>
                <CardContent className="p-0">
                  <div className="divide-y divide-border">
                    {rejected.map(s => (
                      <Row key={s.id} s={s} actions={
                        <>
                          <Badge variant="destructive">거절</Badge>
                          <Button variant="outline" size="sm" onClick={() => restore(s.id)}>복원</Button>
                          <Button variant="ghost" size="sm" onClick={() => remove(s.id)}>삭제</Button>
                        </>
                      } />
                    ))}
                  </div>
                </CardContent>
              </Card>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Root
    // ========================================
    // URL 쿼리 파라미터로 시작 화면을 강제할 수 있게 — 헤드리스 캡쳐·딥링크용
    function readInitialView() {
      try {
        const v = new URLSearchParams(window.location.search).get('view');
        return ['gallery','flow','admin'].includes(v) ? v : 'gallery';
      } catch { return 'gallery'; }
    }
    function App() {
      const [session, setSession] = useState(() => readSession());
      const [view, setView] = useState(readInitialView);
      const logout = () => { writeSession(null); setSession(null); setView('gallery'); };

      if (!session) return <AuthGate onLogin={setSession} />;

      const isAdmin = session.role === 'admin';
      const safeView = isAdmin ? view : (view === 'admin' ? 'gallery' : view);
      const ctx = { session, logout };

      let screen;
      if (safeView === 'flow')       screen = <FlowScreen  onNav={setView} />;
      else if (safeView === 'admin') screen = <AdminScreen onNav={setView} />;
      else                           screen = <GalleryScreen onNav={setView} />;

      return <SessionContext.Provider value={ctx}>{screen}</SessionContext.Provider>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
