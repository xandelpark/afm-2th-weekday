<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MARIAN WEDDING · Payment</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream: '#faf9f7',
            ivory: '#f4f1eb',
            sand: '#e8e4dc',
            taupe: '#8b8580',
            charcoal: '#2a2725',
            bronze: '#8b6f47',
          },
          fontFamily: {
            serif: ['Cormorant Garamond', 'serif'],
            sans: ['Noto Sans KR', '-apple-system', 'sans-serif'],
          },
        },
      },
    };
  </script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://js.tosspayments.com/v2/standard"></script>
  <style>
    body { font-family: 'Noto Sans KR', -apple-system, BlinkMacSystemFont, sans-serif; color: #2a2725; }
    .font-serif { font-family: 'Cormorant Garamond', serif; }
    .tracking-luxe { letter-spacing: 0.35em; }
    .divider-line {
      display: inline-block;
      width: 32px;
      height: 1px;
      background: #c8c0b3;
      vertical-align: middle;
    }
  </style>
</head>
<body class="bg-cream min-h-screen">
  <div id="root"></div>

  <script type="text/babel" data-presets="env,react">
    const { useState, useEffect, useRef } = React;

    function Header() {
      return (
        <header className="text-center pt-12 pb-8">
          <h1 className="font-serif text-5xl font-light text-charcoal tracking-[0.3em]">MARIAN</h1>
          <p className="text-[10px] text-taupe mt-2 tracking-luxe">WEDDING · PAYMENT</p>
          <div className="flex items-center justify-center gap-3 mt-5">
            <span className="divider-line"></span>
            <span className="text-[10px] text-taupe tracking-[0.2em]">SINCE 2010</span>
            <span className="divider-line"></span>
          </div>
        </header>
      );
    }

    function StepIndicator({ step }) {
      const steps = ['SELECT', 'DETAILS', 'PAYMENT'];
      return (
        <div className="flex items-center justify-center gap-3 mb-10">
          {steps.map((label, i) => (
            <div key={i} className="flex items-center gap-3">
              <div className={`w-6 h-6 rounded-full border flex items-center justify-center text-[10px] font-medium transition ${
                step >= i ? 'bg-charcoal border-charcoal text-cream' : 'bg-transparent border-sand text-taupe'
              }`}>{i + 1}</div>
              <span className={`text-[10px] tracking-[0.2em] ${step >= i ? 'text-charcoal' : 'text-taupe/60'}`}>{label}</span>
              {i < steps.length - 1 && <span className="w-6 h-px bg-sand"></span>}
            </div>
          ))}
        </div>
      );
    }

    // 1단계: 결제 종류 선택
    function TypeSelect({ onSelect }) {
      const Card = ({ titleEn, titleKr, desc, amount, footnote, onClick }) => (
        <button
          onClick={onClick}
          className="group bg-white border border-sand hover:border-charcoal transition text-center flex flex-col"
        >
          <div className="px-8 pt-12 pb-6 h-[110px] flex flex-col justify-start">
            <p className="font-serif text-2xl tracking-[0.25em] text-charcoal">{titleEn}</p>
            <p className="text-xs text-taupe tracking-[0.15em] mt-1">{titleKr}</p>
          </div>

          <div className="flex items-center justify-center h-[24px]">
            <span className="divider-line"></span>
          </div>

          <div className="px-8 h-[60px] flex items-center justify-center">
            <p className="text-sm text-taupe whitespace-nowrap">{desc}</p>
          </div>

          <div className="px-8 h-[64px] flex items-center justify-center">
            <p className="font-serif text-3xl font-light text-charcoal whitespace-nowrap">{amount}</p>
          </div>

          <div className="px-8 pt-2 pb-12 h-[48px] flex items-start justify-center">
            <p className="text-[10px] text-taupe tracking-[0.2em]">{footnote}</p>
          </div>
        </button>
      );

      return (
        <div className="grid grid-cols-2 gap-4">
          <Card
            titleEn="DEPOSIT"
            titleKr="예약금"
            desc="예약 확정 시"
            amount="₩ 300,000"
            footnote="FIXED AMOUNT"
            onClick={() => onSelect('예약금')}
          />
          <Card
            titleEn="BALANCE"
            titleKr="잔금"
            desc="예식 잔금 결제"
            amount="₩ —"
            footnote="CUSTOM AMOUNT"
            onClick={() => onSelect('잔금')}
          />
        </div>
      );
    }

    // 2단계: 정보 입력
    function InfoForm({ type, onBack, onNext }) {
      const [name, setName] = useState('');
      const [phone, setPhone] = useState('');
      const [groomName, setGroomName] = useState('');
      const [brideName, setBrideName] = useState('');
      const [weddingDate, setWeddingDate] = useState('');
      const [amountManwon, setAmountManwon] = useState(''); // 만원 단위
      const [error, setError] = useState('');

      const formattedPhone = (v) => {
        const digits = v.replace(/\D/g, '').slice(0, 11);
        if (digits.length < 4) return digits;
        if (digits.length < 8) return `${digits.slice(0, 3)}-${digits.slice(3)}`;
        return `${digits.slice(0, 3)}-${digits.slice(3, 7)}-${digits.slice(7)}`;
      };

      const submit = async () => {
        setError('');
        if (!name.trim()) return setError('신청자 이름을 입력해주세요');
        if (!phone.trim() || phone.replace(/\D/g, '').length < 10) return setError('연락처를 정확히 입력해주세요');
        if (!groomName.trim()) return setError('신랑 이름을 입력해주세요');
        if (!brideName.trim()) return setError('신부 이름을 입력해주세요');
        if (!weddingDate) return setError('예식 날짜를 선택해주세요');

        let amount;
        if (type === '예약금') {
          amount = 300000;
        } else {
          const num = Number(amountManwon);
          if (!Number.isInteger(num) || num < 1) return setError('금액을 만원 단위로 입력해주세요 (최소 1만원)');
          amount = num * 10000;
        }

        try {
          const res = await fetch('/api/orders', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ type, name, phone, groomName, brideName, weddingDate, amount }),
          });
          const data = await res.json();
          if (!res.ok) return setError(data.error || '주문 생성에 실패했습니다');
          onNext({ ...data, type, name, phone, groomName, brideName, weddingDate });
        } catch (e) {
          setError('서버 연결에 실패했습니다');
        }
      };

      const inputCls = "w-full px-4 py-3 bg-cream border border-sand focus:border-charcoal outline-none text-charcoal transition";
      const labelCls = "block text-[11px] tracking-[0.18em] text-taupe mb-2";

      return (
        <div className="bg-white border border-sand p-8 sm:p-12">
          <div className="flex items-center justify-between mb-8 pb-6 border-b border-sand">
            <button onClick={onBack} className="text-taupe hover:text-charcoal text-xs tracking-[0.2em] transition">← BACK</button>
            <span className="text-[10px] tracking-[0.25em] text-bronze font-medium">
              {type === '예약금' ? 'DEPOSIT' : 'BALANCE'}
            </span>
          </div>

          <form autoComplete="off" onSubmit={(e) => { e.preventDefault(); submit(); }} className="space-y-6">
            <div>
              <label className={labelCls}>신청자 이름 <span className="text-bronze">*</span></label>
              <input
                type="text"
                value={name}
                onChange={(e) => setName(e.target.value)}
                placeholder="결제하시는 분 성함"
                autoComplete="off"
                className={inputCls}
              />
            </div>

            <div>
              <label className={labelCls}>연락처 <span className="text-bronze">*</span></label>
              <input
                type="tel"
                value={phone}
                onChange={(e) => setPhone(formattedPhone(e.target.value))}
                placeholder="010-1234-5678"
                autoComplete="off"
                className={inputCls}
              />
            </div>

            <div className="pt-6 border-t border-sand">
              <div className="flex items-center gap-3 mb-5">
                <span className="divider-line"></span>
                <p className="text-[10px] tracking-[0.25em] text-taupe">WEDDING INFORMATION</p>
                <span className="divider-line"></span>
              </div>

              <div className="grid grid-cols-2 gap-4 mb-5">
                <div>
                  <label className={labelCls}>신랑 <span className="text-bronze">*</span></label>
                  <input
                    type="text"
                    value={groomName}
                    onChange={(e) => setGroomName(e.target.value)}
                    placeholder="GROOM"
                    autoComplete="off"
                    className={inputCls}
                  />
                </div>
                <div>
                  <label className={labelCls}>신부 <span className="text-bronze">*</span></label>
                  <input
                    type="text"
                    value={brideName}
                    onChange={(e) => setBrideName(e.target.value)}
                    placeholder="BRIDE"
                    autoComplete="off"
                    className={inputCls}
                  />
                </div>
              </div>

              <div>
                <label className={labelCls}>예식 날짜 <span className="text-bronze">*</span></label>
                <input
                  type="date"
                  value={weddingDate}
                  onChange={(e) => setWeddingDate(e.target.value)}
                  autoComplete="off"
                  className={inputCls}
                />
              </div>
            </div>

            <div className="pt-6 border-t border-sand">
              <label className={labelCls}>결제 금액</label>
              {type === '예약금' ? (
                <div className="px-4 py-5 bg-cream border border-sand flex items-baseline justify-between">
                  <span className="font-serif text-3xl font-light text-charcoal">₩ 300,000</span>
                  <span className="text-[10px] text-taupe tracking-[0.2em]">FIXED</span>
                </div>
              ) : (
                <div>
                  <div className="flex items-stretch">
                    <input
                      type="text"
                      inputMode="numeric"
                      value={amountManwon}
                      onChange={(e) => setAmountManwon(e.target.value.replace(/\D/g, ''))}
                      placeholder="500"
                      autoComplete="off"
                      className="flex-1 px-4 py-3 bg-cream border border-sand focus:border-charcoal outline-none text-right font-serif text-2xl font-light text-charcoal transition"
                    />
                    <div className="px-6 bg-charcoal flex items-center justify-center text-cream text-xs whitespace-nowrap min-w-[80px]">만원</div>
                  </div>
                  {amountManwon && (
                    <p className="text-xs text-taupe mt-2 tracking-[0.1em]">
                      = <span className="font-serif text-base text-charcoal">₩ {(Number(amountManwon) * 10000).toLocaleString()}</span>
                    </p>
                  )}
                </div>
              )}
            </div>

            {error && (
              <div className="px-4 py-3 bg-cream border border-bronze/30 text-xs text-bronze tracking-[0.05em]">{error}</div>
            )}

            <button
              type="submit"
              className="w-full py-4 bg-charcoal hover:bg-black text-cream tracking-[0.3em] text-xs transition"
            >
              CONTINUE →
            </button>
          </form>
        </div>
      );
    }

    // 3단계: TossPayments 위젯
    function PaymentWidget({ orderInfo, onBack }) {
      const [widgets, setWidgets] = useState(null);
      const [ready, setReady] = useState(false);
      const [error, setError] = useState('');
      const initialized = useRef(false);

      useEffect(() => {
        if (initialized.current) return;
        initialized.current = true;

        (async () => {
          try {
            const res = await fetch('/api/config');
            const { clientKey } = await res.json();
            const tossPayments = TossPayments(clientKey);
            const customerKey = `customer_${orderInfo.phone.replace(/\D/g, '')}`;
            const w = tossPayments.widgets({ customerKey });
            await w.setAmount({ currency: 'KRW', value: orderInfo.amount });
            await Promise.all([
              w.renderPaymentMethods({ selector: '#payment-method', variantKey: 'DEFAULT' }),
              w.renderAgreement({ selector: '#agreement', variantKey: 'AGREEMENT' }),
            ]);
            setWidgets(w);
            setReady(true);
          } catch (e) {
            console.error(e);
            setError('결제 위젯을 불러오지 못했습니다: ' + e.message);
          }
        })();
      }, []);

      const requestPay = async () => {
        if (!widgets) return;
        try {
          await widgets.requestPayment({
            orderId: orderInfo.orderId,
            orderName: orderInfo.orderName,
            successUrl: window.location.origin + '/success',
            failUrl: window.location.origin + '/fail',
            customerName: orderInfo.name,
            customerMobilePhone: orderInfo.phone.replace(/\D/g, ''),
          });
        } catch (e) {
          setError('결제 요청 실패: ' + e.message);
        }
      };

      return (
        <div className="bg-white border border-sand">
          <div className="p-8 sm:p-10 border-b border-sand">
            <button onClick={onBack} className="text-taupe hover:text-charcoal text-xs tracking-[0.2em] mb-6 transition">← EDIT INFO</button>

            <div className="text-center mb-6">
              <p className="text-[10px] tracking-[0.3em] text-bronze mb-2">
                {orderInfo.type === '예약금' ? 'DEPOSIT PAYMENT' : 'BALANCE PAYMENT'}
              </p>
              <p className="font-serif text-2xl font-light tracking-[0.15em] text-charcoal">
                {orderInfo.groomName} <span className="text-bronze mx-2">&</span> {orderInfo.brideName}
              </p>
              <p className="text-xs text-taupe tracking-[0.2em] mt-1">{orderInfo.weddingDate}</p>
            </div>

            <div className="flex items-center justify-center gap-3 mb-6">
              <span className="divider-line"></span>
              <span className="font-serif text-4xl font-light text-charcoal">₩ {orderInfo.amount.toLocaleString()}</span>
              <span className="divider-line"></span>
            </div>

            <p className="text-center text-[10px] tracking-[0.2em] text-taupe">신청자 · {orderInfo.name}</p>
          </div>

          <div className="p-2">
            <div id="payment-method"></div>
            <div id="agreement"></div>
          </div>

          <div className="p-8 pt-4">
            <div className="bg-cream border border-sand p-4 mb-5 text-[11px] text-taupe tracking-[0.05em] leading-relaxed">
              <span className="text-bronze font-medium">TEST MODE</span> · 실제 결제는 발생하지 않습니다.
              테스트 카드 번호 (예: 4242-4242-4242-4242) 사용 가능합니다.
            </div>

            {error && <div className="px-4 py-3 bg-cream border border-bronze/30 text-xs text-bronze mb-4">{error}</div>}

            <button
              onClick={requestPay}
              disabled={!ready}
              className="w-full py-4 bg-charcoal hover:bg-black disabled:bg-taupe disabled:cursor-not-allowed text-cream tracking-[0.3em] text-xs transition"
            >
              {ready ? `PAY ₩ ${orderInfo.amount.toLocaleString()}` : 'LOADING...'}
            </button>
          </div>
        </div>
      );
    }

    // 결제 성공 페이지
    function SuccessPage() {
      const [order, setOrder] = useState(null);
      const [error, setError] = useState('');

      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const paymentKey = params.get('paymentKey');
        const orderId = params.get('orderId');
        const amount = params.get('amount');

        (async () => {
          try {
            const res = await fetch('/api/confirm', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ paymentKey, orderId, amount }),
            });
            const data = await res.json();
            if (!res.ok) return setError(data.error || '결제 승인 실패');
            setOrder(data.order);
          } catch (e) {
            setError('결제 승인 중 오류가 발생했습니다');
          }
        })();
      }, []);

      if (error) {
        return (
          <div className="bg-white border border-sand p-12 text-center">
            <p className="text-[10px] tracking-[0.3em] text-bronze mb-3">PAYMENT FAILED</p>
            <p className="font-serif text-2xl text-charcoal mb-6">결제 처리 실패</p>
            <p className="text-sm text-taupe mb-8 leading-relaxed">{error}</p>
            <a href="/" className="inline-block px-10 py-3 bg-charcoal text-cream tracking-[0.3em] text-xs hover:bg-black transition">RETRY</a>
          </div>
        );
      }

      if (!order) {
        return (
          <div className="bg-white border border-sand p-16 text-center">
            <p className="text-[10px] tracking-[0.3em] text-taupe animate-pulse">CONFIRMING PAYMENT</p>
          </div>
        );
      }

      return (
        <div className="bg-white border border-sand">
          <div className="p-12 text-center border-b border-sand">
            <div className="flex items-center justify-center gap-3 mb-5">
              <span className="divider-line"></span>
              <p className="text-[10px] tracking-[0.3em] text-bronze">PAYMENT COMPLETED</p>
              <span className="divider-line"></span>
            </div>
            <p className="font-serif text-3xl font-light text-charcoal mb-2">감사합니다</p>
            <p className="text-xs text-taupe tracking-[0.05em]">담당자가 곧 연락드릴 예정입니다</p>
          </div>

          <div className="p-8 sm:p-10">
            <div className="space-y-5">
              <Row label="결제 종류" value={order.type === '예약금' ? 'DEPOSIT · 예약금' : 'BALANCE · 잔금'} />
              <Row label="신청자" value={order.name} />
              <Row label="연락처" value={order.phone} />

              <div className="pt-5 border-t border-sand space-y-5">
                <div className="text-center pb-2">
                  <p className="font-serif text-xl text-charcoal tracking-[0.1em]">
                    {order.groomName} <span className="text-bronze mx-2">&</span> {order.brideName}
                  </p>
                  <p className="text-[10px] text-taupe tracking-[0.2em] mt-1">{order.weddingDate}</p>
                </div>
              </div>

              <div className="pt-5 border-t border-sand space-y-5">
                <Row label="결제 수단" value={order.method || '-'} />
                <Row label="결제 금액" value={`₩ ${order.amount.toLocaleString()}`} highlight />
              </div>

              <div className="pt-3 space-y-2">
                <Row label="결제 일시" value={new Date(order.paidAt).toLocaleString('ko-KR')} small />
                <Row label="주문번호" value={order.orderId} small />
              </div>
            </div>

            <a href="/" className="mt-10 block text-center py-4 bg-cream border border-sand hover:border-charcoal text-charcoal tracking-[0.3em] text-xs transition">
              HOME
            </a>
          </div>
        </div>
      );
    }

    function Row({ label, value, highlight, small }) {
      return (
        <div className="flex justify-between items-baseline">
          <span className={`text-[11px] tracking-[0.15em] ${small ? 'text-taupe/70' : 'text-taupe'}`}>{label}</span>
          <span className={
            highlight
              ? 'font-serif text-2xl font-light text-charcoal'
              : small
              ? 'text-[11px] text-taupe/70 tracking-[0.05em]'
              : 'text-sm text-charcoal'
          }>{value}</span>
        </div>
      );
    }

    // 결제 실패 페이지
    function FailPage() {
      const params = new URLSearchParams(window.location.search);
      const code = params.get('code');
      const message = params.get('message');

      return (
        <div className="bg-white border border-sand p-12 text-center">
          <p className="text-[10px] tracking-[0.3em] text-bronze mb-3">PAYMENT CANCELLED</p>
          <p className="font-serif text-2xl text-charcoal mb-6">결제가 완료되지 않았습니다</p>
          <p className="text-sm text-taupe mb-2 leading-relaxed">{message || '알 수 없는 오류'}</p>
          {code && <p className="text-[10px] text-taupe/60 tracking-[0.15em] mb-8">CODE: {code}</p>}
          <a href="/" className="inline-block px-10 py-3 bg-charcoal text-cream tracking-[0.3em] text-xs hover:bg-black transition">RETRY</a>
        </div>
      );
    }

    // 메인 앱
    function App() {
      const path = window.location.pathname;

      if (path === '/success') {
        return (
          <div className="max-w-md mx-auto px-4 pb-10">
            <Header />
            <SuccessPage />
          </div>
        );
      }
      if (path === '/fail') {
        return (
          <div className="max-w-md mx-auto px-4 pb-10">
            <Header />
            <FailPage />
          </div>
        );
      }

      const [step, setStep] = useState(0);
      const [type, setType] = useState(null);
      const [orderInfo, setOrderInfo] = useState(null);

      return (
        <div className="max-w-md mx-auto px-4 pb-10">
          <Header />
          <StepIndicator step={step} />

          {step === 0 && (
            <TypeSelect onSelect={(t) => { setType(t); setStep(1); }} />
          )}
          {step === 1 && (
            <InfoForm
              type={type}
              onBack={() => setStep(0)}
              onNext={(info) => { setOrderInfo(info); setStep(2); }}
            />
          )}
          {step === 2 && orderInfo && (
            <PaymentWidget
              orderInfo={orderInfo}
              onBack={() => setStep(1)}
            />
          )}

          <p className="text-center text-[10px] tracking-[0.2em] text-taupe/70 mt-12">
            SECURED BY <span className="text-taupe">TOSSPAYMENTS</span>
          </p>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
