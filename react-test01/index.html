<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Single React Dev Guide</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

    * { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Helvetica Neue', sans-serif; }

    body {
      background: #fbfbfd;
      color: #1d1d1f;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      height: 100vh;
    }

    .slide-enter {
      animation: slideIn 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: scale(0.95) translateY(12px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    .progress-bar {
      transition: width 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }

    .arrow-btn {
      transition: all 0.25s ease;
    }
    .arrow-btn:hover:not(:disabled) {
      background: rgba(0,0,0,0.06);
      transform: scale(1.05);
    }
    .arrow-btn:active:not(:disabled) {
      transform: scale(0.95);
    }
    .arrow-btn:disabled {
      opacity: 0.2;
      cursor: not-allowed;
    }

    .dot {
      transition: all 0.3s ease;
    }

    .img-container {
      transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    }
    .img-container:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    }
  </style>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            apple: {
              gray: { 1: '#f5f5f7', 2: '#a1a1a6', 3: '#6e6e73', 4: '#1d1d1f' },
              blue: '#0071e3',
              purple: '#5e5ce6',
              violet: '#bf5af2',
            }
          }
        }
      }
    }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ========================================
    // 🎨 Data
    // ========================================
    const sections = [
      {
        emoji: "🎯", title: "Core Principles",
        desc: "단일 파일, CDN 기반, 구조화된 컴포넌트, 해시 라우팅의 핵심 원칙",
        img: "https://images.unsplash.com/photo-1667427044194-67d142fdb980?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "📐", title: "Template Structure",
        desc: "index.html의 정확한 기본 구조 및 CDN 스크립트 로딩 순서",
        img: "https://images.unsplash.com/photo-1721244654392-9c912a6eb236?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "📋", title: "Code Organization",
        desc: "Hooks → Design System → Router → Layout → Pages → App 순서 정리",
        img: "https://images.unsplash.com/photo-1703000002324-e4c22127c327?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "🎨", title: "Design System Components",
        desc: "Button, Input, Card, Modal 등 재사용 가능한 UI 프리미티브",
        img: "https://images.unsplash.com/photo-1493217465235-252dd9c0d632?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "🔀", title: "Router Implementation",
        desc: "해시 기반 경량 라우터: Context, Routes, Link, useParams",
        img: "https://images.unsplash.com/photo-1503387837-b154d5074bd2?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "📡", title: "API Communication Rules",
        desc: "localhost 하드코딩 금지, 상대 경로 및 useFetch 훅 패턴",
        img: "https://images.unsplash.com/photo-1558494949-ef010cbdcc31?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "🔧", title: "Additional CDN Libraries",
        desc: "Axios, Day.js, Chart.js, Lodash, Marked, SortableJS",
        img: "https://images.unsplash.com/photo-1753947687841-eab7644f9a23?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "🧠", title: "State Management",
        desc: "useState, useContext, useReducer, useMemo, useCallback 활용 전략",
        img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "✅", title: "Quality Standards",
        desc: "반응형 디자인, 접근성, 에러 처리, 로딩 상태, 한국어 기본",
        img: "https://images.unsplash.com/photo-1758263715725-3ebac833b5a2?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "📝", title: "Response Format",
        desc: "요구사항 분석 → 완전한 코드 생성 → 실행 안내",
        img: "https://images.unsplash.com/reserve/LJIZlzHgQ7WPSh5KVTCB_Typewriter.jpg?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "⚠️", title: "Strict Rules",
        desc: "단일 파일, 의존 순서, Tailwind 우선, Babel 필수, 미사용 코드 제거",
        img: "https://images.unsplash.com/photo-1759160897213-b919da384a44?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "💡", title: "Best Practices",
        desc: "이모지 섹션 헤더, 제어 컴포넌트, 적절한 useEffect 정리",
        img: "https://images.unsplash.com/photo-1605677725437-74dafaa1272d?w=800&q=80&fit=crop&h=500"
      },
      {
        emoji: "🧠", title: "Persistent Agent Memory",
        desc: "에이전트 메모리 시스템: 패턴, 디버깅, 학습 내용 영구 저장",
        img: "https://images.unsplash.com/photo-1677442135703-1787eea5ce01?w=800&q=80&fit=crop&h=500"
      },
    ];

    // ========================================
    // 🧩 Progress Bar
    // ========================================
    function ProgressBar({ current, total }) {
      const pct = ((current + 1) / total) * 100;
      return (
        <div className="w-full max-w-md mx-auto h-[3px] bg-black/[0.06] rounded-full overflow-hidden">
          <div className="progress-bar h-full rounded-full bg-apple-purple" style={{ width: `${pct}%` }} />
        </div>
      );
    }

    // ========================================
    // 📄 Slide Component
    // ========================================
    function Slide({ section, index, animKey }) {
      const [imgLoaded, setImgLoaded] = useState(false);

      useEffect(() => {
        setImgLoaded(false);
      }, [section.img]);

      return (
        <div key={animKey} className="slide-enter flex flex-col lg:flex-row items-center gap-8 lg:gap-12 w-full max-w-5xl mx-auto px-6">
          {/* Image */}
          <div className="img-container w-full lg:w-1/2 flex-shrink-0">
            <div className="relative rounded-2xl overflow-hidden shadow-lg bg-apple-gray-1 aspect-[16/10]">
              {!imgLoaded && (
                <div className="absolute inset-0 flex items-center justify-center">
                  <div className="w-8 h-8 border-2 border-apple-purple/30 border-t-apple-purple rounded-full animate-spin" />
                </div>
              )}
              <img
                src={section.img}
                alt={section.title}
                className={`w-full h-full object-cover transition-opacity duration-500 ${imgLoaded ? 'opacity-100' : 'opacity-0'}`}
                onLoad={() => setImgLoaded(true)}
              />
            </div>
          </div>

          {/* Text */}
          <div className="w-full lg:w-1/2 text-center lg:text-left">
            <div className="text-5xl mb-4">{section.emoji}</div>
            <h2 className="text-3xl sm:text-4xl lg:text-5xl font-bold tracking-tight text-apple-gray-4 mb-4 leading-tight">
              {section.title}
            </h2>
            <p className="text-base sm:text-lg text-apple-gray-3 leading-relaxed max-w-md mx-auto lg:mx-0">
              {section.desc}
            </p>
            <div className="mt-6 inline-block px-4 py-2 rounded-full text-xs font-medium text-apple-gray-3 bg-black/[0.04]">
              {index + 1} / {sections.length}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🔘 Dot Navigation
    // ========================================
    function DotNav({ current, total, onGo }) {
      return (
        <div className="flex items-center gap-2">
          {Array.from({ length: total }, (_, i) => (
            <button
              key={i}
              onClick={() => onGo(i)}
              className={`dot rounded-full ${
                i === current
                  ? 'w-6 h-2 bg-apple-purple'
                  : 'w-2 h-2 bg-black/[0.15] hover:bg-black/[0.3]'
              }`}
            />
          ))}
        </div>
      );
    }

    // ========================================
    // ⬅️➡️ Arrow Button
    // ========================================
    function ArrowButton({ direction, onClick, disabled }) {
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className="arrow-btn w-12 h-12 rounded-full flex items-center justify-center border border-black/[0.08]"
        >
          <svg className="w-5 h-5 text-apple-gray-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
            {direction === 'left'
              ? <path strokeLinecap="round" strokeLinejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5" />
              : <path strokeLinecap="round" strokeLinejoin="round" d="M8.25 4.5l7.5 7.5-7.5 7.5" />
            }
          </svg>
        </button>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================
    function App() {
      const [current, setCurrent] = useState(0);
      const [animKey, setAnimKey] = useState(0);

      const goTo = useCallback((idx) => {
        if (idx < 0 || idx >= sections.length || idx === current) return;
        setAnimKey(k => k + 1);
        setCurrent(idx);
      }, [current]);

      const prev = useCallback(() => goTo(current - 1), [current, goTo]);
      const next = useCallback(() => goTo(current + 1), [current, goTo]);

      useEffect(() => {
        const handleKey = (e) => {
          if (e.key === 'ArrowLeft') prev();
          if (e.key === 'ArrowRight') next();
        };
        window.addEventListener('keydown', handleKey);
        return () => window.removeEventListener('keydown', handleKey);
      }, [prev, next]);

      return (
        <div className="h-screen flex flex-col">
          {/* Top Bar */}
          <header className="flex-shrink-0 px-6 pt-5 pb-3">
            <div className="flex items-center justify-between max-w-5xl mx-auto mb-3">
              <span className="text-sm font-medium text-apple-gray-4">Single React Dev</span>
              <span className="text-xs text-apple-gray-3">
                <kbd className="px-1.5 py-0.5 rounded bg-black/[0.06] text-[10px] font-mono mx-0.5">←</kbd>
                <kbd className="px-1.5 py-0.5 rounded bg-black/[0.06] text-[10px] font-mono mx-0.5">→</kbd>
              </span>
            </div>
            <ProgressBar current={current} total={sections.length} />
          </header>

          {/* Slide Area */}
          <main className="flex-1 flex items-center justify-center min-h-0 overflow-hidden">
            <div className="flex items-center w-full">
              <div className="flex-shrink-0 hidden md:flex pl-4 pr-2">
                <ArrowButton direction="left" onClick={prev} disabled={current === 0} />
              </div>
              <div className="flex-1 flex items-center justify-center min-w-0">
                <Slide section={sections[current]} index={current} animKey={animKey} />
              </div>
              <div className="flex-shrink-0 hidden md:flex pr-4 pl-2">
                <ArrowButton direction="right" onClick={next} disabled={current === sections.length - 1} />
              </div>
            </div>
          </main>

          {/* Bottom Nav */}
          <footer className="flex-shrink-0 pb-6 pt-3 flex flex-col items-center gap-3">
            <DotNav current={current} total={sections.length} onGo={goTo} />
            <div className="flex md:hidden items-center gap-6">
              <ArrowButton direction="left" onClick={prev} disabled={current === 0} />
              <ArrowButton direction="right" onClick={next} disabled={current === sections.length - 1} />
            </div>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
