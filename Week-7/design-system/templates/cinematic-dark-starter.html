<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[프로젝트 이름] — Cinematic Dark</title>
  <!--
    AFM Design System / Cinematic Dark Palette (shadcn token + grain/scanlines)
    어둡고 영화적인 무드. 영상/포스터/티저/콘텐츠 마케팅.
  -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Noto+Serif+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
            popover: { DEFAULT: 'hsl(var(--popover))', foreground: 'hsl(var(--popover-foreground))' },
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
          },
          borderRadius: { lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' },
          fontFamily: {
            sans: ['"Noto Serif KR"', 'serif'],
            display: ['Cinzel', '"Noto Serif KR"', 'serif'],
          },
        }
      }
    };
  </script>
  <style>
    /* ==== Cinematic Dark palette ==== */
    :root {
      --background: 0 0% 2%;
      --foreground: 16 14% 76%;
      --card: 0 0% 4%;
      --card-foreground: 16 14% 76%;
      --popover: 0 0% 4%;
      --popover-foreground: 16 14% 76%;
      --primary: 0 62% 36%;
      --primary-foreground: 28 70% 92%;
      --secondary: 0 0% 10%;
      --secondary-foreground: 16 14% 76%;
      --muted: 0 0% 8%;
      --muted-foreground: 16 10% 55%;
      --accent: 0 62% 30%;
      --accent-foreground: 28 70% 92%;
      --destructive: 0 80% 45%;
      --destructive-foreground: 28 70% 92%;
      --border: 16 14% 30%;
      --input: 16 14% 20%;
      --ring: 0 62% 36%;
      --radius: 0rem;
    }
    body {
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
    }
    .font-display { font-family: 'Cinzel', 'Noto Serif KR', serif; letter-spacing: 0.18em; }
    /* Grain noise */
    .grain::before {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 50;
      opacity: 0.08; mix-blend-mode: overlay;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.6  0 0 0 0 0.6  0 0 0 1 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    }
    /* Scanlines */
    .scanlines::after {
      content: ""; position: fixed; inset: 0; pointer-events: none; z-index: 49;
      background: repeating-linear-gradient(to bottom, rgba(255,255,255,0.018) 0px, rgba(255,255,255,0.018) 1px, transparent 1px, transparent 3px);
    }
    .vignette {
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 45%, rgba(0,0,0,0.75) 100%),
        linear-gradient(180deg, hsl(var(--card)) 0%, hsl(var(--background)) 60%, #000 100%);
    }
    .blood-text { text-shadow: 0 0 24px hsl(var(--primary) / 0.45); }
    @keyframes flicker { 0%,19.999%,22%,62.999%,64%,64.999%,70%,100% {opacity:1;} 20%,21.999%,63%,63.999%,65%,69.999% {opacity:0.78;} }
    .flicker { animation: flicker 6s infinite; }
    @keyframes fadeUp { from {opacity:0; transform: translateY(24px);} to {opacity:1; transform: translateY(0);} }
    .reveal { opacity: 0; transform: translateY(24px); transition: opacity 1.1s ease, transform 1.1s ease; }
    .reveal.in { opacity: 1; transform: translateY(0); }
    ::-webkit-scrollbar { width: 8px; background: hsl(var(--background)); }
    ::-webkit-scrollbar-thumb { background: hsl(var(--accent)); }
  </style>
</head>
<body class="bg-background text-foreground grain scanlines">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const cn = (...c) => c.filter(Boolean).join(' ');

    // ====== shadcn DS components ======
    function Button({ variant = "default", size = "default", className = "", ...p }) {
      const base = "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium uppercase tracking-[0.18em] font-display ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50";
      const variants = {
        default:     "bg-primary text-primary-foreground hover:bg-primary/80",
        destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/90",
        outline:     "border border-foreground/30 bg-transparent text-foreground hover:border-primary hover:text-primary-foreground hover:bg-primary",
        secondary:   "bg-secondary text-secondary-foreground hover:bg-secondary/80",
        ghost:       "text-foreground hover:bg-secondary",
        link:        "text-primary underline-offset-4 hover:underline",
      };
      const sizes = { default: "h-11 px-5 py-2 text-xs", sm: "h-9 px-3 text-xs", lg: "h-12 px-10 text-sm", icon: "h-10 w-10" };
      return <button className={cn(base, variants[variant], sizes[size], className)} {...p} />;
    }
    function Input({ className = "", type = "text", ...p }) {
      return <input type={type} className={cn(
        "flex h-11 w-full border border-input bg-card px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:opacity-50", className)} {...p} />;
    }
    function Label({ className = "", htmlFor, children }) {
      return <label htmlFor={htmlFor} className={cn("font-display text-[10px] uppercase tracking-[0.3em] text-muted-foreground", className)}>{children}</label>;
    }
    function Card({ className = "", ...p }) { return <div className={cn("border border-border bg-card text-card-foreground", className)} {...p} />; }
    function CardHeader({ className = "", ...p }) { return <div className={cn("flex flex-col space-y-1.5 p-6", className)} {...p} />; }
    function CardTitle({ className = "", ...p }) { return <h3 className={cn("text-xl text-foreground tracking-wide", className)} {...p} />; }
    function CardDescription({ className = "", ...p }) { return <p className={cn("text-sm text-muted-foreground italic", className)} {...p} />; }
    function CardContent({ className = "", ...p }) { return <div className={cn("p-6 pt-0", className)} {...p} />; }
    function CardFooter({ className = "", ...p }) { return <div className={cn("flex items-center p-6 pt-0", className)} {...p} />; }
    function Badge({ variant = "default", className = "", ...p }) {
      const base = "inline-flex items-center border px-2.5 py-0.5 font-display text-[10px] uppercase tracking-[0.25em]";
      const variants = {
        default:     "border-transparent bg-primary text-primary-foreground",
        secondary:   "border-transparent bg-secondary text-secondary-foreground",
        destructive: "border-transparent bg-destructive text-destructive-foreground",
        outline:     "border-foreground/40 text-foreground",
      };
      return <div className={cn(base, variants[variant], className)} {...p} />;
    }
    function Checkbox({ checked, onCheckedChange, id, className = "" }) {
      return (
        <button type="button" role="checkbox" aria-checked={checked} id={id}
          onClick={() => onCheckedChange?.(!checked)}
          className={cn("h-4 w-4 shrink-0 border border-foreground/40 flex items-center justify-center", checked && "bg-primary border-primary text-primary-foreground", className)}>
          {checked && <svg className="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>}
        </button>
      );
    }
    function Separator({ className = "" }) {
      return <div className={cn("h-px w-full bg-gradient-to-r from-primary/60 via-primary/20 to-transparent", className)} />;
    }
    function Reveal({ children, delay = 0 }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current; if (!el) return;
        const io = new IntersectionObserver((entries) => entries.forEach((e) => {
          if (e.isIntersecting) { setTimeout(() => el.classList.add('in'), delay); io.unobserve(el); }
        }), { threshold: 0.15 });
        io.observe(el); return () => io.disconnect();
      }, [delay]);
      return <div ref={ref} className="reveal">{children}</div>;
    }
    function Dialog({ open, onOpenChange, children }) {
      useEffect(() => {
        if (!open) return;
        const onKey = (e) => e.key === 'Escape' && onOpenChange?.(false);
        window.addEventListener('keydown', onKey); return () => window.removeEventListener('keydown', onKey);
      }, [open, onOpenChange]);
      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50" onClick={() => onOpenChange?.(false)}>
          <div className="fixed inset-0 bg-black/85" />
          <div className="fixed inset-0 flex items-center justify-center p-4" onClick={(e) => e.stopPropagation()}>{children}</div>
        </div>
      );
    }
    function DialogContent({ className = "", children }) {
      return <div className={cn("relative z-50 grid w-full max-w-lg gap-4 border border-border bg-card p-8 shadow-2xl", className)}>{children}</div>;
    }
    function DialogHeader({ className = "", ...p }) { return <div className={cn("flex flex-col space-y-1.5", className)} {...p} />; }
    function DialogTitle({ className = "", ...p }) { return <h2 className={cn("text-2xl tracking-wide", className)} {...p} />; }
    function DialogDescription({ className = "", ...p }) { return <p className={cn("text-sm text-muted-foreground italic", className)} {...p} />; }
    function DialogFooter({ className = "", ...p }) { return <div className={cn("flex flex-col-reverse sm:flex-row sm:justify-end sm:space-x-2", className)} {...p} />; }

    // ====== App ======
    function App() {
      const [name, setName] = useState("");
      const [agreed, setAgreed] = useState(false);
      const [open, setOpen] = useState(false);
      return (
        <>
          <section className="relative min-h-screen vignette flex flex-col items-center justify-center px-6 py-24 overflow-hidden">
            <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
              <div className="font-display text-[28vw] font-black text-primary/[0.04] select-none tracking-[0.2em]">影</div>
            </div>
            <div className="relative z-10 mb-10 flex items-center gap-3 flicker">
              <span className="inline-block w-2 h-2 bg-primary"></span>
              <span className="font-display text-[10px] tracking-[0.5em] text-foreground/70 uppercase">Cinematic · Dark</span>
            </div>
            <h1 className="relative z-10 hero-title font-display text-[12vw] sm:text-[8rem] leading-none text-foreground mb-8 text-center font-black tracking-[0.25em] blood-text">
              BRAND
            </h1>
            <div className="relative z-10 flex items-center gap-6 mb-10">
              <span className="h-px w-12 bg-primary"></span>
              <h2 className="font-display text-sm tracking-[0.6em] text-primary uppercase font-light">Wish Your Death</h2>
              <span className="h-px w-12 bg-primary"></span>
            </div>
            <p className="relative z-10 italic text-lg sm:text-xl text-foreground/85 text-center max-w-2xl mb-10 leading-relaxed">
              "여기에 영화적인 카피를 적어주세요."
            </p>
            <Button size="lg" onClick={() => setOpen(true)}>▶ Watch Trailer</Button>
          </section>

          <section className="px-6 py-24 max-w-3xl mx-auto">
            <Reveal>
              <div className="flex items-center gap-4 mb-10">
                <span className="font-display text-xs tracking-[0.4em] blood-text">01</span>
                <span className="h-px flex-1 bg-gradient-to-r from-primary/60 to-transparent"></span>
                <span className="font-display text-xs tracking-[0.4em] text-foreground/60 uppercase">Form Demo</span>
              </div>
            </Reveal>
            <Reveal delay={150}>
              <Card>
                <CardHeader>
                  <CardTitle>Cinematic Dark</CardTitle>
                  <CardDescription>shadcn 토큰 + grain/scanlines/vignette/flicker</CardDescription>
                </CardHeader>
                <CardContent className="space-y-5">
                  <div className="space-y-2">
                    <Label htmlFor="n">Name</Label>
                    <Input id="n" placeholder="당신의 이름" value={name} onChange={(e) => setName(e.target.value)} />
                  </div>
                  <Separator />
                  <div className="flex items-center gap-2">
                    <Checkbox id="ag" checked={agreed} onCheckedChange={setAgreed} />
                    <Label htmlFor="ag">동의합니다</Label>
                  </div>
                  <div className="flex flex-wrap gap-2">
                    <Badge>NEW</Badge>
                    <Badge variant="outline">2026</Badge>
                    <Badge variant="destructive">19+</Badge>
                  </div>
                </CardContent>
                <CardFooter className="gap-2">
                  <Button variant="outline" className="flex-1">Back</Button>
                  <Button className="flex-1" disabled={!name || !agreed} onClick={() => setOpen(true)}>Continue</Button>
                </CardFooter>
              </Card>
            </Reveal>
          </section>

          <Dialog open={open} onOpenChange={setOpen}>
            <DialogContent>
              <DialogHeader>
                <DialogTitle>Confirmation</DialogTitle>
                <DialogDescription>
                  <span className="text-foreground not-italic">{name || "당신"}</span> 이(가) 진입할까요?
                </DialogDescription>
              </DialogHeader>
              <DialogFooter>
                <Button variant="outline" onClick={() => setOpen(false)}>Cancel</Button>
                <Button onClick={() => setOpen(false)}>Enter</Button>
              </DialogFooter>
            </DialogContent>
          </Dialog>
        </>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
