    }

    // QrCode가 svg를 받지 못하는 작은 사이즈에서도 동작하도록 위에서 size를 직접 전달.
    // (qrcode-generator는 module 수가 많으면 size/cell 비율 문제가 생길 수 있어 padding 1.5로 보강)

    // ========================================
    // 🖥️ PC State 1 — WaitingScreen
    //   지속형 QR 모드 (store-token):
    //     - 페이지 로드 시 GET /api/store-token → QR 표시
    //     - 30초마다 토큰 회전 체크 (값이 바뀌면 QR 새로 그림)
    //     - 1초마다 GET /api/queue/next → 200이면 onPickup, 204면 계속 대기
    // ========================================
    function WaitingScreen() {
      const [tokenInfo, setTokenInfo] = useState(null); // { token, qrUrl, expiresAt }
      const [error, setError] = useState("");
      const tokenRef = useRef(null);

      // 1) 초기 토큰 조회
      useEffect(() => {
        let cancelled = false;
        (async () => {
          try {
            const t = await apiGetStoreToken();
            if (cancelled) return;
            setTokenInfo(t);
            tokenRef.current = t.token;
          } catch (err) {
            if (!cancelled) setError(err.message);
          }
        })();
        return () => { cancelled = true; };
      }, []);

      // 2) 토큰 회전 감지 — 30초 간격
      useEffect(() => {
        if (!tokenInfo) return;
        const id = setInterval(async () => {
          try {
            const t = await apiGetStoreToken();
            if (t.token !== tokenRef.current) {
              console.log("[token] 회전 감지 — QR 갱신");
              tokenRef.current = t.token;
              setTokenInfo(t);
            }
          } catch (err) {
            console.warn("[token] 회전 체크 실패", err);
          }
        }, PC_TOKEN_REFRESH_MS);
        return () => clearInterval(id);
      }, [tokenInfo]);
      // v2: 큐 폴링 제거 — PC는 영상 픽업/분석 안 함. 분석은 손님 폰에서 직접.

      if (error) {
        return (
          <div className="min-h-screen flex items-center justify-center px-6">
            <Card className="max-w-md w-full text-center">
              <div className="text-rose-300 text-base mb-2">서버 연결 실패</div>
              <div className="text-sm text-slate-400 mb-4">{error}</div>
              <PrimaryButton onClick={() => window.location.reload()}>다시 시도</PrimaryButton>
            </Card>
          </div>
        );
      }

      if (!tokenInfo) {
        return (
          <div className="min-h-screen flex items-center justify-center">
            <div className="flex items-center gap-3 text-slate-300">
              <Spinner /> <span>매장 QR 준비 중...</span>
            </div>
          </div>
        );
      }

      return (
        <div className="min-h-screen flex flex-col items-center justify-center px-6 py-10">
          {/* 헤더 */}
          <div className="text-center mb-10">
            <div className="text-3xl font-extrabold tracking-widest accent-lime mb-1">
              {BRAND.name}
            </div>
            <div className="text-sm text-slate-400">{BRAND.storeName} · 자세 분석</div>
          </div>

          {/* QR + 안내 */}
          <div className="flex flex-col items-center gap-6">
            <QrCode value={tokenInfo.qrUrl} size={320} dark="#0f172a" light="#f8fafc" />
            <div className="text-center max-w-md">
              <h2 className="text-2xl font-bold mb-3">📱 휴대폰으로 QR을 스캔하세요</h2>
              <div className="grid grid-cols-3 gap-2 mt-4 mb-3">
                <div className="rounded-xl bg-slate-800/60 border border-slate-700 px-3 py-3">
                  <div className="text-lime-400 text-xl mb-1">⏱️</div>
                  <div className="text-xs font-semibold text-white">30초 이내</div>
                  <div className="text-[10px] text-slate-500 mt-0.5">잘 친 스윙만</div>
                </div>
                <div className="rounded-xl bg-slate-800/60 border border-slate-700 px-3 py-3">
                  <div className="text-lime-400 text-xl mb-1">🎥</div>
                  <div className="text-xs font-semibold text-white">FHD 권장</div>
                  <div className="text-[10px] text-slate-500 mt-0.5">1080p · 4K X</div>
                </div>
                <div className="rounded-xl bg-slate-800/60 border border-slate-700 px-3 py-3">
                  <div className="text-lime-400 text-xl mb-1">📐</div>
                  <div className="text-xs font-semibold text-white">대각선 촬영</div>
                  <div className="text-[10px] text-slate-500 mt-0.5">전신 · 1명</div>
                </div>
              </div>
              <p className="text-slate-500 text-xs mt-3">
                업로드가 완료되면 자동으로 분석이 시작됩니다.
              </p>
            </div>
            <div className="pulse-soft text-xs text-slate-500 mt-2 flex items-center gap-2">
              <span className="inline-block w-2 h-2 rounded-full bg-lime-400" />
              <span>업로드 대기 중...</span>
            </div>
          </div>

          {/* 디버그/운영 정보 */}
          <div className="mt-10 text-center text-[11px] text-slate-600 leading-relaxed">
            <div>
              매장 QR ·{" "}
              <a
                href={tokenInfo.qrUrl}
                target="_blank"
                rel="noreferrer"
                className="hover:text-slate-400 underline"
              >
                {tokenInfo.qrUrl}
              </a>
            </div>
            <div className="mt-1">
              만료: {new Date(tokenInfo.expiresAt).toLocaleString("ko-KR", { timeZone: "Asia/Seoul" })}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🔬 PC State 2 — AnalyzingScreen (영상 업로드됨 → MediaPipe 분석)
    // ========================================
    // 입력: { sessionId, videoUrl }
    // 동작:
    //   1) 모델 로드 (full)
    //   2) <video> 자동 재생 (음소거)
    //   3) requestAnimationFrame 루프로 매 프레임 detectForVideo + framesRef 누적
    //   4) ended 이벤트 시 detectSwings + scoreSwing 실행
    //   5) onComplete({ scoreData, bestSwing, framesData, videoUrl, slowMoFactor })
    function AnalyzingScreen({ session, onComplete, onError }) {
      const mpReady = useMediaPipeReady();
      const [progress, setProgress] = useState(0);
      const [stage, setStage] = useState("loading"); // loading | playing | scoring | done
      const [warning, setWarning] = useState("");
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const landmarkerRef = useRef(null);
      const framesRef = useRef([]);
      const racketTrailRef = useRef([]);
      const rafIdRef = useRef(null);
      const videoTsRef = useRef(0);
      const lastFrameTimeRef = useRef(0);

      // 기본값 — V2에서 모바일 메타로 받을 예정
      const hand = "right";
      const slowMoFactor = 1;

      // 모델 로드
      useEffect(() => {
        if (!mpReady) return;
        let cancelled = false;
        (async () => {
          try {
            setStage("loading");
            const lm = await window.__MediaPipe.createLandmarker("full");
            if (cancelled) { lm.close?.(); return; }
            landmarkerRef.current = lm;
            setStage("playing");
            // 영상 자동 재생
            const v = videoRef.current;
            if (v) {
              v.muted = true;
              v.playbackRate = 1;
              v.play().catch(() => {});
            }
          } catch (err) {
            console.error("[MediaPipe]", err);
            if (!cancelled) onError("모델 로딩 실패. 인터넷 연결 확인");
          }
        })();
        return () => { cancelled = true; };
      }, [mpReady]);

      // canvas 사이즈 동기화
      const syncCanvasSize = useCallback(() => {
        const v = videoRef.current;
        const c = canvasRef.current;
        if (!v || !c) return;
        if (v.videoWidth && (c.width !== v.videoWidth || c.height !== v.videoHeight)) {
          c.width = v.videoWidth;
          c.height = v.videoHeight;
        }
      }, []);

      // 분석 루프 — rVFC가 있으면 그것을 우선 사용 (실제 프레임의 mediaTime을 정확히 t로 기록).
      //  → 추후 미리보기/다운로드 영상에서 findFrameAtTimeMs(rVFC mediaTime)가 같은 프레임의 pose를 가져와 alignment 정확.
      const runInference = useCallback((video, canvas, lm, frameMediaTimeMs) => {
        const tMs = frameMediaTimeMs;
        videoTsRef.current = Math.max(videoTsRef.current + 1, Math.floor(tMs));
        const ts = videoTsRef.current;
        let result = null;
        try { result = lm.detectForVideo(video, ts); }
        catch (err) { console.warn("[detectForVideo]", err); }

        syncCanvasSize();
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (result?.landmarks?.length > 0) {
          const landmarks = result.landmarks[0];
          const racketTip = estimateRacketTip(landmarks, hand);
          framesRef.current.push({
            t: tMs,
            landmarks: landmarks.map(p => ({ x: p.x, y: p.y, z: p.z, visibility: p.visibility })),
            racketTip,
          });
          if (racketTip) racketTrailRef.current.push({ x: racketTip.x, y: racketTip.y, t: tMs });
          racketTrailRef.current = racketTrailRef.current.filter(p => tMs - p.t <= TRAIL_DURATION_MS);
          drawPoseSkeleton(ctx, landmarks, window.__MediaPipe.POSE_CONNECTIONS);
          drawRacketTrail(ctx, racketTrailRef.current, tMs);
        }
        if (video.duration) {
          setProgress(Math.min(100, Math.round((video.currentTime / video.duration) * 100)));
        }
      }, [hand, syncCanvasSize]);

      // RAF 폴백 — rVFC 미지원 환경용 (currentTime이 frame mediaTime과 거의 같다고 가정)
      const processFrame = useCallback(() => {
        const video = videoRef.current;
        const canvas = canvasRef.current;
        const lm = landmarkerRef.current;
        if (!video || !canvas || !lm) {
          rafIdRef.current = requestAnimationFrame(processFrame);
          return;
        }
        if (video.paused || video.ended) return;
        if (video.currentTime === lastFrameTimeRef.current) {
          rafIdRef.current = requestAnimationFrame(processFrame);
          return;
        }
        lastFrameTimeRef.current = video.currentTime;
        runInference(video, canvas, lm, video.currentTime * 1000);
        rafIdRef.current = requestAnimationFrame(processFrame);
      }, [runInference]);

      // 비디오 이벤트
      useEffect(() => {
        const v = videoRef.current;
        if (!v) return;
        const hasRVFC = typeof v.requestVideoFrameCallback === "function";
        const onPlay = () => {
          framesRef.current = [];
          racketTrailRef.current = [];
          videoTsRef.current = 0;
          if (hasRVFC) {
            // rVFC: 새 프레임이 컴포지터에 올라올 때마다 그 프레임의 mediaTime으로 추론.
            const onFrame = (_now, meta) => {
              const canvas = canvasRef.current;
              const lm = landmarkerRef.current;
              if (!v || !canvas || !lm) return;
              if (v.paused || v.ended) return;
              runInference(v, canvas, lm, meta.mediaTime * 1000);
              rafIdRef.current = v.requestVideoFrameCallback(onFrame);
            };
            rafIdRef.current = v.requestVideoFrameCallback(onFrame);
          } else {
            rafIdRef.current = requestAnimationFrame(processFrame);
          }
        };
        const onEnded = () => {
          // rafIdRef는 RAF id 또는 rVFC handle. 둘 다 cancel 시도 (실패해도 안전).
          if (rafIdRef.current != null) {
            try { cancelAnimationFrame(rafIdRef.current); } catch (_) {}
            if (typeof v.cancelVideoFrameCallback === "function") {
              try { v.cancelVideoFrameCallback(rafIdRef.current); } catch (_) {}
            }
            rafIdRef.current = null;
          }
          // 분석 + 스코어링
          setStage("scoring");
          setTimeout(() => {
            const frames = framesRef.current;
            const result = detectSwings(frames, hand, slowMoFactor);
            if (!result.swings.length) {
              onError("스윙이 검출되지 않았습니다. 대각선(30~45° 사선) 또는 정면 촬영을 확인해주세요.");
              return;
            }
            // 카메라 각도 정규화: 'front' / 'diagonal' 만 허용 (side/뒤는 매장 시나리오에 없음)
            const cameraAngle = session.cameraAngle === 'front' ? 'front' : 'diagonal';
            // 백핸드 스타일 사용자 prefer: 'auto' / 'one-handed' / 'two-handed'
            const bhPref = session.backhandStyle || 'auto';
            const perSwing = result.swings.map(sw => {
              // 1) 스탠스 감지
              const stanceResult = detectStance(frames, sw.peakIdx, slowMoFactor, cameraAngle);
              const finalStance = stanceResult.stance === 'unknown' ? 'semi-open' : stanceResult.stance;
              console.log('[detectStance]', { swingTime: sw.peakTime, ...stanceResult });

              // 2) 백핸드 스타일 결정 (백핸드 스윙에만 의미 있음)
              let backhandStyle = null;
              let backhandStyleSource = null;
              if (sw.type === 'backhand') {
                if (bhPref === 'one-handed' || bhPref === 'two-handed') {
                  backhandStyle = bhPref;
                  backhandStyleSource = 'user';
                } else {
                  const det = detectBackhandStyle(frames, sw.peakIdx, slowMoFactor);
                  console.log('[detectBackhandStyle]', { swingTime: sw.peakTime, ...det });
                  if (det.style === 'one-handed' || det.style === 'two-handed') {
                    backhandStyle = det.style;
                    backhandStyleSource = 'auto';
                  } else {
                    backhandStyle = 'two-handed';
                    backhandStyleSource = 'fallback';
                  }
                }
              }

              // 3) 스윙 궤도 분류 (탑스핀/플랫/슬라이스) — 채점 전에 결정해서 follow-through에 전달
              const shapeResult = detectShotShape(frames, sw.peakIdx, slowMoFactor);
              console.log('[detectShotShape]', { swingTime: sw.peakTime, type: sw.type, ...shapeResult });

              // 4) 6축 채점 (shotShape 전달 — follow-through 일관성 평가에 쓰임)
              const scored = scoreSwing(frames, sw.peakIdx, hand, slowMoFactor, finalStance, cameraAngle, shapeResult.shape);

              return {
                ...sw,
                scores: scored,
                stance: finalStance,
                stanceDebug: stanceResult,
                backhandStyle,
                backhandStyleSource,
                shotShape: shapeResult.shape,
                shotShapeDebug: shapeResult,
              };
            });
            const axesKeys = ["ready", "back", "weight", "chain", "impact", "follow"];
            const axes = {};
            axesKeys.forEach(k => {
              const vals = perSwing.map(s => s.scores[k]);
              axes[k] = clampScore(vals.reduce((a, b) => a + b, 0) / vals.length);
            });
            const total = clampScore(axesKeys.reduce((sum, k) => sum + axes[k], 0) / axesKeys.length);
            const fhSwings = perSwing.filter(s => s.type === "forehand");
            const bhSwings = perSwing.filter(s => s.type === "backhand");
            const fhAvg = fhSwings.length
              ? clampScore(fhSwings.reduce((a, s) => a + s.scores.total, 0) / fhSwings.length) : null;
            const bhAvg = bhSwings.length
              ? clampScore(bhSwings.reduce((a, s) => a + s.scores.total, 0) / bhSwings.length) : null;
            const bestSwing = perSwing.reduce((best, sw) =>
              (sw.scores?.total ?? -1) > (best?.scores?.total ?? -1) ? sw : best, null);
            const finalScoreData = { perSwing, axes, total, fhAvg, bhAvg };
            const swingProfile = computeSwingProfile(finalScoreData);
            onComplete({
              sessionId: session.sessionId,
              nickname: swingProfile.nickname,
              nicknameDesc: swingProfile.desc,
              cameraAngle,
              scoreData: finalScoreData,
              bestSwing,
              framesData: [...framesRef.current],
              videoUrl: session.videoUrl,
              slowMoFactor,
              diagnostics: result.diagnostics,
            });
          }, 100);
        };
        const onLoadedMeta = () => {
          syncCanvasSize();
          if (v.duration > 30) setWarning(`영상 길이 ${v.duration.toFixed(1)}초 (30초 초과). 분석 진행됨.`);
        };
        const onErr = () => onError("영상 디코딩 실패");
        v.addEventListener("play", onPlay);
        v.addEventListener("ended", onEnded);
        v.addEventListener("loadedmetadata", onLoadedMeta);
        v.addEventListener("error", onErr);
        return () => {
          v.removeEventListener("play", onPlay);
          v.removeEventListener("ended", onEnded);
          v.removeEventListener("loadedmetadata", onLoadedMeta);
          v.removeEventListener("error", onErr);
          if (rafIdRef.current != null) {
            try { cancelAnimationFrame(rafIdRef.current); } catch (_) {}
            if (typeof v.cancelVideoFrameCallback === "function") {
              try { v.cancelVideoFrameCallback(rafIdRef.current); } catch (_) {}
            }
            rafIdRef.current = null;
          }
        };
      }, [processFrame, runInference, session?.videoUrl, syncCanvasSize, onComplete, onError, slowMoFactor]);

      // 단계 정의 — 사용자에게 흐름 보여주기 위함
      const stages = [
        { key: "received", label: "영상 받음", icon: "📥" },
        { key: "loading",  label: "AI 모델 로딩", icon: "🤖" },
        { key: "playing",  label: "스윙 분석 중", icon: "🎾" },
        { key: "scoring",  label: "6축 채점", icon: "🎯" },
        { key: "done",     label: "완료", icon: "✅" },
      ];
      // stage 진행도 인덱스 (received는 항상 통과, loading 시점부터 활성화)
      const stageOrder = { loading: 1, playing: 2, scoring: 3, done: 4 };
      const currentIdx = stageOrder[stage] ?? 0;

      const stageLabel =
        stage === "loading" ? "AI 모델 로딩 중... (처음엔 5~10초 걸려요)"
        : stage === "playing" ? `스윙 분석 중... ${progress}%`
        : stage === "scoring" ? "스윙 검출 + 6축 채점 중..."
        : "완료";

      return (
        <div className="min-h-screen flex flex-col items-center justify-center px-6 py-10">
          <div className="text-center mb-6">
            <div className="text-2xl font-extrabold tracking-widest accent-lime mb-1">{BRAND.name}</div>
            <div className="text-sm text-slate-400">자세 분석 중</div>
          </div>

          {/* 단계 표시 (체크인 형태) */}
          <div className="mb-6 flex items-center gap-1 sm:gap-3">
            {stages.map((s, i) => {
              const done = i < currentIdx + 1;
              const active = i === currentIdx + 1;
              return (
                <React.Fragment key={s.key}>
                  <div
                    className={`flex flex-col items-center text-center transition-colors ${
                      done ? "text-lime-300" : active ? "text-lime-400" : "text-slate-600"
                    }`}
                  >
                    <div
                      className={`w-9 h-9 rounded-full flex items-center justify-center text-base ${
                        done
                          ? "bg-lime-400/20 border border-lime-400/60"
                          : active
                          ? "bg-lime-400/10 border border-lime-400/40 pulse-soft"
                          : "bg-slate-800 border border-slate-700"
                      }`}
                    >
                      {s.icon}
                    </div>
                    <div className="text-[10px] mt-1 font-medium hidden sm:block">{s.label}</div>
                  </div>
                  {i < stages.length - 1 && (
                    <div
                      className={`w-6 sm:w-10 h-px ${
                        i < currentIdx ? "bg-lime-400/60" : "bg-slate-700"
                      }`}
                    />
                  )}
                </React.Fragment>
              );
            })}
          </div>

          {warning && (
            <div className="mb-4 w-full max-w-3xl p-3 rounded-lg bg-amber-500/10 border border-amber-500/40 text-amber-300 text-sm">
              {warning}
            </div>
          )}

          <div className="w-full max-w-3xl">
            <div className="video-stack">
              <video
                ref={videoRef}
                src={session.videoUrl}
                controls={false}
                playsInline
                muted
                crossOrigin="anonymous"
              />
              <canvas ref={canvasRef} />
            </div>
          </div>

          <div className="mt-6 w-full max-w-md">
            <div className="flex items-center justify-between text-sm mb-2">
              <span className="text-slate-300 flex items-center gap-2">
                <Spinner size={3} />
                {stageLabel}
              </span>
              {stage === "playing" && <span className="text-lime-400 font-semibold">{progress}%</span>}
            </div>
            <div className="progress-track">
              <div className="progress-fill" style={{ width: `${stage === "scoring" ? 100 : progress}%` }} />
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🏆 PC State 3 — ResultScreen (인스타 9:16 결과 카드)
    //   - 진입 시 즉시 POST /api/sessions/:id/complete (PCApp에서 처리)
    //   - 5분 자동 타임아웃 → onRestart()
    //   - 다운로드 3종: 영상(MediaRecorder webm), PNG, 원본 mp4
    //   - 안전 영역 오버레이 토글
    // ========================================
    function ResultScreen({ result, onRestart, phoneMode = false }) {
      const cardRef = useRef(null);
      const [downloadingPng, setDownloadingPng] = useState(false);
      const [downloadingVideo, setDownloadingVideo] = useState(false);
      const [videoRenderProgress, setVideoRenderProgress] = useState(0);
      const [downloadError, setDownloadError] = useState("");
      const [showSafeArea, setShowSafeArea] = useState(false);
      const [secondsLeft, setSecondsLeft] = useState(Math.floor(RESULT_AUTO_TIMEOUT_MS / 1000));

      // ── 자동 합성 (결과 화면 진입 즉시) ───────────────────────────────────────
      // composeStatus: idle | rendering | uploading | ready | error
      const [composeStatus, setComposeStatus] = useState("idle");
      const [composeProgress, setComposeProgress] = useState(0);
      const [composeError, setComposeError] = useState("");  // 실패 시 실제 에러 메시지
      const [downloadUrl, setDownloadUrl] = useState("");
      const composedBlobRef = useRef(null);          // 합성 완료된 Blob (재사용)
      const composedExtRef = useRef("webm");         // 확장자 (mp4 / webm)
      const autoComposeStartedRef = useRef(false);   // 한 번만 실행

      // PC 매장 모드: 5분 타임아웃 → 자동으로 QR 화면 복귀.
      // 폰 모드: 타임아웃 없음 — 폰은 개인 디바이스라 다음 손님 차단 우려 없음.
      useEffect(() => {
        if (phoneMode) return;
        const t = setTimeout(() => onRestart(), RESULT_AUTO_TIMEOUT_MS);
        const tick = setInterval(() => {
          setSecondsLeft(s => Math.max(0, s - 1));
        }, 1000);
        return () => { clearTimeout(t); clearInterval(tick); };
      }, [onRestart, phoneMode]);

      // PNG 다운로드 (1080x1920)
      const handlePngDownload = async () => {
        const node = cardRef.current;
        if (!node) return;
        setDownloadingPng(true);
        setDownloadError("");
        try {
          node.classList.add("capture-mode");
          await new Promise(r => requestAnimationFrame(r));
          const canvas = await window.html2canvas(node, {
            backgroundColor: null,
            scale: 1,
            useCORS: true,
            allowTaint: true,
            logging: false,
            width: 1080,
            height: 1920,
          });
          node.classList.remove("capture-mode");
          const dataUrl = canvas.toDataURL("image/png");
          const a = document.createElement("a");
          a.href = dataUrl;
          a.download = `daily-tennis-${result.scoreData.total}-${Date.now()}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        } catch (err) {
          console.error("[png-download]", err);
          setDownloadError("PNG 생성 실패: " + err.message);
          if (cardRef.current) cardRef.current.classList.remove("capture-mode");
        } finally {
          setDownloadingPng(false);
        }
      };

      // 원본 영상 다운로드
      const handleRawVideoDownload = () => {
        if (!result.videoUrl) return;
        const a = document.createElement("a");
        a.href = result.videoUrl;
        a.download = `swing-${Date.now()}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      };

      // ────────────────────────────────────────────────────────────────────────
      // 🎬 합성 영상 코어 — Canvas + MediaRecorder로 webm/mp4 Blob 생성
      //   onProgress: 0~99 진행률 콜백
      //   반환: { blob, ext, mimeType }
      // ────────────────────────────────────────────────────────────────────────
      const composeVideoBlob = async (onProgress) => {
        if (!result.bestSwing || !result.videoUrl) {
          throw new Error("베스트 샷이 없어 영상을 만들 수 없습니다");
        }

        // 1) Offscreen video 만들기 (audio off).
        //    ⚠️ iOS Safari는 DOM에 붙지 않은 video 요소의 재생/디코딩을 거부한다.
        //    화면 밖에 작게 attach해서 손님 화면에 노출은 안 시키되 실제로는 DOM에 존재하도록.
        console.log('[compose] start, videoUrl prefix:', String(result.videoUrl).slice(0, 30));
        const srcVideo = document.createElement("video");
        srcVideo.crossOrigin = "anonymous";
        srcVideo.muted = true;
        srcVideo.playsInline = true;
        srcVideo.preload = "auto";
        srcVideo.setAttribute('webkit-playsinline', 'true');
        Object.assign(srcVideo.style, {
          position: 'fixed', left: '-9999px', top: '-9999px',
          width: '2px', height: '2px', opacity: '0.01', pointerEvents: 'none',
        });
        document.body.appendChild(srcVideo);
        srcVideo.src = result.videoUrl;
        await new Promise((resolve, reject) => {
          let done = false;
          const ok = () => { if (done) return; done = true; resolve(); };
          const ng = (e) => { if (done) return; done = true; reject(new Error("영상 로딩 실패: " + (e?.message || ''))); };
          srcVideo.addEventListener("loadedmetadata", ok, { once: true });
          srcVideo.addEventListener("error", ng, { once: true });
          setTimeout(() => ng(new Error("loadedmetadata 타임아웃 10s")), 10000);
        });
        console.log('[compose] loadedmetadata OK', srcVideo.videoWidth, 'x', srcVideo.videoHeight, 'dur=', srcVideo.duration);

        // 2) Offscreen canvas (1080x1920)
        const canvas = document.createElement("canvas");
        canvas.width = 1080;
        canvas.height = 1920;
        const ctx = canvas.getContext("2d");

        // 3) MediaRecorder
        // ⚠️ iOS 사진앱은 MP4(H.264)만 지원 — WebM 미지원.
        //    가능하면 MP4로 인코딩해야 폰 갤러리 저장 흐름이 매끄러움.
        const stream = canvas.captureStream(30);
        const mimeCandidates = [
          'video/mp4; codecs="avc1.42E01E,mp4a.40.2"', // H.264 baseline + AAC
          'video/mp4; codecs="avc1.42E01E"',          // H.264 only
          "video/mp4",
          "video/webm;codecs=vp9",
          "video/webm;codecs=vp8",
          "video/webm",
        ];
        const mimeType = mimeCandidates.find(m =>
          window.MediaRecorder && MediaRecorder.isTypeSupported(m)
        );
        if (!mimeType) throw new Error("이 브라우저는 영상 녹화를 지원하지 않습니다");

        console.log('[compose] mimeType chosen:', mimeType);
        const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: 4_000_000 });
        const chunks = [];
        recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        const stopPromise = new Promise((resolve) => {
          recorder.onstop = () => resolve();
        });

        // 4) 베스트 샷 윈도우 결정 (±5000ms)
        //    1배속(1.0x) 한 번 재생 = 10초 하이라이트.
        const windowMs = 5000;
        const startSec = Math.max(0, (result.bestSwing.time - windowMs) / 1000);
        const endSec = Math.min(srcVideo.duration || 30, (result.bestSwing.time + windowMs) / 1000);
        // 정상속도 시작 (Phase A) — seeked 이벤트가 안 뜨는 케이스(이미 같은 시점 / 등록 race)를 대비해 타임아웃 안전망 둔다.
        srcVideo.playbackRate = 1.0;
        console.log('[compose] seeking to', startSec, 'from', srcVideo.currentTime);
        await new Promise((resolve) => {
          if (Math.abs(srcVideo.currentTime - startSec) < 0.01) { resolve(); return; }
          let done = false;
          const finish = (src) => { if (done) return; done = true; srcVideo.removeEventListener("seeked", finishEvt); console.log('[compose] seek done via', src, 'currentTime=', srcVideo.currentTime); resolve(); };
          const finishEvt = () => finish('event');
          srcVideo.addEventListener("seeked", finishEvt);
          srcVideo.currentTime = startSec;
          setTimeout(() => finish('timeout-1.5s'), 1500); // seeked 안 뜨면 1.5초 후 강제 진행
        });
        try {
          await srcVideo.play();
          console.log('[compose] play OK, entering RAF loop');
        } catch (e) {
          console.warn('[compose] play rejected (계속 진행):', e?.message);
        }

        // 🔍 진단 로그 (1회) — 합성 영상 좌표/타임라인 검증용 (contain fit 방식)
        try {
          const _fit = containFitRect(srcVideo.videoWidth, srcVideo.videoHeight, 940, 940);
          const fd = result.framesData;
          const firstT = fd && fd.length ? fd[0].t : null;
          const lastT = fd && fd.length ? fd[fd.length - 1].t : null;
          console.log("[compose] geometry (contain)", {
            videoWH: [srcVideo.videoWidth, srcVideo.videoHeight],
            fit: _fit,
            window: [startSec.toFixed(3), endSec.toFixed(3)],
            framesData: { count: fd?.length, firstT, lastT },
            mimeType,
          });
          // 첫 keypoint 변환 검증 (왼쪽 어깨=11번)
          if (fd && fd.length && fd[0].landmarks && fd[0].landmarks[11]) {
            const lm = fd[0].landmarks[11];
            const fitBox = { x: 70 + _fit.dx, y: 195 + _fit.dy, w: _fit.dw, h: _fit.dh };
            const P = projectNormalizedToFit(lm.x, lm.y, fitBox);
            console.log("[compose] sample keypoint #11 (left shoulder)", { norm: { x: lm.x, y: lm.y }, fitBox, dst: P });
          }
        } catch (e) { /* diag only */ }

        // 5) 녹화 시작 + 1배속 단일 페이즈 렌더링 루프
        //    1.0x 한 번 재생으로 10초. 윈도우 끝에 도달하면 처음으로 seek해 반복.
        srcVideo.playbackRate = 1.0;
        try {
          recorder.start();
          console.log('[compose] recorder.start() OK, state=', recorder.state);
        } catch (e) {
          console.error('[compose] recorder.start() 실패:', e);
          throw e;
        }
        // 실제 윈도우 길이(클램프 반영) — 짧은 영상에서 startSec=0, endSec=duration일 수 있음.
        // T_TOTAL_MS을 이걸로 맞춰서 seek-back loop 없이 한 번에 자연스럽게 재생 → 다운로드 mp4 끊김 방지.
        const actualWindowMs = Math.max(1000, Math.round((endSec - startSec) * 1000));
        const PHASE_NORMAL_MS = actualWindowMs;
        const T_TOTAL_MS = actualWindowMs;
        const SCORE_ANIM_MS = 1200; // 점수 카운트업
        const t0 = performance.now();
        let stopped = false;

        // rVFC 콜백 안에서 drawImage(body) + drawSkeleton(at meta.mediaTime)을 같이 호출하면
        // 두 픽셀이 같은 비디오 프레임을 가리킨다 (유체이탈 방지).
        // 백업: rVFC 미지원/스톨 시 RAF에서 currentTime 기반으로 그림.
        const hasRVFC = typeof srcVideo.requestVideoFrameCallback === "function";

        const drawAt = (mediaTimeMs) => {
          const elapsed = performance.now() - t0;
          if (elapsed >= T_TOTAL_MS) return false;
          const pct = Math.min(99, Math.floor((elapsed / T_TOTAL_MS) * 100));
          if (onProgress) onProgress(pct);
          // seek-back 제거 — T_TOTAL_MS을 실제 윈도우 길이로 맞췄으므로 자연 재생 종료 시점과 일치.
          // 중간에 seek-back 일어나면 mp4가 끊김.
          const animT = Math.min(1, elapsed / SCORE_ANIM_MS);
          const easeT = 1 - Math.pow(1 - animT, 3);
          drawInstaCardFrame(ctx, {
            videoEl: srcVideo,
            framesData: result.framesData,
            bestSwing: result.bestSwing,
            scoreData: result.scoreData,
            nickname: result.nickname,
            nicknameDesc: result.nicknameDesc,
            currentVideoTimeMs: mediaTimeMs,
            scoreAnimT: easeT,
            phase: 'normal',
            phaseProgress: elapsed / PHASE_NORMAL_MS,
          });
          return true;
        };

        let nextLogAt = 1000;
        // 마지막으로 rVFC가 보고한 mediaTime — RAF 헬퍼가 score 애니메이션 갱신할 때 같은 시각으로 다시 그림.
        let lastReportedMediaTimeMs = srcVideo.currentTime * 1000;

        await new Promise((resolveLoop) => {
          let rvfcHandle = null;
          let rafHandle = null;
          let watchdog = null;
          const finish = () => {
            stopped = true;
            if (watchdog) clearTimeout(watchdog);
            if (rafHandle) cancelAnimationFrame(rafHandle);
            if (hasRVFC && rvfcHandle != null && typeof srcVideo.cancelVideoFrameCallback === "function") {
              try { srcVideo.cancelVideoFrameCallback(rvfcHandle); } catch (_) {}
            }
            resolveLoop();
          };

          if (hasRVFC) {
            // rVFC: 새 비디오 프레임이 컴포지터에 올라올 때마다 같은 시각으로 body+skeleton을 함께 그림.
            const onFrame = (_now, meta) => {
              if (stopped) return;
              lastReportedMediaTimeMs = meta.mediaTime * 1000;
              if (performance.now() - t0 >= nextLogAt) {
                console.log('[compose] tick', { elapsedMs: Math.round(performance.now() - t0), frameMediaTimeS: meta.mediaTime.toFixed(3) });
                nextLogAt += 1000;
              }
              if (!drawAt(lastReportedMediaTimeMs)) { finish(); return; }
              rvfcHandle = srcVideo.requestVideoFrameCallback(onFrame);
            };
            rvfcHandle = srcVideo.requestVideoFrameCallback(onFrame);
            // 안전 타임아웃 — rVFC가 멈춰도 T_TOTAL_MS + 2s 후 강제 종료
            watchdog = setTimeout(finish, T_TOTAL_MS + 2000);
          } else {
            // rVFC 미지원: RAF 폴백 (currentTime 기반 — 작은 스큐 가능)
            const loop = () => {
              if (stopped) return;
              if (!drawAt(srcVideo.currentTime * 1000)) { finish(); return; }
              rafHandle = requestAnimationFrame(loop);
            };
            rafHandle = requestAnimationFrame(loop);
          }
        });

        recorder.stop();
        srcVideo.pause();
        await stopPromise;
        try { srcVideo.remove(); } catch (_) {}

        // mimeType이 'video/mp4; codecs="..."' 형태라도 startsWith("video/mp4")로 정확히 잡음
        const isMp4 = mimeType.startsWith("video/mp4");
        const blob = new Blob(chunks, { type: mimeType });
        const ext = isMp4 ? "mp4" : "webm";
        if (onProgress) onProgress(100);
        return { blob, ext, mimeType };
      };

      // ────────────────────────────────────────────────────────────────────────
      // 🚀 자동 합성 + 클라이언트 직접 업로드 (Vercel Blob CDN) — 결과 화면 진입 시 1회 자동 실행
      //   완료 시 publicDownloadUrl 받아 푸터 QR로 노출
      // ────────────────────────────────────────────────────────────────────────
      const startAutoCompose = async () => {
        try {
          setComposeStatus("rendering");
          setComposeProgress(0);

          const { blob, ext } = await composeVideoBlob((pct) => setComposeProgress(pct));
          composedBlobRef.current = blob;
          composedExtRef.current = ext;

          if (phoneMode) {
            // 폰 모드: 합성본을 Blob에 안 올림. 사용자가 다운로드 버튼 누르면 즉시 로컬 다운.
            setComposeStatus("ready");
            return;
          }

          // PC 모드: Blob CDN 직접 업로드 → 다운로드 URL을 푸터 QR로 노출
          setComposeStatus("uploading");
          const data = await apiUploadResultVideo(result.sessionId, blob, ext, () => {
            // 진행률은 별도 표시 안 함 (PC 환경 빠름) — 필요시 setComposeProgress(p) 추가
          });
          const url = data.publicDownloadUrl || data.downloadUrl;
          if (!url) throw new Error("다운로드 URL 응답 없음");

          setDownloadUrl(url);
          setComposeStatus("ready");
        } catch (err) {
          console.error("[auto-compose]", err);
          setComposeError(err && err.message ? err.message : String(err));
          setComposeStatus("error");
        }
      };

      // 결과 데이터가 갖춰지면 1회 자동 합성 시작
      useEffect(() => {
        if (!result?.scoreData || !result?.bestSwing || !result?.videoUrl || !result?.sessionId) return;
        if (autoComposeStartedRef.current) return;
        autoComposeStartedRef.current = true;
        startAutoCompose();
      }, [result]);

      // ────────────────────────────────────────────────────────────────────────
      // 🎬 PC 다운로드 버튼 — 캐시된 Blob 우선 사용
      //   (자동 합성이 끝나기 전에 누르면 직접 다시 합성)
      // ────────────────────────────────────────────────────────────────────────
      const handleVideoCompose = async () => {
        // 1) 이미 캐시된 Blob 있으면 즉시 다운로드
        if (composedBlobRef.current) {
          const blob = composedBlobRef.current;
          const ext = composedExtRef.current || "webm";
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `daily-tennis-${result.scoreData.total}-${Date.now()}.${ext}`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 1000);
          return;
        }

        // 2) 자동 합성이 진행 중이면 대기 안내만
        if (composeStatus === "rendering" || composeStatus === "uploading") {
          setDownloadError("영상 생성 중입니다. 잠시 후 다시 시도해주세요");
          return;
        }

        // 3) 캐시도 없고 합성도 안 됨 → 직접 합성 + 다운로드 (fallback)
        if (!result.bestSwing || !result.videoUrl) {
          setDownloadError("베스트 샷이 없어 영상을 만들 수 없습니다");
          return;
        }
        setDownloadingVideo(true);
        setVideoRenderProgress(0);
        setDownloadError("");
        try {
          const { blob, ext } = await composeVideoBlob((pct) => setVideoRenderProgress(pct));
          composedBlobRef.current = blob;
          composedExtRef.current = ext;
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          a.href = url;
          a.download = `daily-tennis-${result.scoreData.total}-${Date.now()}.${ext}`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch (err) {
          console.error("[video-compose]", err);
          setDownloadError("영상 생성 실패: " + err.message);
        } finally {
          setDownloadingVideo(false);
          setTimeout(() => setVideoRenderProgress(0), 1500);
        }
      };

      const minutesLeft = Math.floor(secondsLeft / 60);
      const secsLeftMod = secondsLeft % 60;

      return (
        <div className="min-h-screen px-6 py-10">
          <div className="max-w-6xl mx-auto">
            {/* 상단 헤더 */}
            <div className="flex items-center justify-between mb-6 flex-wrap gap-3">
              <div>
                <div className="text-xl font-extrabold tracking-widest accent-lime">{BRAND.name}</div>
                <div className="text-sm text-slate-400">
                  {phoneMode
                    ? '분석 완료'
                    : `분석 완료 · 다음 손님까지 ${minutesLeft}:${String(secsLeftMod).padStart(2, "0")}`}
                </div>
              </div>
              {!phoneMode && (
                <div className="flex items-center gap-3">
                  <label className="flex items-center gap-2 text-xs text-slate-400 cursor-pointer">
                    <input
                      type="checkbox"
                      className="w-4 h-4 accent-lime-400"
                      checked={showSafeArea}
                      onChange={(e) => setShowSafeArea(e.target.checked)}
                    />
                    인스타 안전 영역 보기
                  </label>
                  <PrimaryButton onClick={onRestart}>다음 손님 →</PrimaryButton>
                </div>
              )}
            </div>

            <div className={phoneMode
              ? "flex flex-col gap-6 items-stretch max-w-md mx-auto w-full"
              : "grid grid-cols-1 lg:grid-cols-3 gap-8 items-start"
            }>
              {/* phoneMode: 분석 영상 카드를 맨 위로. 좌우폭은 부모(max-w-md)에 맞춰 통일. */}
              {phoneMode && (
                <div className="order-1 w-full">
                  <div className="relative w-full">
                    <ResultInstaCard
                      nickname={result.nickname}
                      nicknameDesc={result.nicknameDesc}
                      scoreData={result.scoreData}
                      bestSwing={result.bestSwing}
                      framesData={result.framesData}
                      videoUrl={result.videoUrl}
                      slowMoFactor={result.slowMoFactor}
                      cardRef={cardRef}
                      showSafeArea={showSafeArea}
                      composeStatus={composeStatus}
                      composeProgress={composeProgress}
                      composeError={composeError}
                      downloadUrl={downloadUrl}
                      phoneMode={phoneMode}
                    />
                    {downloadingVideo && (
                      <div className="render-overlay">
                        <Spinner size={6} />
                        <div className="text-lime-300 font-semibold text-lg">
                          🎬 영상 만드는 중... {videoRenderProgress}%
                        </div>
                      </div>
                    )}
                  </div>
                </div>
              )}
              {/* 좌측(PC) / 중단(phone): 컨트롤/요약 */}
              <div className={phoneMode ? "flex flex-col gap-4 order-2" : "lg:col-span-1 space-y-4"}>
                <Card className={phoneMode ? "order-2" : ""}>
                  <h3 className="text-sm font-medium text-slate-400 mb-3">요약</h3>
                  <div className="space-y-2 text-sm">
                    <div className="flex justify-between">
                      <span className="text-slate-400">검출 스윙</span>
                      <span className="font-semibold">{result.scoreData.perSwing.length}개</span>
                    </div>
                    {result.scoreData.fhAvg !== null && (
                      <div className="flex justify-between">
                        <span className="text-slate-400">포핸드 평균</span>
                        <span className={`font-semibold ${scoreColorClass(result.scoreData.fhAvg)}`}>
                          {result.scoreData.fhAvg} / 100
                        </span>
                      </div>
                    )}
                    {result.scoreData.bhAvg !== null && (
                      <div className="flex justify-between">
                        <span className="text-slate-400">백핸드 평균</span>
                        <span className={`font-semibold ${scoreColorClass(result.scoreData.bhAvg)}`}>
                          {result.scoreData.bhAvg} / 100
                        </span>
                      </div>
                    )}
                    <div className="flex justify-between pt-2 mt-2 border-t border-slate-700">
                      <span className="text-slate-300">종합 점수</span>
                      <span className={`font-bold text-lg ${scoreColorClass(result.scoreData.total)}`}>
                        {result.scoreData.total} / 100
                      </span>
                    </div>
                  </div>
                </Card>

                <Card className={phoneMode ? "order-3" : ""}>
                  <h3 className="text-sm font-medium text-slate-400 mb-3">📥 분석 영상 다운로드</h3>
                  <p className="text-xs text-slate-500 mb-3">
                    {phoneMode
                      ? "결과 영상이 자동 생성됩니다. 아래 버튼으로 폰 사진앱에 저장하세요."
                      : "결과 영상이 자동 생성됩니다. 푸터의 QR을 폰으로 스캔하면 폰에 저장되거나, PC에서 직접 받으세요."}
                  </p>

                  {/* 자동 합성 상태 표시 */}
                  <div className="mb-3 px-3 py-2 rounded-lg bg-slate-800/50 border border-slate-700 text-xs">
                    {composeStatus === "rendering" && (
                      <span className="text-lime-300">📹 영상 자동 생성 중... {composeProgress}%</span>
                    )}
                    {composeStatus === "uploading" && !phoneMode && (
                      <span className="text-lime-300">📤 서버 업로드 중...</span>
                    )}
                    {composeStatus === "ready" && (
                      <span className="text-lime-300">
                        {phoneMode ? "✅ 준비 완료 — 아래 버튼 누르면 폰에 저장" : "✅ QR 준비 완료 — 폰으로 스캔하면 폰에 저장"}
                      </span>
                    )}
                    {composeStatus === "error" && (
                      <span className="text-rose-300 break-all">
                        ❌ {composeError || '영상 생성 실패 — 다시 시도해 주세요'}
                      </span>
                    )}
                    {composeStatus === "idle" && (
                      <span className="text-slate-400">⏳ 준비중...</span>
                    )}
                  </div>

                  {/* 메인 — 영상 다운로드 */}
                  <PrimaryButton
                    onClick={handleVideoCompose}
                    disabled={downloadingVideo || downloadingPng || composeStatus === "rendering" || composeStatus === "uploading"}
                    className="w-full"
                  >
                    {downloadingVideo
                      ? `🎬 영상 만드는 중... ${videoRenderProgress}%`
                      : composeStatus === "ready"
                        ? (phoneMode ? "📱 폰에 영상 저장" : "🎬 PC로 영상 다운로드")
                        : composeStatus === "rendering" || composeStatus === "uploading"
                          ? "🎬 영상 준비 중..."
                          : (phoneMode ? "📱 폰에 영상 저장" : "🎬 영상 다운로드")}
                  </PrimaryButton>

                  {/* 보조 — PNG (합성 완료 후 활성화) */}
                  <button
                    onClick={handlePngDownload}
                    disabled={downloadingVideo || downloadingPng || (composeStatus !== "ready" && composeStatus !== "error")}
                    title={composeStatus !== "ready" && composeStatus !== "error" ? "영상 생성 후 가능합니다" : ""}
                    className="mt-2 w-full px-4 py-2.5 rounded-xl text-sm font-medium border border-slate-600 text-slate-200 hover:bg-slate-700 disabled:opacity-40 disabled:cursor-not-allowed"
                  >
                    {downloadingPng
                      ? "이미지 생성 중..."
                      : composeStatus !== "ready" && composeStatus !== "error"
                        ? "🖼️ 이미지 다운로드 (영상 생성 후)"
                        : "🖼️ 이미지 다운로드 (PNG)"}
                  </button>

                  {/* 보조 — 원본 영상 */}
                  <button
                    onClick={handleRawVideoDownload}
                    className="mt-2 w-full px-4 py-2.5 rounded-xl text-sm font-medium border border-slate-700 text-slate-300 hover:bg-slate-800"
                  >
                    📥 원본 영상 다운로드
                  </button>

                  {downloadError && (
                    <p className="mt-2 text-xs text-rose-300">{downloadError}</p>
                  )}

                </Card>

                {/* 📱 폰으로 저장하는 법 — PC 모드는 QR 스캔 흐름, 폰 모드는 다운로드 후 갤러리 이동 흐름 */}
                <Card className={phoneMode ? "order-4" : ""}>
                  <h3 className="text-sm font-medium text-slate-400 mb-3">📱 갤러리에 저장하는 법</h3>

                  <div className="text-xs text-slate-300 mb-3 leading-relaxed">
                    {phoneMode
                      ? '위의 "📱 폰에 영상 저장" 버튼을 누르면 영상이 다운로드돼요. 그 후 OS별로 갤러리/사진앱으로 옮기는 단계입니다.'
                      : '우측 QR 코드를 폰으로 스캔 → 다운로드 페이지가 열립니다.'}
                  </div>

                  {/* iPhone 안내 */}
                  <div className="rounded-lg bg-slate-800/60 border border-slate-700 p-3 mb-2">
                    <div className="flex items-center gap-2 text-xs font-bold text-lime-300 mb-2">
                      <span>🍎</span><span>iPhone (아이폰)</span>
                    </div>
                    <ol className="text-[11px] text-slate-200 leading-relaxed pl-4 space-y-1" style={{ listStyleType: 'decimal' }}>
                      <li>위 <b className="text-lime-300">"📱 폰에 영상 저장"</b> 버튼 누르면 다운로드 시작</li>
                      <li>다운로드 완료 시 화면 상단 다운로드 아이콘(↓) 탭 → "파일에서 보기"</li>
                      <li>또는 <b>"파일" 앱</b> 열기 → <b>"다운로드"</b> 폴더로 이동</li>
                      <li>영상을 <b>길게 누름</b> → <b>"공유"</b> → <b>"비디오 저장"</b></li>
                      <li>사진 앱(갤러리)에 영상이 저장됩니다 ✅</li>
                    </ol>
                    <div className="mt-2 pt-2 border-t border-slate-700/60 text-[10px] text-amber-300/80 leading-relaxed">
                      ⚠️ iPhone은 사진 앱으로 바로 저장 안 되고 <b>"파일" 앱</b> 거쳐야 합니다.
                    </div>
                  </div>

                  {/* Android 안내 */}
                  <div className="rounded-lg bg-slate-800/60 border border-slate-700 p-3">
                    <div className="flex items-center gap-2 text-xs font-bold text-lime-300 mb-2">
                      <span>🤖</span><span>Android (안드로이드)</span>
                    </div>
                    <ol className="text-[11px] text-slate-200 leading-relaxed pl-4 space-y-1" style={{ listStyleType: 'decimal' }}>
                      <li>위 <b className="text-lime-300">"📱 폰에 영상 저장"</b> 버튼 누르면 다운로드 시작</li>
                      <li><b>"내 파일"</b>(삼성) 또는 <b>"파일"</b> 앱 → <b>"Download"</b> 폴더</li>
                      <li>대부분 <b>갤러리 앱에서 자동 인식</b>되어 바로 보입니다 ✅</li>
                      <li>안 보이면 갤러리 새로고침 (당겨서 새로고침) 또는 재시작</li>
                    </ol>
                  </div>

                  <p className="mt-3 text-[10px] text-slate-500 leading-relaxed">
                    영상 포맷은 mp4 또는 webm입니다. iOS는 webm을 갤러리에 못 올리므로 mp4가 우선 시도됩니다.
                  </p>
                </Card>

                <Card className={phoneMode ? "order-2" : ""}>
                  <h3 className="text-sm font-medium text-slate-400 mb-3">베스트 샷</h3>
                  {result.bestSwing && (
                    <div className="text-sm space-y-1">
                      <div className="flex justify-between">
                        <span className="text-slate-400">시점</span>
                        <span>{(result.bestSwing.time / 1000).toFixed(1)}초</span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-slate-400">종목</span>
                        <span>
                          {result.bestSwing.type === "forehand" ? "포핸드"
                            : result.bestSwing.type === "backhand" ? "백핸드" : "분류불가"}
                        </span>
                      </div>
                      <div className="flex justify-between">
                        <span className="text-slate-400">스탠스</span>
                        <span>{stanceLabel(result.bestSwing.stance)}</span>
                      </div>
                      <div className="flex justify-between pt-2 mt-2 border-t border-slate-700">
                        <span className="text-slate-300">점수</span>
                        <span className={`font-bold ${scoreColorClass(result.bestSwing.scores.total)}`}>
                          {result.bestSwing.scores.total} / 100
                        </span>
                      </div>
                    </div>
                  )}
                </Card>
              </div>

              {/* 우측: 9:16 인스타 카드 (PC 모드만 — phoneMode에선 위쪽에 이미 그림) */}
              {!phoneMode && (
              <div className="lg:col-span-2 flex justify-center">
                <div className="relative">
                  <ResultInstaCard
                    nickname={result.nickname}
                    nicknameDesc={result.nicknameDesc}
                    scoreData={result.scoreData}
                    bestSwing={result.bestSwing}
                    framesData={result.framesData}
                    videoUrl={result.videoUrl}
                    slowMoFactor={result.slowMoFactor}
                    cardRef={cardRef}
                    showSafeArea={showSafeArea}
                    composeStatus={composeStatus}
                    composeProgress={composeProgress}
                    composeError={composeError}
                    downloadUrl={downloadUrl}
                    phoneMode={phoneMode}
                  />
                  {downloadingVideo && (
                    <div className="render-overlay">
                      <Spinner size={6} />
                      <div className="text-lime-300 font-semibold text-lg">
                        🎬 영상 만드는 중... {videoRenderProgress}%
                      </div>
                      <div className="w-3/4 max-w-xs">
                        <div className="progress-track">
                          <div className="progress-fill" style={{ width: `${videoRenderProgress}%` }} />
                        </div>
                      </div>
                      <div className="text-xs text-slate-400">잠시만 기다려주세요 (~6초)</div>
                    </div>
                  )}
                </div>
              </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 📵 ErrorScreen — 분석 실패/에러 안내
    // ========================================
    function ErrorScreen({ message, onRestart }) {
      return (
        <div className="min-h-screen flex items-center justify-center px-6">
          <Card className="max-w-md w-full text-center">
            <div className="text-3xl mb-3">⚠️</div>
            <h2 className="text-lg font-semibold mb-2 text-amber-300">분석을 마치지 못했습니다</h2>
            <p className="text-sm text-slate-400 mb-5">{message}</p>
            <PrimaryButton onClick={onRestart}>다시 시작</PrimaryButton>
          </Card>
        </div>
      );
    }

    // ========================================
    // 🖥️ PCApp — v2에선 PC가 QR 표시 역할만 한다.
    //   분석/결과는 손님 폰에서 직접 처리(MobileUploadApp). PC는 큐 픽업도 안 함.
    // ========================================
    function PCApp() {
      return <WaitingScreen key="waiting" />;
    }

    // ========================================
    // 📱 MobileUploadApp — 모바일 업로드 화면 (`/upload?token=<storeToken>`)
    //   1) URL ?token 읽음
    //   2) 영상 선택
    //   3) 업로드 시작 시 POST /api/sessions { token } → sessionId 발급
    //   4) POST /api/sessions/:id/upload
    // ========================================
    function MobileUploadApp() {
      const [storeToken, setStoreToken] = useState("");
      const [legacySessionId, setLegacySessionId] = useState(""); // 구 ?session=… 호환
      const [cameraAngle, setCameraAngle] = useState("diagonal"); // 'diagonal' | 'front'
      const [backhandStyle, setBackhandStyle] = useState("auto"); // 'auto' | 'one-handed' | 'two-handed'
      const [file, setFile] = useState(null);
      const [previewUrl, setPreviewUrl] = useState("");
      const [progress, setProgress] = useState(0);
      // v2: idle → creating → uploading → analyzing → result → (error)
      // 분석/결과는 폰에서 직접. PC는 QR 표시만.
      const [stage, setStage] = useState("idle");
      const [errorMsg, setErrorMsg] = useState("");
      const [analyzeSession, setAnalyzeSession] = useState(null); // AnalyzingScreen에 넘길 세션 데이터
      const [result, setResult] = useState(null);                 // ResultScreen에 넘길 분석 결과

      // 쿼리에서 token 추출 (구 session= 도 폴백 지원)
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const token = params.get("token");
        const sessionParam = params.get("session");
        if (token) {
          setStoreToken(token);
        } else if (sessionParam) {
          setLegacySessionId(sessionParam);
        } else {
          setErrorMsg("토큰이 없습니다. 매장 모니터의 QR을 다시 스캔해주세요.");
        }
      }, []);

      // 파일 미리보기 URL
      useEffect(() => {
        if (!file) {
          setPreviewUrl("");
          return;
        }
        const u = URL.createObjectURL(file);
        setPreviewUrl(u);
        return () => URL.revokeObjectURL(u);
      }, [file]);

      const handleFile = (f) => {
        if (!f) return;
        if (!f.type.startsWith("video/")) {
          setErrorMsg("영상 파일만 업로드 가능합니다");
          return;
        }
        setErrorMsg("");
        setFile(f);
        setStage("idle");
        setProgress(0);
      };

      const handleUpload = async () => {
        if (!file) return;
        if (!storeToken && !legacySessionId) {
          setErrorMsg("토큰이 없습니다. 매장 모니터의 QR을 다시 스캔해주세요.");
          return;
        }
        setErrorMsg("");
        try {
          // 1) 세션 발급 (카메라 각도 동봉)
          let sessionId = legacySessionId;
          if (!sessionId && storeToken) {
            setStage("creating");
            const s = await apiCreateSessionWithToken(storeToken, cameraAngle, backhandStyle);
            sessionId = s.sessionId;
          }
          // 2) 영상 업로드 (원본은 Blob에 보관 — 추후 백업/재분석용)
          setStage("uploading");
          await apiUploadVideo(sessionId, file, setProgress);

          // 3) 폰에서 직접 분석 — 로컬 objectURL을 써서 재다운로드 없이 바로 MediaPipe로 넘김
          const localUrl = URL.createObjectURL(file);
          setAnalyzeSession({
            sessionId,
            videoUrl: localUrl,
            cameraAngle,
            backhandStyle,
          });
          setStage("analyzing");
        } catch (err) {
          if (err.status === 401) {
            setErrorMsg("유효하지 않은 토큰입니다. 매장 모니터의 새 QR을 다시 스캔해주세요.");
          } else {
            setErrorMsg(err.message || "업로드 실패");
          }
          setStage("error");
        }
      };

      const handleAnalysisComplete = useCallback((r) => {
        setResult(r);
        setStage("result");
        // 세션 종료 보고 → 서버가 store-token 강제 회전 → PC 화면의 QR이 새 토큰으로 갱신됨.
        // 같은 손님이 다른 영상을 다시 못 올림 (기존 토큰 무효화).
        if (r?.sessionId) {
          apiSessionComplete(r.sessionId).catch(err => {
            console.warn("[complete] 보고 실패 (무시)", err);
          });
        }
      }, []);

      const handleAnalysisError = useCallback((msg) => {
        setErrorMsg(msg || "분석 실패");
        setStage("error");
        // 실패도 동일 — 토큰 회전해서 다음 손님이 즉시 새 QR로 진행 가능.
        if (analyzeSession?.sessionId) {
          apiSessionSkip(analyzeSession.sessionId, "phone_analysis_error").catch(() => {});
        }
      }, [analyzeSession]);

      const handleRestart = useCallback(() => {
        if (analyzeSession?.videoUrl?.startsWith("blob:")) {
          URL.revokeObjectURL(analyzeSession.videoUrl);
        }
        setAnalyzeSession(null);
        setResult(null);
        setFile(null);
        setProgress(0);
        setErrorMsg("");
        setStage("idle");
      }, [analyzeSession]);

      // 분석 단계 — 폰 화면 전체를 차지
      if (stage === "analyzing" && analyzeSession) {
        return (
          <AnalyzingScreen
            session={analyzeSession}
            onComplete={handleAnalysisComplete}
            onError={handleAnalysisError}
          />
        );
      }
      // 결과 단계 — 폰에서 직접 다운로드 (Blob 업로드 안 함)
      if (stage === "result" && result) {
        return <ResultScreen result={result} onRestart={handleRestart} phoneMode={true} />;
      }
      if (stage === "error" && errorMsg && !file) {
        // 토큰 없음/세션 실패 등 초기 에러는 기존 inline 메시지로 처리
      }

      return (
        <div className="min-h-screen px-5 py-8">
          <div className="max-w-md mx-auto">
            {/* 헤더 */}
            <div className="text-center mb-8">
              <div className="text-2xl font-extrabold tracking-widest accent-lime mb-1">{BRAND.name}</div>
              <div className="text-sm text-slate-400">{BRAND.storeName}</div>
            </div>

            {errorMsg && (
              <div className="mb-4 p-3 rounded-lg bg-rose-500/10 border border-rose-500/40 text-rose-300 text-sm">
                {errorMsg}
              </div>
            )}

            {stage === "done" ? (
              <Card className="text-center py-10">
                <div className="text-5xl mb-3">✅</div>
                <h2 className="text-xl font-semibold mb-2">업로드 완료!</h2>
                <p className="text-sm text-slate-400 mb-1">
                  매장 PC 화면에서 자동으로 분석이 시작됩니다.
                </p>
                <p className="text-xs text-slate-500">
                  PC 화면을 봐주세요 👀
                </p>
              </Card>
            ) : (
              <>
                {/* 안내: 분석 후 자동으로 스윙 별명이 부여됩니다 */}
                <div className="mb-4 px-4 py-3 rounded-xl bg-lime-400/5 border border-lime-400/30">
                  <div className="flex items-start gap-2">
                    <span className="text-lg leading-none">🏷️</span>
                    <div>
                      <p className="text-sm font-bold text-lime-300 leading-tight">스윙 별명 자동 부여</p>
                      <p className="text-[11px] text-slate-400 mt-1 leading-snug">
                        분석이 끝나면 당신의 스윙 스타일에 맞는 MBTI 같은 별명이 자동으로 붙어요.
                      </p>
                    </div>
                  </div>
                </div>

                {/* 카메라 각도 선택 — 측정 임계치가 다르게 적용됨 */}
                <div className="mb-4">
                  <label className="block text-xs text-slate-300 font-semibold mb-2 tracking-wide">
                    📐 영상 촬영 각도 <span className="text-rose-400">*</span>
                    <span className="text-slate-500 font-normal ml-1">(채점 기준에 영향)</span>
                  </label>
                  <div className="grid grid-cols-2 gap-2">
                    {[
                      { key: 'diagonal', emoji: '📐', title: '대각선', sub: '30~45° 사선 앞에서 (기본)' },
                      { key: 'front', emoji: '🎯', title: '정면', sub: '카메라를 정면으로 보며' },
                    ].map(opt => {
                      const active = cameraAngle === opt.key;
                      return (
                        <button
                          key={opt.key}
                          type="button"
                          onClick={() => setCameraAngle(opt.key)}
                          disabled={stage === "uploading" || stage === "creating"}
                          className={`px-3 py-3 rounded-xl text-left border-2 transition-colors disabled:opacity-50 ${
                            active
                              ? 'border-lime-400 bg-lime-400/10'
                              : 'border-slate-700 bg-slate-800/40 hover:border-slate-600'
                          }`}
                        >
                          <div className="flex items-center gap-2">
                            <span className="text-xl leading-none">{opt.emoji}</span>
                            <div className="leading-tight">
                              <div className={`text-sm font-bold ${active ? 'text-lime-300' : 'text-slate-200'}`}>{opt.title}</div>
                              <div className="text-[10px] text-slate-500 mt-0.5">{opt.sub}</div>
                            </div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                  <p className="text-[10px] text-slate-500 mt-1.5 leading-snug">
                    대각선(기본)은 어깨 회전·체중이동·스탠스가 모두 잘 보이는 자기촬영 표준. 정면은 카메라를 정면으로 보며 칠 때 — 골반 회전·임팩트 자세에 가중을 둡니다.
                  </p>
                </div>

                {/* 백핸드 스타일 선택 — 자동 분류 보조 (백핸드 영상에만 적용됨) */}
                <div className="mb-4">
                  <label className="block text-xs text-slate-300 font-semibold mb-2 tracking-wide">
                    🤲 백핸드 스타일
                    <span className="text-slate-500 font-normal ml-1">(백핸드일 때만 적용)</span>
                  </label>
                  <div className="grid grid-cols-3 gap-2">
                    {[
                      { key: 'auto', emoji: '🤖', title: '자동' },
                      { key: 'one-handed', emoji: '✋', title: '한손' },
                      { key: 'two-handed', emoji: '🤲', title: '양손' },
                    ].map(opt => {
                      const active = backhandStyle === opt.key;
                      return (
                        <button
                          key={opt.key}
                          type="button"
                          onClick={() => setBackhandStyle(opt.key)}
                          disabled={stage === "uploading" || stage === "creating"}
                          className={`px-2 py-2 rounded-xl border-2 transition-colors disabled:opacity-50 ${
                            active
                              ? 'border-lime-400 bg-lime-400/10'
                              : 'border-slate-700 bg-slate-800/40 hover:border-slate-600'
                          }`}
                        >
                          <div className="flex flex-col items-center gap-1">
                            <span className="text-xl leading-none">{opt.emoji}</span>
                            <div className={`text-xs font-bold ${active ? 'text-lime-300' : 'text-slate-200'}`}>{opt.title}</div>
                          </div>
                        </button>
                      );
                    })}
                  </div>
                  <p className="text-[10px] text-slate-500 mt-1.5 leading-snug">
                    자동은 임팩트 시 양 손 거리로 판단. 명시적으로 골라두면 자동 판별이 애매할 때 그 값을 사용합니다.
                  </p>
                </div>

                {/* 파일 선택 — 갤러리(기본) + 즉석 촬영 두 옵션 */}
                {!file ? (
                  <div className="grid grid-cols-2 gap-3">
                    <label className="mobile-pick block cursor-pointer text-center">
                      <input
                        type="file"
                        accept="video/*"
                        className="hidden"
                        onChange={(e) => handleFile(e.target.files?.[0])}
                        disabled={stage === "uploading"}
                      />
                      <div className="text-4xl mb-2">🖼️</div>
                      <p className="text-sm font-semibold mb-1">갤러리에서 선택</p>
                      <p className="text-xs text-slate-500">
                        저장된 영상 중 고르기
                      </p>
                    </label>
                    <label className="mobile-pick block cursor-pointer text-center">
                      <input
                        type="file"
                        accept="video/*"
                        capture="environment"
                        className="hidden"
                        onChange={(e) => handleFile(e.target.files?.[0])}
                        disabled={stage === "uploading"}
                      />
                      <div className="text-4xl mb-2">📹</div>
                      <p className="text-sm font-semibold mb-1">바로 촬영</p>
                      <p className="text-xs text-slate-500">
                        지금 카메라로 찍기
                      </p>
                    </label>
                  </div>
                ) : (
                  <label className="mobile-pick block cursor-pointer">
                    <input
                      type="file"
                      accept="video/*"
                      className="hidden"
                      onChange={(e) => handleFile(e.target.files?.[0])}
                      disabled={stage === "uploading"}
                    />
                    <div className="text-3xl mb-2">🎬</div>
                    <p className="text-sm font-semibold mb-1">{file.name}</p>
                    <p className="text-xs text-slate-500">
                      {(file.size / 1024 / 1024).toFixed(1)} MB · 다시 누르면 재선택
                    </p>
                  </label>
                )}
                {!file && (
                  <p className="text-xs text-slate-500 mt-3 text-center">
                    · 30초 이내 권장 · 측면 촬영 · 사람 1명
                  </p>
                )}

                {/* 미리보기 */}
                {previewUrl && (
                  <div className="mt-4 rounded-2xl overflow-hidden border border-slate-700 bg-black">
                    <video
                      src={previewUrl}
                      controls
                      playsInline
                      className="w-full h-auto block"
                    />
                  </div>
                )}

                {/* 세션 발급 단계 */}
                {stage === "creating" && (
                  <div className="mt-5 flex items-center gap-3 text-slate-300 text-sm">
                    <Spinner size={3} /> <span>세션 준비 중...</span>
                  </div>
                )}

                {/* 진행률 */}
                {stage === "uploading" && (
                  <div className="mt-5">
                    <div className="flex items-center justify-between text-sm mb-2">
                      <span className="text-slate-300">업로드 중...</span>
                      <span className="text-lime-400 font-semibold">{progress}%</span>
                    </div>
                    <div className="progress-track">
                      <div className="progress-fill" style={{ width: `${progress}%` }} />
                    </div>
                  </div>
                )}

                {/* 업로드 버튼 */}
                {file && stage !== "uploading" && stage !== "creating" && (
                  <PrimaryButton
                    onClick={handleUpload}
                    disabled={!storeToken && !legacySessionId}
                    className="w-full mt-5 text-base"
                  >
                    🚀 업로드 시작
                  </PrimaryButton>
                )}
              </>
            )}

            <div className="mt-10 text-center text-xs text-slate-600">
              powered by {BRAND.name}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App — pathname 기반 라우팅
    // ========================================
    // ─────────────────────────────────────────────────────────────
    // 🧪 TestCardApp — ?testCard=1 시 결과 카드만 더미 데이터로 띄움
    //   레이아웃/코칭 멘트/안전 영역 검증용. 실제 분석 흐름 안 탐.
    //   ?score=평균 으로 점수대 시뮬레이션 (예: ?testCard=1&score=55 → 약점 위주)
    // ─────────────────────────────────────────────────────────────
    function TestCardApp() {
      const params = new URLSearchParams(window.location.search);
      const targetAvg = parseInt(params.get("score") || "65", 10);
      // targetAvg 주변에서 ±20 분포로 6축 점수 생성 (재현 가능 시드 X)
      const randAround = (m) => Math.max(0, Math.min(100, Math.round(m + (Math.random() - 0.5) * 40)));
      const axes = {
        ready:  randAround(targetAvg + 5),
        back:   randAround(targetAvg - 10),
        weight: randAround(targetAvg - 5),
        chain:  randAround(targetAvg),
        impact: randAround(targetAvg + 10),
        follow: randAround(targetAvg + 3),
      };
      const total = Math.round(Object.values(axes).reduce((a, b) => a + b, 0) / 6);
      const scoreData = { axes, total };
      const profile = computeSwingProfile(scoreData);
      const dummyBestSwing = {
        time: 1500, type: "forehand", stance: "semi-open",
        scores: { ...axes, total },
      };
      return (
        <div className="min-h-screen flex items-center justify-center" style={{ background: "linear-gradient(180deg,#020617,#0c1a14)" }}>
          <div style={{ width: 540, transform: "scale(0.5)", transformOrigin: "center" }}>
            <ResultInstaCard
              nickname={profile.nickname}
              nicknameDesc={profile.desc}
              scoreData={scoreData}
              bestSwing={dummyBestSwing}
              framesData={[]}
              videoUrl="/sample-pro-forehand.mp4"
              slowMoFactor={1}
              cardRef={{ current: null }}
              showSafeArea={params.get("safe") === "1"}
              composeStatus="ready"
              composeProgress={100}
              downloadUrl="https://daily-tennis.example/d/test"
            />
          </div>
        </div>
      );
    }

    function App() {
      // 초기 라우팅 — 페이지 로드 시 한 번 결정 (파일 업로드 후 페이지 안 떠나니까 충분)
      const [path] = useState(() => window.location.pathname);
      const isTestCard = useMemo(() => new URLSearchParams(window.location.search).get("testCard") === "1", []);

      if (isTestCard) return <TestCardApp />;
      if (path === "/upload" || path.startsWith("/upload")) {
        return <MobileUploadApp />;
      }
      return <PCApp />;
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>


</body></html>
