<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SnapPoster — Prototype v1 · Design Gallery</title>
  <!--
    AFM Design System / Marian Editorial Palette (shadcn token)
    프로젝트: SnapPoster (사진 스튜디오용 자동 포스터 합성)
    팔레트 선택 사유: 도메인이 "웨딩/포토 스튜디오/포트폴리오" — README 가이드의 마리안 권장 케이스.
  -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Allura&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Great+Vibes&family=Noto+Serif+KR:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,500;0,600;1,500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary:     { DEFAULT: 'hsl(var(--primary))',     foreground: 'hsl(var(--primary-foreground))' },
            secondary:   { DEFAULT: 'hsl(var(--secondary))',   foreground: 'hsl(var(--secondary-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            muted:       { DEFAULT: 'hsl(var(--muted))',       foreground: 'hsl(var(--muted-foreground))' },
            accent:      { DEFAULT: 'hsl(var(--accent))',      foreground: 'hsl(var(--accent-foreground))' },
            popover:     { DEFAULT: 'hsl(var(--popover))',     foreground: 'hsl(var(--popover-foreground))' },
            card:        { DEFAULT: 'hsl(var(--card))',        foreground: 'hsl(var(--card-foreground))' },
          },
          borderRadius: { lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' },
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', '"Helvetica Neue"', 'Helvetica', 'Arial', 'system-ui', 'sans-serif'],
            display: ['"Helvetica Neue"', 'Helvetica', 'Inter', 'Arial', 'sans-serif'],
            'serif-kr': ['"Noto Serif KR"', 'serif'],
            cormorant: ['"Cormorant Garamond"', 'serif'],
            playfair: ['"Playfair Display"', 'serif'],
            script: ['"Allura"', '"Great Vibes"', 'cursive'],
          },
        }
      }
    };
  </script>
  <style>
    /* ==== Marian Editorial palette ==== */
    :root {
      --background: 0 0% 100%;
      --foreground: 0 0% 13%;
      --card: 0 0% 100%;
      --card-foreground: 0 0% 13%;
      --popover: 0 0% 100%;
      --popover-foreground: 0 0% 13%;
      --primary: 224 75% 14%;          /* #091940 deep midnight navy */
      --primary-foreground: 0 0% 100%;
      --secondary: 0 0% 96%;
      --secondary-foreground: 0 0% 20%;
      --muted: 0 0% 96%;
      --muted-foreground: 0 0% 40%;
      --accent: 224 75% 14%;
      --accent-foreground: 0 0% 100%;
      --destructive: 0 70% 45%;
      --destructive-foreground: 0 0% 100%;
      --border: 0 0% 87%;
      --input: 0 0% 87%;
      --ring: 224 75% 14%;
      --radius: 0rem;
    }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', 'Helvetica Neue', Helvetica, Arial, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
    }
    .display-bold {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      font-weight: 800;
      letter-spacing: 0.02em;
    }
    .eyebrow {
      font-family: 'Helvetica Neue', Helvetica, 'Inter', Arial, sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
    }
    /* 청첩장 스타일에서 사용하는 세로 디바이더 */
    .vline::after { content:''; display:block; width:1px; height:36px; background: currentColor; margin: 6px auto 0; opacity:.5; }
    /* 러블리 톤 — 누드 핑크/크림 베이스 (포스터 결과물 한정) */
    .lovely-cream { background: linear-gradient(180deg, #fbf2eb 0%, #f8e9df 100%); }
    .lovely-blush { background: linear-gradient(180deg, #fdf3ee 0%, #fbe6dc 100%); }
    /* 손글씨 hero "thank you" */
    .font-script { font-family: 'Allura', 'Great Vibes', cursive; font-weight: 400; }
  </style>
</head>
<body class="bg-background text-foreground">
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo } = React;
    const cn = (...c) => c.filter(Boolean).join(' ');

    // ========================================
    // 🎨 Design System (shadcn 토큰 기반 — components.md 규약)
    // ========================================
    function Button({ variant = 'default', size = 'default', className = '', ...p }) {
      const base = 'inline-flex items-center justify-center gap-2 whitespace-nowrap text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50';
      const variants = {
        default:     'bg-primary text-primary-foreground hover:bg-primary/90 tracking-wider uppercase',
        destructive: 'bg-destructive text-destructive-foreground hover:bg-destructive/90 tracking-wider uppercase',
        outline:     'border border-foreground/30 bg-transparent text-foreground hover:bg-primary hover:border-primary hover:text-primary-foreground tracking-wider uppercase',
        secondary:   'bg-secondary text-secondary-foreground hover:bg-secondary/80 tracking-wider uppercase',
        ghost:       'text-foreground hover:bg-secondary',
        link:        'text-primary underline-offset-4 hover:underline',
      };
      const sizes = { default: 'h-11 px-6', sm: 'h-9 px-4 text-xs', lg: 'h-14 px-10 text-sm', icon: 'h-10 w-10' };
      return <button className={cn(base, variants[variant], sizes[size], className)} {...p} />;
    }
    function Input({ className = '', ...p }) {
      return <input className={cn('flex h-11 w-full border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring', className)} {...p} />;
    }
    function Select({ className = '', children, ...p }) {
      return <select className={cn('flex h-11 border border-input bg-background px-3 py-2 text-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring', className)} {...p}>{children}</select>;
    }
    function Label({ className = '', htmlFor, children }) {
      return <label htmlFor={htmlFor} className={cn('eyebrow text-foreground', className)}>{children}</label>;
    }
    function Card({ className = '', ...p })        { return <div className={cn('border border-border bg-card text-card-foreground', className)} {...p} />; }
    function CardHeader({ className = '', ...p })  { return <div className={cn('flex flex-col space-y-2 p-6 border-b border-border', className)} {...p} />; }
    function CardTitle({ className = '', ...p })   { return <h3 className={cn('display-bold text-xl text-foreground', className)} {...p} />; }
    function CardDescription({ className = '', ...p }) { return <p className={cn('text-sm text-muted-foreground', className)} {...p} />; }
    function CardContent({ className = '', ...p }) { return <div className={cn('p-6', className)} {...p} />; }
    function CardFooter({ className = '', ...p })  { return <div className={cn('flex items-center p-6 pt-0', className)} {...p} />; }
    function Badge({ variant = 'default', className = '', ...p }) {
      const base = 'inline-flex items-center border px-2.5 py-0.5 eyebrow';
      const variants = {
        default:     'border-transparent bg-primary text-primary-foreground',
        secondary:   'border-transparent bg-secondary text-secondary-foreground',
        destructive: 'border-transparent bg-destructive text-destructive-foreground',
        outline:     'border-foreground/40 text-foreground',
      };
      return <span className={cn(base, variants[variant], className)} {...p} />;
    }
    function Separator({ className = '' }) { return <div className={cn('h-px w-full bg-border', className)} />; }

    // 작은 잎 라인 일러스트 — 러블리 톤 장식 (좌·우 미러)
    function LeafSprig({ className = '', mirror = false }) {
      return (
        <svg viewBox="0 0 60 24" className={className} fill="none" stroke="currentColor" strokeWidth="0.8" strokeLinecap="round" strokeLinejoin="round" style={mirror ? { transform: 'scaleX(-1)' } : undefined}>
          <path d="M3 12 C 18 12, 30 12, 56 12" />
          <path d="M14 12 C 14 8, 16 6, 19 5"  />
          <path d="M14 12 C 14 16, 16 18, 19 19" />
          <path d="M24 12 C 24 9, 26 7, 29 6.5" />
          <path d="M24 12 C 24 15, 26 17, 29 17.5" />
          <path d="M34 12 C 34 9.5, 36 8, 39 7.6" />
          <path d="M34 12 C 34 14.5, 36 16, 39 16.4" />
          <path d="M44 12 C 44 10.5, 46 9.5, 48 9.2" />
          <path d="M44 12 C 44 13.5, 46 14.5, 48 14.8" />
        </svg>
      );
    }
    function HeartTiny({ className = '' }) {
      return (
        <svg viewBox="0 0 20 20" className={className} fill="currentColor">
          <path d="M10 17s-6-3.6-6-8a4 4 0 0 1 6-3.5A4 4 0 0 1 16 9c0 4.4-6 8-6 8z" opacity="0.85" />
        </svg>
      );
    }

    // ========================================
    // 📚 Domain Data — 카테고리, 더미 사진, 카피 풀
    // ========================================
    const PHOTOS = {
      wedding:   'https://images.unsplash.com/photo-1519741497674-611481863552?auto=format&fit=crop&w=1400&q=80',
      outdoor:   'https://images.unsplash.com/photo-1503264116251-35a269479413?auto=format&fit=crop&w=1400&q=80',
      product:   'https://images.unsplash.com/photo-1542291026-7eec264c27ff?auto=format&fit=crop&w=1400&q=80',
      landscape: 'https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?auto=format&fit=crop&w=1400&q=80',
    };
    const CATEGORIES = [
      { key: 'wedding',   label: '본식 스냅', en: 'Wedding'   },
      { key: 'outdoor',   label: '야외 스냅', en: 'Outdoor'   },
      { key: 'product',   label: '제품 사진', en: 'Product'   },
      { key: 'landscape', label: '풍경 사진', en: 'Landscape' },
    ];
    const COPY = {
      wedding:   {
        // ※ 본식 스냅 카테고리 = 결혼식 후 보내는 땡큐카드. 식 당일 촬영 사진 위에 감사 메시지.
        minimalEn: 'Thank You for Being There', minimalKr: '함께해 주셔서 감사합니다',
        emotiveKr: '당신이 있던 자리, 가장 환했습니다', emotiveSub: '— thank you, from both of us',
        invitation: {
          coupleEn: 'JIHYE  ·  MINSU',
          dateEn: '2026 . 06 . 14  SUN',
          venueKr: '그랜드 컨벤션 5F 더 그레이스홀',
          // 땡큐카드 격식형 전용 메시지
          thanksHeadEn: 'with all our love',
          thanksKr: '오신 자리 덕분에 더 빛나는 날이었습니다',
        },
        no: 'No. 0421',
      },
      outdoor: {
        minimalEn: 'A Quiet Afternoon', minimalKr: '오후의 햇살 아래, 너와 나',
        emotiveKr: '바람이 적당히 스치는 오후였다', emotiveSub: '— an afternoon worth keeping',
        invitation: { coupleEn: 'AN  AFTERNOON  TOGETHER', dateEn: '2026 . 05 . 16  SAT  PM 4:00', venueKr: '서울숲, 두 사람의 산책' },
        no: 'No. 0182',
      },
      product: {
        minimalEn: 'Crafted, Not Made', minimalKr: '한 장으로 충분한 디테일',
        emotiveKr: '오래도록 곁에 두고 싶은 것', emotiveSub: '— made to be kept',
        invitation: { coupleEn: 'STUDIO  ATELIER  09', dateEn: 'NEW  RELEASE  ·  SPRING  2026', venueKr: 'a small object, a long story' },
        no: 'No. 0093',
      },
      landscape: {
        minimalEn: 'Where Wind Belongs', minimalKr: '바람이 머무는 자리',
        emotiveKr: '말이 사라지고, 풍경만 남았다', emotiveSub: '— and the world stayed still',
        invitation: { coupleEn: 'A  DAY  AT  JEJU', dateEn: '2026 . 04 . 22  TUE  AM 6:14', venueKr: '제주, 바람이 가장 먼저 닿는 곳' },
        no: 'No. 0307',
      },
    };

    // ========================================
    // 🖼️ Poster Renders (제품 결과물 — 자체 비주얼 정책 유지, 셸 토큰과 분리)
    // ========================================
    function PosterMinimal({ category, photo }) {
      const c = COPY[category];
      const src = photo || PHOTOS[category];
      // 본식 = 땡큐카드 · 러블리 미니멀 (인스타 피드용)
      if (category === 'wedding') {
        const i = c.invitation;
        return (
          <div className="aspect-[4/5] w-full lovely-cream relative overflow-hidden">
            <div className="absolute inset-0 px-6 pt-6 pb-7 flex flex-col">
              <div className="flex items-center justify-between text-[9px] tracking-[0.42em] uppercase" style={{ color: '#9b6b5e' }}>
                <span>Thank You · Wedding Day</span>
                <span>{c.no}</span>
              </div>
              <div className="mt-4 flex-1 overflow-hidden rounded-md">
                <img src={src} className="w-full h-full object-cover" />
              </div>
              {/* 컬리그래피 thank you + 작은 잎 장식 */}
              <div className="mt-4 flex items-center justify-center gap-3" style={{ color: '#9b6b5e' }}>
                <LeafSprig className="w-12 h-3 opacity-70" />
                <span className="font-script text-[34px] leading-none" style={{ color: '#7d4f47' }}>thank you</span>
                <LeafSprig className="w-12 h-3 opacity-70" mirror />
              </div>
              {/* 한국어 + 신랑·신부 + 일자 */}
              <div className="mt-3 text-center">
                <div className="font-serif-kr text-[12px]" style={{ color: '#5a3c36' }}>{c.minimalKr}</div>
                <div className="mt-2 inline-flex items-center gap-2 text-[10px] tracking-[0.22em] uppercase" style={{ color: '#9b6b5e' }}>
                  <span>{i.coupleEn}</span>
                  <HeartTiny className="w-2.5 h-2.5" />
                  <span>06.14.2026</span>
                </div>
              </div>
            </div>
          </div>
        );
      }
      // 베이스 (다른 카테고리 — 추후 카테고리별 확장 예정)
      return (
        <div className="aspect-[4/5] w-full bg-[#f6f4ef] relative overflow-hidden">
          <div className="absolute inset-0 p-5 flex flex-col">
            <div className="flex items-center justify-between text-[10px] tracking-[0.4em] text-zinc-500 uppercase">
              <span>{CATEGORIES.find(x=>x.key===category).en}</span>
              <span>{c.no}</span>
            </div>
            <div className="mt-3 flex-1 overflow-hidden">
              <img src={src} className="w-full h-full object-cover" />
            </div>
            <div className="pt-4 flex items-end justify-between">
              <div>
                <div className="text-[10px] tracking-[0.32em] text-zinc-500 uppercase">{c.minimalEn}</div>
                <div className="text-[13px] text-zinc-800 mt-1">{c.minimalKr}</div>
              </div>
              <div className="text-[10px] text-zinc-400 tracking-widest">SnapPoster</div>
            </div>
          </div>
        </div>
      );
    }
    function PosterInvitation({ category, photo }) {
      const i = COPY[category].invitation;
      const src = photo || PHOTOS[category];
      // 본식 = 땡큐카드 격식형 · 러블리 톤 (누드 핑크 베이스 + 큰 컬리그래피 thank you)
      if (category === 'wedding') {
        return (
          <div className="aspect-[4/5] w-full lovely-blush relative overflow-hidden">
            <div className="absolute inset-0 px-7 pt-7 pb-7 flex flex-col items-center text-center" style={{ color: '#5a3c36' }}>
              {/* 상단 모노그램 + 잎 */}
              <div className="flex items-center gap-3" style={{ color: '#9b6b5e' }}>
                <LeafSprig className="w-10 h-3 opacity-80" />
                <span className="font-cormorant italic text-[22px] tracking-wide leading-none">J <span className="opacity-60">&</span> M</span>
                <LeafSprig className="w-10 h-3 opacity-80" mirror />
              </div>
              <div className="font-cormorant italic text-[13px] mt-2" style={{ color: '#7d4f47' }}>{i.thanksHeadEn}</div>

              {/* 큰 컬리그래피 hero "Thank You" */}
              <div className="font-script text-[56px] leading-[0.9] mt-3" style={{ color: '#7d4f47' }}>Thank you</div>

              {/* 사진 — 둥근 모서리 */}
              <div className="flex-1 w-full mt-5 overflow-hidden rounded-md">
                <img src={src} className="w-full h-full object-cover" />
              </div>

              {/* 한국어 감사 메시지 + 식 정보 */}
              <div className="font-serif-kr text-[12px] mt-5 leading-[1.75]" style={{ color: '#5a3c36' }}>{i.thanksKr}</div>
              <div className="flex items-center gap-2 mt-3" style={{ color: '#c89789' }}>
                <span className="w-8 h-px bg-current" />
                <HeartTiny className="w-2.5 h-2.5" />
                <span className="w-8 h-px bg-current" />
              </div>
              <div className="font-cormorant text-[11px] tracking-[0.22em] mt-3" style={{ color: '#7d4f47' }}>{i.dateEn}</div>
              <div className="font-serif-kr text-[10px] mt-1" style={{ color: '#9b6b5e' }}>{i.venueKr}</div>
              <div className="font-cormorant italic text-[12px] tracking-wide mt-2" style={{ color: '#5a3c36' }}>{i.coupleEn}</div>
            </div>
          </div>
        );
      }
      // 베이스 (그 외 카테고리)
      return (
        <div className="aspect-[4/5] w-full bg-[#fbf7f1] relative overflow-hidden">
          <div className="absolute inset-0 p-6 flex flex-col items-center text-center">
            <div className="font-cormorant italic text-[15px] text-zinc-700">we are getting married</div>
            <div className="vline text-zinc-500" />
            <div className="font-serif-kr text-[18px] tracking-[0.18em] text-zinc-900 mt-1">{i.coupleEn}</div>
            <div className="flex-1 w-full mt-4 overflow-hidden">
              <img src={src} className="w-full h-full object-cover" />
            </div>
            <div className="font-cormorant text-[12px] tracking-[0.18em] text-zinc-700 mt-4">{i.dateEn}</div>
            <div className="font-serif-kr text-[11px] text-zinc-500 mt-1">{i.venueKr}</div>
          </div>
        </div>
      );
    }
    function PosterEmotive({ category, photo }) {
      const c = COPY[category];
      const src = photo || PHOTOS[category];
      if (category === 'wedding') {
        return (
          <div className="aspect-[4/5] w-full relative overflow-hidden bg-zinc-900">
            <img src={src} className="absolute inset-0 w-full h-full object-cover" />
            <div className="absolute inset-0 bg-gradient-to-b from-black/15 via-transparent to-black/65" />

            {/* 좌상단 메타 — 땡큐카드 명시 */}
            <div className="absolute left-6 top-6 text-white/80">
              <div className="text-[9px] tracking-[0.42em] uppercase">Thank You · Wedding Day</div>
              <div className="font-cormorant italic text-[11px] mt-1">06.14.2026</div>
            </div>
            <div className="absolute right-6 top-6 text-white/60 text-[9px] tracking-[0.3em] uppercase">No. 0421</div>

            {/* 한국어 감사 메시지 + 영문 sub + 신랑·신부 라인 */}
            <div className="absolute left-6 right-6 bottom-7 text-white">
              <div className="font-cormorant italic text-[16px] tracking-wide opacity-90">thank you</div>
              <div className="font-serif-kr text-[20px] leading-[1.55] tracking-[-0.012em] mt-2">
                당신이 있던 자리,<br />가장 환했습니다
              </div>
              <div className="font-cormorant italic text-[12px] mt-3 opacity-85">— from both of us</div>
              <div className="mt-4 flex items-center gap-3 text-white/80 text-[10px] tracking-[0.32em] uppercase">
                <span>Jihye</span>
                <span className="w-px h-2.5 bg-white/50" />
                <span>Minsu</span>
              </div>
            </div>
          </div>
        );
      }
      return (
        <div className="aspect-[4/5] w-full relative overflow-hidden bg-zinc-900">
          <img src={src} className="absolute inset-0 w-full h-full object-cover" />
          <div className="absolute inset-0 bg-gradient-to-b from-black/10 via-transparent to-black/55" />
          <div className="absolute left-5 right-5 bottom-6 text-white">
            <div className="font-serif-kr text-[18px] leading-[1.55] tracking-[-0.01em]">{c.emotiveKr}</div>
            <div className="font-cormorant italic text-[12px] mt-2 opacity-85">{c.emotiveSub}</div>
          </div>

              <CardHeader>
                <CardTitle className="text-lg">계정 발급</CardTitle>
                <CardDescription>발급 시 임시 비밀번호가 사용자 이메일로 발송됩니다 (Phase 4 연동).</CardDescription>
              </CardHeader>
              <CardContent>
                <div className="grid grid-cols-12 gap-3">
                  <div className="col-span-12 sm:col-span-5 space-y-2">
                    <Label>이메일</Label>
                    <Input value={draft.email} onChange={e => setDraft({...draft, email: e.target.value})} placeholder="customer@example.com" />
                  </div>
                  <div className="col-span-7 sm:col-span-4 space-y-2">
                    <Label>만료일</Label>
                    <Input value={draft.expiresAt} onChange={e => setDraft({...draft, expiresAt: e.target.value})} placeholder="YYYY-MM-DD" />
                  </div>
                  <div className="col-span-5 sm:col-span-2 space-y-2">
                    <Label>할당량</Label>
                    <Input type="number" value={draft.quotaTotal} onChange={e => setDraft({...draft, quotaTotal: +e.target.value})} />
                  </div>
                  <div className="col-span-12 sm:col-span-1 flex items-end">
                    <Button className="w-full" onClick={issue}>발급</Button>
                  </div>
                </div>
              </CardContent>
            </Card>

            <Card>
              <CardHeader>
                <CardTitle className="text-lg">계정 목록 ({accounts.length})</CardTitle>
              </CardHeader>
              <CardContent className="p-0">
                <div className="divide-y divide-border">
                  {accounts.map(a => (
                    <div key={a.id} className="px-6 py-4 flex items-center gap-4 text-sm">
                      <div className="flex-1 min-w-0">
                        <div className="truncate text-foreground">{a.email}</div>
                        <div className="eyebrow text-muted-foreground mt-1">EXP {a.expiresAt} · {a.quotaUsed}/{a.quotaTotal}</div>
                      </div>
                      <Badge variant={a.status === 'active' ? 'default' : 'destructive'}>{a.status}</Badge>
                      <Button variant="outline" size="sm" onClick={() => toggle(a.id)}>
                        {a.status === 'active' ? '비활성' : '재활성'}
                      </Button>
                    </div>
                  ))}
                </div>
              </CardContent>
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Root
    // ========================================
    function App() {
      const [view, setView] = useState('gallery'); // gallery | flow | admin
      if (view === 'flow')  return <FlowScreen  onNav={setView} />;
      if (view === 'admin') return <AdminScreen onNav={setView} />;
      return <GalleryScreen onNav={setView} />;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
