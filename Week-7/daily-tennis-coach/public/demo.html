    // ========================================
    // 🏆 BestShotCard — 베스트 스윙 슬로우모션 카드
    // ----------------------------------------
    // 결과 패널 맨 위에 표시. 가장 점수가 높은 스윙의 [-0.5s, +0.5s] 윈도우를
    // 0.25x로 무한 루프 재생. 메인 video와 동일 src 재사용.
    // 자체 video + canvas 오버레이로 스켈레톤+라켓 궤적도 그림 (캐시된
    // framesData를 timestamp 기반으로 lookup → detectForVideo 재호출 안 함).
    // ========================================
    function BestShotCard({ bestSwing, framesData, videoUrl, hand, slowMoFactor = 1, onToggleType, onCycleStance }) {
      const bestVideoRef = useRef(null);
      const bestCanvasRef = useRef(null);
      const rafRef = useRef(null);

      // 베스트 윈도우(초) — 영상 시간 기준.
      // 실시간 ±500ms 윈도우 → 영상시간으로는 ±500*factor ms.
      // (4x 슬로면 영상시간 ±2초가 실제 ±0.5초에 해당)
      const windowMs = 500 * slowMoFactor;
      const startSec = (bestSwing.time - windowMs) / 1000;
      const endSec = (bestSwing.time + windowMs) / 1000;

      // --- video src 세팅 + 슬로우 루프 시작 ---
      useEffect(() => {
        const v = bestVideoRef.current;
        if (!v) return;
        v.playbackRate = 0.25;
        v.muted = true;

        // 영상 메타 로드 후 윈도우 안으로 시크 + 재생
        const startLoop = () => {
          // 영상 길이 안으로 clamp
          const dur = v.duration || 0;
          const s = Math.max(0, Math.min(dur, startSec));
          v.currentTime = s;
          const playPromise = v.play();
          if (playPromise && typeof playPromise.catch === "function") {
            playPromise.catch(() => { /* autoplay 정책 등 무시 */ });
          }
        };
        // 메타 로드 안됐으면 이벤트 대기
        if (v.readyState >= 1) startLoop();
        else v.addEventListener("loadedmetadata", startLoop, { once: true });

        // 윈도우 끝 넘어가면 시작점으로 점프
        const onTimeUpdate = () => {
          if (v.currentTime >= endSec) {
            v.currentTime = Math.max(0, startSec);
          }
        };
        v.addEventListener("timeupdate", onTimeUpdate);

        return () => {
          v.removeEventListener("timeupdate", onTimeUpdate);
          v.removeEventListener("loadedmetadata", startLoop);
          v.pause();
        };
      }, [videoUrl, startSec, endSec, bestSwing.time]);

      // --- canvas 사이즈 동기화 ---
      const syncCanvas = useCallback(() => {
        const v = bestVideoRef.current;
        const c = bestCanvasRef.current;
        if (!v || !c) return;
        if (v.videoWidth && (c.width !== v.videoWidth || c.height !== v.videoHeight)) {
          c.width = v.videoWidth;
          c.height = v.videoHeight;
        }
      }, []);

      // --- 매 프레임 마다 framesData에서 최근접 프레임을 찾아 스켈레톤+궤적 그림 ---
      useEffect(() => {
        const v = bestVideoRef.current;
        const c = bestCanvasRef.current;
        if (!v || !c || !framesData || framesData.length === 0) return;

        const tick = () => {
          syncCanvas();
          const ctx = c.getContext("2d");
          ctx.clearRect(0, 0, c.width, c.height);

          const tMs = v.currentTime * 1000;

          // 가장 가까운 프레임 (이진/선형 — 데이터가 ordered)
          let bestI = 0, bestD = Infinity;
          for (let i = 0; i < framesData.length; i++) {
            const d = Math.abs(framesData[i].t - tMs);
            if (d < bestD) { bestD = d; bestI = i; }
            else if (framesData[i].t > tMs && d > bestD) break; // ordered 가정 시 조기 종료
          }
          const f = framesData[bestI];

          // 스켈레톤
          if (f && f.landmarks && window.__MediaPipe?.POSE_CONNECTIONS) {
            drawPoseSkeleton(ctx, f.landmarks, window.__MediaPipe.POSE_CONNECTIONS);
          }

          // 라켓 궤적 — 현재 시점까지의 trail [t-TRAIL_DURATION_MS, t]
          const trail = [];
          for (let i = 0; i < framesData.length; i++) {
            const fi = framesData[i];
            if (!fi.racketTip) continue;
            if (fi.t > tMs) break;
            if (tMs - fi.t > TRAIL_DURATION_MS) continue;
            trail.push({ x: fi.racketTip.x, y: fi.racketTip.y, t: fi.t });
          }
          if (trail.length >= 2) {
            drawRacketTrail(ctx, trail, tMs);
          }

          rafRef.current = requestAnimationFrame(tick);
        };

        rafRef.current = requestAnimationFrame(tick);
        return () => {
          if (rafRef.current) cancelAnimationFrame(rafRef.current);
        };
      }, [framesData, syncCanvas]);

      // 점수 / 라벨
      const score = bestSwing.scores?.total ?? 0;
      const conf = bestSwing.classifyConfidence ?? 1;
      let typeLabel, typeBadgeTone;
      if (bestSwing.type === "unknown") {
        typeLabel = "분류불가";
        typeBadgeTone = "slate";
      } else if (bestSwing.userOverridden) {
        // 사용자가 직접 지정 — confidence 무시
        const baseLabel = bestSwing.type === "forehand" ? "포핸드" : "백핸드";
        typeLabel = `${baseLabel} ✏️`;
        typeBadgeTone = bestSwing.type === "forehand" ? "rose" : "cyan";
      } else if (conf < 0.3) {
        typeLabel = "분류 모호";
        typeBadgeTone = "slate";
      } else {
        const baseLabel = bestSwing.type === "forehand" ? "포핸드" : "백핸드";
        typeLabel = conf < 0.6 ? `${baseLabel} (불확실)` : baseLabel;
        typeBadgeTone = conf < 0.6
          ? "amber"
          : (bestSwing.type === "forehand" ? "rose" : "cyan");
      }

      return (
        <Card className="border border-lime-400/30 bg-gradient-to-br from-slate-800 to-slate-800/40">
          <div className="flex items-center justify-between mb-3">
            <h2 className="text-sm font-medium text-lime-300 flex items-center gap-1.5">
              <span>🏆</span>
              <span>베스트 샷</span>
              <span className="text-xs text-slate-400 font-normal">(슬로우 0.25x · 자동 루프)</span>
            </h2>
          </div>

          <div className="video-stack mb-3">
            <video
              ref={bestVideoRef}
              src={videoUrl}
              playsInline
              muted
              loop={false}
              controls={false}
            />
            <canvas ref={bestCanvasRef} />
          </div>

          <div className="flex items-center justify-between gap-3">
            <div className="flex items-center gap-2 min-w-0 flex-wrap">
              <Badge tone={typeBadgeTone}>{typeLabel}</Badge>
              {bestSwing.type !== "unknown" && onToggleType && (
                <button
                  onClick={() => onToggleType(bestSwing.index)}
                  className="px-1.5 py-0.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs leading-none"
                  title="자동 분류가 틀렸다면 클릭해서 포/백 변경"
                  aria-label="포핸드/백핸드 토글"
                >
                  ⇄
                </button>
              )}
              {onCycleStance && (
                <button
                  onClick={() => onCycleStance(bestSwing.index)}
                  className="px-2 py-0.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs leading-none inline-flex items-center gap-1"
                  title="스탠스가 틀렸다면 클릭해서 변경 (자동 → 오픈 → 세미오픈 → 클로즈 → 자동)"
                  aria-label="스탠스 사이클"
                >
                  <span>스탠스: {stanceLabel(bestSwing.stance)}</span>
                  {bestSwing.stanceUserOverridden && <span>✏️</span>}
                  <span>⇄</span>
                </button>
              )}
              <span className="text-xs text-slate-400">
                {(bestSwing.time / 1000).toFixed(1)}초 시점
              </span>
            </div>
            <div className="flex items-center gap-2 flex-shrink-0">
              <Stars score={score} />
              <div className="flex items-baseline gap-1">
                <span className={`text-2xl font-bold ${scoreColorClass(score)}`}>{score}</span>
                <span className="text-xs text-slate-500">/100</span>
              </div>
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 🚀 App — 메인 애플리케이션
    // ========================================
    function App() {
      const mpReady = useMediaPipeReady();

      // --- 상태 ---
      const [videoFile, setVideoFile] = useState(null);
      const [videoUrl, setVideoUrl] = useState("");
      const [hand, setHand] = useState("right");
      const [model, setModel] = useState("full");
      // 영상 속도 배율 — 1=실시간, 2/4/8=슬로모션 영상 (원본 대비 배율)
      // 모든 시간 임계치(피크 윈도우, 최소 간격 등)는 "실시간 ms" 기준이라
      // 영상시간 ms로 변환할 때 factor를 곱해야 동일한 실제 시간 윈도우가 됨.
      const [slowMoFactor, setSlowMoFactor] = useState(1);
      const [framesData, setFramesData] = useState([]); // [{ t, landmarks }]
      const [analysisResult, setAnalysisResult] = useState({ swings: [], speeds: [], diagnostics: null });
      const [isPlaying, setIsPlaying] = useState(false);
      const [playbackRate, setPlaybackRate] = useState(1);
      const [stats, setStats] = useState({ fps: 0, avgMs: 0, avgConf: 0 });
      const [loadingModel, setLoadingModel] = useState(true);
      const [errorMsg, setErrorMsg] = useState("");
      const [warningMsg, setWarningMsg] = useState("");
      const [videoDuration, setVideoDuration] = useState(0);

      // --- refs ---
      const videoRef = useRef(null);
      const canvasRef = useRef(null);
      const landmarkerRef = useRef(null);
      const framesRef = useRef([]);          // 분석 중에 쌓이는 raw 시계열
      const speedsLiveRef = useRef([]);      // 실시간 speed 누적
      const lastFrameTimeRef = useRef(0);
      const fpsCounterRef = useRef({ frames: 0, lastTick: performance.now() });
      const processingTimesRef = useRef([]);
      const confidencesRef = useRef([]);
      const rafIdRef = useRef(null);
      const noPersonStreakRef = useRef(0);
      // VIDEO 모드는 timestamp가 strict monotonic이어야 함. 자체 카운터로 보장.
      const videoTsRef = useRef(0);
      // 라켓 끝 궤적 — 최근 1초간 시계열 [{ x, y, t }]
      const racketTipTrailRef = useRef([]);

      // --- 분석 상태 ---
      const [isAnalyzing, setIsAnalyzing] = useState(false);
      const [scoreData, setScoreData] = useState(null); // { perSwing, axes, total, fhAvg, bhAvg }
      // 사용자 수동 오버라이드 — { [swing.index]: 'forehand' | 'backhand' }
      // 자동 분류가 틀렸을 때 토글 버튼으로 강제 교정. 점수 useEffect의 deps라서
      // 변경 즉시 FH/BH 평균 / 차트 마커 색이 모두 재계산됨.
      const [swingOverrides, setSwingOverrides] = useState({});
      // 스탠스 수동 오버라이드 — { [swing.index]: 'open' | 'semi-open' | 'closed' }
      // 자동 스탠스 감지가 틀렸을 때 사이클 버튼으로 강제 교정. 체중이동 점수가
      // 스탠스 의존이라 즉시 재계산됨.
      const [stanceOverrides, setStanceOverrides] = useState({});

      // --- MediaPipe 초기화 / 모델 변경 시 재초기화 ---
      useEffect(() => {
        if (!mpReady) return;
        let cancelled = false;
        setLoadingModel(true);
        setErrorMsg("");

        (async () => {
          try {
            // 기존 인스턴스 정리
            if (landmarkerRef.current) {
              landmarkerRef.current.close?.();
              landmarkerRef.current = null;
            }
            // 새 인스턴스 = 새 timestamp 시퀀스 시작
            videoTsRef.current = 0;
            const lm = await window.__MediaPipe.createLandmarker(model);
            if (cancelled) { lm.close?.(); return; }
            landmarkerRef.current = lm;
            setLoadingModel(false);

            // 영상이 이미 로드된 상태라면 첫 프레임 다시 그려주기
            const v = videoRef.current;
            if (v && v.readyState >= 2 && v.paused) {
              setTimeout(() => analyzeCurrentFrame(), 50);
            }
          } catch (err) {
            console.error("[MediaPipe] 모델 로딩 실패:", err);
            if (!cancelled) {
              setErrorMsg("모델 로딩 실패. 인터넷 연결 확인");
              setLoadingModel(false);
            }
          }
        })();

        return () => {
          cancelled = true;
        };
      }, [mpReady, model, analyzeCurrentFrame]);

      // --- 영상 파일 → object URL ---
      useEffect(() => {
        if (!videoFile) {
          setVideoUrl("");
          return;
        }
        const url = URL.createObjectURL(videoFile);
        setVideoUrl(url);
        // 시계열 초기화
        framesRef.current = [];
        speedsLiveRef.current = [];
        confidencesRef.current = [];
        racketTipTrailRef.current = [];
        setFramesData([]);
        setAnalysisResult({ swings: [], speeds: [], diagnostics: null });
        setScoreData(null);
        setSwingOverrides({});
        setStanceOverrides({});
        setWarningMsg("");
        // 새 영상 = 새 timestamp 시퀀스 시작 (VIDEO 모드 monotonic 보장)
        videoTsRef.current = 0;
        return () => URL.revokeObjectURL(url);
      }, [videoFile]);

      // --- canvas 내부 해상도를 video 원본 해상도와 동기화 ---
      // CSS 사이즈는 100%×100% stretch이므로 픽셀 비율만 video와 맞추면
      // 정규화 좌표(0~1)로 그려도 video 표시 영역에 정확히 매핑됨.
      const syncCanvasSize = useCallback(() => {
        const v = videoRef.current;
        const c = canvasRef.current;
        if (!v || !c) return;
        if (v.videoWidth && (c.width !== v.videoWidth || c.height !== v.videoHeight)) {
          c.width = v.videoWidth;
          c.height = v.videoHeight;
        }
      }, []);

      // --- 비디오 메타로딩 후 길이 검증 + canvas 사이즈 동기화 ---
      const onLoadedMetadata = () => {
        const v = videoRef.current;
        if (!v) return;
        setVideoDuration(v.duration);
        if (v.duration > 30) {
          setWarningMsg(`영상 길이 ${v.duration.toFixed(1)}초 (30초 초과). 분석은 진행됩니다.`);
        }
        syncCanvasSize();
      };

      // --- 임의의 한 프레임 분석 + 그리기 (재생 안 할 때도 호출 가능) ---
      // 시계열에는 저장하지 않는다 (재생 중 누적된 프레임만 분석에 사용).
      const analyzeCurrentFrame = useCallback(() => {
        const video = videoRef.current;
        const canvas = canvasRef.current;
        const lm = landmarkerRef.current;
        if (!video || !canvas || !lm) return;
        if (!video.videoWidth) return;
        // 영상이 한 프레임도 그려지지 않았으면 스킵 (readyState >= 2)
        if (video.readyState < 2) return;

        syncCanvasSize();
        // VIDEO 모드는 strict monotonic timestamp 필요
        videoTsRef.current += 16;
        const ts = videoTsRef.current;
        let result = null;
        try {
          result = lm.detectForVideo(video, ts);
        } catch (err) {
          console.warn("[analyzeCurrentFrame]", err);
        }
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (result?.landmarks?.length > 0) {
          drawPoseSkeleton(ctx, result.landmarks[0], window.__MediaPipe.POSE_CONNECTIONS);
          // 일시정지/시크 시점에도 누적된 trail이 있다면 보이게 그려줌
          // (trail의 t 기준 nowMs는 최신 trail 점의 t로 사용 — 멈춰있어도 잔상이 사라지지 않게)
          const trail = racketTipTrailRef.current;
          if (trail.length > 0) {
            const nowMs = trail[trail.length - 1].t;
            drawRacketTrail(ctx, trail, nowMs);
          }
        }
      }, [syncCanvasSize]);

      // --- 프레임마다 pose 추정 + 스켈레톤 그리기 (재생 중) ---
      const processFrame = useCallback(() => {
        const video = videoRef.current;
        const canvas = canvasRef.current;
        const lm = landmarkerRef.current;
        if (!video || !canvas || !lm) {
          rafIdRef.current = requestAnimationFrame(processFrame);
          return;
        }
        if (video.paused || video.ended) {
          return;
        }

        const tsStart = performance.now();
        // 같은 currentTime이면 스킵 (재생 중이 아니거나 프레임 멈춤)
        if (video.currentTime === lastFrameTimeRef.current) {
          rafIdRef.current = requestAnimationFrame(processFrame);
          return;
        }
        lastFrameTimeRef.current = video.currentTime;

        // VIDEO 모드 monotonic timestamp
        videoTsRef.current += 16;
        const ts = videoTsRef.current;

        let result = null;
        try {
          result = lm.detectForVideo(video, ts);
        } catch (err) {
          console.warn("[detectForVideo]", err);
        }
        const procMs = performance.now() - tsStart;
        processingTimesRef.current.push(procMs);
        if (processingTimesRef.current.length > 60) processingTimesRef.current.shift();

        // FPS 계산 (1초 단위)
        fpsCounterRef.current.frames += 1;
        const now = performance.now();
        if (now - fpsCounterRef.current.lastTick >= 1000) {
          const fps = fpsCounterRef.current.frames;
          const avgMs = processingTimesRef.current.length
            ? processingTimesRef.current.reduce((a, b) => a + b, 0) / processingTimesRef.current.length
            : 0;
          const avgConf = confidencesRef.current.length
            ? confidencesRef.current.slice(-30).reduce((a, b) => a + b, 0) /
              Math.min(confidencesRef.current.length, 30)
            : 0;
          setStats({ fps, avgMs: +avgMs.toFixed(1), avgConf: +avgConf.toFixed(2) });
          fpsCounterRef.current.frames = 0;
          fpsCounterRef.current.lastTick = now;
        }

        syncCanvasSize();
        const ctx = canvas.getContext("2d");
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        if (result?.landmarks?.length > 0) {
          const landmarks = result.landmarks[0];
          noPersonStreakRef.current = 0;

          // 신뢰도 평균 (visibility는 0~1)
          const confs = landmarks.map(p => p.visibility ?? 0).filter(v => v > 0);
          if (confs.length) {
            const avg = confs.reduce((a, b) => a + b, 0) / confs.length;
            confidencesRef.current.push(avg);
          }

          // 라켓 끝 추정 (현재 손잡이 기준)
          const tMs = video.currentTime * 1000;
          const racketTip = estimateRacketTip(landmarks, hand);

          // 시계열 저장 — 비디오의 currentTime을 ms로 + racketTip 같이 저장
          framesRef.current.push({
            t: tMs,
            landmarks: landmarks.map(p => ({ x: p.x, y: p.y, z: p.z, visibility: p.visibility })),
            racketTip, // null 가능
          });

          // 라켓 끝 궤적 갱신 — 1초 이전 점은 제거
          if (racketTip) {
            racketTipTrailRef.current.push({ x: racketTip.x, y: racketTip.y, t: tMs });
          }
          racketTipTrailRef.current = racketTipTrailRef.current.filter(p => tMs - p.t <= TRAIL_DURATION_MS);

          // 직접 그리기 — 부위별 파스텔 색상 + 라켓 궤적 (포즈 위에)
          drawPoseSkeleton(ctx, landmarks, window.__MediaPipe.POSE_CONNECTIONS);
          drawRacketTrail(ctx, racketTipTrailRef.current, tMs);
        } else {
          noPersonStreakRef.current += 1;
          if (noPersonStreakRef.current === 30) {
            setWarningMsg("사람이 검출되지 않습니다. 측면 촬영인지 확인");
          }
        }

        rafIdRef.current = requestAnimationFrame(processFrame);
      }, [hand, syncCanvasSize]);

      // --- 비디오 이벤트 hookup ---
      useEffect(() => {
        const v = videoRef.current;
        if (!v) return;

        const onPlay = () => {
          setIsPlaying(true);
          // 분석 시작 전 reset (사용자가 처음부터 재생할 때만)
          if (v.currentTime === 0) {
            framesRef.current = [];
            confidencesRef.current = [];
            racketTipTrailRef.current = [];
            noPersonStreakRef.current = 0;
            setWarningMsg("");
            setAnalysisResult({ swings: [], speeds: [], diagnostics: null });
            setScoreData(null);
          }
          fpsCounterRef.current = { frames: 0, lastTick: performance.now() };
          rafIdRef.current = requestAnimationFrame(processFrame);
        };

        const onPause = () => {
          setIsPlaying(false);
          if (rafIdRef.current) cancelAnimationFrame(rafIdRef.current);
          // 일시정지 시점 프레임 한 번 더 그려주기
          analyzeCurrentFrame();
        };

        const onEnded = () => {
          setIsPlaying(false);
          if (rafIdRef.current) cancelAnimationFrame(rafIdRef.current);
          // 끝났을 때 분석
          if (framesRef.current.length > 0) {
            setIsAnalyzing(true);
            // 다음 tick에 분석 (UI 갱신 후)
            setTimeout(() => {
              const result = detectSwings(framesRef.current, hand, slowMoFactor);
              setAnalysisResult(result);
              setFramesData([...framesRef.current]);
              setIsAnalyzing(false);
            }, 0);
          }
        };

        // 영상 첫 데이터 로드 — 첫 프레임 스켈레톤 그려주기
        const onLoadedData = () => {
          syncCanvasSize();
          analyzeCurrentFrame();
        };

        // 영상 첫 paint 가능 — 한 번 더 안전하게
        const onCanPlay = () => {
          syncCanvasSize();
          analyzeCurrentFrame();
        };

        // 사용자가 시크/일시정지 후 위치 변경 → 그 프레임 분석
        const onSeeked = () => {
          analyzeCurrentFrame();
        };

        v.addEventListener("play", onPlay);
        v.addEventListener("pause", onPause);
        v.addEventListener("ended", onEnded);
        v.addEventListener("loadedmetadata", onLoadedMetadata);
        v.addEventListener("loadeddata", onLoadedData);
        v.addEventListener("canplay", onCanPlay);
        v.addEventListener("seeked", onSeeked);
        v.addEventListener("error", () => {
          setErrorMsg("지원하지 않는 영상 형식 또는 디코딩 실패");
        });

        // 윈도우 resize / 비디오 박스 resize → canvas 사이즈 재동기화 + 다시 그리기
        const onResize = () => {
          syncCanvasSize();
          // 재생 중이 아닐 때만 다시 그리기 (재생 중이면 곧 다음 프레임에서 처리)
          if (v.paused || v.ended) analyzeCurrentFrame();
        };
        window.addEventListener("resize", onResize);
        let ro = null;
        if (typeof ResizeObserver !== "undefined") {
          ro = new ResizeObserver(onResize);
          ro.observe(v);
        }

        return () => {
          v.removeEventListener("play", onPlay);
          v.removeEventListener("pause", onPause);
          v.removeEventListener("ended", onEnded);
          v.removeEventListener("loadedmetadata", onLoadedMetadata);
          v.removeEventListener("loadeddata", onLoadedData);
          v.removeEventListener("canplay", onCanPlay);
          v.removeEventListener("seeked", onSeeked);
          window.removeEventListener("resize", onResize);
          if (ro) ro.disconnect();
          if (rafIdRef.current) cancelAnimationFrame(rafIdRef.current);
        };
      }, [videoUrl, processFrame, hand, slowMoFactor, analyzeCurrentFrame, syncCanvasSize]);

      // --- playbackRate 동기화 ---
      useEffect(() => {
        if (videoRef.current) videoRef.current.playbackRate = playbackRate;
      }, [playbackRate, videoUrl]);

      // --- 손잡이/슬로모션 배율 변경 시 이미 분석된 데이터에 대해 재분류 + 라켓 끝 재추정 ---
      useEffect(() => {
        if (framesRef.current.length > 0 && !isPlaying) {
          // 모든 프레임의 racketTip을 새 hand 기준으로 다시 계산
          framesRef.current = framesRef.current.map(f => ({
            ...f,
            racketTip: estimateRacketTip(f.landmarks, hand),
          }));
          const result = detectSwings(framesRef.current, hand, slowMoFactor);
          setAnalysisResult(result);
          // 손잡이/슬로모를 바꾸면 자동 분류 + 자동 스탠스 감지가 새로 돌아가니까
          // 사용자 override는 의미가 없어짐
          setSwingOverrides({});
          setStanceOverrides({});
          // framesData 갱신 → 6축 점수 useEffect도 재계산되어 BestShotCard도 새로 그려짐
          setFramesData([...framesRef.current]);
        }
      }, [hand, slowMoFactor, isPlaying]);

      // --- 분석 결과 변경 시 6축 점수 산출 ---
      useEffect(() => {
        const swings = analysisResult.swings;
        const frames = framesRef.current;
        if (!swings.length || !frames.length) {
          setScoreData(null);
          return;
        }

        // 각 스윙별 6축 점수 + 궤적 일관성 점수 + 스탠스 감지
        const perSwing = swings.map(sw => {
          // 스윙 시작 윈도우(피크 -600~-200ms × slowMoFactor) 다중 프레임에서 스탠스 감지
          const autoStance = detectStance(frames, sw.peakIdx, slowMoFactor);
          // 사용자 스탠스 오버라이드 — 자동값보다 우선
          const stanceOverride = stanceOverrides[sw.index];
          const finalStance = stanceOverride ?? (autoStance === 'unknown' ? 'semi-open' : autoStance);
          const stanceUserOverridden = !!stanceOverride && stanceOverride !== autoStance;
          const scored = scoreSwing(frames, sw.peakIdx, hand, slowMoFactor, finalStance);
          const swingFrames = extractSwingFrames(frames, sw.peakIdx, slowMoFactor);
          const trailScore = scoreTrailConsistency(swingFrames);
          // 사용자 override가 있으면 type을 강제 교체. autoType은 보존.
          const override = swingOverrides[sw.index];
          const finalType = override ?? sw.autoType ?? sw.type;
          const userOverridden = !!override && override !== sw.autoType;
          return {
            ...sw,
            type: finalType,
            userOverridden,
            scores: scored,
            trailScore,
            // stance: 채점에 실제 사용된 값 (오버라이드 반영)
            stance: finalStance,
            // stanceDetected: 자동 감지 결과 (UI 라벨용 — override 시에도 보존)
            stanceDetected: finalStance,
            // autoStance: 원본 자동값 — 사이클 토글이 'auto'로 복귀할 때 참조
            autoStance,
            stanceUserOverridden,
          };
        });

        // 6축 평균 (모든 스윙)
        const axesKeys = ["ready", "back", "weight", "chain", "impact", "follow"];
        const axes = {};
        axesKeys.forEach(k => {
          const vals = perSwing.map(s => s.scores[k]);
          axes[k] = clampScore(vals.reduce((a, b) => a + b, 0) / vals.length);
        });

        const total = clampScore(
          axesKeys.reduce((sum, k) => sum + axes[k], 0) / axesKeys.length
        );

        // 포핸드 / 백핸드 평균
        const fhSwings = perSwing.filter(s => s.type === "forehand");
        const bhSwings = perSwing.filter(s => s.type === "backhand");
        const fhAvg = fhSwings.length
          ? clampScore(fhSwings.reduce((a, s) => a + s.scores.total, 0) / fhSwings.length)
          : null;
        const bhAvg = bhSwings.length
          ? clampScore(bhSwings.reduce((a, s) => a + s.scores.total, 0) / bhSwings.length)
          : null;

        // 궤적 일관성 평균 (전체 스윙)
        const trailAvg = clampScore(
          perSwing.reduce((a, s) => a + s.trailScore, 0) / perSwing.length
        );

        // 가장 빈번한 스탠스 (체중이동 라벨용) — 사용자 오버라이드가 있으면 그 값을, 없으면 자동값을 카운트.
        // 모두 unknown이면 semi-open로 fallback.
        const stanceCount = {};
        perSwing.forEach(s => {
          // 채점에 실제 적용된 stance를 카운트 — 오버라이드가 우선이라 사용자 의도와 일치
          if (s.stance && s.stance !== 'unknown') {
            stanceCount[s.stance] = (stanceCount[s.stance] || 0) + 1;
          }
        });
        let majorityStance = 'semi-open';
        let maxC = 0;
        Object.entries(stanceCount).forEach(([k, v]) => {
          if (v > maxC) { maxC = v; majorityStance = k; }
        });

        setScoreData({ perSwing, axes, total, fhAvg, bhAvg, trailAvg, majorityStance });
      }, [analysisResult, hand, slowMoFactor, swingOverrides, stanceOverrides]);

      // 사용자가 자동 분류 결과를 수동 토글
      // - 현재 type과 반대로 강제 (override가 이미 있으면 그것의 반대, 없으면 autoType의 반대)
      // - 같은 토글을 다시 누르면 autoType과 같아지므로 override 자체를 제거 (= 자동값으로 복귀)
      const toggleSwingType = useCallback((swingIndex) => {
        setSwingOverrides(prev => {
          const swing = (analysisResult.swings || []).find(s => s.index === swingIndex);
          if (!swing) return prev;
          const auto = swing.autoType;
          const current = prev[swingIndex] ?? auto;
          const next = current === "forehand" ? "backhand" : "forehand";
          const updated = { ...prev };
          if (next === auto) {
            delete updated[swingIndex]; // 자동값과 같아지면 override 제거 (clean state)
          } else {
            updated[swingIndex] = next;
          }
          return updated;
        });
      }, [analysisResult.swings]);

      // 사용자가 자동 스탠스를 수동 사이클
      // 사이클 순서: 자동 → open → semi-open → closed → 자동(=override 제거)
      // perSwing은 ScoreData에 있으므로 거기서 autoStance를 찾는다.
      const cycleStance = useCallback((swingIndex) => {
        setStanceOverrides(prev => {
          const sw = (scoreData?.perSwing || []).find(s => s.index === swingIndex);
          // autoStance가 unknown이면 'auto' 상태에서 채점은 'semi-open'으로 fallback 중. 사이클은 동일하게 진행.
          const auto = sw?.autoStance ?? 'unknown';
          const current = prev[swingIndex]; // undefined면 'auto' 상태
          const order = ['open', 'semi-open', 'closed'];
          let next;
          if (current === undefined) {
            next = 'open';
          } else if (current === 'open') {
            next = 'semi-open';
          } else if (current === 'semi-open') {
            next = 'closed';
          } else {
            // closed → 자동으로 복귀 (override 제거)
            next = null;
          }
          const updated = { ...prev };
          if (next === null || next === auto) {
            delete updated[swingIndex];
          } else {
            updated[swingIndex] = next;
          }
          return updated;
        });
      }, [scoreData]);

      // --- 컨트롤 핸들러 ---
      const handlePlayPause = () => {
        const v = videoRef.current;
        if (!v) return;
        if (v.paused) v.play();
        else v.pause();
      };

      const handleReset = () => {
        setVideoFile(null);
        setVideoUrl("");
        framesRef.current = [];
        speedsLiveRef.current = [];
        confidencesRef.current = [];
        racketTipTrailRef.current = [];
        setFramesData([]);
        setAnalysisResult({ swings: [], speeds: [], diagnostics: null });
        setWarningMsg("");
        setErrorMsg("");
        setScoreData(null);
        setSwingOverrides({});
        setStanceOverrides({});
        setIsAnalyzing(false);
        videoTsRef.current = 0;
      };

      // 스윙 카드 클릭 → 그 시점으로 시크
      const seekToSwing = (timeMs) => {
        const v = videoRef.current;
        if (!v) return;
        v.currentTime = Math.max(0, timeMs / 1000 - 0.3);
      };

      // --- 결과 카운트 (override 반영) ---
      const counts = useMemo(() => {
        // perSwing이 있으면 override 반영된 type 사용, 아니면 raw swings로 fallback
        const list = (scoreData && scoreData.perSwing) || analysisResult.swings;
        const fh = list.filter(s => s.type === "forehand").length;
        const bh = list.filter(s => s.type === "backhand").length;
        const unk = list.filter(s => s.type === "unknown").length;
        return { total: list.length, fh, bh, unk };
      }, [scoreData, analysisResult]);

      // --- 베스트 스윙 (가장 점수 높은 1개) ---
      // 분석 완료 + perSwing 존재할 때만 산출. 동점이면 더 빠른 시점 우선.
      const bestSwing = useMemo(() => {
        if (!scoreData || !scoreData.perSwing || scoreData.perSwing.length === 0) return null;
        return scoreData.perSwing.reduce((best, sw) => {
          const v = sw.scores?.total ?? -1;
          const bv = best?.scores?.total ?? -1;
          return v > bv ? sw : best;
        }, null);
      }, [scoreData]);

      // --- 렌더 ---
      return (
        <div className="max-w-7xl mx-auto p-6">
          {/* 헤더 */}
          <header className="mb-6 flex items-center justify-between">
            <div>
              <h1 className="text-2xl font-bold tracking-tight">
                <span className="accent-lime">데일리테니스</span> 자세분석 데모
                <span className="ml-2 text-sm text-slate-400 font-normal">(PoC)</span>
              </h1>
              <p className="text-sm text-slate-400 mt-1">
                MediaPipe 포즈 추정 · 스윙 분리 · 포/백 자동 분류
              </p>
            </div>
            <div className="flex items-center gap-2">
              {!mpReady && <Badge tone="slate">MediaPipe 로딩 중…</Badge>}
              {mpReady && loadingModel && <Badge tone="slate">모델({model}) 로딩 중…</Badge>}
              {mpReady && !loadingModel && <Badge tone="lime">모델 준비됨 ({model})</Badge>}
            </div>
          </header>

          {errorMsg && (
            <div className="mb-4 p-4 rounded-lg bg-rose-500/10 border border-rose-500/40 text-rose-300 text-sm">
              {errorMsg}
            </div>
          )}

          {/* 업로드 화면 */}
          {!videoUrl && (
            <UploadArea
              onUpload={(file) => setVideoFile(file)}
              error={null}
            />
          )}

          {/* 분석 화면 */}
          {videoUrl && (
            <div className="grid grid-cols-1 lg:grid-cols-5 gap-6">
              {/* 좌측 (3열): 비디오 + 컨트롤 */}
              <div className="lg:col-span-3 space-y-4">
                <Card className="p-3 sm:p-4">
                  <VideoPanel
                    videoRef={videoRef}
                    canvasRef={canvasRef}
                    src={videoUrl}
                  />
                </Card>

                {warningMsg && (
                  <div className="p-3 rounded-lg bg-amber-500/10 border border-amber-500/40 text-amber-300 text-sm">
                    {warningMsg}
                  </div>
                )}

                {/* 컨트롤 */}
                <Card>
                  <div className="flex flex-wrap items-center gap-3 mb-4">
                    <PrimaryButton onClick={handlePlayPause} disabled={loadingModel}>
                      {isPlaying ? "⏸ 일시정지" : "▶ 재생"}
                    </PrimaryButton>
                    <div className="flex items-center gap-1">
                      <span className="text-sm text-slate-400 mr-2">속도:</span>
                      {[1, 0.5, 0.25].map(rate => (
                        <Button
                          key={rate}
                          onClick={() => setPlaybackRate(rate)}
                          className={`text-xs ${
                            playbackRate === rate
                              ? "bg-lime-400 text-slate-900"
                              : "bg-slate-700 hover:bg-slate-600 text-slate-200"
                          }`}
                        >
                          {rate}x
                        </Button>
                      ))}
                    </div>
                    <div className="flex-1" />
                    <GhostButton onClick={handleReset}>영상 새로 올리기</GhostButton>
                  </div>

                  <div className="flex flex-wrap gap-x-6 gap-y-3 pt-3 border-t border-slate-700">
                    <div className="flex items-center gap-3">
                      <span className="text-sm text-slate-400">손잡이:</span>
                      <Radio
                        name="hand" value="right" label="오른손"
                        checked={hand === "right"}
                        onChange={() => setHand("right")}
                      />
                      <Radio
                        name="hand" value="left" label="왼손"
                        checked={hand === "left"}
                        onChange={() => setHand("left")}
                      />
                    </div>
                    <div className="flex items-center gap-3">
                      <span className="text-sm text-slate-400">모델:</span>
                      <Radio
                        name="model" value="lite" label="Lite"
                        checked={model === "lite"}
                        onChange={() => setModel("lite")}
                      />
                      <Radio
                        name="model" value="full" label="Full"
                        checked={model === "full"}
                        onChange={() => setModel("full")}
                      />
                      <Radio
                        name="model" value="heavy" label="Heavy"
                        checked={model === "heavy"}
                        onChange={() => setModel("heavy")}
                      />
                    </div>
                    <div className="flex items-center gap-3">
                      <span
                        className="text-sm text-slate-400"
                        title="슬로모션 영상이면 원본 대비 배율 선택. 일반 실시간 영상은 1x"
                      >
                        영상 속도:
                      </span>
                      {[1, 2, 4, 8].map(f => (
                        <Radio
                          key={f}
                          name="slowMo"
                          value={String(f)}
                          label={`${f}x`}
                          checked={slowMoFactor === f}
                          onChange={() => setSlowMoFactor(f)}
                        />
                      ))}
                      <span className="text-xs text-slate-500 hidden sm:inline">
                        (슬로모션 영상이면 그 배율, 일반은 1x)
                      </span>
                    </div>
                  </div>
                </Card>

                {/* 성능 정보 */}
                <Card>
                  <div className="text-xs text-slate-400 mb-2">성능 정보</div>
                  <div className="grid grid-cols-2 sm:grid-cols-4 gap-4">
                    <Stat label="FPS" value={stats.fps} />
                    <Stat label="평균 처리시간" value={stats.avgMs} suffix="ms/frame" />
                    <Stat label="평균 신뢰도" value={stats.avgConf} />
                    <Stat label="영상 길이" value={videoDuration.toFixed(1)} suffix="초" />
                  </div>
                </Card>
              </div>

              {/* 우측 (2열): 결과 */}
              <div className="lg:col-span-2 space-y-4">
                {/* 분석 진행 중 */}
                {isAnalyzing && (
                  <Card>
                    <div className="flex items-center gap-3 text-slate-300">
                      <div className="w-4 h-4 rounded-full border-2 border-lime-400 border-t-transparent animate-spin" />
                      <span className="text-sm">분석 중...</span>
                    </div>
                  </Card>
                )}

                {/* 📊 분석 진단 — 영상 분석 끝나면 항상 맨 위에 표시.
                    스윙 0개면 큰 안내 카드 모드, 1개 이상이면 콤팩트 카드. */}
                {!isAnalyzing && analysisResult.diagnostics && (
                  <DiagnosticsCard
                    diagnostics={analysisResult.diagnostics}
                    swingCount={analysisResult.swings.length}
                    large={analysisResult.swings.length === 0}
                  />
                )}

                {/* 🏆 베스트 샷 — 진단 다음 (분석 완료 + 스윙 1개 이상일 때만) */}
                {!isAnalyzing && bestSwing && videoUrl && (
                  <BestShotCard
                    bestSwing={bestSwing}
                    framesData={framesData}
                    videoUrl={videoUrl}
                    hand={hand}
                    slowMoFactor={slowMoFactor}
                    onToggleType={toggleSwingType}
                    onCycleStance={cycleStance}
                  />
                )}

                {/* 분석 전 안내 — 아직 분석 결과 자체가 없을 때만 (diagnostics도 없을 때) */}
                {!isAnalyzing && !scoreData && !analysisResult.diagnostics && (
                  <Card>
                    <h2 className="text-sm font-medium text-slate-400 mb-2">분석 결과</h2>
                    <p className="text-sm text-slate-500">
                      ▶ 재생 버튼을 눌러 영상을 끝까지 재생하면 6축 점수가 여기에 표시됩니다.
                    </p>
                  </Card>
                )}

                {/* 분석 결과 — 점수 요약 */}
                {!isAnalyzing && scoreData && (
                  <Card>
                    <h2 className="text-sm font-medium text-slate-400 mb-3">분석 결과</h2>
                    <div className="space-y-2 text-sm">
                      <div className="flex justify-between">
                        <span className="text-slate-400">검출 스윙</span>
                        <span className="font-semibold text-slate-100">{counts.total}개</span>
                      </div>
                      {scoreData.fhAvg !== null && (
                        <div className="flex justify-between">
                          <span className="text-slate-400">포핸드 평균</span>
                          <span className="font-semibold">
                            <span className={scoreColorClass(scoreData.fhAvg)}>{scoreData.fhAvg}</span>
                            <span className="text-slate-500"> / 100</span>
                          </span>
                        </div>
                      )}
                      {scoreData.bhAvg !== null && (
                        <div className="flex justify-between">
                          <span className="text-slate-400">백핸드 평균</span>
                          <span className="font-semibold">
                            <span className={scoreColorClass(scoreData.bhAvg)}>{scoreData.bhAvg}</span>
                            <span className="text-slate-500"> / 100</span>
                          </span>
                        </div>
                      )}
                      <div className="flex justify-between items-center pt-2 mt-2 border-t border-slate-700">
                        <span className="text-slate-300">종합 점수</span>
                        <div className="flex items-baseline gap-3">
                          <span className={`text-2xl font-bold ${scoreColorClass(scoreData.total)}`}>
                            {scoreData.total}
                          </span>
                          <span className="text-slate-500 text-sm">/ 100</span>
                          <Stars score={scoreData.total} />
                        </div>
                      </div>
                    </div>
                  </Card>
                )}

                {/* 육각형 차트 */}
                {!isAnalyzing && scoreData && (
                  <Card>
                    <h2 className="text-sm font-medium text-slate-400 mb-2">6축 능력치</h2>
                    <p className="text-xs text-slate-500 mb-2">전체 스윙 평균</p>
                    <HexagonChart scores={scoreData.axes} />
                  </Card>
                )}

                {/* 6축 별점 상세 */}
                {!isAnalyzing && scoreData && (
                  <Card>
                    <h2 className="text-sm font-medium text-slate-400 mb-3">6축 별점 상세</h2>
                    <ul className="space-y-1.5">
                      {AXIS_LABELS.map(({ key, label }) => {
                        const v = scoreData.axes[key];
                        const isWeight = key === 'weight';
                        return (
                          <li
                            key={key}
                            className="flex items-center justify-between p-2 rounded bg-slate-700/40"
                          >
                            <span className="text-sm text-slate-300">
                              {label}
                              {isWeight && scoreData.majorityStance && (
                                <span className="ml-2 text-xs text-slate-500">
                                  ({stanceLabel(scoreData.majorityStance)} 스탠스 기준)
                                </span>
                              )}
                            </span>
                            <div className="flex items-center gap-3">
                              <Stars score={v} />
                              <span className={`text-sm font-semibold w-8 text-right ${scoreColorClass(v)}`}>
                                {v}
                              </span>
                            </div>
                          </li>
                        );
                      })}
                    </ul>
                  </Card>
                )}

                {/* 스윙 궤적 일관성 — 7번째 메트릭 (별도 카드) */}
                {!isAnalyzing && scoreData && (
                  <Card>
                    <div className="flex items-center justify-between mb-1">
                      <div className="flex items-center gap-2">
                        <span className="inline-block w-2 h-2 rounded-full bg-cyan-400" />
                        <h2 className="text-sm font-medium text-slate-300">스윙 궤적 일관성</h2>
                      </div>
                      <div className="flex items-center gap-3">
                        <Stars score={scoreData.trailAvg} />
                        <span className={`text-base font-bold ${scoreColorClass(scoreData.trailAvg)}`}>
                          {scoreData.trailAvg}
                        </span>
                        <span className="text-slate-500 text-xs">/ 100</span>
                      </div>
                    </div>
                    <p className="text-xs text-slate-500">
                      라켓 끝 경로 매끄러움 + 백스윙 폭
                    </p>
                  </Card>
                )}

                {/* 손목 속도 그래프 (override 반영된 perSwing 사용) */}
                <Card>
                  <h2 className="text-sm font-medium text-slate-400 mb-2">손목 속도</h2>
                  <p className="text-xs text-slate-500 mb-3">
                    피크 = 스윙. <span className="text-rose-400">●</span> 포핸드 / <span className="text-cyan-400">●</span> 백핸드
                  </p>
                  <SpeedChart
                    speeds={analysisResult.speeds}
                    swings={(scoreData && scoreData.perSwing) || analysisResult.swings}
                  />
                </Card>

                {/* 스윙별 카드 (스코어 포함) */}
                {!isAnalyzing && scoreData && scoreData.perSwing.length > 0 && (
                  <Card>
                    <h2 className="text-sm font-medium text-slate-400 mb-3">스윙별 분석 ({scoreData.perSwing.length})</h2>
                    <ul className="space-y-2 max-h-96 overflow-auto pr-1">
                      {scoreData.perSwing.map(sw => (
                        <li
                          key={sw.index}
                          onClick={() => seekToSwing(sw.time)}
                          className="p-3 rounded-lg bg-slate-700/40 hover:bg-slate-700/70 cursor-pointer transition-colors"
                          title="클릭해서 그 시점으로 이동"
                        >
                          <div className="flex items-center justify-between gap-2">
                            <div className="flex items-center gap-2 min-w-0 flex-wrap">
                              <span className="text-sm text-slate-200 font-medium">스윙 {sw.index}</span>
                              <span className="text-xs text-slate-500">({(sw.time / 1000).toFixed(1)}초)</span>
                              {(() => {
                                if (sw.type === "unknown") return <Badge tone="slate">분류불가</Badge>;
                                const label = sw.type === "forehand" ? "포핸드" : "백핸드";
                                if (sw.userOverridden) {
                                  // 사용자가 직접 지정 — confidence 무시, 단정적으로 표시
                                  const tone = sw.type === "forehand" ? "rose" : "cyan";
                                  return <Badge tone={tone}>{label} ✏️</Badge>;
                                }
                                const conf = sw.classifyConfidence ?? 1;
                                if (conf < 0.3) return <Badge tone="slate">분류 모호</Badge>;
                                const tone = conf < 0.6 ? "amber" : (sw.type === "forehand" ? "rose" : "cyan");
                                const suffix = conf < 0.6 ? " (불확실)" : "";
                                return <Badge tone={tone}>{label}{suffix}</Badge>;
                              })()}
                              <button
                                onClick={(e) => { e.stopPropagation(); toggleSwingType(sw.index); }}
                                className="px-1.5 py-0.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs leading-none"
                                title="자동 분류가 틀렸다면 클릭해서 포/백 변경"
                                aria-label="포핸드/백핸드 토글"
                              >
                                ⇄
                              </button>
                              <button
                                onClick={(e) => { e.stopPropagation(); cycleStance(sw.index); }}
                                className="px-2 py-0.5 rounded bg-slate-700 hover:bg-slate-600 text-slate-300 text-xs leading-none inline-flex items-center gap-1"
                                title="스탠스가 틀렸다면 클릭해서 변경 (자동 → 오픈 → 세미오픈 → 클로즈 → 자동)"
                                aria-label="스탠스 사이클"
                              >
                                <span>스탠스: {stanceLabel(sw.stance)}</span>
                                {sw.stanceUserOverridden && <span>✏️</span>}
                                <span>⇄</span>
                              </button>
                            </div>
                            <div className="flex items-center gap-2 flex-shrink-0">
                              <Stars score={sw.scores.total} />
                              <span className={`text-sm font-bold w-8 text-right ${scoreColorClass(sw.scores.total)}`}>
                                {sw.scores.total}
                              </span>
                            </div>
                          </div>
                          {/* 궤적 일관성 한 줄 — 트리 가지 표현 */}
                          <div className="flex items-center justify-between mt-1.5 pl-2">
                            <span className="text-xs text-slate-400">
                              <span className="text-slate-600">└</span> 궤적 일관성
                            </span>
                            <div className="flex items-center gap-2 flex-shrink-0">
                              <Stars score={sw.trailScore} />
                              <span className={`text-xs font-semibold w-8 text-right ${scoreColorClass(sw.trailScore)}`}>
                                {sw.trailScore}
                              </span>
                            </div>
                          </div>
                        </li>
                      ))}
                    </ul>
                  </Card>
                )}
              </div>
            </div>
          )}

          <footer className="mt-10 text-center text-xs text-slate-500">
            데일리테니스 자세분석 PoC · MediaPipe Tasks Vision · 클라이언트 사이드 처리
          </footer>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
