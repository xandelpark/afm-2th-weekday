<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>배달의민족 스타일 페이지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" />
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            pretendard: ['Pretendard', '-apple-system', 'BlinkMacSystemFont', 'sans-serif'],
          },
          colors: {
            baemin: {
              mint: '#2AC1BC',
              'mint-dark': '#219A96',
              brown: '#3F3A36',
              'brown-light': '#5C5652',
              cream: '#FFF8F0',
              warm: '#F9F5F0',
            },
          },
        },
      },
    }
  </script>
</head>
<body class="min-h-screen flex justify-center bg-baemin-cream font-pretendard px-6 py-20 leading-relaxed antialiased">
  <div class="max-w-[620px] w-full">
    <div id="greeting" class="flex items-center gap-2 mb-12 cursor-pointer select-none">
      <p class="text-lg font-bold text-baemin-mint tracking-tight">안녕하세요</p>
      <div class="relative">
        <span id="bike" class="text-3xl inline-block">🛵</span>
        <div id="smoke" class="absolute top-1/2 -left-2 -translate-y-1/2 flex gap-[2px] pointer-events-none"></div>
      </div>
    </div>

    <h1 class="text-5xl font-extrabold tracking-tighter leading-tight mb-6 text-baemin-brown">제목 1</h1>
    <h2 class="text-3xl font-bold tracking-tight leading-snug mb-5 text-baemin-brown-light">제목 2</h2>
    <h3 class="text-xl font-semibold tracking-tight leading-normal mb-4 text-baemin-brown-light/70">제목 3</h3>

    <div class="w-10 h-1 bg-baemin-mint rounded-full my-10"></div>

    <p class="text-[17px] text-baemin-brown-light leading-loose mb-3 tracking-tight">본문 입니다.</p>

    <div class="mt-12 bg-white border-2 border-baemin-mint/20 rounded-2xl p-8 transition-all duration-200 hover:-translate-y-0.5 hover:shadow-[0_8px_30px_rgba(42,193,188,0.12)]">
      <p class="text-[17px] text-baemin-brown-light leading-loose tracking-tight mb-0">
        본문 입니다. <a href="https://www.naver.com" class="text-baemin-mint font-bold no-underline transition-colors duration-200 hover:text-baemin-mint-dark">네이버 →</a>
      </p>
    </div>
  </div>
  <script src="./client.js"></script>
</body>
</html>
