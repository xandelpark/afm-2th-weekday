<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데일리샵 어드민</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    html, body { font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Noto Sans KR", sans-serif; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes toastIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes modalIn { from { opacity: 0; transform: translateY(-6px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
    .overlay-anim { animation: fadeIn 0.15s ease-out; }
    .toast-anim { animation: toastIn 0.18s ease-out; }
    .modal-anim { animation: modalIn 0.18s ease-out; }
    .skeleton {
      background: linear-gradient(110deg, #f1f5f9 8%, #f8fafc 18%, #f1f5f9 33%);
      background-size: 200% 100%;
      animation: shimmer 1.6s linear infinite;
    }
    .custom-scroll::-webkit-scrollbar { height: 6px; width: 6px; }
    .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 antialiased">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef, useCallback, createContext, useContext } = React;

    // ========================================
    // 상수 / 공용 유틸
    // ========================================
    const TOKEN_KEY = "shopping_admin_token";

    // 고객앱 PRODUCTS 데이터 복붙 (product_id → 상품명 표시)
    const PRODUCTS = [
      { id: 1,  name: "오버사이즈 코튼 티셔츠", price: 29000,  category: "의류" },
      { id: 2,  name: "베이직 후드 집업",      price: 59000,  category: "의류" },
      { id: 3,  name: "플리츠 롱 원피스",      price: 89000,  category: "의류" },
      { id: 4,  name: "무선 노이즈캔슬링 이어폰", price: 149000, category: "전자기기" },
      { id: 5,  name: "기계식 키보드 (청축)",   price: 128000, category: "전자기기" },
      { id: 6,  name: "버티컬 무선 마우스",     price: 42000,  category: "전자기기" },
      { id: 7,  name: "고속충전 보조배터리 20000mAh", price: 38000, category: "전자기기" },
      { id: 8,  name: "스페셜티 싱글오리진 원두 250g", price: 22000, category: "식품" },
      { id: 9,  name: "프리미엄 라면 8종 세트",  price: 24900,  category: "식품" },
      { id: 10, name: "수제 과자 선물박스",     price: 35000,  category: "식품" },
      { id: 11, name: "우드 디퓨저 200ml",     price: 32000,  category: "리빙" },
      { id: 12, name: "도자기 핸드메이드 머그컵", price: 18000,  category: "리빙" },
    ];
    const PRODUCT_BY_ID = Object.fromEntries(PRODUCTS.map((p) => [p.id, p]));

    const formatDateTime = (s) => {
      if (!s) return "-";
      const d = new Date(s);
      if (isNaN(d.getTime())) return s;
      return d.toLocaleString("ko-KR");
    };
    const formatNumber = (n) => Number(n ?? 0).toLocaleString("ko-KR");

    // ========================================
    // Design System: Button / Input / Card / Badge / Skeleton / Toast / AlertDialog
    // ========================================
    function Button({
      variant = "default",
      size = "md",
      className = "",
      disabled,
      children,
      ...rest
    }) {
      const base =
        "inline-flex items-center justify-center font-medium rounded-md transition-colors focus:outline-none focus:ring-2 focus:ring-offset-1 focus:ring-slate-400 disabled:opacity-50 disabled:cursor-not-allowed select-none";
      const variants = {
        default: "bg-slate-900 text-white hover:bg-slate-800",
        outline: "border border-slate-200 bg-white text-slate-900 hover:bg-slate-50",
        ghost: "bg-transparent text-slate-700 hover:bg-slate-100",
        destructive: "bg-red-600 text-white hover:bg-red-700 focus:ring-red-400",
      };
      const sizes = {
        sm: "text-xs px-2.5 py-1.5",
        md: "text-sm px-3.5 py-2",
        lg: "text-sm px-4 py-2.5",
      };
      return (
        <button
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${className}`}
          {...rest}
        >
          {children}
        </button>
      );
    }

    function Input({ label, error, className = "", id, ...rest }) {
      return (
        <div className="space-y-1.5">
          {label && (
            <label htmlFor={id} className="text-xs font-medium text-slate-700">
              {label}
            </label>
          )}
          <input
            id={id}
            className={`w-full px-3 py-2 text-sm bg-white border border-slate-200 rounded-md placeholder:text-slate-400 focus:outline-none focus:border-slate-400 focus:ring-1 focus:ring-slate-400 ${
              error ? "border-red-400 focus:border-red-500 focus:ring-red-300" : ""
            } ${className}`}
            {...rest}
          />
          {error && <p className="text-xs text-red-600">{error}</p>}
        </div>
      );
    }

    function Card({ className = "", children }) {
      return (
        <div className={`bg-white border border-slate-200 rounded-lg shadow-sm ${className}`}>
          {children}
        </div>
      );
    }

    function Badge({ variant = "default", className = "", children }) {
      const variants = {
        default: "bg-slate-100 text-slate-700 border border-slate-200",
        secondary: "bg-slate-900 text-white",
        outline: "border border-slate-200 text-slate-700 bg-white",
        success: "bg-emerald-50 text-emerald-700 border border-emerald-200",
        warning: "bg-amber-50 text-amber-700 border border-amber-200",
        danger: "bg-red-50 text-red-700 border border-red-200",
        admin: "bg-slate-900 text-white",
      };
      return (
        <span className={`inline-flex items-center gap-1 rounded-full text-xs font-medium px-2 py-0.5 ${variants[variant]} ${className}`}>
          {children}
        </span>
      );
    }

    function Skeleton({ className = "" }) {
      return <div className={`skeleton rounded-md ${className}`} />;
    }

    function Toast({ message }) {
      if (!message) return null;
      return (
        <div className="fixed bottom-6 right-6 z-50 toast-anim">
          <div className="bg-slate-900 text-white text-sm px-4 py-2.5 rounded-md shadow-lg border border-slate-800 flex items-center gap-2">
            <svg className="w-4 h-4 text-emerald-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2.5">
              <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
            </svg>
            <span>{message}</span>
          </div>
        </div>
      );
    }

    function AlertDialog({ open, title, description, confirmText = "확인", cancelText = "취소", destructive = false, onConfirm, onCancel }) {
      useEffect(() => {
        if (!open) return;
        const handler = (e) => { if (e.key === "Escape") onCancel?.(); };
        document.addEventListener("keydown", handler);
        return () => document.removeEventListener("keydown", handler);
      }, [open, onCancel]);

      if (!open) return null;
      return (
        <div className="fixed inset-0 z-50 flex items-center justify-center p-4" role="dialog" aria-modal="true">
          <div className="absolute inset-0 bg-black/40 overlay-anim" onClick={onCancel} />
          <Card className="relative w-full max-w-md modal-anim p-6">
            <h3 className="text-base font-semibold text-slate-900">{title}</h3>
            {description && <p className="mt-2 text-sm text-slate-600">{description}</p>}
            <div className="mt-5 flex justify-end gap-2">
              <Button variant="outline" onClick={onCancel}>{cancelText}</Button>
              <Button variant={destructive ? "destructive" : "default"} onClick={onConfirm}>{confirmText}</Button>
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // Toast Hook (1.5s)
    // ========================================
    function useToast() {
      const [message, setMessage] = useState("");
      const timer = useRef(null);
      const show = useCallback((msg) => {
        setMessage(msg);
        if (timer.current) clearTimeout(timer.current);
        timer.current = setTimeout(() => setMessage(""), 1500);
      }, []);
      useEffect(() => () => timer.current && clearTimeout(timer.current), []);
      return { toast: message, showToast: show };
    }

    // ========================================
    // AuthContext — 토큰 관리, authFetch, 401/403 자동 로그아웃
    // ========================================
    const AuthContext = createContext(null);
    const useAuth = () => useContext(AuthContext);

    function AuthProvider({ children }) {
      const [token, setToken] = useState(() => localStorage.getItem(TOKEN_KEY) || "");
      const [user, setUser] = useState(null);
      const [bootLoading, setBootLoading] = useState(true);
      const tokenRef = useRef(token);
      tokenRef.current = token;

      const logout = useCallback(() => {
        localStorage.removeItem(TOKEN_KEY);
        setToken("");
        setUser(null);
      }, []);

      const authFetch = useCallback(async (url, opts = {}) => {
        const headers = { "Content-Type": "application/json", ...(opts.headers || {}) };
        if (tokenRef.current) headers.Authorization = `Bearer ${tokenRef.current}`;
        const res = await fetch(url, { ...opts, headers });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) {
          if (res.status === 401 || res.status === 403) {
            // 토큰 만료 or 권한 없음 → 자동 로그아웃
            logout();
          }
          const err = new Error(body.error || `HTTP ${res.status}`);
          err.status = res.status;
          throw err;
        }
        return body;
      }, [logout]);

      // 초기 부팅: 토큰 검증 + admin 확인
      useEffect(() => {
        if (!token) { setBootLoading(false); return; }
        (async () => {
          try {
            const { user: u } = await authFetch("/api/auth/me");
            if (!u.is_admin) {
              // 관리자 아님 → 토큰 제거
              localStorage.removeItem(TOKEN_KEY);
              setToken("");
              setUser(null);
            } else {
              setUser(u);
            }
          } catch {
            // authFetch가 logout 처리
          } finally {
            setBootLoading(false);
          }
        })();
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, []);

      const login = async (username, password) => {
        const res = await fetch("/api/auth/login", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password }),
        });
        const body = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(body.error || "로그인 실패");
        if (!body.user?.is_admin) {
          throw new Error("관리자 권한이 없습니다");
        }
        localStorage.setItem(TOKEN_KEY, body.token);
        setToken(body.token);
        setUser(body.user);
      };

      return (
        <AuthContext.Provider value={{ user, token, bootLoading, login, logout, authFetch, isAuthenticated: !!user }}>
          {children}
        </AuthContext.Provider>
      );
    }

    // ========================================
    // 로그인 페이지
    // ========================================
    function LoginPage() {
      const { login } = useAuth();
      const [username, setUsername] = useState("");
      const [password, setPassword] = useState("");
      const [error, setError] = useState("");
      const [busy, setBusy] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        setError("");
        setBusy(true);
        try {
          await login(username.trim(), password);
        } catch (err) {
          setError(err.message);
        } finally {
          setBusy(false);
        }
      };

      return (
        <div className="min-h-screen flex items-center justify-center px-4 bg-slate-50">
          <Card className="w-full max-w-sm p-7">
            <div className="text-center mb-6">
              <div className="inline-flex items-center gap-2 mb-2">
                <span className="text-2xl">🛍️</span>
                <span className="text-xs font-semibold text-slate-500 tracking-wider uppercase">데일리샵 어드민</span>
              </div>
              <h1 className="text-xl font-semibold text-slate-900">관리자 로그인</h1>
              <p className="text-sm text-slate-500 mt-1">계정으로 로그인해 대시보드에 접근하세요</p>
            </div>

            <form onSubmit={handleSubmit} className="space-y-4">
              <Input
                id="username"
                label="아이디"
                type="text"
                autoFocus
                autoComplete="username"
                placeholder="admin"
                value={username}
                onChange={(e) => setUsername(e.target.value)}
                disabled={busy}
              />
              <Input
                id="password"
                label="비밀번호"
                type="password"
                autoComplete="current-password"
                placeholder="••••••••"
                value={password}
                onChange={(e) => setPassword(e.target.value)}
                disabled={busy}
              />

              {error && (
                <div className="text-xs text-red-700 bg-red-50 border border-red-200 rounded-md px-3 py-2">
                  {error}
                </div>
              )}

              <Button
                type="submit"
                size="lg"
                className="w-full"
                disabled={busy || !username || !password}
              >
                {busy ? "로그인 중..." : "로그인"}
              </Button>
            </form>

            <div className="mt-6 pt-4 border-t border-slate-100 text-center">
              <p className="text-xs text-slate-400">
                테스트 계정 <span className="font-mono text-slate-600">admin / admin1234</span>
              </p>
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 공용: 섹션 타이틀, 빈 상태, 에러 배너
    // ========================================
    function EmptyState({ icon = "📭", title, description }) {
      return (
        <div className="py-16 text-center">
          <div className="text-4xl mb-3">{icon}</div>
          <p className="text-sm font-medium text-slate-700">{title}</p>
          {description && <p className="text-xs text-slate-500 mt-1">{description}</p>}
        </div>
      );
    }
    function ErrorBanner({ message, onRetry }) {
      if (!message) return null;
      return (
        <div className="flex items-start justify-between gap-3 px-3 py-2.5 bg-red-50 border border-red-200 rounded-md text-sm">
          <div className="flex items-start gap-2 text-red-800">
            <svg className="w-4 h-4 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
              <path strokeLinecap="round" strokeLinejoin="round" d="M12 9v2m0 4h.01M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z" />
            </svg>
            <span>{message}</span>
          </div>
          {onRetry && (
            <button onClick={onRetry} className="text-xs font-medium text-red-700 hover:text-red-900 underline">
              다시 시도
            </button>
          )}
        </div>
      );
    }

    // ========================================
    // 개요 탭 (stats 카드)
    // ========================================
    function StatCard({ label, value, sub }) {
      return (
        <Card className="p-5">
          <p className="text-xs font-medium text-slate-500 uppercase tracking-wide">{label}</p>
          <p className="mt-1.5 text-3xl font-semibold text-slate-900 tabular-nums">{value}</p>
          {sub && <p className="mt-1 text-[11px] text-slate-400">{sub}</p>}
        </Card>
      );
    }

    function StatCardSkeleton() {
      return (
        <Card className="p-5">
          <Skeleton className="h-3 w-20" />
          <Skeleton className="h-8 w-24 mt-2" />
          <Skeleton className="h-3 w-28 mt-2" />
        </Card>
      );
    }

    function OverviewTab() {
      const { authFetch } = useAuth();
      const [stats, setStats] = useState(null);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");

      const load = useCallback(async () => {
        setLoading(true);
        setError("");
        try {
          const data = await authFetch("/api/admin/stats");
          setStats(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, [authFetch]);

      useEffect(() => { load(); }, [load]);

      return (
        <div className="space-y-5">
          <div>
            <h2 className="text-lg font-semibold text-slate-900">개요</h2>
            <p className="text-sm text-slate-500 mt-0.5">서비스 전반의 주요 지표를 한눈에 확인하세요</p>
          </div>
          <ErrorBanner message={error} onRetry={load} />
          {loading ? (
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
              {Array.from({ length: 5 }).map((_, i) => <StatCardSkeleton key={i} />)}
            </div>
          ) : stats ? (
            <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-5 gap-4">
              <StatCard label="전체 사용자" value={formatNumber(stats.total_users)} sub="가입된 모든 사용자 수" />
              <StatCard label="관리자 수"   value={formatNumber(stats.admin_users)} sub="is_admin = true" />
              <StatCard label="장바구니 보유 사용자" value={formatNumber(stats.users_with_cart)} sub="1개 이상 담은 사용자" />
              <StatCard label="전체 담긴 수량" value={formatNumber(stats.total_items_in_carts)} sub="모든 장바구니 수량 합" />
              <StatCard label="장바구니 아이템 행" value={formatNumber(stats.total_cart_rows)} sub="cart_items 테이블 행 수" />
            </div>
          ) : null}
        </div>
      );
    }

    // ========================================
    // 사용자 탭
    // ========================================
    function UserRowSkeleton() {
      return (
        <tr className="border-b border-slate-100">
          {Array.from({ length: 7 }).map((_, i) => (
            <td key={i} className="px-4 py-3"><Skeleton className="h-4 w-16" /></td>
          ))}
        </tr>
      );
    }

    function UsersTab({ onToast }) {
      const { user: me, authFetch } = useAuth();
      const [users, setUsers] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");
      const [confirm, setConfirm] = useState(null); // { user } | null
      const [deleting, setDeleting] = useState(false);

      const load = useCallback(async () => {
        setLoading(true);
        setError("");
        try {
          const data = await authFetch("/api/admin/users");
          setUsers(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, [authFetch]);

      useEffect(() => { load(); }, [load]);

      const confirmDelete = async () => {
        if (!confirm) return;
        setDeleting(true);
        try {
          await authFetch(`/api/admin/users/${confirm.user.id}`, { method: "DELETE" });
          onToast(`${confirm.user.username} 삭제 완료`);
          setConfirm(null);
          await load();
        } catch (e) {
          alert("삭제 실패: " + e.message);
        } finally {
          setDeleting(false);
        }
      };

      return (
        <div className="space-y-4">
          <div className="flex items-end justify-between">
            <div>
              <h2 className="text-lg font-semibold text-slate-900">사용자</h2>
              <p className="text-sm text-slate-500 mt-0.5">가입된 사용자 목록과 장바구니 요약 정보</p>
            </div>
            <Button variant="outline" size="sm" onClick={load} disabled={loading}>
              새로고침
            </Button>
          </div>

          <ErrorBanner message={error} onRetry={load} />

          <Card className="overflow-hidden">
            <div className="overflow-x-auto custom-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-slate-200 bg-slate-50/60">
                    <th className="px-4 py-2.5 text-left text-xs font-medium text-slate-500">ID</th>
                    <th className="px-4 py-2.5 text-left text-xs font-medium text-slate-500">아이디</th>
                    <th className="px-4 py-2.5 text-left text-xs font-medium text-slate-500">권한</th>
                    <th className="px-4 py-2.5 text-right text-xs font-medium text-slate-500">담긴 아이템 수</th>
                    <th className="px-4 py-2.5 text-right text-xs font-medium text-slate-500">담긴 수량</th>
                    <th className="px-4 py-2.5 text-left text-xs font-medium text-slate-500">가입일</th>
                    <th className="px-4 py-2.5 text-right text-xs font-medium text-slate-500">작업</th>
                  </tr>
                </thead>
                <tbody>
                  {loading ? (
                    Array.from({ length: 4 }).map((_, i) => <UserRowSkeleton key={i} />)
                  ) : users.length === 0 ? (
                    <tr>
                      <td colSpan="7" className="px-4">
                        <EmptyState icon="👥" title="사용자가 없습니다" description="가입된 사용자가 아직 없어요" />
                      </td>
                    </tr>
                  ) : (
                    users.map((u) => {
                      const isMe = me && u.id === me.id;
                      return (
                        <tr key={u.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                          <td className="px-4 py-3 text-slate-500 tabular-nums">{u.id}</td>
                          <td className="px-4 py-3 font-medium text-slate-900">
                            <div className="flex items-center gap-2">
                              <span>{u.username}</span>
                              {isMe && <Badge variant="outline">나</Badge>}
                            </div>
                          </td>
                          <td className="px-4 py-3">
                            {u.is_admin ? (
                              <Badge variant="admin">🛡️ 관리자</Badge>
                            ) : (
                              <Badge variant="default">일반</Badge>
                            )}
                          </td>
                          <td className="px-4 py-3 text-right tabular-nums text-slate-700">{formatNumber(u.cart_item_count)}</td>
                          <td className="px-4 py-3 text-right tabular-nums text-slate-700">{formatNumber(u.cart_total_qty)}</td>
                          <td className="px-4 py-3 text-slate-600 text-xs">{formatDateTime(u.created_at)}</td>
                          <td className="px-4 py-3 text-right">
                            <Button
                              size="sm"
                              variant="outline"
                              disabled={isMe}
                              onClick={() => setConfirm({ user: u })}
                              className={isMe ? "" : "text-red-600 hover:bg-red-50 hover:border-red-200"}
                              title={isMe ? "본인 계정은 삭제할 수 없습니다" : "사용자 삭제"}
                            >
                              삭제
                            </Button>
                          </td>
                        </tr>
                      );
                    })
                  )}
                </tbody>
              </table>
            </div>
          </Card>

          <AlertDialog
            open={!!confirm}
            destructive
            title="사용자를 삭제하시겠어요?"
            description={confirm ? `'${confirm.user.username}' 계정과 해당 사용자의 장바구니가 모두 제거됩니다. 이 작업은 되돌릴 수 없습니다.` : ""}
            confirmText={deleting ? "삭제 중..." : "삭제"}
            cancelText="취소"
            onConfirm={deleting ? undefined : confirmDelete}
            onCancel={() => !deleting && setConfirm(null)}
          />
        </div>
      );
    }

    // ========================================
    // 장바구니 탭
    // ========================================
    function CartRowSkeleton() {
      return (
        <tr className="border-b border-slate-100">
          {Array.from({ length: 5 }).map((_, i) => (
            <td key={i} className="px-4 py-3"><Skeleton className="h-4 w-16" /></td>
          ))}
        </tr>
      );
    }

    function CartItemsTab() {
      const { authFetch } = useAuth();
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState("");

      const load = useCallback(async () => {
        setLoading(true);
        setError("");
        try {
          const data = await authFetch("/api/admin/cart-items");
          setItems(data);
        } catch (e) {
          setError(e.message);
        } finally {
          setLoading(false);
        }
      }, [authFetch]);

      useEffect(() => { load(); }, [load]);

      return (
        <div className="space-y-4">
          <div className="flex items-end justify-between">
            <div>
              <h2 className="text-lg font-semibold text-slate-900">장바구니</h2>
              <p className="text-sm text-slate-500 mt-0.5">전체 사용자가 담은 장바구니 아이템 목록</p>
            </div>
            <Button variant="outline" size="sm" onClick={load} disabled={loading}>
              새로고침
            </Button>
          </div>

          <ErrorBanner message={error} onRetry={load} />

          <Card className="overflow-hidden">
            <div className="overflow-x-auto custom-scroll">
              <table className="w-full text-sm">
                <thead>
                  <tr className="border-b border-slate-200 bg-slate-50/60">
                    <th className="px-4 py-2.5 text-left text-xs font-medium text-slate-500">ID</th>
                    <th className="px-4 py-2.5 text-left text-xs font-medium text-slate-500">사용자</th>
                    <th className="px-4 py-2.5 text-left text-xs font-medium text-slate-500">상품</th>
                    <th className="px-4 py-2.5 text-right text-xs font-medium text-slate-500">수량</th>
                    <th className="px-4 py-2.5 text-left text-xs font-medium text-slate-500">담은 일시</th>
                  </tr>
                </thead>
                <tbody>
                  {loading ? (
                    Array.from({ length: 4 }).map((_, i) => <CartRowSkeleton key={i} />)
                  ) : items.length === 0 ? (
                    <tr>
                      <td colSpan="5" className="px-4">
                        <EmptyState icon="🛒" title="장바구니 아이템이 없습니다" description="아직 어떤 사용자도 상품을 담지 않았어요" />
                      </td>
                    </tr>
                  ) : (
                    items.map((it) => {
                      const p = PRODUCT_BY_ID[it.product_id];
                      return (
                        <tr key={it.id} className="border-b border-slate-100 hover:bg-slate-50 transition-colors">
                          <td className="px-4 py-3 text-slate-500 tabular-nums">{it.id}</td>
                          <td className="px-4 py-3">
                            <div className="flex flex-col">
                              <span className="font-medium text-slate-900">{it.username}</span>
                              <span className="text-xs text-slate-400">user_id: {it.user_id}</span>
                            </div>
                          </td>
                          <td className="px-4 py-3">
                            <div className="flex flex-col">
                              <span className="text-slate-900">{p ? p.name : <span className="text-slate-400">알 수 없는 상품</span>}</span>
                              <span className="text-xs text-slate-400">
                                product_id: {it.product_id}
                                {p && ` · ${p.category}`}
                              </span>
                            </div>
                          </td>
                          <td className="px-4 py-3 text-right tabular-nums">
                            <Badge variant="outline">× {formatNumber(it.quantity)}</Badge>
                          </td>
                          <td className="px-4 py-3 text-slate-600 text-xs">{formatDateTime(it.created_at)}</td>
                        </tr>
                      );
                    })
                  )}
                </tbody>
              </table>
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // Tabs 컴포넌트 (shadcn 스타일)
    // ========================================
    function Tabs({ tabs, value, onChange }) {
      return (
        <div className="inline-flex items-center gap-1 bg-slate-100 p-1 rounded-md">
          {tabs.map((t) => (
            <button
              key={t.value}
              onClick={() => onChange(t.value)}
              className={`text-sm font-medium px-3.5 py-1.5 rounded-sm transition-colors ${
                value === t.value
                  ? "bg-white text-slate-900 shadow-sm"
                  : "text-slate-600 hover:text-slate-900"
              }`}
            >
              {t.label}
            </button>
          ))}
        </div>
      );
    }

    // ========================================
    // 대시보드 (로그인 후)
    // ========================================
    function Dashboard() {
      const { user, logout } = useAuth();
      const { toast, showToast } = useToast();
      const [tab, setTab] = useState("overview");
      const [logoutConfirm, setLogoutConfirm] = useState(false);

      const tabs = [
        { value: "overview", label: "개요" },
        { value: "users", label: "사용자" },
        { value: "cart", label: "장바구니" },
      ];

      return (
        <div className="min-h-screen flex flex-col">
          {/* 헤더 */}
          <header className="sticky top-0 z-30 bg-white border-b border-slate-200">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-14 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <span className="text-lg">🛍️</span>
                <h1 className="text-sm font-semibold text-slate-900">데일리샵 어드민</h1>
                <Badge variant="outline" className="ml-1">admin</Badge>
              </div>
              <div className="flex items-center gap-2">
                <div className="hidden sm:flex items-center gap-2 px-3 py-1.5 rounded-md text-sm text-slate-700">
                  <div className="w-6 h-6 bg-slate-900 rounded-full flex items-center justify-center text-white text-xs font-bold">
                    {user.username.charAt(0).toUpperCase()}
                  </div>
                  <span className="font-medium">{user.username}</span>
                </div>
                <Button variant="outline" size="sm" onClick={() => setLogoutConfirm(true)}>
                  로그아웃
                </Button>
              </div>
            </div>
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pb-3">
              <Tabs tabs={tabs} value={tab} onChange={setTab} />
            </div>
          </header>

          {/* 본문 */}
          <main className="flex-1 w-full max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            {tab === "overview" && <OverviewTab />}
            {tab === "users" && <UsersTab onToast={showToast} />}
            {tab === "cart" && <CartItemsTab />}
          </main>

          {/* 푸터 */}
          <footer className="border-t border-slate-200 bg-white py-4">
            <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center text-xs text-slate-400">
              © 2026 데일리샵 어드민 · Express + JWT + Supabase
            </div>
          </footer>

          <Toast message={toast} />

          <AlertDialog
            open={logoutConfirm}
            title="로그아웃 하시겠어요?"
            description="다시 관리자 기능을 이용하려면 재로그인이 필요합니다."
            confirmText="로그아웃"
            cancelText="취소"
            onConfirm={() => { setLogoutConfirm(false); logout(); }}
            onCancel={() => setLogoutConfirm(false)}
          />
        </div>
      );
    }

    // ========================================
    // App (boot 로딩 + 로그인/대시보드 분기)
    // ========================================
    function AppShell() {
      const { isAuthenticated, bootLoading } = useAuth();

      if (bootLoading) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-50">
            <div className="flex items-center gap-2 text-sm text-slate-500">
              <svg className="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
                <circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/>
                <path className="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"/>
              </svg>
              불러오는 중...
            </div>
          </div>
        );
      }

      return isAuthenticated ? <Dashboard /> : <LoginPage />;
    }

    function App() {
      return (
        <AuthProvider>
          <AppShell />
        </AuthProvider>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
