<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Studio — 아기 카툰 쇼츠 메이커</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gamja+Flower&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    // Tailwind 토큰 확장 — Editorial Cream 팔레트
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:    '#FAF7F2',
            paper:    '#FFFFFF',
            ink:      '#1A1A1A',
            muted:    '#7B7470',
            faint:    '#A8A29A',
            hairline: '#E8E4DD',
            accent:   '#C97B63',     // terracotta
            accentSoft: '#F2DDD3',
            sage:     '#9CAF88',
          },
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            cute: ['Gaegu', '"Gamja Flower"', 'Pretendard', 'cursive'],
          },
        }
      }
    };
  </script>
  <style>
    body {
      background: #FAF7F2;
      min-height: 100vh;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }
    /* 귀여운 말풍선 — 꼬리 포함 */
    .bubble-cute {
      font-family: 'Gaegu', 'Gamja Flower', 'Pretendard', cursive;
      font-weight: 700;
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: -0.01em;
      background: #FFFDF7;
      color: #1A1A1A;
      border: 2.2px solid #1A1A1A;
      border-radius: 22px;
      padding: 8px 14px 10px;
      position: relative;
      max-width: 100%;
      word-break: keep-all;
      box-shadow: 0 1px 0 rgba(26,26,26,0.05);
      animation: bubblePop 0.18s ease-out;
    }
    @keyframes bubblePop {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    /* 꼬리 — 왼쪽 (말풍선이 캐릭터의 오른쪽에 있을 때, 꼬리는 왼쪽으로 캐릭터 가리킴) */
    .bubble-cute.tail-left::before,
    .bubble-cute.tail-left::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-style: solid;
    }
    .bubble-cute.tail-left::before {
      left: -12px;
      border-width: 9px 12px 9px 0;
      border-color: transparent #1A1A1A transparent transparent;
    }
    .bubble-cute.tail-left::after {
      left: -8px;
      border-width: 7px 10px 7px 0;
      border-color: transparent #FFFDF7 transparent transparent;
    }
    /* 꼬리 — 오른쪽 (말풍선이 캐릭터의 왼쪽에 있을 때) */
    .bubble-cute.tail-right::before,
    .bubble-cute.tail-right::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-style: solid;
    }
    .bubble-cute.tail-right::before {
      right: -12px;
      border-width: 9px 0 9px 12px;
      border-color: transparent transparent transparent #1A1A1A;
    }
    .bubble-cute.tail-right::after {
      right: -8px;
      border-width: 7px 0 7px 10px;
      border-color: transparent transparent transparent #FFFDF7;
    }

    /* 부드럽게 떠오르는 fade — 장식 최소화 */
    @keyframes softFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-in { animation: softFadeIn 0.28s ease-out; }

    /* 숨겨진 진짜 file input (자리만) */
    .file-input-hidden { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* wordmark 트래킹 */
    .wordmark { letter-spacing: 0.18em; }

    /* number 텍스트 — 모노스페이스 느낌 */
    .num { font-feature-settings: 'tnum' 1; font-variant-numeric: tabular-nums; }

    /* 인라인 텍스트 편집 호버 */
    .editable:hover { box-shadow: inset 0 -1px 0 0 #C97B63; }

    /* 캐릭터 talking 애니메이션 — subtle bob */
    @keyframes talkBob {
      0%, 100% { transform: translateY(0) scale(1);   }
      50%      { transform: translateY(-4px) scale(1.02); }
    }
    .avatar-talking { animation: talkBob 0.42s ease-in-out infinite; transform-origin: center bottom; }

    /* 입 모양 — 말할 때 살짝 벌어지는 효과 */
    @keyframes mouthTalk {
      0%, 100% { transform: scaleY(1);   }
      50%      { transform: scaleY(0.45); }
    }
    .mouth-talking { animation: mouthTalk 0.32s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

    /* idle breathing — 재생 중 아닌 캐릭터에게 미세 호흡 */
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.008); }
    }
    .avatar-idle { animation: breathe 3.2s ease-in-out infinite; transform-origin: center bottom; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    // ========================================
    // 더미 데이터 / 상수
    // ========================================
    const DUMMY_SEGMENTS = [
      { id: 1, start: 0.0,  end: 2.5,  text: "우리 아기 잘 잤어?",        speaker: "A" },
      { id: 2, start: 2.6,  end: 4.2,  text: "응애에에",                  speaker: "B" },
      { id: 3, start: 4.3,  end: 6.8,  text: "배고프구나~ 우유 줄게",     speaker: "A" },
      { id: 4, start: 6.9,  end: 8.5,  text: "꺄르륵",                    speaker: "B" },
      { id: 5, start: 8.6,  end: 10.5, text: "아빠도 같이 먹을까?",       speaker: "C" },
      { id: 6, start: 10.6, end: 12.0, text: "옹알옹알",                  speaker: "B" },
    ];

    const ROLES = [
      { key: "dad",  label: "Father" , kr: "아빠" },
      { key: "mom",  label: "Mother" , kr: "엄마" },
      { key: "baby", label: "Baby"   , kr: "아기" },
    ];

    const SPEAKER_KEYS = ["A", "B", "C"];

    // 화자별 — 모노톤 명도 변형(액센트 톤 변형) 으로 절제된 구분
    const SPEAKER_COLORS = {
      A: { dot: "bg-[#C97B63]",   chip: "bg-[#F2DDD3] text-[#7A3A28]", bar: "bg-[#C97B63]" },
      B: { dot: "bg-[#9CAF88]",   chip: "bg-[#E5EAD9] text-[#48553A]", bar: "bg-[#9CAF88]" },
      C: { dot: "bg-[#7B7470]",   chip: "bg-[#E8E4DD] text-[#3A3530]", bar: "bg-[#7B7470]" },
    };

    const BABY_ONOMATOPOEIA = ["응애", "꺄르륵", "옹알옹알", "꺅", "헤헤", "아바바"];

    const STEPS = [
      { id: 1, key: "upload",    label: "Upload",     kr: "업로드"   },
      { id: 2, key: "label",     label: "Label",      kr: "라벨"     },
      { id: 3, key: "character", label: "Character",  kr: "캐릭터"   },
      { id: 4, key: "preview",   label: "Preview",    kr: "미리보기" },
      { id: 5, key: "export",    label: "Export",     kr: "내보내기" },
    ];

    // 시간(초)을 mm:ss.s 형식으로 변환
    const fmtTime = (sec) => {
      const m = Math.floor(sec / 60);
      const s = (sec - m * 60).toFixed(1);
      return `${m}:${s.padStart(4, "0")}`;
    };

    // ========================================
    // Inline SVG Icons — stroke 1.5, 16~20px
    // ========================================
    const Icon = {
      upload: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M12 4v12"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/>
        </svg>
      ),
      file: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/>
        </svg>
      ),
      arrowRight: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M5 12h14"/><path d="m13 5 7 7-7 7"/>
        </svg>
      ),
      arrowLeft: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M19 12H5"/><path d="m11 19-7-7 7-7"/>
        </svg>
      ),
      check: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      ),
      lock: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <rect width="14" height="10" x="5" y="11" rx="1.5"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
      ),
      play: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <polygon points="6 4 20 12 6 20 6 4" fill="currentColor" stroke="none"/>
        </svg>
      ),
      pause: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <rect x="6" y="5" width="4" height="14" fill="currentColor" stroke="none"/>
          <rect x="14" y="5" width="4" height="14" fill="currentColor" stroke="none"/>
        </svg>
      ),
      download: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>
        </svg>
      ),
      share: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="m16 6-4-4-4 4"/><path d="M12 2v13"/>
        </svg>
      ),
      clock: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
        </svg>
      ),
      // 사람 흉상 silhouette (캐릭터 placeholder용)
      bust: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||32} height={p.size||32} viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <circle cx="32" cy="22" r="10"/>
          <path d="M14 54c0-10 8-16 18-16s18 6 18 16"/>
        </svg>
      ),
      // 작은 아기 (조금 더 둥근 머리 — 그래도 모노크롬 라인)
      bustSmall: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||32} height={p.size||32} viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <circle cx="32" cy="26" r="11"/>
          <path d="M18 56c0-8 6-14 14-14s14 6 14 14"/>
        </svg>
      ),
    };

    // ========================================
    // Avatar — 카툰 캐릭터 (역할별 + variant별 컬러 팔레트)
    //   role: 'dad' | 'mom' | 'baby'
    //   variant: 1~5 (피부톤·머리색 변형)
    //   talking: bool — 말하는 동안 bob + 입 벌어짐 애니메이션
    //   idle: bool — talking이 아닐 때도 살짝 호흡
    // 향후 실제 PNG로 교체할 때는 이 컴포넌트만 갈아끼우면 됨.
    // ========================================
    const PALETTE = {
      dad: [
        { skin: '#F4D8C5', hair: '#3A2E26', cheek: '#E8B5A0' },
        { skin: '#E8C8B0', hair: '#5C4030', cheek: '#D9A38A' },
        { skin: '#F0CFB8', hair: '#7A5C42', cheek: '#E0AC95' },
        { skin: '#D4A98A', hair: '#1F1815', cheek: '#B88B6F' },
        { skin: '#F8E2D0', hair: '#9C6F44', cheek: '#EFC5AB' },
      ],
      mom: [
        { skin: '#F8DDD0', hair: '#4A3325', cheek: '#EAB6A0' },
        { skin: '#F2D2C0', hair: '#6B4A2F', cheek: '#DEAA92' },
        { skin: '#FBE3D2', hair: '#A47147', cheek: '#F1C5AB' },
        { skin: '#E5C4AC', hair: '#2C1F18', cheek: '#CC9A82' },
        { skin: '#FCE4D6', hair: '#8B5E3F', cheek: '#F2C4A7' },
      ],
      baby: [
        { skin: '#FBE3D6', hair: '#5C3F2D', cheek: '#F4B5A1' },
        { skin: '#F8DDD0', hair: '#735544', cheek: '#EFAA92' },
        { skin: '#FCE7DA', hair: '#3F2C20', cheek: '#F4B6A2' },
        { skin: '#EFD2BE', hair: '#9C7855', cheek: '#E2A990' },
        { skin: '#FBDFCE', hair: '#5E412F', cheek: '#F2B19E' },
      ],
    };

    // 5가지 그림체 스타일 메타
    const CHAR_STYLES = [
      { key: 'current',  label: '소프트 일러스트', hint: '지금 그림체' },
      { key: 'stickman', label: '졸라맨 코믹',     hint: '단순선' },
      { key: 'disney',   label: '디즈니풍',         hint: '3D 카툰' },
      { key: 'webtoon',  label: '웹툰풍',           hint: '한국 만화' },
      { key: 'chimchak', label: '침착맨풍',         hint: '굵은선 만화' },
    ];

    function Avatar({ role = 'dad', variant = 1, talking = false, idle = false, size = 96, fill = false, style = 'current' }) {
      const wrapCls = talking ? 'avatar-talking' : (idle ? 'avatar-idle' : '');
      const wrapStyle = fill
        ? { display: 'block', width: '100%', height: '100%', lineHeight: 0 }
        : { display: 'inline-block', width: size, height: size, lineHeight: 0 };

      // PNG 기반 스타일 (디즈니/웹툰/침착맨) — public/characters/{style}/{role}.png
      if (['disney', 'webtoon', 'chimchak'].includes(style)) {
        return <ImageAvatar style={style} role={role} wrapCls={wrapCls} wrapStyle={wrapStyle} />;
      }

      // 졸라맨 SVG
      if (style === 'stickman') {
        return (
          <div className={wrapCls} style={wrapStyle}>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width={fill ? '100%' : size}
              height={fill ? '100%' : size}
              viewBox="0 0 200 200"
              preserveAspectRatio="xMidYMid meet"
              aria-hidden="true"
            >
              <rect width="200" height="200" rx="24" fill="#FFFDF7" />
              <StickmanContent role={role} talking={talking} />
            </svg>
          </div>
        );
      }

      // current — 기존 소프트 일러스트
      const palette = PALETTE[role] || PALETTE.dad;
      const c = palette[Math.min(Math.max(variant - 1, 0), palette.length - 1)];
      const mouthCls = talking ? 'mouth-talking' : '';

      // 공통 배경 둥근 카드
      const bg = (
        <>
          <rect width="200" height="200" rx="24" fill="#FFF6EE" />
          <circle cx="100" cy="200" r="120" fill="#F5E5D6" opacity="0.55" />
        </>
      );

      let content = null;

      if (role === 'baby') {
        // 큰 머리 / 작은 몸통 / 머리카락 한 가닥 / 큰 눈
        content = (
          <g>
            {/* 몸통 (작게) */}
            <ellipse cx="100" cy="172" rx="44" ry="22" fill={c.skin} />
            <rect x="62" y="158" width="76" height="32" rx="14" fill="#C8DACF" />
            {/* 머리 — 매우 둥글게 */}
            <circle cx="100" cy="100" r="60" fill={c.skin} />
            {/* 머리카락 한 가닥 (위로 삐친) */}
            <path d="M100 38 q-4 -10 0 -16 q4 6 0 16 z" fill={c.hair} />
            <path d="M70 60 q8 -14 30 -16" stroke={c.hair} strokeWidth="3" fill="none" strokeLinecap="round" />
            {/* 볼 발그레 */}
            <circle cx="68" cy="115" r="9" fill={c.cheek} opacity="0.65" />
            <circle cx="132" cy="115" r="9" fill={c.cheek} opacity="0.65" />
            {/* 눈 — 크고 동그란 점 */}
            <circle cx="78" cy="98" r="5.5" fill="#1A1A1A" />
            <circle cx="122" cy="98" r="5.5" fill="#1A1A1A" />
            <circle cx="79.5" cy="96" r="1.6" fill="#FFF" />
            <circle cx="123.5" cy="96" r="1.6" fill="#FFF" />
            {/* 입 — 작은 O */}
            <ellipse className={mouthCls} cx="100" cy="128" rx="6" ry="5" fill="#7A3A28" />
          </g>
        );
      } else if (role === 'mom') {
        content = (
          <g>
            {/* 몸통 + 옷 */}
            <ellipse cx="100" cy="178" rx="60" ry="20" fill="#D9C5DA" />
            <path d="M50 178 q-2 -28 16 -34 h68 q18 6 16 34 z" fill="#D9C5DA" />
            {/* 머리카락 (어깨 길이) — 머리 뒤 */}
            <path d="M44 110 q-2 -52 56 -56 q58 4 56 56 q-2 28 -10 42 q-8 -8 -10 -22 q-6 18 -36 22 q-30 -4 -36 -22 q-2 14 -10 22 q-8 -14 -10 -42 z" fill={c.hair} />
            {/* 얼굴 */}
            <ellipse cx="100" cy="100" rx="44" ry="48" fill={c.skin} />
            {/* 앞머리 — 살짝 가린 */}
            <path d="M58 78 q14 -22 42 -22 q28 0 42 22 q-10 -6 -22 -2 q-8 -10 -20 -10 q-12 0 -20 10 q-12 -4 -22 2 z" fill={c.hair} />
            {/* 볼 */}
            <circle cx="68" cy="116" r="7" fill={c.cheek} opacity="0.55" />
            <circle cx="132" cy="116" r="7" fill={c.cheek} opacity="0.55" />
            {/* 눈 */}
            <path d="M76 100 q4 -4 8 0" stroke="#1A1A1A" strokeWidth="2.2" fill="none" strokeLinecap="round" />
            <path d="M116 100 q4 -4 8 0" stroke="#1A1A1A" strokeWidth="2.2" fill="none" strokeLinecap="round" />
            {/* 입 — 미소 */}
            <path className={mouthCls} d="M88 130 q12 8 24 0" stroke="#7A3A28" strokeWidth="2.4" fill="none" strokeLinecap="round" />
          </g>

      } else {

    // 긴 자막을 "말하는 듯한" 청크로 쪼개기
    // - 문장부호 우선, 그 다음 공백
    // - 한 청크당 약 14자 이내 목표 (너무 짧지도 길지도 않게)
    function chunkSpokenText(text, maxChars = 14) {
      if (!text) return [];
      const trimmed = String(text).trim();
      if (trimmed.length <= maxChars) return [trimmed];
      // 문장부호로 1차 분할
      const parts = trimmed.split(/(?<=[.!?,~…])\s*/g).filter(Boolean);
      const chunks = [];
      for (const part of parts) {
        const p = part.trim();
        if (!p) continue;
        if (p.length <= maxChars) {
          chunks.push(p);
        } else {
          // 공백 기준 누적
          const words = p.split(/\s+/);
          let cur = '';
          for (const w of words) {
            const next = cur ? cur + ' ' + w : w;
            if (next.length > maxChars && cur) {
              chunks.push(cur);
              cur = w;
            } else {
              cur = next;
            }
          }
          if (cur) chunks.push(cur);
          // 단일 어절이 maxChars보다 길면 글자수로 강제 분할
          for (let i = chunks.length - 1; i >= 0; i--) {
            if (chunks[i].length > maxChars + 4) {
              const big = chunks.splice(i, 1)[0];
              const sliced = [];
              for (let j = 0; j < big.length; j += maxChars) {
                sliced.push(big.slice(j, j + maxChars));
              }
              chunks.splice(i, 0, ...sliced);
            }
          }
        }
      }
      return chunks.length > 0 ? chunks : [trimmed];
    }

    // 단어별 타임스탬프 → 청크 + 정확한 start/end
    // 단어 데이터 없거나 텍스트가 편집된 경우엔 글자수 비례로 fallback
    function buildTimedChunks(segment, displayText, maxChars = 14) {
      if (!segment) return [];
      const words = segment.words || [];
      const isEdited = displayText !== undefined && displayText !== segment.text;

      // Fallback: 글자수 비례 분배 (단어 데이터 없거나 편집된 경우)
      if (words.length === 0 || isEdited) {
        const chunks = chunkSpokenText(displayText !== undefined ? displayText : segment.text, maxChars);
        const totalChars = chunks.reduce((s, c) => s + c.length, 0) || 1;
        const dur = Math.max(0.001, segment.end - segment.start);
        const result = [];
        let cum = 0;
        for (const c of chunks) {
          const start = segment.start + (cum / totalChars) * dur;
          cum += c.length;
          const end = segment.start + (cum / totalChars) * dur;
          result.push({ text: c, start, end });
        }
        return result;
      }

      // 정확 모드: 단어 단위로 누적해서 청크 빌드
      const result = [];
      let buf = [];
      let bufLen = 0;
      const flush = () => {
        if (buf.length === 0) return;
        result.push({
          text: buf.map((x) => x.text).join(' '),
          start: buf[0].start,
          end: buf[buf.length - 1].end,
        });
        buf = [];
        bufLen = 0;
      };
      for (const w of words) {
        const wText = (w.text || '').trim();
        if (!wText) continue;
        const wLen = wText.length;
        // maxChars 초과 시 flush (다만 buf가 비어있지 않을 때만)
        if (bufLen + wLen + (buf.length > 0 ? 1 : 0) > maxChars && buf.length > 0) {
          flush();
        }
        buf.push(w);
        bufLen += wLen + (buf.length > 1 ? 1 : 0);
        // 문장부호로 끝나는 단어 → 자연스러운 청크 경계
        if (/[.!?,~…]$/.test(wText)) flush();
      }
      flush();
      // 마지막 청크의 end를 segment.end로 확장 — 단어 타임스탬프가 segment.end보다 짧을 때 자막이 뚝 끊기는 거 방지
      if (result.length > 0) {
        const last = result[result.length - 1];
        if (last.end < segment.end) last.end = segment.end;
      }
      return result;
    }

    // currentTime이 어느 청크에 있는지 찾기
    function findActiveChunk(timedChunks, currentTime) {
      if (!timedChunks || timedChunks.length === 0) return '';
      // currentTime 범위에 들어가는 청크
      for (const c of timedChunks) {
        if (currentTime >= c.start && currentTime <= c.end) return c.text;
      }
      // 갭 구간이면 직전 청크 유지 (없으면 빈 문자열)
      let last = '';
      for (const c of timedChunks) {
        if (c.end <= currentTime) last = c.text;
        else break;
      }
      return last;
    }

    // 캐릭터 id ("dad-3") → { role, variant } 파싱
    function parseCharId(charId) {
      if (!charId || typeof charId !== 'string') return { role: 'dad', variant: 1 };
      const [role, vStr] = charId.split('-');
      const variant = parseInt(vStr, 10);
      return {
        role: ['dad', 'mom', 'baby'].includes(role) ? role : 'dad',
        variant: Number.isInteger(variant) && variant >= 1 && variant <= 5 ? variant : 1,
      };
    }

      return (

          {loading && (
            <p className="text-center text-[11px] text-muted">
              발화자 구분에는 보통 30초~2분 정도 걸려요. 페이지를 닫지 마세요.
            </p>
          )}
        </div>
      );
    }

    // ========================================
    // Page — LabelStep
    // ========================================
    function LabelStep({ segments, roleMapping, setRoleMapping, transcriptMeta }) {
      const totalDuration = useMemo(
        () => segments.reduce((max, s) => Math.max(max, s.end), 0),
        [segments]
      );

      const speakerSegments = useMemo(() => {
        const map = { A: [], B: [], C: [] };
        segments.forEach((s) => { if (map[s.speaker]) map[s.speaker].push(s); });
        return map;
      }, [segments]);

      // 중복 체크는 실제 segments가 있는 화자만 — 유령 화자(C가 데이터에 없는데 default에 박혀있는 경우) 제외
      const activeSpeakers = SPEAKER_KEYS.filter((k) => speakerSegments[k] && speakerSegments[k].length > 0);
      const usedRoles = activeSpeakers.map((sp) => roleMapping[sp]).filter(Boolean);
      const hasDuplicate = usedRoles.length !== new Set(usedRoles).size;

      return (
        <div className="px-6 py-7 space-y-5 anim-fade-in">
          <div className="space-y-1.5">
            <div className="text-[10px] uppercase tracking-[0.18em] text-accent num">02 — Label</div>
            <h2 className="font-serif text-[26px] leading-[1.15] text-ink">
              누가 누구인지<br/>알려주세요.
            </h2>
            <p className="text-[13px] text-muted leading-relaxed pt-1">
              AI가 사람 A · B · C로 자동 분리했어요. 각 화자가 누구인지 매칭하세요.
            </p>
          </div>

          {/* 발화자 구분 진단 — 정확도 검증용 */}
          {transcriptMeta && (
            <div className="px-4 py-3 rounded-lg border border-hairline bg-paper text-[12px] text-ink/80 flex items-center justify-between gap-3 num">
              <span>
                <span className="text-ink font-medium">{transcriptMeta.speakerCount ?? '-'}</span>
                <span className="text-muted">명 감지</span>
              </span>
              <span className="text-faint">·</span>
              <span>
                <span className="text-muted">길이 </span>
                <span className="text-ink">{transcriptMeta.audioDurationSec != null ? fmtTime(transcriptMeta.audioDurationSec) : '-'}</span>
              </span>
              <span className="text-faint">·</span>
              <span>
                <span className="text-muted">신뢰도 </span>
                <span className="text-ink">{transcriptMeta.confidence != null ? `${Math.round(transcriptMeta.confidence * 100)}%` : '-'}</span>
              </span>
            </div>
          )}

          {/* timeline visualization */}
          <Card>
            <div className="flex items-baseline justify-between mb-2">
              <span className="text-[10px] uppercase tracking-[0.16em] text-muted">Timeline</span>
              <span className="text-[10px] num text-faint">{fmtTime(totalDuration)}</span>
            </div>
            <div className="relative h-2 w-full rounded-full bg-hairline overflow-hidden">
              {segments.map((s) => {
                const left = (s.start / totalDuration) * 100;
                const width = ((s.end - s.start) / totalDuration) * 100;
                const sp = SPEAKER_COLORS[s.speaker] || SPEAKER_COLORS.C;
                return (
                  <div
                    key={s.id}
                    title={`${s.speaker}: ${s.text}`}
                    className={`absolute top-0 bottom-0 ${sp.bar} opacity-90`}
                    style={{ left: `${left}%`, width: `${width}%` }}
                  />
                );
              })}
            </div>
            <div className="flex items-center gap-4 mt-3 text-[11px]">
              {SPEAKER_KEYS.map((k) => (
                <div key={k} className="flex items-center gap-1.5">
                  <span className={`w-2 h-2 rounded-full ${SPEAKER_COLORS[k].dot}`} />
                  <span className="text-muted">사람 {k}</span>
                </div>
              ))}
            </div>
          </Card>

          {/* speaker mapping cards */}
          {SPEAKER_KEYS.map((sp) => {
            const segs = speakerSegments[sp];
            if (!segs || segs.length === 0) return null;
            const sc = SPEAKER_COLORS[sp];
            return (
              <Card key={sp}>
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <span className={`w-2 h-2 rounded-full ${sc.dot}`} />
                    <span className="text-[13px] font-medium text-ink">사람 {sp}</span>
                  </div>
                  <span className="text-[10px] uppercase tracking-[0.14em] text-faint num">{segs.length}개 발화</span>
                </div>

                {/* segment 미리보기 */}
                <div className="space-y-1 mb-4">
                  {segs.slice(0, 2).map((s) => (
                    <div key={s.id} className="text-[12px] text-ink/80 leading-relaxed flex gap-3">
                      <span className="num text-faint shrink-0">{fmtTime(s.start)}</span>
                      <span>"{s.text}"</span>
                    </div>
                  ))}
                  {segs.length > 2 && (
                    <div className="text-[11px] text-faint">+ {segs.length - 2}개 더</div>
                  )}
                </div>

                {/* 역할 선택 — segmented buttons */}
                <div>
                  <div className="text-[11px] uppercase tracking-[0.14em] text-muted mb-2">Role</div>
                  <div className="grid grid-cols-3 gap-1.5">
                    {ROLES.map((r) => {
                      const selected = roleMapping[sp] === r.key;
                      return (
                        <button
                          key={r.key}
                          type="button"
                          onClick={() => {
                            // 다른 화자에서 같은 역할이 이미 쓰이고 있으면 자동 해제 (유령 매핑도 같이 정리)
                            const next = { ...roleMapping };
                            Object.keys(next).forEach((k) => {
                              if (k !== sp && next[k] === r.key) delete next[k];
                            });
                            next[sp] = r.key;
                            setRoleMapping(next);
                          }}
                          className={`py-2.5 rounded-lg text-[12px] font-medium border transition
                            ${selected
                              ? 'bg-ink text-cream border-ink'
                              : 'bg-paper text-ink/70 border-hairline hover:border-ink/30'}`}
                        >
                          {r.kr}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </Card>
            );
          })}

          {hasDuplicate && (
            <div className="px-4 py-3 rounded-lg border border-accent/40 bg-accentSoft/40 text-[12px] text-[#7A3A28] text-center">
              같은 역할은 두 명에게 매길 수 없어요.
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Page — CharacterStep (5스타일 세트 — 아빠/엄마/아기 1세트로 묶음)
    // ========================================
    function CharacterStep({ roleMapping, characterStyle, setCharacterStyle }) {
      return (
        <div className="px-6 py-7 space-y-5 anim-fade-in">
          <div className="space-y-1.5">
            <div className="text-[10px] uppercase tracking-[0.18em] text-accent num">03 — Style</div>
            <h2 className="font-serif text-[26px] leading-[1.15] text-ink">
              그림체를<br/>골라주세요.
            </h2>
            <p className="text-[13px] text-muted leading-relaxed pt-1">
              5가지 그림체 중 1개. 아빠 · 엄마 · 아기가 같은 화풍의 한 세트로 묶입니다.
            </p>
          </div>

          <div className="space-y-3">
            {CHAR_STYLES.map((s) => {
              const isSelected = characterStyle === s.key;
              return (
                <button
                  key={s.key}
                  type="button"
                  onClick={() => setCharacterStyle(s.key)}
                  className={`relative w-full text-left rounded-xl border-2 p-3 transition
                    ${isSelected
                      ? 'border-ink bg-cream'
                      : 'border-hairline bg-paper hover:border-ink/30'}`}
                  aria-pressed={isSelected}
                >
                  <div className="flex items-center gap-3">
                    {/* 3-캐릭터 미리보기 */}
                    <div className="flex gap-1.5 flex-shrink-0">
                      {['dad', 'mom', 'baby'].map((r) => (
                        <div key={r} className="w-14 h-14 rounded-md bg-paper border border-hairline overflow-hidden flex items-center justify-center">
                          <Avatar role={r} style={s.key} size={56} />
                        </div>
                      ))}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-baseline gap-2">
                        <h3 className="text-[14px] font-medium text-ink">{s.label}</h3>
                        <span className="text-[10px] uppercase tracking-[0.14em] text-faint">{s.hint}</span>
                      </div>
                      <p className="text-[11px] text-muted mt-0.5 leading-snug">
                        {s.key === 'current' && '부드러운 파스텔톤 · 둥근 도형'}
                        {s.key === 'stickman' && '얇은 검정선 · 흰 배경'}
                        {s.key === 'disney' && '3D 카툰 · 부드러운 색감'}
                        {s.key === 'webtoon' && '한국 웹툰 라인아트'}
                        {s.key === 'chimchak' && '굵은 검정선 · 코믹'}
                      </p>
                    </div>
                    {isSelected && (
                      <div className="w-6 h-6 rounded-full bg-ink text-cream flex items-center justify-center flex-shrink-0">
                        <Icon.check size={14} />
                      </div>
                    )}
                  </div>
                </button>
              );
            })}
          </div>

          <div className="px-3 py-2 rounded-lg border border-hairline text-[11px] text-muted leading-relaxed">
            ⓘ 디즈니/웹툰/침착맨 스타일은 AI 이미지 — 처음 한 번 생성 후 캐시됩니다. 이미지가 안 보이면 곧 준비될 거예요.
          </div>
        </div>
      );
    }

    // ========================================
    // Page — PreviewStep
    //   진짜 오디오 재생 + 시간 동기화 + 화자별 캐릭터 talking 애니메이션
    // ========================================
    function PreviewStep({ jobId, segments, roleMapping, setRoleMapping, segmentRoleOverrides, setSegmentRoleOverrides, characterStyle, editedSegments, setEditedSegments }) {
      const audioRef = useRef(null);
      const [editingId, setEditingId] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [audioError, setAudioError] = useState("");

      const getText = (s) => editedSegments[s.id] !== undefined ? editedSegments[s.id] : s.text;
      // 우선순위: segment override → speaker mapping
      const getRoleForSegment = (s) => segmentRoleOverrides[s.id] || roleMapping[s.speaker];
      const getRoleForSpeaker = (sp) => roleMapping[sp];

      // 한 segment의 역할만 변경 (다른 segment에 영향 없음)
      const setSegmentRole = (segmentId, roleKey) => {
        setSegmentRoleOverrides({ ...segmentRoleOverrides, [segmentId]: roleKey });
      };
      // 오버라이드 해제 — speaker 기본값으로 복귀
      const clearSegmentRole = (segmentId) => {
        const next = { ...segmentRoleOverrides };
        delete next[segmentId];
        setSegmentRoleOverrides(next);
      };

      const onTextChange = (id, val) => {
        setEditedSegments({ ...editedSegments, [id]: val });
      };

      // 현재 재생 시간에 해당하는 segment 찾기
      const currentSegment = useMemo(() => {
        if (!segments.length) return null;
        const found = segments.find((s) => currentTime >= s.start && currentTime < s.end);
        if (found) return found;
        // 갭 구간일 땐 가장 가까운 직전 segment 유지 (캐릭터가 사라졌다 나타나는 깜빡임 방지)
        const prev = [...segments].reverse().find((s) => s.end <= currentTime);
        return prev || null;
      }, [segments, currentTime]);

      // segment.end 직후 0.4초 버퍼 — 마지막 음절·자막이 뚝 끊기지 않게 (잔향 자연스러움)
      const speakingNow = useMemo(() => {
        if (!currentSegment) return false;
        return isPlaying && currentTime >= currentSegment.start && currentTime < currentSegment.end + 0.4;
      }, [currentSegment, isPlaying, currentTime]);

      // 오디오 이벤트 바인딩
      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        const onTime = () => setCurrentTime(audio.currentTime);
        const onLoaded = () => { setDuration(audio.duration || 0); setAudioError(""); };
        const onPlay = () => setIsPlaying(true);
        const onPause = () => setIsPlaying(false);
        const onEnded = () => setIsPlaying(false);
        const onErr = () => setAudioError("오디오를 불러오지 못했습니다. 다시 분석을 시도해주세요.");
        audio.addEventListener('timeupdate', onTime);
        audio.addEventListener('loadedmetadata', onLoaded);
        audio.addEventListener('play', onPlay);
        audio.addEventListener('pause', onPause);
        audio.addEventListener('ended', onEnded);
        audio.addEventListener('error', onErr);
        return () => {
          audio.removeEventListener('timeupdate', onTime);
          audio.removeEventListener('loadedmetadata', onLoaded);
          audio.removeEventListener('play', onPlay);
          audio.removeEventListener('pause', onPause);
          audio.removeEventListener('ended', onEnded);
          audio.removeEventListener('error', onErr);
        };
      }, []);

      const togglePlay = () => {
        const audio = audioRef.current;
        if (!audio) return;
        if (audio.paused) {
          audio.play().catch((err) => setAudioError(`재생 오류: ${err.message}`));
        } else {
          audio.pause();
        }
      };

      const seekTo = (sec) => {
        const audio = audioRef.current;
        if (!audio) return;
        audio.currentTime = Math.max(0, Math.min(audio.duration || sec, sec));
      };

      // 현재 segment에 매칭된 역할
      const currentRoleKey = currentSegment ? getRoleForSegment(currentSegment) : null;
      const currentText = currentSegment ? getText(currentSegment) : "";

      // 등장 인물 (역할 기준) — segment 오버라이드 포함, dad → mom → baby 순서
      const uniqueRoles = useMemo(() => {
        const present = new Set();
        for (const s of segments) {
          const r = segmentRoleOverrides[s.id] || roleMapping[s.speaker];
          if (r) present.add(r);
        }
        return ROLES.map(r => r.key).filter(k => present.has(k));
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [segments, segmentRoleOverrides, roleMapping]);
      const totalDur = duration || segments.reduce((m, s) => Math.max(m, s.end), 0) || 0;
      const progressPct = totalDur > 0 ? Math.min(100, (currentTime / totalDur) * 100) : 0;

      return (
        <div className="px-6 py-7 space-y-5 anim-fade-in">
          <div className="space-y-1.5">
            <div className="text-[10px] uppercase tracking-[0.18em] text-accent num">04 — Preview</div>
            <h2 className="font-serif text-[26px] leading-[1.15] text-ink">
              미리 보고<br/>다듬어보세요.
            </h2>
          </div>

          {/* Preview surface — 9:16 (Reels/Shorts 공통) + 안전영역 */}
          <Card className="!p-0 overflow-hidden">
            <div
              className="relative bg-cream border-b border-hairline overflow-hidden mx-auto"
              style={{ aspectRatio: '9 / 16', maxWidth: 360 }}
            >
              {/* 배경 톤 */}
              <div className="absolute inset-0 bg-gradient-to-b from-[#FDF8F1] to-[#F2E5D6]" />

              {/* 안전영역 가이드 — Reels(상단 ~14%/하단 ~22%) + Shorts 공통 */}
              {/* 상단 unsafe (작가/아이콘 영역) */}
              <div className="absolute inset-x-0 top-0 h-[14%] bg-ink/[0.025] border-b border-dashed border-ink/10 pointer-events-none flex items-center justify-center">
                <span className="text-[8px] uppercase tracking-[0.18em] text-ink/30 num">UNSAFE — top</span>
              </div>
              {/* 하단 unsafe (좋아요/공유/캡션 영역) */}
              <div className="absolute inset-x-0 bottom-0 h-[22%] bg-ink/[0.025] border-t border-dashed border-ink/10 pointer-events-none flex items-center justify-center">
                <span className="text-[8px] uppercase tracking-[0.18em] text-ink/30 num">UNSAFE — bottom</span>
              </div>

              {/* 안전영역 내부 — N분할 (좌/우 교차) */}
              <div className="absolute left-[4%] right-[4%] top-[14%] bottom-[22%] flex flex-col gap-2">
                {uniqueRoles.length === 0 ? (
                  <div className="flex-1 flex flex-col items-center justify-center text-faint">
                    <div className="w-12 h-12 mb-2 rounded-full border border-hairline flex items-center justify-center text-ink/40 bg-paper/70">
                      <Icon.play size={18} />
                    </div>
                    <div className="text-[11px] uppercase tracking-[0.16em]">재생을 눌러 미리보기</div>
                  </div>
                ) : (
                  uniqueRoles.map((roleKey, idx) => {
                    const isSpeaking = currentRoleKey === roleKey && speakingNow;
                    const roleLabel = ROLES.find(r => r.key === roleKey)?.kr || roleKey;
                    // 짝수 index = 캐릭터 왼쪽 / 말풍선 오른쪽, 홀수 = 반대
                    const avatarOnLeft = idx % 2 === 0;
                    const timedChunks = isSpeaking && currentSegment
                      ? buildTimedChunks(currentSegment, getText(currentSegment))
                      : [];
                    const activeChunk = isSpeaking ? findActiveChunk(timedChunks, currentTime) : '';
                    return (
                      <div
                        key={roleKey}
                        className={`flex-1 min-h-0 flex items-center gap-2 ${avatarOnLeft ? '' : 'flex-row-reverse'}`}
                      >
                        {/* 캐릭터 — 정사각형 비율 유지하면서 패널의 짧은 변에 맞춰 채우기 */}
                        <div
                          className={`relative transition-opacity ${currentRoleKey && currentRoleKey !== roleKey ? 'opacity-60' : ''}`}
                          style={{
                            height: '100%',
                            aspectRatio: '1 / 1',
                            maxWidth: uniqueRoles.length === 1 ? '70%' : '48%',
                            flexShrink: 0
                          }}
                        >
                          <Avatar
                            role={roleKey}
                            style={characterStyle}
                            talking={isSpeaking}
                            idle={!isSpeaking}
                            fill={true}
                          />
                          {/* role 라벨 */}
                          <span className={`absolute top-1 ${avatarOnLeft ? 'left-1' : 'right-1'} px-1.5 py-0.5 rounded text-[9px] uppercase tracking-[0.14em] z-10 ${
                            isSpeaking ? 'bg-ink text-cream' : 'bg-paper/80 text-ink/60 border border-hairline'
                          }`}>
                            {roleLabel}
                          </span>
                        </div>

                        {/* 말풍선 자리 — 말하고 있을 때만 등장 */}
                        <div className="flex-1 min-w-0 h-full flex items-center justify-center">
                          {activeChunk && (
                            <div className={`bubble-cute ${avatarOnLeft ? 'tail-left' : 'tail-right'}`} key={activeChunk}>
                              {activeChunk}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })
                )}
              </div>

              {/* 비율 가이드 — 우상단 */}
              <div className="absolute top-1 right-1 px-1.5 py-0.5 rounded text-[8px] uppercase tracking-[0.14em] text-ink/30 num bg-paper/60">
                9:16
              </div>
            </div>

            {/* 진행 바 — 클릭으로 seek */}
            <div className="px-4 pt-3">
              <div
                className="relative h-1.5 w-full rounded-full bg-hairline overflow-hidden cursor-pointer"
                onClick={(e) => {
                  const rect = e.currentTarget.getBoundingClientRect();
                  const ratio = (e.clientX - rect.left) / rect.width;
                  seekTo(ratio * totalDur);
                }}
              >
                <div className="absolute top-0 left-0 h-full bg-accent transition-[width] duration-100" style={{ width: `${progressPct}%` }} />
              </div>
              <div className="flex justify-between mt-1.5 text-[10px] num text-faint">
                <span>{fmtTime(currentTime)}</span>
                <span>{fmtTime(totalDur)}</span>
              </div>
            </div>

            <div className="p-4 flex items-center justify-between gap-3">
              <Button variant={isPlaying ? "secondary" : "primary"} size="md" onClick={togglePlay} disabled={!jobId}>
                {isPlaying ? <><Icon.pause /> 일시정지</> : <><Icon.play /> 재생</>}
              </Button>
              <span className="text-[10px] uppercase tracking-[0.14em] text-faint text-right">실제 합성은 다음 단계에서</span>
            </div>

            {audioError && (
              <div className="px-4 pb-3 text-[11px] text-[#7A3A28]">{audioError}</div>
            )}

            {/* 숨겨진 video element — .mov / .mp4 / .m4a / .mp3 모두 지원 */}
            {jobId && (
              <video
                ref={audioRef}
                src={`/api/jobs/${jobId}/audio`}
                preload="auto"
                playsInline
                style={{ display: 'none' }}
              />
            )}
          </Card>

          {/* 자막 리스트 */}
          <div>
            <div className="flex items-baseline justify-between mb-1 px-1">
              <h3 className="text-[13px] font-medium text-ink">자막</h3>
              <span className="text-[11px] text-faint">탭하면 자막 편집</span>
            </div>
            <p className="text-[11px] text-muted px-1 mb-3 leading-relaxed">
              라벨은 <span className="text-ink/80">한 발화씩 개별 변경</span>됩니다 — 같은 화자의 다른 발화엔 영향 없음. 변경된 발화엔 <span className="text-accent">↺ 복원</span> 버튼이 생겨요.
            </p>
            <div className="bg-paper border border-hairline rounded-xl divide-y divide-hairline">
              {segments.map((s) => {
                const isEditing = editingId === s.id;
                const sp = SPEAKER_COLORS[s.speaker] || SPEAKER_COLORS.C;
                const role = getRoleForSegment(s);
                const speakerDefaultRole = roleMapping[s.speaker];
                const isOverridden = segmentRoleOverrides[s.id] !== undefined;
                const isBaby = role === "baby";
                const isCurrent = currentSegment && currentSegment.id === s.id;
                return (
                  <div key={s.id} className={`px-4 py-3.5 transition-colors ${isCurrent ? 'bg-accentSoft/30' : ''}`}>
                    <div className="flex items-center gap-2 mb-2">
                      <span className={`w-1.5 h-1.5 rounded-full ${sp.dot}`} />
                      <span className="text-[10px] uppercase tracking-[0.14em] text-faint">사람 {s.speaker}</span>
                      {isOverridden && (
                        <button
                          type="button"
                          onClick={() => clearSegmentRole(s.id)}
                          className="text-[10px] px-1.5 py-0.5 rounded border border-accent/40 text-accent hover:bg-accent/10 transition"
                          title="이 발화 라벨을 기본값으로 복원"
                        >
                          ↺ 복원
                        </button>
                      )}
                      <button
                        type="button"
                        onClick={() => seekTo(s.start)}
                        className="text-[10px] text-faint num ml-auto hover:text-ink transition"
                        title="이 구간으로 이동"
                      >
                        ▸ {fmtTime(s.start)} — {fmtTime(s.end)}
                      </button>
                    </div>

                    {/* 역할 인라인 선택 — 이 발화 한 개만 변경 (다른 segment 영향 없음) */}
                    <div className="flex gap-1 mb-2">
                      {ROLES.map((r) => {
                        const selected = role === r.key;
                        const isSpeakerDefault = speakerDefaultRole === r.key && !isOverridden;
                        return (
                          <button
                            key={r.key}
                            type="button"
                            onClick={() => setSegmentRole(s.id, r.key)}
                            className={`text-[11px] px-2.5 py-1 rounded-full border transition
                              ${selected
                                ? (isOverridden
                                    ? 'bg-accent text-cream border-accent'
                                    : 'bg-ink text-cream border-ink')
                                : 'bg-paper text-ink/60 border-hairline hover:border-ink/40'}`}
                            title={isSpeakerDefault ? `사람 ${s.speaker} 기본값` : `이 발화만 ${r.kr}로`}
                          >
                            {r.kr}
                          </button>
                        );
                      })}
                    </div>

                    {isEditing ? (
                      <input
                        type="text"
                        autoFocus
                        value={getText(s)}
                        onChange={(e) => onTextChange(s.id, e.target.value)}
                        onBlur={() => setEditingId(null)}
                        onKeyDown={(e) => { if (e.key === "Enter") setEditingId(null); }}
                        className="w-full pb-1 text-[14px] text-ink bg-transparent border-b border-accent focus:outline-none"
                      />
                    ) : (
                      <button
                        type="button"
                        onClick={() => setEditingId(s.id)}
                        className="block w-full text-left text-[14px] text-ink leading-relaxed editable transition pb-px"
                      >
                        {getText(s)}
                      </button>
                    )}
                    {isBaby && (
                      <div className="mt-2.5 flex flex-wrap items-center gap-1.5">
                        <span className="text-[10px] uppercase tracking-[0.14em] text-faint mr-1">의성어</span>
                        {BABY_ONOMATOPOEIA.slice(0, 4).map((w) => (
                          <button
                            key={w}
                            type="button"
                            onClick={() => onTextChange(s.id, w)}
                            className="text-[11px] px-2 py-0.5 rounded-full border border-hairline text-ink/70 hover:bg-ink hover:text-cream hover:border-ink transition"
                          >
                            {w}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Page — ExportStep
    // ========================================
    function ExportStep() {
      const [progress, setProgress] = useState(0);
      const [rendering, setRendering] = useState(false);
      const [done, setDone] = useState(false);

      const startRender = useCallback(() => {
        setRendering(true);
        setProgress(0);
        setDone(false);
        const iv = setInterval(() => {
          setProgress((p) => {
            if (p >= 100) {
              clearInterval(iv);
              setRendering(false);
              setDone(true);
              return 100;
            }
            return p + 5;
          });
        }, 150);
      }, []);

      return (
        <div className="px-6 py-7 space-y-5 anim-fade-in">
          <div className="space-y-1.5">
            <div className="text-[10px] uppercase tracking-[0.18em] text-accent num">05 — Export</div>
            <h2 className="font-serif text-[26px] leading-[1.15] text-ink">
              완성된 영상을<br/>받아가세요.
            </h2>
            <p className="text-[13px] text-muted leading-relaxed pt-1">
              MP4로 저장하거나 SNS로 바로 공유할 수 있습니다.
            </p>
          </div>

          {/* 합성 영역 */}
          <Card>
            {!rendering && !done && (
              <Button variant="accent" size="lg" className="w-full" onClick={startRender}>
                영상 합성 시작 <Icon.arrowRight />
              </Button>
            )}
            {rendering && (
              <div className="space-y-3">
                <div className="flex items-baseline justify-between">
                  <span className="text-[11px] uppercase tracking-[0.14em] text-muted">Rendering</span>
                  <span className="text-[12px] num text-ink">{progress}%</span>
                </div>
                <div className="h-1 w-full bg-hairline rounded-full overflow-hidden">
                  <div
                    className="h-full bg-ink transition-all duration-200"
                    style={{ width: `${progress}%` }}
                  />
                </div>
                <p className="text-[11px] text-muted">
                  카툰 캐릭터와 자막을 입히는 중입니다.
                </p>
              </div>
            )}
            {done && (
              <div className="space-y-3">
                <div className="flex items-baseline justify-between">
                  <span className="text-[11px] uppercase tracking-[0.14em] text-accent">Complete</span>
                  <span className="text-[12px] num text-ink">100%</span>
                </div>
                <div className="h-1 w-full bg-hairline rounded-full overflow-hidden">
                  <div className="h-full bg-accent" style={{ width: '100%' }} />
                </div>
                <p className="text-[11px] text-muted">
                  합성이 완료되었습니다. 아래에서 받아가세요.
                </p>
              </div>
            )}
          </Card>

          {/* Actions */}
          <div className="space-y-2.5">
            <Button
              variant="primary"
              size="lg"
              disabled={!done}
              className="w-full"
              onClick={() => {/* Day 5 다운로드 */}}
            >
              <Icon.download /> MP4 다운로드
            </Button>
            <Button
              variant="secondary"
              size="lg"
              disabled={!done}
              className="w-full"
              onClick={() => {/* Day 6 Web Share */}}
            >
              <Icon.share /> 공유하기
            </Button>
            <Button
              variant="ghost"
              size="lg"
              disabled
              className="w-full"
            >
              유튜브 업로드 (준비 중)
            </Button>
          </div>

          {/* 자동 삭제 안내 — 조용히 */}
          <div className="flex items-start gap-2 px-1 pt-2 text-[11px] text-muted leading-relaxed">
            <Icon.clock size={13} className="mt-0.5 shrink-0" />
            <span>업로드 원본과 결과물 모두 1시간 후 자동 삭제됩니다.</span>
          </div>
        </div>
      );
    }

    // ========================================
    // App — 루트 컴포넌트
    // ========================================
    function App() {
      const [step, setStep] = useState(1);

      const [file, setFile] = useState(null);
      const [fileName, setFileName] = useState("");
      const [consent, setConsent] = useState(false);
      const [roleMapping, setRoleMapping] = useState({});
      const [characterStyle, setCharacterStyle] = useState("current");
      const [editedSegments, setEditedSegments] = useState({});
      // per-segment 역할 오버라이드 — AssemblyAI 발화자 구분이 틀린 segment 개별 정정
      const [segmentRoleOverrides, setSegmentRoleOverrides] = useState({});

      // Day 2-6: 실제 백엔드 연동 상태
      const [segments, setSegments] = useState([]);
      const [jobId, setJobId] = useState(null);
      const [loading, setLoading] = useState(false);
      const [loadingPhase, setLoadingPhase] = useState("");
      const [errorMsg, setErrorMsg] = useState("");
      const [transcriptMeta, setTranscriptMeta] = useState(null); // { speakerCount, audioDurationSec, confidence }

      // Day 3: 매핑 저장 진행 상태
      const [saving, setSaving] = useState(false);

      const canAdvance = useMemo(() => {
        if (step === 1) return segments.length > 0;
        if (step === 2) {
          const usedSpeakers = SPEAKER_KEYS.filter(
            (k) => segments.some((s) => s.speaker === k)
          );
          const allMapped = usedSpeakers.every((k) => !!roleMapping[k]);
          const used = usedSpeakers.map((k) => roleMapping[k]).filter(Boolean);
          const noDup = used.length === new Set(used).size;
          return allMapped && noDup;
        }
        if (step === 3) {
          // 스타일은 항상 기본값이 있으므로 추가 검증 없이 통과
          return !!characterStyle;
        }
        return true;
      }, [step, segments, roleMapping, characterStyle]);

      const handleAnalyze = useCallback(async () => {
        if (!file || !consent) return;
        setLoading(true);
        setErrorMsg("");
        try {
          // 1) 업로드
          setLoadingPhase("업로드 중...");
          const fd = new FormData();
          fd.append("file", file);
          const upRes = await fetch("/api/upload", { method: "POST", body: fd });
          const upJson = await upRes.json().catch(() => ({}));
          if (!upRes.ok || !upJson.success) {
            throw new Error(upJson.message || `업로드 실패 (HTTP ${upRes.status})`);
          }
          const newJobId = upJson.data.jobId;
          setJobId(newJobId);

          // 2) AssemblyAI 발화자 구분
          setLoadingPhase("발화자 분석 중... (최대 2분)");
          const trRes = await fetch("/api/transcribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ jobId: newJobId }),
          });
          const trJson = await trRes.json().catch(() => ({}));
          if (!trRes.ok || !trJson.success) {
            throw new Error(trJson.message || `발화자 구분 실패 (HTTP ${trRes.status})`);
          }
          const segs = Array.isArray(trJson.data.segments) ? trJson.data.segments : [];
          if (segs.length === 0) {
            throw new Error("발화자가 감지되지 않았습니다. 더 또렷하게 녹음된 파일로 다시 시도해주세요.");
          }
          setSegments(segs);
          setTranscriptMeta({
            speakerCount: trJson.data.speakerCount ?? null,
            audioDurationSec: trJson.data.audioDurationSec ?? null,
            confidence: trJson.data.confidence ?? null,
          });
          setStep(2);
        } catch (err) {
          console.error("[handleAnalyze]", err);
          setErrorMsg(err.message || "분석 중 오류가 발생했습니다. 다시 시도해주세요.");
        } finally {
          setLoading(false);
          setLoadingPhase("");
        }
      }, [file, consent]);

      const onPrev = (reset = false) => {
        if (reset === true) {
          setStep(1);
          setSegments([]);
          setJobId(null);
          setFile(null);
          setFileName("");
          setConsent(false);
          setEditedSegments({});
          setSegmentRoleOverrides({});
          setErrorMsg("");
          setTranscriptMeta(null);
          return;
        }
        setErrorMsg("");
        setStep((s) => Math.max(1, s - 1));
      };
      // step 2 → 3 (roleMapping), step 3 → 4 (characterMapping),
      // step 4 → 5 (프리뷰에서 라벨 바꾼 경우 roleMapping 재저장)
      const handleNext = useCallback(async () => {
        if (jobId && (step === 2 || step === 3 || step === 4)) {
          setSaving(true);
          setErrorMsg("");
          try {
            let body;
            if (step === 2) body = { roleMapping };
            else if (step === 3) body = { characterStyle };
            else body = { roleMapping }; // step 4 → 5
            const res = await fetch(`/api/jobs/${jobId}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            const json = await res.json().catch(() => ({}));
            if (!res.ok || !json.success) {
              throw new Error(json.message || `저장 실패 (HTTP ${res.status})`);
            }
          } catch (err) {
            console.error("[handleNext]", err);
            setErrorMsg(err.message || "저장 중 오류가 발생했습니다.");
            setSaving(false);
            return;
          }
          setSaving(false);
        }
        setStep((s) => Math.min(STEPS.length, s + 1));
      }, [step, jobId, roleMapping, characterStyle]);
      const onStepClick = (n) => {
        // 1단계는 항상 갈 수 있고, 그 외 단계는 segments가 있어야 갈 수 있음
        if (n > 1 && segments.length === 0) return;
        setStep(n);
      };

      const nextLabel =
        step === 1 ? "분석 단계로" :
        step === 2 ? "캐릭터 고르기" :
        step === 3 ? "미리보기" :
        step === 4 ? "내보내기" : "다음";

      return (
        <div className="min-h-screen w-full flex justify-center bg-cream">
          <div className="w-full max-w-md bg-cream min-h-screen flex flex-col">
            <Header currentStep={step} />
            <StepNav currentStep={step} onStepClick={onStepClick} />

            <main className="flex-1">
              {step === 1 && (
                <UploadStep
                  fileName={fileName}
                  setFileName={setFileName}
                  setFile={setFile}
                  consent={consent}
                  setConsent={setConsent}
                  loading={loading}
                  loadingPhase={loadingPhase}
                  errorMsg={errorMsg}
                  onAnalyze={handleAnalyze}
                />
              )}
              {step === 2 && (
                <LabelStep
                  segments={segments}
                  roleMapping={roleMapping}
                  setRoleMapping={setRoleMapping}
                  transcriptMeta={transcriptMeta}
                />
              )}
              {step === 3 && (
                <CharacterStep
                  roleMapping={roleMapping}
                  characterStyle={characterStyle}
                  setCharacterStyle={setCharacterStyle}
                />
              )}
              {step === 4 && (
                <PreviewStep
                  jobId={jobId}
                  segments={segments}
                  roleMapping={roleMapping}
                  setRoleMapping={setRoleMapping}
                  segmentRoleOverrides={segmentRoleOverrides}
                  setSegmentRoleOverrides={setSegmentRoleOverrides}
                  characterStyle={characterStyle}
                  editedSegments={editedSegments}
                  setEditedSegments={setEditedSegments}
                />
              )}
              {step === 5 && <ExportStep />}
            </main>

            {/* Day 3: step 2/3 저장 에러 배너 */}
            {step > 1 && errorMsg && (
              <div className="mx-6 mb-3 px-4 py-3 rounded-lg border border-accent/40 bg-accentSoft/40 text-[12px] text-[#7A3A28]">
                {errorMsg}
              </div>
            )}

            <StepFooter
              currentStep={step}
              onPrev={onPrev}
              onNext={handleNext}
              nextLabel={saving ? "저장 중..." : nextLabel}
              nextDisabled={!canAdvance || saving}
            />

            {/* 푸터 — 절제된 사인 */}
            <div className="text-center pb-5 pt-2 text-[10px] uppercase tracking-[0.18em] text-faint">
              Soft Studio · Prototype v1
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
