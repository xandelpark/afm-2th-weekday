    tailwind.config = {

            ring: 'hsl(var(--ring))',

            foreground: 'hsl(var(--foreground))',

            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },

  <style>
    /* ==== Marian Editorial palette ==== */
    :root {
      --background: 0 0% 100%;
      --foreground: 0 0% 13%;
      --card: 0 0% 100%;
      --card-foreground: 0 0% 13%;
      --popover: 0 0% 100%;

    /* 키치 폴라로이드 — 흰 보더 + 부드러운 그림자 */

      background: #fbf6ec;

    /* 손글씨 hero "thank you" */
    .font-script { font-family: 'Allura', 'Great Vibes', cursive; font-weight: 400; }
    /* 손글씨 휘갈김 (키치용) */

    .font-marker    { font-family: 'Permanent Marker', 'Caveat', cursive; font-weight: 400; }
    .font-kalam     { font-family: 'Kalam', 'Caveat', cursive; font-weight: 700; }
    /* 크레파스/마커 거친 질감 — text-shadow 다중 스택 + SVG turbulence */
    .crayon-text {
      filter: url('#crayonFilter');

      filter: url('#crayonSoftFilter');

    /* 형광 네온 강조 — 핫핑크 박스에 살짝 글로우 */

    .vrl-up.has-em-space { word-spacing: 0.15em; }

    /* === 모바일 터치 최적화 === */
    /* 텍스트 블록·핸들에 touch-action: none → 드래그가 페이지 스크롤로 새지 않게 */
    [data-textblock] { touch-action: none; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
    [data-textblock] [data-resize-handle] { touch-action: none; }
    /* 포스터 surface 안 사진/배경 영역 클릭으로 선택 해제 시에도 터치 동작 안전 */
    .poster-surface { touch-action: pan-y; -webkit-tap-highlight-color: transparent; }
    /* iOS 사파리 자동 줌 방지 — 입력 폰트 16px 이상 권장 */
    input[type='text'], input[type='email'], input[type='password'], input[type='date'], input[type='number'], textarea, select {
      font-size: 16px;
    }
    /* 큰 화면에선 다시 축소 */
    @media (min-width: 640px) {
      input[type='text'], input[type='email'], input[type='password'], input[type='date'], input[type='number'], textarea, select {
        font-size: inherit;
      }
    }
    /* 슬라이더 — 손가락 친화 트랙/엄지 */
    input[type='range'] { height: 28px; -webkit-appearance: none; appearance: none; background: transparent; }
    input[type='range']::-webkit-slider-runnable-track { height: 4px; background: hsl(var(--border)); border-radius: 2px; }
    input[type='range']::-moz-range-track            { height: 4px; background: hsl(var(--border)); border-radius: 2px; }
    input[type='range']::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; height: 18px; width: 18px; border-radius: 9999px; background: hsl(var(--primary)); margin-top: -7px; border: 2px solid hsl(var(--background)); box-shadow: 0 1px 2px rgba(0,0,0,0.15); }
    input[type='range']::-moz-range-thumb     { height: 18px; width: 18px; border-radius: 9999px; background: hsl(var(--primary)); border: 2px solid hsl(var(--background)); }
    input[type='range']:disabled { opacity: 0.4; }

    /* iPhone safe-area */
    .safe-bottom { padding-bottom: max(env(safe-area-inset-bottom), 0px); }
  </style>
</head>
<body class="bg-background text-foreground">
  <!-- 키치 카드용 SVG turbulence filter (크레파스/마커 거친 질감) -->
  <svg style="position:absolute;width:0;height:0;overflow:hidden" aria-hidden="true">
    <defs>
      <filter id="crayonFilter" x="-8%" y="-8%" width="116%" height="116%">
        <feTurbulence type="fractalNoise" baseFrequency="0.78" numOctaves="2" seed="7" />
        <feDisplacementMap in="SourceGraphic" scale="1.6" />
      </filter>
      <filter id="crayonSoftFilter" x="-6%" y="-6%" width="112%" height="112%">
        <feTurbulence type="fractalNoise" baseFrequency="0.55" numOctaves="2" seed="3" />
        <feDisplacementMap in="SourceGraphic" scale="0.9" />
      </filter>
    </defs>
  </svg>
  <div id="root"></div>
  <script>
    // 임시 디버그 — viewport 폭과 scrollWidth 화면에 표시 (캡쳐 후 제거 예정)
    if (location.search.includes('debug=1')) {
      window.addEventListener('load', () => {
        setTimeout(() => {
          const w = window.innerWidth;
          const sw = document.documentElement.scrollWidth;
          const tag = document.createElement('div');
          tag.style.cssText = 'position:fixed;top:0;left:0;z-index:9999;background:#ff0066;color:white;padding:4px 8px;font:12px/1.2 monospace';
          tag.textContent = `vp:${w} sw:${sw} diff:${sw - w}`;
          document.body.appendChild(tag);
          // 가장 wide한 자식 element 찾기
          let widest = null, widestRight = 0;
          document.querySelectorAll('*').forEach(el => {
            const r = el.getBoundingClientRect();
            if (r.right > widestRight && r.width > 1) { widestRight = r.right; widest = el; }
          });
          if (widest && widestRight > w) {
            const tag2 = document.createElement('div');
            tag2.style.cssText = 'position:fixed;top:24px;left:0;z-index:9999;background:#0066ff;color:white;padding:4px 8px;font:11px/1.2 monospace;max-width:90vw';
            tag2.textContent = `widest right:${widestRight.toFixed(0)} <${widest.tagName}.${(widest.className||'').toString().slice(0,40)}>`;
            document.body.appendChild(tag2);
          }
        }, 800);
      });
    }
  </script>

  <script type="text/babel">
    // ========================================
    // React Hooks
    // ========================================
    const { useState, useMemo, useRef, useEffect, useContext, createContext } = React;
    const cn = (...c) => c.filter(Boolean).join(' ');

    // 캔바형 스냅 가이드 — surface가 자식 TextBlock의 드래그를 listen하고 가이드 라인을 그림
    const SurfaceContext = createContext(null);
    const SessionContext = createContext({ session: null, logout: () => {} });

    // ========================================
    // 🔐 Auth & Storage — Supabase (signups 테이블) + 세션은 localStorage
    // ========================================
    const SUPABASE_URL = 'https://bgczrwripgsqtayrsgak.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_IyknkL-H4SK-hDDBWDg4fQ_9EAA0uw7';
    const supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const STORAGE = { session: 'marian.session' };
    const ADMIN_ID = 'marian';
    const ADMIN_PW = 'marian2026';
    const PHOTO_QUOTA = 5;

    // DB(snake_case) ↔ JS(camelCase) 매핑
    function fromDB(r) {
      if (!r) return r;
      return {
        id: r.id, name: r.name, weddingDate: r.wedding_date, phone4: r.phone4,
        status: r.status, photoCount: r.photo_count || 0,
        appliedAt: r.applied_at, approvedAt: r.approved_at,
      };
    }
    function toDB(o) {
      const out = {};
      if ('name'        in o) out.name         = o.name;
      if ('weddingDate' in o) out.wedding_date = o.weddingDate;
      if ('phone4'      in o) out.phone4       = o.phone4;
      if ('status'      in o) out.status       = o.status;
      if ('photoCount'  in o) out.photo_count  = o.photoCount;
      if ('approvedAt'  in o) out.approved_at  = o.approvedAt;
      return out;
    }

    // 세션은 디바이스별이라 localStorage 유지
    function readSession() {
      try { return JSON.parse(localStorage.getItem(STORAGE.session) || 'null'); } catch { return null; }
    }
    function writeSession(s) {
      try {
        if (s) localStorage.setItem(STORAGE.session, JSON.stringify(s));
        else   localStorage.removeItem(STORAGE.session);
      } catch {}
    }

    // Supabase signups CRUD
    async function readSignups() {
      const { data, error } = await supa.from('signups').select('*').order('applied_at', { ascending: false });
      if (error) { console.error('readSignups', error); return []; }
      return (data || []).map(fromDB);
    }
    async function insertSignup(record) {
      const { data, error } = await supa.from('signups').insert(toDB(record)).select().single();
      if (error) throw error;
      return fromDB(data);
    }
    async function updateSignup(id, patch) {
      const { data, error } = await supa.from('signups').update(toDB(patch)).eq('id', id).select().single();
      if (error) throw error;
      return fromDB(data);
    }
    async function deleteSignup(id) {
      const { error } = await supa.from('signups').delete().eq('id', id);
      if (error) throw error;
    }
    async function findSignupByLogin(name, weddingDate) {
      const { data, error } = await supa.from('signups').select('*')
        .eq('name', name).eq('wedding_date', weddingDate).maybeSingle();
      if (error) { console.error('findSignupByLogin', error); return null; }
      return fromDB(data);
    }
    async function getUserPhotoCount(userId) {
      const { data, error } = await supa.from('signups').select('photo_count').eq('id', userId).maybeSingle();
      if (error || !data) return 0;
      return data.photo_count || 0;
    }
    // 카드 비율을 viewport에 무관하게 유지하기 위한 scale wrapper.
    // 자식 카드는 항상 baseWidth × (baseWidth/ratio) 사이즈로 렌더하고, 외부 wrapper의
    // 실제 폭에 맞춰 transform: scale로 축소·확대한다. ResizeObserver로 wrapper 폭 추적.
    function ScaledPoster({ className = '', baseWidth = 480, ratio = 4/5, children }) {
      const wrapRef = useRef(null);
      const [scale, setScale] = useState(1);
      useEffect(() => {
        const el = wrapRef.current;
        if (!el) return;
        const update = () => {
          const w = el.offsetWidth || 0;
          setScale(w / baseWidth);
        };
        update();
        const ro = new ResizeObserver(update);
        ro.observe(el);
        return () => ro.disconnect();
      }, [baseWidth]);
      const baseHeight = baseWidth / ratio;
      return (
        <div ref={wrapRef} className={cn('relative overflow-hidden', className)} style={{ aspectRatio: `${ratio}` }}>
          <div style={{ width: `${baseWidth}px`, height: `${baseHeight}px`, transformOrigin: 'top left', transform: `scale(${scale})` }}>
            {children}
          </div>
        </div>
      );
    }
    function PosterSurface({ className = '', children }) {
      const surfaceRef = useRef(null);
      const [guides, setGuides] = useState([]);
      return (
        <SurfaceContext.Provider value={{ surfaceRef, setGuides }}>
          <div ref={surfaceRef} className={cn('h-full w-full relative overflow-hidden poster-surface', className)}>
            {children}
            {guides.length > 0 && (
              <div className="pointer-events-none absolute inset-0 z-50">
                {guides.map((g, i) => g.type === 'v'
                  ? <div key={i} className="absolute top-0 bottom-0" style={{ left: g.pos, borderLeft: '1px dashed #ec4899' }} />
                  : <div key={i} className="absolute left-0 right-0" style={{ top: g.pos, borderTop: '1px dashed #ec4899' }} />
                )}
              </div>
            )}
          </div>
        </SurfaceContext.Provider>
      );
    }

    // ========================================
    // 🎨 Design System (shadcn 토큰 기반 — components.md 규약)
    // ========================================
    function Button({ variant = 'default', size = 'default', className = '', ...p }) {
      const base = 'inline-flex items-center justify-center gap-2 whitespace-nowrap text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50';
      const variants = {
        default:     'bg-primary text-primary-foreground hover:bg-primary/90 tracking-wider uppercase',
        destructive: 'bg-destructive text-destructive-foreground hover:bg-destructive/90 tracking-wider uppercase',
        outline:     'border border-foreground/30 bg-transparent text-foreground hover:bg-primary hover:border-primary hover:text-primary-foreground tracking-wider uppercase',
        secondary:   'bg-secondary text-secondary-foreground hover:bg-secondary/80 tracking-wider uppercase',
        ghost:       'text-foreground hover:bg-secondary',
        link:        'text-primary underline-offset-4 hover:underline',
      };
      const sizes = { default: 'h-11 px-6', sm: 'h-9 px-4 text-xs', lg: 'h-14 px-10 text-sm', icon: 'h-10 w-10' };
      return <button className={cn(base, variants[variant], sizes[size], className)} {...p} />;
    }
    function Input({ className = '', ...p }) {
      return <input className={cn('flex h-11 w-full border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring', className)} {...p} />;
    }
    function Select({ className = '', children, ...p }) {
      return <select className={cn('flex h-11 border border-input bg-background px-3 py-2 text-sm focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring', className)} {...p}>{children}</select>;
    }
    function Label({ className = '', htmlFor, children }) {
      return <label htmlFor={htmlFor} className={cn('eyebrow text-foreground', className)}>{children}</label>;
    }
    function Card({ className = '', ...p })        { return <div className={cn('w-full min-w-0 box-border border border-border bg-card text-card-foreground', className)} {...p} />; }
    function CardHeader({ className = '', ...p })  { return <div className={cn('flex flex-col space-y-2 p-4 sm:p-6 border-b border-border', className)} {...p} />; }
    function CardTitle({ className = '', ...p })   { return <h3 className={cn('display-bold text-xl text-foreground', className)} {...p} />; }
    function CardDescription({ className = '', ...p }) { return <p className={cn('text-sm text-muted-foreground', className)} {...p} />; }
    function CardContent({ className = '', ...p }) { return <div className={cn('p-4 sm:p-6', className)} {...p} />; }
    function CardFooter({ className = '', ...p })  { return <div className={cn('flex items-center p-4 sm:p-6 pt-0 sm:pt-0', className)} {...p} />; }
    function Badge({ variant = 'default', className = '', ...p }) {
      const base = 'inline-flex items-center border px-2.5 py-0.5 eyebrow';
      const variants = {
        default:     'border-transparent bg-primary text-primary-foreground',
        secondary:   'border-transparent bg-secondary text-secondary-foreground',
        destructive: 'border-transparent bg-destructive text-destructive-foreground',
        outline:     'border-foreground/40 text-foreground',
      };
      return <span className={cn(base, variants[variant], className)} {...p} />;
    }
    function Separator({ className = '' }) { return <div className={cn('h-px w-full bg-border', className)} />; }

    // 캔바 라이트 — 텍스트 블록 (클릭 선택 + 드래그 이동 + 우하단 핸들로 scale + 스냅)
    // edit: { x, y, scale }  — x/y는 px 오프셋(베이스 레이아웃 기준), scale은 1.0 디폴트
    const SNAP_PX = 6;
    function TextBlock({ id, edit, selected, onSelect, onChange, className = '', anchor = 'top-left', children }) {
      const e = edit || { x: 0, y: 0, scale: 1 };
      const ref = useRef(null);
      const ctx = useContext(SurfaceContext);

      // 드래그 시 스냅 + 가이드 계산
      const computeSnap = (proposedX, proposedY) => {
        const surface = ctx?.surfaceRef?.current;
        const me = ref.current;
        if (!surface || !me) return { x: proposedX, y: proposedY, guides: [] };
        const sr = surface.getBoundingClientRect();
        const myR = me.getBoundingClientRect();
        const dx = proposedX - e.x;  // 현재 transform 대비 추가 변화량
        const dy = proposedY - e.y;
        const pr = {
          left:   myR.left - sr.left + dx,
          top:    myR.top  - sr.top  + dy,
          width:  myR.width,
          height: myR.height,
        };
        pr.right  = pr.left + pr.width;
        pr.bottom = pr.top  + pr.height;
        pr.cx     = pr.left + pr.width / 2;
        pr.cy     = pr.top  + pr.height / 2;

        // surface 기준점
        const targetsX = [
          { x: 0,            kind: 's-l' },
          { x: sr.width / 2, kind: 's-c' },
          { x: sr.width,     kind: 's-r' },
        ];
        const targetsY = [
          { y: 0,             kind: 's-t' },
          { y: sr.height / 2, kind: 's-m' },
          { y: sr.height,     kind: 's-b' },
        ];
        // 다른 형제 텍스트 블록 기준점
        surface.querySelectorAll('[data-textblock]').forEach(el => {
          if (el === me) return;
          const r = el.getBoundingClientRect();
          targetsX.push(
            { x: r.left  - sr.left,                   kind: 'b-l' },
            { x: r.left  - sr.left + r.width / 2,     kind: 'b-c' },
            { x: r.right - sr.left,                   kind: 'b-r' },
          );
          targetsY.push(
            { y: r.top    - sr.top,                   kind: 'b-t' },
            { y: r.top    - sr.top + r.height / 2,    kind: 'b-m' },
            { y: r.bottom - sr.top,                   kind: 'b-b' },
          );
        });

        const myXs = [pr.left, pr.cx, pr.right];
        const myYs = [pr.top,  pr.cy, pr.bottom];
        let bestX = null, bestY = null;
        myXs.forEach(my => targetsX.forEach(t => {
          const d = t.x - my;
          if (Math.abs(d) <= SNAP_PX && (!bestX || Math.abs(d) < Math.abs(bestX.delta))) {
            bestX = { delta: d, pos: t.x };
          }
        }));
        myYs.forEach(my => targetsY.forEach(t => {
          const d = t.y - my;
          if (Math.abs(d) <= SNAP_PX && (!bestY || Math.abs(d) < Math.abs(bestY.delta))) {
            bestY = { delta: d, pos: t.y };
          }
        }));

        const guides = [];
        if (bestX) guides.push({ type: 'v', pos: bestX.pos });
        if (bestY) guides.push({ type: 'h', pos: bestY.pos });
        return {
          x: proposedX + (bestX?.delta ?? 0),
          y: proposedY + (bestY?.delta ?? 0),
          guides,
        };
      };

      const onPointerDown = (ev) => {
        if (ev.button !== undefined && ev.button !== 0) return; // 좌클릭/터치만
        ev.stopPropagation();
        ev.preventDefault();
        onSelect?.(id);
        const target = ev.currentTarget;
        try { target.setPointerCapture(ev.pointerId); } catch {}
        const startX = ev.clientX, startY = ev.clientY;
        const base = { x: e.x, y: e.y };
        const move = (mv) => {
          const proposedX = base.x + (mv.clientX - startX);
          const proposedY = base.y + (mv.clientY - startY);
          const snap = computeSnap(proposedX, proposedY);
          ctx?.setGuides?.(snap.guides);
          onChange?.(id, { x: snap.x, y: snap.y });
        };
        const up = () => {
          try { target.releasePointerCapture(ev.pointerId); } catch {}
          ctx?.setGuides?.([]);
          target.removeEventListener('pointermove', move);
          target.removeEventListener('pointerup', up);
          target.removeEventListener('pointercancel', up);
        };
        target.addEventListener('pointermove', move);
        target.addEventListener('pointerup', up);
        target.addEventListener('pointercancel', up);
      };
      const onResizePointerDown = (ev) => {
        if (ev.button !== undefined && ev.button !== 0) return;
        ev.stopPropagation();
        ev.preventDefault();
        onSelect?.(id);
        const target = ev.currentTarget;
        try { target.setPointerCapture(ev.pointerId); } catch {}
        const startX = ev.clientX, startY = ev.clientY;
        const baseScale = e.scale ?? 1;
        const move = (mv) => {
          const delta = ((mv.clientX - startX) + (mv.clientY - startY)) / 200;
          const next = Math.max(0.4, Math.min(3, baseScale + delta));
          onChange?.(id, { scale: +next.toFixed(3) });
        };
        const up = () => {
          try { target.releasePointerCapture(ev.pointerId); } catch {}
          target.removeEventListener('pointermove', move);
          target.removeEventListener('pointerup', up);
          target.removeEventListener('pointercancel', up);
        };
        target.addEventListener('pointermove', move);
        target.addEventListener('pointerup', up);
        target.addEventListener('pointercancel', up);
      };
      const transform = `translate(${e.x}px, ${e.y}px) scale(${e.scale ?? 1})`;
      const origin = anchor === 'top-left' ? 'top left' : anchor === 'top-center' ? 'top center' : anchor === 'bottom-left' ? 'bottom left' : 'center';
      return (
        <div
          ref={ref}
          data-textblock={id}
          onPointerDown={onPointerDown}
          onClick={(ev) => ev.stopPropagation()}
          className={cn('relative select-none cursor-move', selected && 'outline outline-1 outline-dashed outline-primary outline-offset-4', className)}
          style={{ transform, transformOrigin: origin }}
        >
          {children}
          {selected && (
            <span
              data-resize-handle
              onPointerDown={onResizePointerDown}
              onClick={(ev) => ev.stopPropagation()}
              title="크기 조절"
              className="absolute -bottom-2 -right-2 w-5 h-5 bg-primary rounded-full border-2 border-white shadow cursor-nwse-resize"
            />
          )}
        </div>
      );
    }

    // 사용자 업로드 사진 객체에서 img 스타일을 만든다 (translate + scale).
    // object-cover만으로는 사진 AR이 컨테이너 AR과 일치할 때 가로 overflow가 생기지 않아
    // objectPosition X가 무용해진다 → 항상 베이스 1.2x 줌을 깔고 translate로 패닝.
    // photo: { url, x, y, scale } | undefined
    function applyPhotoStyle(p) {
      if (!p) return undefined;
      const x = p.x ?? 50, y = p.y ?? 50, s = p.scale ?? 100;
      const totalScale = (s / 100) + 0.2; // 1.2 ~ 2.7 — 항상 overflow 보장
      const overflowPct = (totalScale - 1) * 50; // 한쪽 여유분 (% of element)
      const tx = -((x - 50) / 50) * overflowPct; // x=0 → +overflow, x=100 → -overflow
      const ty = -((y - 50) / 50) * overflowPct;
      return {
        objectFit: 'cover',
        transform: `translate(${tx}%, ${ty}%) scale(${totalScale})`,
        transformOrigin: 'center',
      };
    }

      const userId = session?.userId;
      const [size, setSize] = useState('1080x1350');
      const ratioCls = size === '1080x1080' ? 'aspect-square' : 'aspect-[4/5]';
      const [photoCount, setPhotoCount] = useState(0);
      const [uploadError, setUploadError] = useState(null);
      useEffect(() => {
        if (userId) getUserPhotoCount(userId).then(setPhotoCount);
      }, [userId]);
      // 데모 파라미터 — ?demo=x | ?demo=y | ?demo=s 로 미니멀 thanks 블록을 미리 transform 적용해서 캡쳐 검증용
      const demoMode = (() => {
        try { return new URLSearchParams(window.location.search).get('demo') || ''; } catch { return ''; }
      })();
      // 사진 (카테고리별) — 단순 url만
      const [userPhotos, setUserPhotos] = useState({}); // { wedding: blobURL, ... }
      // 카드별 편집 상태: cardEdits[cat][style] = { photo: {x,y,scale}, texts: { [id]: {x,y,scale} } }
      const [cardEdits, setCardEdits] = useState(() => {
        if (demoMode === 'x') return { wedding: { minimal: { photo: { x: 50, y: 50, scale: 100 }, texts: { thanks: { x: 80, y: 0, scale: 1 } } } } };
        if (demoMode === 'y') return { wedding: { minimal: { photo: { x: 50, y: 50, scale: 100 }, texts: { thanks: { x: 0, y: -40, scale: 1 } } } } };
        if (demoMode === 's') return { wedding: { minimal: { photo: { x: 50, y: 50, scale: 100 }, texts: { thanks: { x: 0, y: 0, scale: 1.4 } } } } };
        return {};
      });
      // 선택된 항목: { cat, style, kind: 'text', id }  (사진은 항상 카드 컨트롤로 조정 — 선택 X)
      const [selected, setSelected] = useState(() => {
        if (demoMode) return { cat: 'wedding', style: 'minimal', kind: 'text', id: 'thanks' };
        return null;
      });

      const handleFile = async (catKey, file) => {
        if (!file) return;
        if (!isAdmin && userId) {
          // 서버에서 최신 카운트 다시 확인 (관리자가 다른 곳에서 리셋했을 수 있음)
          const fresh = await getUserPhotoCount(userId);
          if (fresh >= PHOTO_QUOTA) {
            setPhotoCount(fresh);
            setUploadError(`사진 업로드 한도(${PHOTO_QUOTA}장)에 도달했습니다. 마리안 운영자에게 리셋을 요청해 주세요.`);
            return;
          }
          const next = fresh + 1;
          try {
            await updateSignup(userId, { photoCount: next });
            setPhotoCount(next);
          } catch (e) {
            setUploadError('사용량 기록 실패: ' + (e?.message || e));
            return;
          }
        }
        setUploadError(null);
        const url = URL.createObjectURL(file);
        setUserPhotos(prev => ({ ...prev, [catKey]: url }));
      };
      const clearPhoto = (catKey) => {
        setUploadError(null);
        setUserPhotos(prev => {
          const u = prev[catKey];
          if (u) URL.revokeObjectURL(u);
          const { [catKey]: gone, ...rest } = prev;
          return rest;
        });
      };

      // ─ 카드 → JPG 저장 (저장 폴더 지정 시 File System Access API 사용, iOS는 공유 시트, 그 외는 일반 다운로드)
      const cardRefs = useRef(new Map());
      const [busyKey, setBusyKey] = useState(null);

      // ── 저장 폴더(FileSystemDirectoryHandle) — IndexedDB에 영속 저장
      const supportsFsAccess = typeof window !== 'undefined' && typeof window.showDirectoryPicker === 'function';
      const [saveDir, setSaveDir]         = useState(null);
      const [saveDirName, setSaveDirName] = useState('');

      const openDirDB = () => new Promise((resolve, reject) => {
        const req = indexedDB.open('marian-photo-poster', 1);
        req.onupgradeneeded = () => req.result.createObjectStore('handles');
        req.onsuccess = () => resolve(req.result);
        req.onerror   = () => reject(req.error);
      });
      const idbGet = async (key) => {
        try {
          const db = await openDirDB();
          return await new Promise((resolve, reject) => {
            const tx = db.transaction('handles', 'readonly');
            const r  = tx.objectStore('handles').get(key);
            r.onsuccess = () => resolve(r.result);
            r.onerror   = () => reject(r.error);
          });
        } catch { return null; }
      };
      const idbSet = async (key, value) => {
        try {
          const db = await openDirDB();
          await new Promise((resolve, reject) => {
            const tx = db.transaction('handles', 'readwrite');
            tx.objectStore('handles').put(value, key);
            tx.oncomplete = () => resolve();
            tx.onerror    = () => reject(tx.error);
          });
        } catch {}
      };
      const idbDel = async (key) => {
        try {
          const db = await openDirDB();
          await new Promise((resolve, reject) => {
            const tx = db.transaction('handles', 'readwrite');
            tx.objectStore('handles').delete(key);
            tx.oncomplete = () => resolve();
            tx.onerror    = () => reject(tx.error);
          });
        } catch {}
      };

      // 마운트 시 저장된 폴더 핸들 복원
      useEffect(() => {
        if (!supportsFsAccess) return;
        (async () => {
          const h = await idbGet('saveDir');
          if (h && h.queryPermission) {
            setSaveDir(h);
            setSaveDirName(h.name || '');
          }
        })();
      }, []);

      const pickSaveDir = async () => {
        if (!supportsFsAccess) {
          alert('이 브라우저는 폴더 지정 저장을 지원하지 않습니다. Chrome·Edge·Arc 등 크로미움 계열을 이용해 주세요.\n(현재 브라우저는 기본 다운로드 폴더로 저장됩니다.)');
          return;
        }
        try {
          const h = await window.showDirectoryPicker({ mode: 'readwrite', id: 'marian-thankyou' });
          setSaveDir(h);
          setSaveDirName(h.name || '');
          await idbSet('saveDir', h);
        } catch (e) {
          if (e && e.name === 'AbortError') return;
          alert('폴더 선택 실패: ' + (e?.message || e));
        }
      };
      const clearSaveDir = async () => {
        setSaveDir(null);
        setSaveDirName('');
        await idbDel('saveDir');
      };

      // 권한 확인/요청 → 폴더에 blob 저장. 실패 시 false 반환
      const writeBlobToSaveDir = async (blob, filename) => {
        if (!saveDir) return false;
        try {
          const opts = { mode: 'readwrite' };
          let perm = await saveDir.queryPermission(opts);
          if (perm !== 'granted') perm = await saveDir.requestPermission(opts);
          if (perm !== 'granted') return false;
          const fh = await saveDir.getFileHandle(filename, { create: true });
          const w  = await fh.createWritable();
          await w.write(blob);
          await w.close();
          return true;
        } catch (e) {
          console.warn('지정 폴더 저장 실패, 기본 다운로드로 폴백:', e);
          return false;
        }
      };

      const downloadCard = async (styleKey, label) => {
        const node = cardRefs.current.get(styleKey);
        const lib = window.htmlToImage;
        if (!node || !lib) {
          alert('아직 준비 중입니다. 잠시 후 다시 시도해 주세요.');
          return;
        }
        setBusyKey(styleKey);
        // ── 캡쳐 안정화: 미리보기와 저장본을 똑같이
        // 1) 선택 해제 — dashed outline/리사이즈 핸들이 함께 찍히지 않게
        setSelected(null);
        await new Promise(r => requestAnimationFrame(r));
        // 2) 폰트/이미지 완전 로드 보장
        if (document.fonts && document.fonts.ready) {
          try { await document.fonts.ready; } catch {}
        }
        const imgs = Array.from(node.querySelectorAll('img'));
        await Promise.all(imgs.map(img =>
          img.complete && img.naturalWidth > 0
            ? Promise.resolve()
            : new Promise((r) => {
                img.addEventListener('load',  r, { once: true });
                img.addEventListener('error', r, { once: true });
              })
        ));
        await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));

        // ── blob: URL (사용자 업로드 사진) 은 html-to-image가 SVG inline 단계에서 못 가져옴
        // (crossOrigin="anonymous" + blob URL 조합으로 Image onerror 발생).
        // 캡쳐 전 base64 dataURL로 임시 교체하고, 끝나면 원본 src로 복원.
        const restore = [];
        for (const img of imgs) {
          if (img.src && img.src.startsWith('blob:')) {
            try {
              const r = await fetch(img.src);
              const b = await r.blob();
              const du = await new Promise((res, rej) => {
                const fr = new FileReader();
                fr.onload  = () => res(fr.result);
                fr.onerror = () => rej(fr.error);
                fr.readAsDataURL(b);
              });
              restore.push({ img, src: img.src, co: img.getAttribute('crossorigin') });
              img.removeAttribute('crossorigin');
              img.src = du;
            } catch (e) {
              console.warn('blob → dataURL 변환 실패', e);
            }
          }
        }
        // 교체한 src 로드 완료 대기
        if (restore.length) {
          await Promise.all(restore.map(({ img }) =>
            img.complete && img.naturalWidth > 0
              ? Promise.resolve()
              : new Promise((r) => {
                  img.addEventListener('load',  r, { once: true });
                  img.addEventListener('error', r, { once: true });
                })
          ));
          await new Promise(r => requestAnimationFrame(() => requestAnimationFrame(r)));
        }

        try {
          // html-to-image: SVG foreignObject 기반 — line-height / object-fit / transform 보존.
          // toJpeg → dataURL → Blob (toBlob은 PNG만 지원).
          // cacheBust는 blob URL을 깨뜨릴 수 있어 사용 안 함 (위에서 dataURL로 변환했으므로 캐시 이슈 없음).
          const dataUrl = await lib.toJpeg(node, {
            quality:    0.95,
            pixelRatio: 3,
            backgroundColor: '#ffffff',
          });
          const blob = await (await fetch(dataUrl)).blob();
          if (!blob) { throw new Error('빈 이미지'); }
          const filename = `marian-thankyou-${styleKey}-${Date.now()}.jpg`;

          if (saveDir) {
            const ok = await writeBlobToSaveDir(blob, filename);
            if (ok) return;
          }
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url; a.download = filename;
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        } catch (e) {
          alert('카드 저장 실패: ' + (e?.message || e));
        } finally {
          // 원본 src·crossorigin 복원 (성공·실패 무관하게)
          for (const { img, src, co } of restore) {
            img.src = src;
            if (co != null) img.setAttribute('crossorigin', co);
          }
          setBusyKey(null);
        }
      };

      const DEFAULT_PHOTO     = { x: 50, y: 50, scale: 100 };
      const DEFAULT_PHOTO_ALT = { x: 60, y: 40, scale: 180 };
      const getCardEdit = (cat, style) => {
        const v = cardEdits[cat]?.[style];
        return {
          photo:    v?.photo    || { ...DEFAULT_PHOTO },
          photoAlt: v?.photoAlt || { ...DEFAULT_PHOTO_ALT },
          texts:    v?.texts    || {},
          copy:     v?.copy     || {},
        };
      };
      const ensureCard = (prev, cat, style) => {
        const v = prev[cat]?.[style];
        return {
          photo:    v?.photo    || { ...DEFAULT_PHOTO },
          photoAlt: v?.photoAlt || { ...DEFAULT_PHOTO_ALT },
          texts:    v?.texts    || {},
          copy:     v?.copy     || {},
        };
      };
      const updateCardPhoto = (cat, style, patch, which = 'main') => {
        const key = which === 'alt' ? 'photoAlt' : 'photo';
        setCardEdits(prev => {
          const cur = ensureCard(prev, cat, style);
          return { ...prev, [cat]: { ...prev[cat], [style]: { ...cur, [key]: { ...cur[key], ...patch } } } };
        });
      };
      const updateCardText = (cat, style, id, patch) => {
        setCardEdits(prev => {
          const cur = ensureCard(prev, cat, style);
          const t = cur.texts?.[id] || { x: 0, y: 0, scale: 1 };
          return { ...prev, [cat]: { ...prev[cat], [style]: { ...cur, texts: { ...cur.texts, [id]: { ...t, ...patch } } } } };
        });
      };
      const updateCardCopy = (cat, style, key, value) => {
        setCardEdits(prev => {
          const cur = ensureCard(prev, cat, style);
          return { ...prev, [cat]: { ...prev[cat], [style]: { ...cur, copy: { ...(cur.copy||{}), [key]: value } } } };
        });
      };
      const resetCardPhoto = (cat, style, which = 'main') => updateCardPhoto(cat, style,
        which === 'alt' ? { ...DEFAULT_PHOTO_ALT } : { ...DEFAULT_PHOTO }, which);
      const resetCardText  = (cat, style, id) => updateCardText(cat, style, id, { x: 0, y: 0, scale: 1 });
      const resetCardCopyKey = (cat, style, key) => updateCardCopy(cat, style, key, '');

      const sizeToggle = (
        <div className="inline-flex items-center border border-input">
          {['1080x1350','1080x1080'].map(s => (
            <button key={s} onClick={() => setSize(s)}
              className={cn('h-10 px-4 text-xs eyebrow', size===s ? 'bg-primary text-primary-foreground' : 'text-muted-foreground hover:bg-secondary')}>
              {s}
            </button>
          ))}
        </div>
      );

      return (
        <div className="min-h-screen overflow-x-hidden">
          <TopNav active="gallery" onNav={onNav} />

          {/* Page header */}
          <section className="max-w-[1280px] mx-auto px-4 sm:px-6 pt-8 sm:pt-12 pb-6 sm:pb-8">
            <div className="flex flex-col sm:flex-row sm:items-end sm:justify-between gap-4">
              <div className="min-w-0">
                <div className="eyebrow text-primary mb-3">Marian Wedding · Thank You Card</div>
                <h1 className="display-bold text-3xl sm:text-4xl md:text-5xl text-foreground leading-tight">결혼식 후 보내는 땡큐카드</h1>
                <p className="text-sm text-muted-foreground mt-3 sm:mt-4 max-w-xl leading-relaxed">
                  마리안 웨딩이 우리 고객분들께 또 어떤 걸 해드릴 수 있을까 고민하다 만든
                  자동 땡큐카드 생성기. 본식 스냅 한 장을 올리면 미니멀 · 격식 · 감성 · 키치 4가지 카드를
                  동시에 만들어 드립니다.
                </p>
              </div>
              <div className="shrink-0">{sizeToggle}</div>
            </div>
          </section>

          {/* === 본식 스냅 업로드 (단일) === */}
          <section className="max-w-[1280px] mx-auto px-4 sm:px-6">
            <Card>
              <CardHeader>
                <div className="flex items-start justify-between gap-4 flex-wrap">
                  <div>
                    <CardTitle className="text-xl">본식 스냅 업로드</CardTitle>
                    <CardDescription>
                      한 아이디로 사진 5장까지만 가능합니다. 추가로 필요하시면 관리자에 요청해주세요.
                    </CardDescription>
                    {!isAdmin && userId && (
                      <div className="mt-2 text-xs text-foreground">
                        사용 <strong>{photoCount}</strong> / {PHOTO_QUOTA}
                      </div>
                    )}
                    {uploadError && (
                      <div className="mt-2 text-xs text-destructive border border-destructive/30 bg-destructive/5 p-2">
                        {uploadError}
                      </div>
                    )}
                  </div>
                  <label className="inline-flex">
                    <input type="file" accept="image/*" className="hidden"
                      onChange={(e) => handleFile('wedding', e.target.files?.[0])} />
                    <span className="inline-flex items-center justify-center gap-2 h-11 px-6 bg-primary text-primary-foreground hover:bg-primary/90 text-sm font-medium tracking-wider uppercase cursor-pointer">
                      본식 사진 선택
                    </span>
                  </label>
                </div>
              </CardHeader>
              <CardContent>
                <div className="grid grid-cols-1 sm:grid-cols-3 gap-px bg-border">
                  <div className="bg-background sm:col-span-1">
                    <div className="aspect-[4/5] relative overflow-hidden">
                      {userPhotos.wedding ? (
                        <img src={userPhotos.wedding} className="w-full h-full object-cover" />
                      ) : (
                        <div className="absolute inset-0 flex items-center justify-center eyebrow text-muted-foreground text-center px-4">
                          본식 스냅<br/>여기에 표시됩니다
                        </div>
                      )}
                    </div>
                  </div>
                  <div className="bg-background sm:col-span-2 p-6 flex flex-col justify-between">
                    <div>
                      <div className="eyebrow text-muted-foreground">Workflow</div>
                      <ol className="mt-3 space-y-2 text-sm text-foreground list-decimal list-inside">
                        <li>본식 스냅 한 장 업로드</li>
                        <li>3 카드(미니멀 · 격식 · 감성)가 자동 생성</li>
                        <li>카드별 밑 컨트롤로 사진 크롭·텍스트 이동·문구 수정</li>
                        <li>"사진 저장 (JPG)" 버튼으로 PC에 저장 (저장 폴더는 우측 상단에서 지정) → 하객분들께 바로 전송 <span className="text-muted-foreground">(PC 전용 · Chrome·Edge·Arc 권장)</span></li>
                        <li>한 아이디로 사진 5장까지 가능. 추가로 필요하시면 마리안 운영자에 요청해 주세요.</li>
                      </ol>
                    </div>
                    {userPhotos.wedding && (
                      <button onClick={() => clearPhoto('wedding')} className="eyebrow text-destructive hover:opacity-70 mt-6 self-start">사진 제거</button>
                    )}
                  </div>
                </div>
              </CardContent>
            </Card>
          </section>

          {/* === 마리안 웨딩 땡큐카드 — 3 변형 === */}
          <section className="max-w-[1280px] mx-auto px-4 sm:px-6 mt-16">
            <div className="flex items-end justify-between border-b border-border pb-4">
              <div>
                <div className="eyebrow text-primary">3 Variants</div>
                <h2 className="display-bold text-3xl md:text-4xl text-foreground mt-2">
                  땡큐카드 결과물
                  {userPhotos.wedding && <Badge className="ml-3 align-middle">YOUR PHOTO</Badge>}
                </h2>
                <p className="text-sm text-muted-foreground mt-2 max-w-xl leading-relaxed">
                  같은 사진 한 장 → 4가지 톤(미니멀·격식·감성·키치)으로 동시 출력. 신랑·신부가 인스타·카톡·인쇄 어디에든
                  어울리는 카드를 골라 사용할 수 있도록.
                </p>
              </div>
              <div className="flex flex-col items-end gap-2">
                <div className="eyebrow text-muted-foreground hidden sm:block">click & drag · snap</div>
                {/* 저장 폴더 지정 (Chromium 계열만) */}
                <div className="flex items-center gap-2 text-[11px]">
                  <span className="eyebrow text-muted-foreground">저장 위치</span>
                  <button
                    type="button"
                    onClick={pickSaveDir}
                    title={supportsFsAccess ? '카드 JPG가 저장될 폴더를 지정합니다 (브라우저에 기억됨)' : '이 브라우저는 폴더 지정을 지원하지 않습니다 — 기본 다운로드 폴더로 저장됩니다'}
                    className={cn(
                      'inline-flex items-center gap-1 px-2 py-1 border',
                      saveDirName
                        ? 'border-primary text-primary hover:bg-primary/10'
                        : 'border-input text-foreground hover:bg-secondary',
                      !supportsFsAccess && 'opacity-60 cursor-not-allowed'
                    )}
                  >
                    <span aria-hidden>📁</span>
                    <span className="max-w-[160px] truncate">
                      {saveDirName ? saveDirName : (supportsFsAccess ? '폴더 선택' : '기본 다운로드 폴더')}
                    </span>
                  </button>
                  {saveDirName && (
                    <button
                      type="button"
                      onClick={clearSaveDir}
                      title="지정 해제"
                      className="px-1 text-muted-foreground hover:text-destructive"
                    >×</button>
                  )}
                </div>
              </div>
            </div>

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-6 mt-8">
              {STYLE_DEFS.map(s => {
                const weddingMeta = {
                  minimal:    { label: '미니멀 땡큐',  desc: '러블리 미니멀 · 인스타 피드용 감사' },
                  invitation: { label: '격식형 땡큐',  desc: '청첩장 톤의 정중한 감사장' },
                  emotive:    { label: '감성 땡큐',    desc: '한국어 종서 감성 · 풀블리드 + 한 줄 카피' },
                  kitsch:     { label: '키치 땡큐',    desc: '폴라로이드 콜라주 · 손글씨 · 오렌지 인용구' },
                }[s.key];
                const cat = 'wedding';
                const ce = getCardEdit(cat, s.key);
                const photoData    = userPhotos.wedding ? { url: userPhotos.wedding, ...ce.photo }    : null;
                const photoAltData = userPhotos.wedding ? { url: userPhotos.wedding, ...ce.photoAlt } : null;
                const isSelectedHere = selected && selected.cat === cat && selected.style === s.key;
                const selectedTextId  = isSelectedHere && selected.kind === 'text'  ? selected.id : null;
                const selectedPhotoId = isSelectedHere && selected.kind === 'photo' ? selected.id : null;
                const selectedTextEdit = selectedTextId ? getTextEdit(ce.texts, selectedTextId) : null;

    // ========================================
    // 🔐 AuthGate — 회원가입 신청 / 신랑·신부 로그인 / 관리자 로그인
    // ========================================
    function AuthGate({ onLogin }) {
      const [mode, setMode] = useState('signup'); // signup | userLogin | adminLogin
      const [signupForm, setSignupForm] = useState({ name: '', weddingDate: '', phone4: '' });
      const [userForm, setUserForm] = useState({ name: '', weddingDate: '', phone4: '' });
      const [adminPw, setAdminPw] = useState('');
      const [msg, setMsg] = useState(null);

      const submitSignup = async () => {
        const name = signupForm.name.trim();
        const weddingDate = signupForm.weddingDate;
        const phone4 = (signupForm.phone4 || '').trim();
        if (!name || !weddingDate || !phone4) {
          setMsg({ type: 'error', text: '이름·예식일자·전화번호 뒷자리를 모두 입력해 주세요.' });
          return;
        }
        if (!/^\d{4}$/.test(phone4)) {
          setMsg({ type: 'error', text: '전화번호 뒷자리 4자리(숫자)를 정확히 입력해 주세요.' });
          return;
        }
        try {
          const dup = await findSignupByLogin(name, weddingDate);
          if (dup) {
            setMsg({ type: 'warn', text: '이미 같은 이름·예식일자로 신청한 내역이 있습니다.' });
            return;
          }
          await insertSignup({ name, weddingDate, phone4, status: 'pending' });
          setMsg({ type: 'ok', text: '신청 완료. 마리안 운영자 승인 후 로그인하실 수 있습니다.' });
          setSignupForm({ name: '', weddingDate: '', phone4: '' });
        } catch (e) {
          setMsg({ type: 'error', text: '신청 실패: ' + (e?.message || e) });
        }
      };

      const submitUserLogin = async () => {
        const name = userForm.name.trim();
        const weddingDate = userForm.weddingDate;
        const phone4 = (userForm.phone4 || '').trim();
        if (!name || !weddingDate || !phone4) {
          setMsg({ type: 'error', text: '이름·예식일자·전화번호 뒷자리를 모두 입력해 주세요.' });
          return;
        }
        if (!/^\d{4}$/.test(phone4)) {
          setMsg({ type: 'error', text: '전화번호 뒷자리 4자리(숫자)를 정확히 입력해 주세요.' });
          return;
        }
        const found = await findSignupByLogin(name, weddingDate);
        if (!found) {
          setMsg({ type: 'error', text: '신청 내역이 없습니다. 회원가입 신청을 먼저 진행해 주세요.' });
          return;
        }
        if ((found.phone4 || '') !== phone4) {
          setMsg({ type: 'error', text: '전화번호 뒷자리가 일치하지 않습니다.' });
          return;
        }
        if (found.status === 'pending') {
          setMsg({ type: 'warn', text: '아직 승인되지 않았습니다. 마리안 운영자 승인 대기 중.' });
          return;
        }
        if (found.status === 'rejected') {
          setMsg({ type: 'error', text: '신청이 거절되었습니다. 마리안 웨딩에 문의해 주세요.' });
          return;
        }
        const sess = { role: 'user', userId: found.id, name: found.name, weddingDate: found.weddingDate };
        writeSession(sess);
        onLogin(sess);
      };

      const submitAdminLogin = () => {
        if (adminPw !== ADMIN_PW) {
          setMsg({ type: 'error', text: '비밀번호가 일치하지 않습니다.' });
          return;
        }
        const sess = { role: 'admin' };
        writeSession(sess);
        onLogin(sess);
      };

      const TABS = [
        { k: 'signup',     l: '회원가입' },
        { k: 'userLogin',  l: '로그인' },
        { k: 'adminLogin', l: '관리자' },
      ];

      const STYLE_META = {
        minimal:    { label: '미니멀 땡큐', desc: '러블리 미니멀 · 인스타 피드용' },
        invitation: { label: '격식형 땡큐', desc: '청첩장 톤의 정중한 감사장' },
        emotive:    { label: '감성 땡큐',   desc: '한국어 종서 감성 · 풀블리드' },
        kitsch:     { label: '키치 땡큐',   desc: '폴라로이드 콜라주 · 네온' },
      };
      return (
        <div className="min-h-screen bg-background px-4 py-10">
          <div className="max-w-6xl mx-auto">
            {/* 헤더 — 홍보용 hero */}
            <div className="text-center mb-8">
              <div className="eyebrow text-primary mb-3">Marian Wedding</div>
              <h1 className="display-bold text-3xl sm:text-4xl text-foreground tracking-tight">
                결혼식 후 보내는 땡큐카드
              </h1>
              <p className="text-sm text-muted-foreground mt-3 max-w-xl mx-auto leading-relaxed">
                본식 스냅 한 장이면 끝. 미니멀 · 격식 · 감성 · 키치 4가지 톤으로 동시에 만들어 드립니다.
                마음에 드는 카드를 골라 하객분들께 보내 보세요.
              </p>
            </div>

            {/* 4 스타일 미리보기 그리드 (홍보·상담용) — 갤러리와 같은 break 패턴 */}
            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-4 gap-5 mb-10">
              {STYLE_DEFS.map(s => {
                const url = SAMPLE_PHOTOS[s.key];
                const crop = SAMPLE_CROPS[s.key];
                const meta = STYLE_META[s.key];
                return (
                  <div key={s.key} className="space-y-2">
                    <ScaledPoster className="border border-border bg-secondary/30" baseWidth={480} ratio={4/5}>
                      <s.Render
                        category="wedding"
                        photo={{ url, ...crop.main }}
                        photoAlt={crop.alt ? { url, ...crop.alt } : undefined}
                        textEdits={{}}
                        cardCopy={{}}
                        isSquare={false}
                      />
                    </ScaledPoster>
                    <div className="text-center px-1">
                      <div className="display-bold text-[12px] sm:text-[13px] text-foreground">{meta.label}</div>
                      <div className="text-[10px] sm:text-[11px] text-muted-foreground mt-0.5 leading-snug">{meta.desc}</div>
                    </div>
                  </div>
                );
              })}
            </div>

            {/* 가입·로그인 카드 */}
            <Card className="w-full max-w-md mx-auto">
            <CardHeader>
              <CardTitle className="text-xl">땡큐카드 받아보기</CardTitle>
              <CardDescription>
                마리안 웨딩에서 결혼식을 올린 부부에게만 발급되는 서비스입니다. 운영자 승인 후 위 4가지 카드를 모두 받아보실 수 있어요.
              </CardDescription>
            </CardHeader>
            <CardContent className="space-y-5">
              <div className="flex border border-border">
                {TABS.map(t => (
                  <button key={t.k} onClick={() => { setMode(t.k); setMsg(null); }}
                    className={cn('flex-1 h-10 text-xs eyebrow', mode === t.k ? 'bg-primary text-primary-foreground' : 'text-muted-foreground hover:bg-secondary')}>
                    {t.l}
                  </button>
                ))}
              </div>

              {mode === 'signup' && (
                <div className="space-y-3">
                  <div className="space-y-2">
                    <Label>이름 (신랑 또는 신부)</Label>
                    <Input value={signupForm.name} onChange={e => setSignupForm({ ...signupForm, name: e.target.value })} placeholder="홍길동" />
                  </div>
                  <div className="space-y-2">
                    <Label>예식일자</Label>
                    <Input type="date" value={signupForm.weddingDate} onChange={e => setSignupForm({ ...signupForm, weddingDate: e.target.value })} />
                  </div>
                  <div className="space-y-2">
                    <Label>전화번호 뒷자리 4개</Label>
                    <Input
                      type="tel"
                      inputMode="numeric"
                      maxLength={4}
                      placeholder="예: 1234"
                      value={signupForm.phone4}
                      onChange={e => setSignupForm({ ...signupForm, phone4: e.target.value.replace(/\D/g, '').slice(0, 4) })}
                    />
                  </div>
                  <Button className="w-full" onClick={submitSignup}>가입 신청</Button>
                  <p className="text-[11px] text-muted-foreground leading-relaxed">
                    신청 후 마리안 운영자의 승인을 거쳐 사용 가능합니다. 승인 시 입력하신 이름·예식일자로 로그인하세요.
                  </p>
                </div>
              )}

              {mode === 'userLogin' && (
                <div className="space-y-3">
                  <div className="space-y-2">
                    <Label>이름</Label>
                    <Input value={userForm.name} onChange={e => setUserForm({ ...userForm, name: e.target.value })} placeholder="홍길동" />
                  </div>
                  <div className="space-y-2">
                    <Label>예식일자</Label>
                    <Input type="date" value={userForm.weddingDate} onChange={e => setUserForm({ ...userForm, weddingDate: e.target.value })} />
                  </div>
                  <div className="space-y-2">
                    <Label>전화번호 뒷자리 4개</Label>
                    <Input
                      type="tel"
                      inputMode="numeric"
                      maxLength={4}
                      placeholder="예: 1234"
                      value={userForm.phone4}
                      onChange={e => setUserForm({ ...userForm, phone4: e.target.value.replace(/\D/g, '').slice(0, 4) })}
                    />
                  </div>
                  <Button className="w-full" onClick={submitUserLogin}>로그인</Button>
                  <p className="text-[11px] text-muted-foreground">가입 신청 시 입력한 이름·예식일자·전화번호 뒷자리로 로그인합니다.</p>
                </div>
              )}

              {mode === 'adminLogin' && (
                <div className="space-y-3">
                  <div className="space-y-2">
                    <Label>아이디</Label>
                    <Input value={ADMIN_ID} readOnly className="bg-secondary cursor-not-allowed" />
                  </div>
                  <div className="space-y-2">
                    <Label>비밀번호</Label>
                    <Input type="password" value={adminPw}
                      onChange={e => setAdminPw(e.target.value)}
                      onKeyDown={e => { if (e.key === 'Enter') submitAdminLogin(); }} />
                  </div>
                  <Button className="w-full" onClick={submitAdminLogin}>관리자 로그인</Button>
                  <p className="text-[11px] text-muted-foreground">마리안 운영자 전용 입구.</p>
                </div>
              )}

              {msg && (
                <div className={cn('text-xs p-3 border',
                  msg.type === 'error' ? 'border-destructive text-destructive bg-destructive/5' :
                  msg.type === 'warn'  ? 'border-amber-300 text-amber-700 bg-amber-50' :
                                         'border-primary text-primary bg-primary/5'
                )}>{msg.text}</div>
              )}
            </CardContent>
            </Card>
          </div>
        </div>
      );
    }

    // ========================================
    // 📄 Page · Admin (마리안 운영자 — 회원가입 승인 큐)
    // ========================================
    function AdminScreen({ onNav }) {
      const [signups, setSignups] = useState([]);
      const [search, setSearch] = useState('');
      const refresh = async () => { setSignups(await readSignups()); };
      useEffect(() => { refresh(); }, []);
      const update = async (id, patch) => { await updateSignup(id, patch); refresh(); };
      const remove = async (id) => { await deleteSignup(id); refresh(); };
      const approve = (id) => update(id, { status: 'approved', approvedAt: new Date().toISOString() });
      const reject  = (id) => update(id, { status: 'rejected' });
      const restore = (id) => update(id, { status: 'pending' });
      const resetQuota = (id) => update(id, { photoCount: 0 });

      const pending  = signups.filter(s => s.status === 'pending');
      const approved = signups.filter(s => s.status === 'approved');
      const rejected = signups.filter(s => s.status === 'rejected');

      const q = search.trim().toLowerCase();
      const filteredApproved = q
        ? approved.filter(s => s.name.toLowerCase().includes(q) || s.weddingDate.includes(q) || (s.phone4 || '').includes(q))
        : approved;

      const Row = ({ s, actions, showUsage }) => (
        <div className="px-6 py-4 flex items-center gap-3 text-sm flex-wrap">
          <div className="flex-1 min-w-0">
            <div className="truncate text-foreground">
              {s.name}
              {s.phone4 && <span className="text-muted-foreground ml-2">···· {s.phone4}</span>}
            </div>
            <div className="eyebrow text-muted-foreground mt-1">예식일 {s.weddingDate} · 신청 {(s.appliedAt||'').slice(0,10)}</div>
          </div>
          {showUsage && (
            <div className="text-xs text-muted-foreground">
              사진 <strong className="text-foreground">{s.photoCount || 0}</strong>/{PHOTO_QUOTA}
            </div>
          )}
          {actions}
        </div>
      );

      return (
        <div className="min-h-screen overflow-x-hidden">
          <TopNav active="admin" onNav={onNav} />
          <div className="w-full max-w-[860px] mx-auto px-4 sm:px-6 py-8 sm:py-12 space-y-8">
            <div>
              <div className="eyebrow text-primary mb-2">Marian Admin</div>
              <h1 className="display-bold text-3xl text-foreground">회원가입 승인 관리</h1>
              <p className="text-sm text-muted-foreground mt-2">
                마리안 웨딩에서 결혼식을 올리신 신랑·신부의 가입 신청을 검토하고 승인합니다.
                자유 가입 없음 — 운영자 승인을 받아야만 땡큐카드 도구를 사용할 수 있습니다.
              </p>
            </div>

            <Card>
              <CardHeader>
                <CardTitle className="text-lg">승인 대기 ({pending.length})</CardTitle>
                <CardDescription>마리안에서 결혼식을 올리신 부부가 맞는지 확인 후 승인해 주세요.</CardDescription>
              </CardHeader>
              <CardContent className="p-0">
                {pending.length === 0 ? (
                  <div className="px-6 py-8 text-center text-sm text-muted-foreground">대기 중인 신청이 없습니다.</div>
                ) : (
                  <div className="divide-y divide-border">
                    {pending.map(s => (
                      <Row key={s.id} s={s} actions={
                        <>
                          <Badge variant="outline">대기</Badge>
                          <Button size="sm" onClick={() => approve(s.id)}>승인</Button>
                          <Button variant="outline" size="sm" onClick={() => reject(s.id)}>거절</Button>
                        </>
                      } />
                    ))}
                  </div>
                )}
              </CardContent>
            </Card>

            <Card>
              <CardHeader>
                <CardTitle className="text-lg">승인 완료 ({approved.length})</CardTitle>
                <CardDescription>이름 또는 예식일자로 검색해 사진 한도를 리셋할 수 있습니다.</CardDescription>
                <Input
                  className="mt-2"
                  placeholder="이름 또는 예식일자 검색"
                  value={search}
                  onChange={e => setSearch(e.target.value)}
                />
              </CardHeader>
              <CardContent className="p-0">
                {filteredApproved.length === 0 ? (
                  <div className="px-6 py-8 text-center text-sm text-muted-foreground">
                    {q ? '검색 결과가 없습니다.' : '승인된 신청이 없습니다.'}
                  </div>
                ) : (
                  <div className="divide-y divide-border">
                    {filteredApproved.map(s => (
                      <Row key={s.id} s={s} showUsage actions={
                        <>
                          <Badge>승인</Badge>
                          <Button size="sm" onClick={() => resetQuota(s.id)}>사진 리셋</Button>
                          <Button variant="outline" size="sm" onClick={() => reject(s.id)}>비활성</Button>
                          <Button variant="ghost" size="sm" onClick={() => remove(s.id)}>삭제</Button>
                        </>
                      } />
                    ))}
                  </div>
                )}
              </CardContent>
            </Card>

            {rejected.length > 0 && (
              <Card>
                <CardHeader>
                  <CardTitle className="text-lg">거절/비활성 ({rejected.length})</CardTitle>
                </CardHeader>
                <CardContent className="p-0">
                  <div className="divide-y divide-border">
                    {rejected.map(s => (
                      <Row key={s.id} s={s} actions={
                        <>
                          <Badge variant="destructive">거절</Badge>
                          <Button variant="outline" size="sm" onClick={() => restore(s.id)}>복원</Button>
                          <Button variant="ghost" size="sm" onClick={() => remove(s.id)}>삭제</Button>
                        </>
                      } />
                    ))}
                  </div>
                </CardContent>
              </Card>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Root
    // ========================================
    // URL 쿼리 파라미터로 시작 화면을 강제할 수 있게 — 헤드리스 캡쳐·딥링크용
    function readInitialView() {
      try {
        const v = new URLSearchParams(window.location.search).get('view');
        return ['gallery','flow','admin'].includes(v) ? v : 'gallery';
      } catch { return 'gallery'; }
    }
    function App() {
      const [session, setSession] = useState(() => readSession());
      const [view, setView] = useState(readInitialView);
      const logout = () => { writeSession(null); setSession(null); setView('gallery'); };

      if (!session) return <AuthGate onLogin={setSession} />;

      const isAdmin = session.role === 'admin';
      const safeView = isAdmin ? view : (view === 'admin' ? 'gallery' : view);
      const ctx = { session, logout };

      let screen;
      if (safeView === 'flow')       screen = <FlowScreen  onNav={setView} />;
      else if (safeView === 'admin') screen = <AdminScreen onNav={setView} />;
      else                           screen = <GalleryScreen onNav={setView} />;

      return <SessionContext.Provider value={ctx}>{screen}</SessionContext.Provider>;
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
