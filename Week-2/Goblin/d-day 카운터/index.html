<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>D-Day 카운터</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulse-slow {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }
    .fade-in { animation: fadeIn 0.4s ease-out; }
    .pulse-dot { animation: pulse-slow 1.5s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useRef, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-lg p-6 sm:p-8 ${className}`}>
          {children}
        </div>
      );
    }

    function Button({ children, onClick, variant = 'primary', disabled = false, className = '' }) {
      const base = 'px-5 py-2.5 rounded-xl font-bold transition-all duration-200 disabled:opacity-40 disabled:cursor-not-allowed';
      const variants = {
        primary: 'bg-indigo-500 text-white hover:bg-indigo-600 active:scale-95 shadow-md',
        secondary: 'bg-gray-200 text-gray-700 hover:bg-gray-300 active:scale-95',
        danger: 'bg-red-500 text-white hover:bg-red-600 active:scale-95 shadow-md',
      };
      return (
        <button onClick={onClick} disabled={disabled} className={`${base} ${variants[variant]} ${className}`}>
          {children}
        </button>
      );
    }

    // ========================================
    // 📄 D-Day 계산 로직
    // ========================================

    function calcRemaining(targetDate) {
      const now = new Date();
      const target = new Date(targetDate);
      const diff = target - now;

      if (diff <= 0) {
        // 이미 지난 날짜
        const pastDiff = now - target;
        const totalSeconds = Math.floor(pastDiff / 1000);
        const days = Math.floor(totalSeconds / 86400);
        const hours = Math.floor((totalSeconds % 86400) / 3600);
        const minutes = Math.floor((totalSeconds % 3600) / 60);
        const seconds = totalSeconds % 60;
        return { passed: true, days, hours, minutes, seconds, totalDiff: pastDiff };
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;
      return { passed: false, days, hours, minutes, seconds, totalDiff: diff };
    }

    // ========================================
    // 📄 TimeUnit Component
    // ========================================

    function TimeUnit({ value, label, color }) {
      return (
        <div className="flex flex-col items-center">
          <div className={`text-4xl sm:text-5xl font-black tabular-nums ${color}`}>
            {String(value).padStart(2, '0')}
          </div>
          <div className="text-xs text-gray-400 mt-1 font-medium">{label}</div>
        </div>
      );
    }

    function Separator() {
      return (
        <div className="flex flex-col items-center justify-center pb-5">
          <span className="text-2xl sm:text-3xl font-bold text-gray-300 pulse-dot">:</span>
        </div>
      );
    }

    // ========================================
    // 📄 CountdownDisplay Component
    // ========================================

    function CountdownDisplay({ item, onDelete }) {
      const [remaining, setRemaining] = useState(() => calcRemaining(item.date));

      useEffect(() => {
        const timer = setInterval(() => {
          setRemaining(calcRemaining(item.date));
        }, 1000);
        return () => clearInterval(timer);
      }, [item.date]);

      const targetDate = new Date(item.date);
      const dateStr = `${targetDate.getFullYear()}. ${targetDate.getMonth() + 1}. ${targetDate.getDate()}. ${String(targetDate.getHours()).padStart(2, '0')}:${String(targetDate.getMinutes()).padStart(2, '0')}`;

      const progressPercent = remaining.passed ? 100 : Math.max(0, Math.min(100,
        ((Date.now() - item.createdAt) / (new Date(item.date) - item.createdAt)) * 100
      ));

      return (
        <Card className="fade-in mb-4">
          <div className="flex justify-between items-start mb-4">
            <div>
              <h2 className="text-xl font-black text-gray-800">{item.title}</h2>
              <p className="text-sm text-gray-400 mt-1">{dateStr}</p>
            </div>
            <button
              onClick={() => onDelete(item.id)}
              className="text-gray-300 hover:text-red-400 transition-colors text-lg"
              aria-label="삭제"
            >
              &times;
            </button>
          </div>

          {remaining.passed ? (
            <div className="text-center py-4">
              <div className="text-sm font-medium text-rose-400 mb-3">지난 지</div>
              <div className="flex justify-center items-center gap-2 sm:gap-4">
                <TimeUnit value={remaining.days} label="일" color="text-rose-500" />
                <Separator />
                <TimeUnit value={remaining.hours} label="시간" color="text-rose-500" />
                <Separator />
                <TimeUnit value={remaining.minutes} label="분" color="text-rose-500" />
                <Separator />
                <TimeUnit value={remaining.seconds} label="초" color="text-rose-500" />
              </div>
            </div>
          ) : (
            <div className="text-center py-4">
              <div className="text-sm font-medium text-indigo-400 mb-3">남은 시간</div>
              <div className="flex justify-center items-center gap-2 sm:gap-4">
                <TimeUnit value={remaining.days} label="일" color="text-indigo-600" />
                <Separator />
                <TimeUnit value={remaining.hours} label="시간" color="text-indigo-600" />
                <Separator />
                <TimeUnit value={remaining.minutes} label="분" color="text-indigo-600" />
                <Separator />
                <TimeUnit value={remaining.seconds} label="초" color="text-indigo-600" />
              </div>
            </div>
          )}

          {/* 진행률 바 */}
          <div className="mt-4">
            <div className="flex justify-between text-xs text-gray-400 mb-1">
              <span>진행률</span>
              <span>{Math.round(progressPercent)}%</span>
            </div>
            <div className="w-full bg-gray-100 rounded-full h-2 overflow-hidden">
              <div
                className={`h-full rounded-full transition-all duration-1000 ${remaining.passed ? 'bg-rose-400' : 'bg-indigo-400'}`}
                style={{ width: `${progressPercent}%` }}
              />
            </div>
          </div>
        </Card>
      );
    }

    // ========================================
    // 📄 AddForm Component
    // ========================================

    function AddForm({ onAdd, onCancel }) {
      const [title, setTitle] = useState('');
      const [date, setDate] = useState('');
      const [time, setTime] = useState('00:00');
      const [error, setError] = useState('');
      const titleRef = useRef(null);

      useEffect(() => {
        titleRef.current?.focus();
      }, []);

      const handleSubmit = (e) => {
        e.preventDefault();
        if (!title.trim()) {
          setError('제목을 입력해주세요.');
          return;
        }
        if (!date) {
          setError('날짜를 선택해주세요.');
          return;
        }
        setError('');
        const targetDate = new Date(`${date}T${time}:00`);
        onAdd({
          id: Date.now(),
          title: title.trim(),
          date: targetDate.toISOString(),
          createdAt: Date.now(),
        });
      };

      return (
        <Card className="fade-in mb-4">
          <h2 className="text-lg font-bold text-gray-800 mb-4">새 D-Day 추가</h2>
          <form onSubmit={handleSubmit} className="space-y-3">
            <div>
              <label className="text-sm font-medium text-gray-600 block mb-1">제목</label>
              <input
                ref={titleRef}
                type="text"
                value={title}
                onChange={(e) => setTitle(e.target.value)}
                placeholder="예: 여행 출발, 시험일, 기념일..."
                className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-all"
              />
            </div>
            <div className="grid grid-cols-2 gap-3">
              <div>
                <label className="text-sm font-medium text-gray-600 block mb-1">날짜</label>
                <input
                  type="date"
                  value={date}
                  onChange={(e) => setDate(e.target.value)}
                  className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-all"
                />
              </div>
              <div>
                <label className="text-sm font-medium text-gray-600 block mb-1">시간</label>
                <input
                  type="time"
                  value={time}
                  onChange={(e) => setTime(e.target.value)}
                  className="w-full px-4 py-3 rounded-xl border-2 border-gray-200 bg-gray-50 focus:border-indigo-400 focus:outline-none focus:ring-2 focus:ring-indigo-300 transition-all"
                />
              </div>
            </div>

            {error && (
              <div className="bg-red-50 border border-red-200 text-red-600 text-sm rounded-xl px-4 py-3 text-center">
                {error}
              </div>
            )}

            <div className="flex gap-3 pt-2">
              <Button className="flex-1" onClick={() => {}}>
                추가하기
              </Button>
              <Button variant="secondary" onClick={onCancel}>
                취소
              </Button>
            </div>
          </form>
        </Card>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [items, setItems] = useState(() => {
        try {
          const saved = localStorage.getItem('dday-items');
          return saved ? JSON.parse(saved) : [];
        } catch { return []; }
      });
      const [showForm, setShowForm] = useState(false);
      const [now, setNow] = useState(new Date());

      // localStorage 저장
      useEffect(() => {
        localStorage.setItem('dday-items', JSON.stringify(items));
      }, [items]);

      // 현재 시간 실시간 업데이트 (헤더용)
      useEffect(() => {
        const timer = setInterval(() => setNow(new Date()), 1000);
        return () => clearInterval(timer);
      }, []);

      const handleAdd = useCallback((item) => {
        setItems(prev => [item, ...prev]);
        setShowForm(false);
      }, []);

      const handleDelete = useCallback((id) => {
        setItems(prev => prev.filter(item => item.id !== id));
      }, []);

      const formatNow = `${now.getFullYear()}. ${now.getMonth() + 1}. ${now.getDate()}. ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}:${String(now.getSeconds()).padStart(2, '0')}`;

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-100 via-indigo-50 to-purple-100 p-4">
          <div className="max-w-lg mx-auto pt-6 pb-12">
            {/* 헤더 */}
            <div className="text-center mb-8">
              <h1 className="text-3xl font-black text-gray-800 mb-2">D-Day 카운터</h1>
              <p className="text-gray-400 text-sm">목표 날짜까지 남은 시간을 실시간으로 확인하세요</p>
              <div className="mt-3 inline-block bg-white/70 backdrop-blur rounded-full px-4 py-1.5 text-sm text-gray-500 font-mono tabular-nums">
                <span className="inline-block w-2 h-2 bg-green-400 rounded-full mr-2 pulse-dot"></span>
                {formatNow}
              </div>
            </div>

            {/* 추가 버튼 또는 폼 */}
            {showForm ? (
              <AddForm onAdd={handleAdd} onCancel={() => setShowForm(false)} />
            ) : (
              <button
                onClick={() => setShowForm(true)}
                className="w-full mb-6 py-4 rounded-2xl border-2 border-dashed border-gray-300 text-gray-400 font-bold hover:border-indigo-400 hover:text-indigo-500 hover:bg-indigo-50/50 transition-all active:scale-[0.98]"
              >
                + 새 D-Day 추가
              </button>
            )}

            {/* D-Day 목록 */}
            {items.length === 0 && !showForm && (
              <div className="text-center py-16 fade-in">
                <div className="text-5xl mb-4">⏳</div>
                <p className="text-gray-400 font-medium">아직 등록된 D-Day가 없어요</p>
                <p className="text-gray-300 text-sm mt-1">위 버튼을 눌러 첫 D-Day를 추가해보세요</p>
              </div>
            )}

            {items.map(item => (
              <CountdownDisplay key={item.id} item={item} onDelete={handleDelete} />
            ))}
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
