name: Weekly Book Recommendation

on:
  schedule:
    # 매주 월요일 오전 9시 (KST) = 일요일 자정 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: # 수동 실행도 가능

jobs:
  recommend-book:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Add weekly book to Notion
        env:
          NOTION_API_KEY: ${{ secrets.NOTION_API_KEY }}
          NOTION_BOOK_DB_ID: ${{ secrets.NOTION_BOOK_DB_ID }}
        run: node Week-5/reddit-collector/scripts/weekly-book.js
