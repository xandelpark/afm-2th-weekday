<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AFM Design System — shadcn / 4 Palettes Showcase</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Noto+Serif+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            border: 'hsl(var(--border))',
            input: 'hsl(var(--input))',
            ring: 'hsl(var(--ring))',
            background: 'hsl(var(--background))',
            foreground: 'hsl(var(--foreground))',
            primary: { DEFAULT: 'hsl(var(--primary))', foreground: 'hsl(var(--primary-foreground))' },
            secondary: { DEFAULT: 'hsl(var(--secondary))', foreground: 'hsl(var(--secondary-foreground))' },
            destructive: { DEFAULT: 'hsl(var(--destructive))', foreground: 'hsl(var(--destructive-foreground))' },
            muted: { DEFAULT: 'hsl(var(--muted))', foreground: 'hsl(var(--muted-foreground))' },
            accent: { DEFAULT: 'hsl(var(--accent))', foreground: 'hsl(var(--accent-foreground))' },
            popover: { DEFAULT: 'hsl(var(--popover))', foreground: 'hsl(var(--popover-foreground))' },
            card: { DEFAULT: 'hsl(var(--card))', foreground: 'hsl(var(--card-foreground))' },
          },
          borderRadius: { lg: 'var(--radius)', md: 'calc(var(--radius) - 2px)', sm: 'calc(var(--radius) - 4px)' },
        }
      }
    };
  </script>
  <style>
    /* === 페이지 자체는 default light로 시작 === */
    html, body { background: #fafafa; color: #0a0a0a; }
    body {
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }

    /* === 4개 팔레트 = 4개 wrapper class === */
    .palette-default {
      --background: 0 0% 100%; --foreground: 240 10% 3.9%;
      --card: 0 0% 100%; --card-foreground: 240 10% 3.9%;
      --popover: 0 0% 100%; --popover-foreground: 240 10% 3.9%;
      --primary: 240 5.9% 10%; --primary-foreground: 0 0% 98%;
      --secondary: 240 4.8% 95.9%; --secondary-foreground: 240 5.9% 10%;
      --muted: 240 4.8% 95.9%; --muted-foreground: 240 3.8% 46.1%;
      --accent: 240 4.8% 95.9%; --accent-foreground: 240 5.9% 10%;
      --destructive: 0 84.2% 60.2%; --destructive-foreground: 0 0% 98%;
      --border: 240 5.9% 90%; --input: 240 5.9% 90%; --ring: 240 5.9% 10%;
      --radius: 0.5rem;
      font-family: 'Pretendard Variable', 'Pretendard', system-ui, sans-serif;
    }
    .palette-cream {
      --background: 36 33% 97%; --foreground: 0 0% 10%;
      --card: 0 0% 100%; --card-foreground: 0 0% 10%;
      --popover: 0 0% 100%; --popover-foreground: 0 0% 10%;
      --primary: 0 0% 10%; --primary-foreground: 36 33% 97%;
      --secondary: 36 25% 92%; --secondary-foreground: 0 0% 10%;
      --muted: 36 25% 92%; --muted-foreground: 22 9% 47%;
      --accent: 14 47% 59%; --accent-foreground: 0 0% 100%;
      --destructive: 0 70% 50%; --destructive-foreground: 0 0% 100%;
      --border: 36 22% 89%; --input: 36 22% 89%; --ring: 14 47% 59%;
      --radius: 0.75rem;
      font-family: 'Pretendard Variable', 'Pretendard', system-ui, sans-serif;
    }
    .palette-cream .display { font-family: 'Cormorant Garamond', Georgia, serif; font-style: italic; }
    .palette-cinematic {
      --background: 0 0% 2%; --foreground: 16 14% 76%;
      --card: 0 0% 4%; --card-foreground: 16 14% 76%;
      --popover: 0 0% 4%; --popover-foreground: 16 14% 76%;
      --primary: 0 62% 36%; --primary-foreground: 28 70% 92%;
      --secondary: 0 0% 10%; --secondary-foreground: 16 14% 76%;
      --muted: 0 0% 8%; --muted-foreground: 16 10% 55%;
      --accent: 0 62% 30%; --accent-foreground: 28 70% 92%;
      --destructive: 0 80% 45%; --destructive-foreground: 28 70% 92%;
      --border: 16 14% 30%; --input: 16 14% 20%; --ring: 0 62% 36%;
      --radius: 0rem;
      font-family: 'Noto Serif KR', serif;
    }
    .palette-cinematic .display { font-family: 'Cinzel', 'Noto Serif KR', serif; letter-spacing: 0.18em; text-transform: uppercase; }
    .palette-marian {
      --background: 0 0% 100%; --foreground: 0 0% 13%;
      --card: 0 0% 100%; --card-foreground: 0 0% 13%;
      --popover: 0 0% 100%; --popover-foreground: 0 0% 13%;
      --primary: 224 75% 14%; --primary-foreground: 0 0% 100%;
      --secondary: 0 0% 96%; --secondary-foreground: 0 0% 20%;
      --muted: 0 0% 96%; --muted-foreground: 0 0% 40%;
      --accent: 224 75% 14%; --accent-foreground: 0 0% 100%;
      --destructive: 0 70% 45%; --destructive-foreground: 0 0% 100%;
      --border: 0 0% 87%; --input: 0 0% 87%; --ring: 224 75% 14%;
      --radius: 0rem;
      font-family: 'Pretendard Variable', 'Pretendard', 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }
    .palette-marian .display { font-family: 'Helvetica Neue', Helvetica, Inter, Arial, sans-serif; font-weight: 800; letter-spacing: 0.02em; }
    .palette-mono {
      --background: 0 0% 98%; --foreground: 222 47% 11%;
      --card: 0 0% 100%; --card-foreground: 222 47% 11%;
      --popover: 0 0% 100%; --popover-foreground: 222 47% 11%;
      --primary: 215 28% 17%; --primary-foreground: 0 0% 100%;
      --secondary: 220 14% 96%; --secondary-foreground: 222 47% 11%;
      --muted: 220 14% 96%; --muted-foreground: 220 9% 46%;
      --accent: 220 14% 96%; --accent-foreground: 222 47% 11%;
      --destructive: 0 84% 60%; --destructive-foreground: 0 0% 100%;
      --border: 220 13% 91%; --input: 220 13% 91%; --ring: 215 28% 17%;
      --radius: 0.5rem;
      font-family: 'Pretendard Variable', 'Pretendard', system-ui, sans-serif;
    }

    @keyframes softFadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: translateY(0); } }
    .anim-fade-in { animation: softFadeIn 0.28s ease-out; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;
    const cn = (...c) => c.filter(Boolean).join(' ');

    // ==================== shadcn DS (showcase 공용) ====================
    function Button({ variant = "default", size = "default", className = "", ...p }) {
      const base = "inline-flex items-center justify-center gap-2 whitespace-nowrap rounded-md text-sm font-medium ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 disabled:pointer-events-none disabled:opacity-50";
      const variants = {
        default:     "bg-primary text-primary-foreground hover:bg-primary/90",
        destructive: "bg-destructive text-destructive-foreground hover:bg-destructive/90",
        outline:     "border border-input bg-background hover:bg-accent hover:text-accent-foreground",
        secondary:   "bg-secondary text-secondary-foreground hover:bg-secondary/80",
        ghost:       "hover:bg-accent hover:text-accent-foreground",
        link:        "text-primary underline-offset-4 hover:underline",
      };
      const sizes = { default: "h-10 px-4 py-2", sm: "h-9 px-3", lg: "h-11 px-8", icon: "h-10 w-10" };
      return <button className={cn(base, variants[variant], sizes[size], className)} {...p} />;
    }
    function Input({ className = "", ...p }) {
      return <input className={cn("flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2", className)} {...p} />;
    }
    function Label({ className = "", ...p }) { return <label className={cn("text-sm font-medium", className)} {...p} />; }
    function Badge({ variant = "default", className = "", ...p }) {
      const variants = {
        default:     "border-transparent bg-primary text-primary-foreground",
        secondary:   "border-transparent bg-secondary text-secondary-foreground",
        destructive: "border-transparent bg-destructive text-destructive-foreground",
        outline:     "text-foreground",
      };
      return <div className={cn("inline-flex items-center rounded-full border px-2.5 py-0.5 text-xs font-semibold", variants[variant], className)} {...p} />;
    }
    function Checkbox({ checked, onCheckedChange, id, className = "" }) {
      return (
        <button type="button" role="checkbox" aria-checked={checked} id={id}
          onClick={() => onCheckedChange?.(!checked)}
          className={cn("h-4 w-4 shrink-0 rounded-sm border border-primary flex items-center justify-center", checked && "bg-primary text-primary-foreground", className)}>
          {checked && <svg className="h-3 w-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M20 6 9 17l-5-5"/></svg>}
        </button>
      );
    }
    function Switch({ checked, onCheckedChange }) {
      return (
        <button type="button" role="switch" aria-checked={checked}
          onClick={() => onCheckedChange?.(!checked)}
          className={cn("inline-flex h-6 w-11 items-center rounded-full transition-colors", checked ? "bg-primary" : "bg-input")}>
          <span className={cn("block h-5 w-5 rounded-full bg-background shadow transition-transform", checked ? "translate-x-5" : "translate-x-0.5")} />
        </button>
      );
    }

    // ==================== 토큰 색 칩 ====================
    function Swatch({ token, label }) {
      return (
        <div className="flex items-center gap-3 text-xs">
          <div className="w-9 h-9 rounded-md border border-border" style={{ background: `hsl(var(--${token}))` }} />
          <div>
            <div className="font-mono text-foreground">--{token}</div>
            <div className="text-muted-foreground">{label}</div>
          </div>
        </div>
      );
    }

    // ==================== 팔레트 1개 카드 ====================
    function PaletteCard({ name, paletteClass, description, font, radius, accent }) {
      const [agreed, setAgreed] = useState(true);
      const [notif, setNotif] = useState(true);
      return (
        <div className={`${paletteClass} bg-background text-foreground rounded-2xl border border-border overflow-hidden`}>
          {/* Header bar — 외부(default) 토큰을 따르도록 화이트 */}
          <div className="bg-card border-b border-border px-5 py-3 flex items-center justify-between">
            <div>
              <div className="text-sm font-semibold flex items-center gap-2">
                <span className="display text-base">{name}</span>
                <Badge variant="outline" className="text-[10px] py-0">{paletteClass.replace('palette-','')}</Badge>
              </div>
              <div className="text-xs text-muted-foreground">{description}</div>
            </div>
            <div className="text-right text-[10px] text-muted-foreground space-y-0.5">
              <div>{font}</div>
              <div>radius {radius}</div>
            </div>
          </div>

          <div className="p-5 space-y-5">
            {/* 색 스와치 */}
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              <Swatch token="background" label="bg" />
              <Swatch token="foreground" label="text" />
              <Swatch token="primary" label="primary" />
              <Swatch token="secondary" label="secondary" />
              <Swatch token="muted" label="muted" />
              <Swatch token="accent" label="accent" />
              <Swatch token="destructive" label="destructive" />
              <Swatch token="border" label="border" />
              <Swatch token="ring" label="ring" />
            </div>

            {/* 타이포 */}
            <div className="space-y-1">
              <div className="display text-2xl text-foreground">The quick brown fox</div>
              <p className="text-sm text-muted-foreground">jumps over the lazy dog · 한글 본문 — 디자인 시스템은 톤의 약속이다.</p>
            </div>

            {/* 컴포넌트 */}
            <div className="flex flex-wrap gap-2">
              <Button>Primary</Button>
              <Button variant="secondary">Secondary</Button>
              <Button variant="outline">Outline</Button>
              <Button variant="ghost">Ghost</Button>
              <Button variant="destructive">Delete</Button>
            </div>

            <div className="grid grid-cols-2 gap-3">
              <div className="space-y-1.5">
                <Label htmlFor={`in-${paletteClass}`}>이메일</Label>
                <Input id={`in-${paletteClass}`} placeholder="me@example.com" />
              </div>
              <div className="space-y-1.5">
                <Label>스위치</Label>
                <div className="flex items-center gap-3 h-10">
                  <Switch checked={notif} onCheckedChange={setNotif} />
                  <span className="text-sm text-muted-foreground">{notif ? '켜짐' : '꺼짐'}</span>
                </div>
              </div>
            </div>

            <div className="flex flex-wrap items-center gap-2">
              <Checkbox checked={agreed} onCheckedChange={setAgreed} id={`cb-${paletteClass}`} />
              <Label htmlFor={`cb-${paletteClass}`}>약관 동의</Label>
              <Badge>NEW</Badge>
              <Badge variant="secondary">DEMO</Badge>
              <Badge variant="outline">v0.1</Badge>
              <Badge variant="destructive">19+</Badge>
            </div>

            <a href={`templates/${paletteClass.replace('palette-','')}-starter.html`}
               className="block text-center text-xs text-muted-foreground underline underline-offset-4 hover:text-foreground">
              → templates/{paletteClass.replace('palette-','')}-starter.html 열기
            </a>
          </div>
        </div>
      );
    }

    // ==================== App ====================
    function App() {
      return (
        <div className="min-h-screen bg-neutral-50">
          <header className="border-b bg-white">
            <div className="max-w-6xl mx-auto px-6 py-6">
              <div className="text-xs uppercase tracking-[0.2em] text-neutral-500">AFM Design System</div>
              <h1 className="text-2xl font-semibold mt-1">shadcn/ui 토큰 기반 4-팔레트 시스템</h1>
              <p className="text-sm text-neutral-600 mt-2 max-w-2xl">
                동일한 컴포넌트 코드 위에서 CSS 변수만 교체해 톤을 바꾸는 디자인 시스템.
                새 프로젝트를 시작할 때는 <code className="font-mono bg-neutral-100 px-1.5 py-0.5 rounded text-[12px]">templates/&lt;팔레트&gt;-starter.html</code>를 복사하세요.
              </p>
              <div className="flex gap-2 mt-4 flex-wrap">
                <a href="README.md" className="text-xs px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200">README</a>
                <a href="tokens.md" className="text-xs px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200">tokens.md</a>
                <a href="components.md" className="text-xs px-3 py-1 rounded-full bg-neutral-100 hover:bg-neutral-200">components.md</a>
              </div>
            </div>
          </header>

          <main className="max-w-6xl mx-auto px-6 py-10 grid lg:grid-cols-2 gap-6 anim-fade-in">
            <PaletteCard
              name="shadcn Default"
              paletteClass="palette-default"
              description="신규 프로젝트 기본값 (neutral light)"
              font="Pretendard"
              radius="0.5rem"
            />
            <PaletteCard
              name="Editorial Cream"
              paletteClass="palette-cream"
              description="따뜻한 종이 톤 + 테라코타 액센트 — 사용자 앱/툴/대시보드"
              font="Pretendard + Cormorant"
              radius="0.75rem"
            />
            <PaletteCard
              name="Cinematic Dark"
              paletteClass="palette-cinematic"
              description="영화적 다크 + 핏빛 액센트 — 영상/포스터/티저"
              font="Noto Serif KR + Cinzel"
              radius="0rem"
            />
            <PaletteCard
              name="Marian Editorial"
              paletteClass="palette-marian"
              description="딥 네이비 + 풀블리드 사진 — 웨딩/포토 스튜디오 (marianwedding.co.kr 무드)"
              font="Pretendard + Helvetica Bold"
              radius="0rem"
            />
            <PaletteCard
              name="Mono Utility"
              paletteClass="palette-mono"
              description="회색 중성 — 결제/관리자/B2B"
              font="Pretendard"
              radius="0.5rem"
            />
          </main>

          <footer className="max-w-6xl mx-auto px-6 py-10 text-xs text-neutral-500 border-t mt-10">
            기본값을 정하지 못했다면 <strong>shadcn Default</strong>를 사용하세요. 한국어 본문이 많거나 따뜻한 인상이 필요하면 <strong>Editorial Cream</strong>이 권장.
          </footer>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
