<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn { from { opacity:0; transform:translateY(4px); } to { opacity:1; transform:translateY(0); } }
    .fade-in { animation: fadeIn 0.2s ease-out; }
    .done-text { text-decoration: line-through; }
  </style>
</head>
<body class="bg-neutral-50 min-h-screen">
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback, useEffect } = React;

    // ========================================
    // 🔐 Auth Helper
    // ========================================

    function authFetch(url, options = {}) {
      const token = localStorage.getItem('token');
      return fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          ...(token ? { Authorization: `Bearer ${token}` } : {}),
          ...options.headers,
        }
      });
    }

    // ========================================
    // 🔑 AuthPage Component
    // ========================================

    function AuthPage({ onLogin }) {
      const [mode, setMode] = useState('login');
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [name, setName] = useState('');
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const submit = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);
        try {
          const body = mode === 'login'
            ? { email, password }
            : { email, password, name };
          const res = await fetch(`/api/${mode === 'login' ? 'login' : 'signup'}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(body)
          });
          const data = await res.json();
          if (data.error) { setError(data.error); return; }
          localStorage.setItem('token', data.token);
          onLogin(data.user);
        } catch {
          setError('서버 연결에 실패했습니다');
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="max-w-sm mx-auto px-4 py-20">
          <h1 className="text-2xl font-bold text-neutral-800 mb-1">Todo</h1>
          <p className="text-sm text-neutral-400 mb-8">{mode === 'login' ? '로그인하고 할 일을 관리하세요' : '계정을 만들어보세요'}</p>

          <form onSubmit={submit} className="space-y-3">
            {mode === 'signup' && (
              <input
                value={name}
                onChange={e => setName(e.target.value)}
                placeholder="이름"
                required
                className="w-full px-4 py-3 bg-white border border-neutral-200 rounded-lg text-sm focus:outline-none focus:border-neutral-400"
              />
            )}
            <input
              type="email"
              value={email}
              onChange={e => setEmail(e.target.value)}
              placeholder="이메일"
              required
              className="w-full px-4 py-3 bg-white border border-neutral-200 rounded-lg text-sm focus:outline-none focus:border-neutral-400"
            />
            <input
              type="password"
              value={password}
              onChange={e => setPassword(e.target.value)}
              placeholder="비밀번호"
              required
              className="w-full px-4 py-3 bg-white border border-neutral-200 rounded-lg text-sm focus:outline-none focus:border-neutral-400"
            />

            {error && <p className="text-red-500 text-xs">{error}</p>}

            <button
              type="submit"
              disabled={loading}
              className="w-full py-3 bg-neutral-800 text-white text-sm font-medium rounded-lg hover:bg-neutral-700 disabled:opacity-50 transition-colors"
            >
              {loading ? '...' : mode === 'login' ? '로그인' : '회원가입'}
            </button>
          </form>

          <p className="text-center text-xs text-neutral-400 mt-6">
            {mode === 'login' ? '계정이 없으신가요?' : '이미 계정이 있으신가요?'}
            <button
              onClick={() => { setMode(mode === 'login' ? 'signup' : 'login'); setError(''); }}
              className="text-neutral-800 font-medium ml-1 hover:underline"
            >
              {mode === 'login' ? '회원가입' : '로그인'}
            </button>
          </p>
        </div>
      );
    }

    // ========================================
    // ✅ TodoPage Component
    // ========================================

    function TodoPage({ user, onLogout }) {
      const [todos, setTodos] = useState([]);
      const [input, setInput] = useState('');
      const [filter, setFilter] = useState('all');

      const fetchTodos = useCallback(async () => {
        const res = await authFetch('/api/todos');
        if (res.ok) setTodos(await res.json());
      }, []);

      useEffect(() => { fetchTodos(); }, [fetchTodos]);

      const add = useCallback(async () => {
        const t = input.trim();
        if (!t) return;
        setInput('');
        await authFetch('/api/todos', {
          method: 'POST',
          body: JSON.stringify({ text: t })
        });
        fetchTodos();
      }, [input, fetchTodos]);

      const toggle = useCallback(async (id) => {
        await authFetch(`/api/todos/${id}/toggle`, { method: 'PATCH' });
        fetchTodos();
      }, [fetchTodos]);

      const remove = useCallback(async (id) => {
        await authFetch(`/api/todos/${id}`, { method: 'DELETE' });
        fetchTodos();
      }, [fetchTodos]);

      const clearDone = useCallback(async () => {
        await authFetch('/api/todos/done', { method: 'DELETE' });
        fetchTodos();
      }, [fetchTodos]);

      const filtered = todos.filter(t =>
        filter === 'all' ? true : filter === 'active' ? !t.completed : t.completed
      );
      const doneCount = todos.filter(t => t.completed).length;
      const activeCount = todos.length - doneCount;

      return (
        <div className="max-w-md mx-auto px-4 py-10">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <h1 className="text-2xl font-bold text-neutral-800">Todo</h1>
              <p className="text-xs text-neutral-400">{user.name}님</p>
            </div>
            <button
              onClick={onLogout}
              className="text-xs text-neutral-400 hover:text-neutral-600 transition-colors"
            >
              로그아웃
            </button>
          </div>

          {/* Input */}
          <div className="flex gap-2 mb-6">
            <input
              value={input}
              onChange={e => setInput(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && add()}
              placeholder="할 일을 입력하세요"
              className="flex-1 px-4 py-3 bg-white border border-neutral-200 rounded-lg text-sm focus:outline-none focus:border-neutral-400 transition-colors"
            />
            <button
              onClick={add}
              disabled={!input.trim()}
              className="px-5 py-3 bg-neutral-800 text-white text-sm font-medium rounded-lg hover:bg-neutral-700 disabled:opacity-30 transition-colors"
            >
              추가
            </button>
          </div>

          {/* Filter */}
          {todos.length > 0 && (
            <div className="flex items-center justify-between mb-4">
              <div className="flex gap-1">
                {['all', 'active', 'done'].map(f => (
                  <button
                    key={f}
                    onClick={() => setFilter(f)}
                    className={`px-3 py-1 text-xs rounded-full transition-colors ${
                      filter === f
                        ? 'bg-neutral-800 text-white'
                        : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'
                    }`}
                  >
                    {f === 'all' ? `전체 ${todos.length}` : f === 'active' ? `남은 할 일 ${activeCount}` : `완료 ${doneCount}`}
                  </button>
                ))}
              </div>
              {doneCount > 0 && (
                <button onClick={clearDone} className="text-xs text-neutral-400 hover:text-neutral-600 transition-colors">
                  완료 삭제
                </button>
              )}
            </div>
          )}

          {/* Todo List */}
          <ul className="space-y-1.5">
            {filtered.map(todo => (
              <li key={todo.id} className="flex items-center gap-3 bg-white border border-neutral-100 rounded-lg px-4 py-3 group fade-in">
                <button onClick={() => toggle(todo.id)} className="shrink-0">
                  <div className={`w-5 h-5 rounded-full border-2 flex items-center justify-center transition-colors ${
                    todo.completed ? 'bg-neutral-800 border-neutral-800' : 'border-neutral-300 hover:border-neutral-400'
                  }`}>
                    {todo.completed && (
                      <svg className="w-3 h-3 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                      </svg>
                    )}
                  </div>
                </button>
                <span className={`flex-1 text-sm transition-colors ${todo.completed ? 'done-text text-neutral-300' : 'text-neutral-700'}`}>
                  {todo.text}
                </span>
                <button
                  onClick={() => remove(todo.id)}
                  className="text-neutral-300 hover:text-neutral-500 opacity-0 group-hover:opacity-100 transition-all text-lg leading-none"
                >
                  &times;
                </button>
              </li>
            ))}
          </ul>

          {/* Empty */}
          {todos.length === 0 && (
            <div className="text-center py-16 text-neutral-300">
              <p className="text-sm">할 일을 추가해보세요</p>
            </div>
          )}
          {todos.length > 0 && filtered.length === 0 && (
            <div className="text-center py-10 text-neutral-300">
              <p className="text-sm">{filter === 'active' ? '남은 할 일이 없어요!' : '완료된 항목이 없어요'}</p>
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 👑 AdminPage Component
    // ========================================

    function AdminPage({ user, onLogout, onBack }) {
      const [stats, setStats] = useState(null);
      const [users, setUsers] = useState([]);
      const [selectedUser, setSelectedUser] = useState(null);
      const [userTodos, setUserTodos] = useState([]);
      const [tab, setTab] = useState('users');

      const fetchStats = useCallback(async () => {
        const res = await authFetch('/api/admin/stats');
        if (res.ok) setStats(await res.json());
      }, []);

      const fetchUsers = useCallback(async () => {
        const res = await authFetch('/api/admin/users');
        if (res.ok) setUsers(await res.json());
      }, []);

      const fetchUserTodos = useCallback(async (userId) => {
        const res = await authFetch(`/api/admin/users/${userId}/todos`);
        if (res.ok) setUserTodos(await res.json());
      }, []);

      useEffect(() => { fetchStats(); fetchUsers(); }, [fetchStats, fetchUsers]);

      const deleteUser = useCallback(async (id, name) => {
        if (!confirm(`"${name}" 사용자를 삭제하시겠습니까? 모든 할 일도 함께 삭제됩니다.`)) return;
        await authFetch(`/api/admin/users/${id}`, { method: 'DELETE' });
        fetchUsers();
        fetchStats();
        if (selectedUser === id) { setSelectedUser(null); setUserTodos([]); }
      }, [fetchUsers, fetchStats, selectedUser]);

      const deleteTodo = useCallback(async (id) => {
        await authFetch(`/api/admin/todos/${id}`, { method: 'DELETE' });
        if (selectedUser) fetchUserTodos(selectedUser);
        fetchStats();
      }, [selectedUser, fetchUserTodos, fetchStats]);

      const selectUser = useCallback((id) => {
        setSelectedUser(id);
        fetchUserTodos(id);
      }, [fetchUserTodos]);

      return (
        <div className="max-w-2xl mx-auto px-4 py-10">
          {/* Header */}
          <div className="flex items-center justify-between mb-6">
            <div>
              <h1 className="text-2xl font-bold text-neutral-800">관리자 대시보드</h1>
              <p className="text-xs text-neutral-400">{user.name} (슈퍼관리자)</p>
            </div>
            <div className="flex gap-3">
              <button onClick={onBack} className="text-xs text-neutral-400 hover:text-neutral-600 transition-colors">내 할 일</button>
              <button onClick={onLogout} className="text-xs text-neutral-400 hover:text-neutral-600 transition-colors">로그아웃</button>
            </div>
          </div>

          {/* Stats */}
          {stats && (
            <div className="grid grid-cols-3 gap-3 mb-6">
              <div className="bg-white border border-neutral-100 rounded-lg p-4 text-center">
                <p className="text-2xl font-bold text-neutral-800">{stats.userCount}</p>
                <p className="text-xs text-neutral-400">전체 사용자</p>
              </div>
              <div className="bg-white border border-neutral-100 rounded-lg p-4 text-center">
                <p className="text-2xl font-bold text-neutral-800">{stats.todoCount}</p>
                <p className="text-xs text-neutral-400">전체 할 일</p>
              </div>
              <div className="bg-white border border-neutral-100 rounded-lg p-4 text-center">
                <p className="text-2xl font-bold text-blue-600">{stats.doneCount}</p>
                <p className="text-xs text-neutral-400">완료된 할 일</p>
              </div>
            </div>
          )}

          {/* Tabs */}
          <div className="flex gap-1 mb-4">
            <button
              onClick={() => { setTab('users'); setSelectedUser(null); setUserTodos([]); }}
              className={`px-3 py-1 text-xs rounded-full transition-colors ${tab === 'users' ? 'bg-neutral-800 text-white' : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}`}
            >사용자 목록</button>
            <button
              onClick={() => setTab('todos')}
              className={`px-3 py-1 text-xs rounded-full transition-colors ${tab === 'todos' ? 'bg-neutral-800 text-white' : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}`}
            >할 일 관리</button>
          </div>

          {/* Users Tab */}
          {tab === 'users' && (
            <ul className="space-y-1.5">
              {users.map(u => (
                <li key={u.id} className="flex items-center gap-3 bg-white border border-neutral-100 rounded-lg px-4 py-3 group fade-in">
                  <div className="flex-1 min-w-0">
                    <div className="flex items-center gap-2">
                      <span className="text-sm font-medium text-neutral-700">{u.name}</span>
                      {u.role === 'admin' && <span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-full font-medium">관리자</span>}
                    </div>
                    <p className="text-xs text-neutral-400">{u.email}</p>
                    <p className="text-xs text-neutral-300 mt-0.5">할 일 {u.todo_count}개 / 완료 {u.done_count}개</p>
                  </div>
                  {u.role !== 'admin' && (
                    <button
                      onClick={() => deleteUser(u.id, u.name)}
                      className="text-neutral-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all text-lg leading-none"
                    >&times;</button>
                  )}
                </li>
              ))}
              {users.length === 0 && <p className="text-center py-10 text-sm text-neutral-300">등록된 사용자가 없습니다</p>}
            </ul>
          )}

          {/* Todos Tab */}
          {tab === 'todos' && (
            <div>
              {/* User selector */}
              <div className="flex flex-wrap gap-1.5 mb-4">
                {users.map(u => (
                  <button
                    key={u.id}
                    onClick={() => selectUser(u.id)}
                    className={`px-3 py-1 text-xs rounded-full transition-colors ${selectedUser === u.id ? 'bg-neutral-700 text-white' : 'bg-neutral-100 text-neutral-500 hover:bg-neutral-200'}`}
                  >{u.name} ({u.todo_count})</button>
                ))}
              </div>

              {!selectedUser && <p className="text-center py-10 text-sm text-neutral-300">사용자를 선택하세요</p>}

              {selectedUser && (
                <ul className="space-y-1.5">
                  {userTodos.map(todo => (
                    <li key={todo.id} className="flex items-center gap-3 bg-white border border-neutral-100 rounded-lg px-4 py-3 group fade-in">
                      <div className={`w-4 h-4 rounded-full border-2 flex items-center justify-center shrink-0 ${todo.completed ? 'bg-neutral-800 border-neutral-800' : 'border-neutral-300'}`}>
                        {todo.completed && (
                          <svg className="w-2.5 h-2.5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={3} d="M5 13l4 4L19 7" />
                          </svg>
                        )}
                      </div>
                      <span className={`flex-1 text-sm ${todo.completed ? 'done-text text-neutral-300' : 'text-neutral-700'}`}>{todo.text}</span>
                      <button
                        onClick={() => deleteTodo(todo.id)}
                        className="text-neutral-300 hover:text-red-400 opacity-0 group-hover:opacity-100 transition-all text-lg leading-none"
                      >&times;</button>
                    </li>
                  ))}
                  {userTodos.length === 0 && <p className="text-center py-10 text-sm text-neutral-300">할 일이 없습니다</p>}
                </ul>
              )}
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      const [user, setUser] = useState(null);
      const [checking, setChecking] = useState(true);
      const [page, setPage] = useState('todo');

      useEffect(() => {
        const token = localStorage.getItem('token');
        if (!token) { setChecking(false); return; }
        authFetch('/api/me')
          .then(res => res.ok ? res.json() : Promise.reject())
          .then(data => {
            setUser(data.user);
            if (data.user.role === 'admin') setPage('admin');
          })
          .catch(() => localStorage.removeItem('token'))
          .finally(() => setChecking(false));
      }, []);

      const handleLogin = (u) => {
        setUser(u);
        if (u.role === 'admin') setPage('admin');
        else setPage('todo');
      };

      const logout = () => {
        localStorage.removeItem('token');
        setUser(null);
        setPage('todo');
      };

      if (checking) return null;
      if (!user) return <AuthPage onLogin={handleLogin} />;
      if (user.role === 'admin' && page === 'admin') {
        return <AdminPage user={user} onLogout={logout} onBack={() => setPage('todo')} />;
      }
      return (
        <React.Fragment>
          <TodoPage user={user} onLogout={logout} />
          {user.role === 'admin' && (
            <div className="text-center pb-6">
              <button onClick={() => setPage('admin')} className="text-xs text-neutral-400 hover:text-neutral-600 transition-colors">관리자 대시보드</button>
            </div>
          )}
        </React.Fragment>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
