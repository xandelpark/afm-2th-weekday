<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soft Studio — 아기 카툰 쇼츠 메이커</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Gamja+Flower&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <!-- html2canvas: 미리보기 영역을 매 프레임 canvas로 그려서 영상 녹화 -->
  <script src="https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <!-- 한글 영상 자막용 폰트 패밀리 (제목/캡션 스타일 프리셋용) -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Dodum&family=Gaegu:wght@700&family=Noto+Serif+KR:wght@700;900&family=Noto+Sans+KR:wght@700;900&display=swap" rel="stylesheet">
  <script>
    // Tailwind 토큰 확장 — Editorial Cream 팔레트
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            cream:    '#FAF7F2',
            paper:    '#FFFFFF',
            ink:      '#1A1A1A',
            muted:    '#7B7470',
            faint:    '#A8A29A',
            hairline: '#E8E4DD',
            accent:   '#C97B63',     // terracotta
            accentSoft: '#F2DDD3',
            sage:     '#9CAF88',
          },
          fontFamily: {
            sans: ['Pretendard Variable', 'Pretendard', '-apple-system', 'BlinkMacSystemFont', 'system-ui', 'sans-serif'],
            serif: ['"Cormorant Garamond"', 'Georgia', 'serif'],
            cute: ['Gaegu', '"Gamja Flower"', 'Pretendard', 'cursive'],
          },
        }
      }
    };
  </script>
  <style>
    body {
      background: #FAF7F2;
      min-height: 100vh;
      font-family: 'Pretendard Variable', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      color: #1A1A1A;
      -webkit-font-smoothing: antialiased;
      letter-spacing: -0.005em;
    }
    /* 귀여운 말풍선 — 꼬리 포함 */
    .bubble-cute {
      font-family: 'Gaegu', 'Gamja Flower', 'Pretendard', cursive;
      font-weight: 700;
      font-size: 17px;
      line-height: 1.25;
      letter-spacing: -0.01em;
      background: #FFFDF7;
      color: #1A1A1A;
      border: 2.2px solid #1A1A1A;
      border-radius: 22px;
      padding: 8px 14px 10px;
      position: relative;
      max-width: 100%;
      word-break: keep-all;
      box-shadow: 0 1px 0 rgba(26,26,26,0.05);
      animation: bubblePop 0.18s ease-out;
    }
    @keyframes bubblePop {
      from { opacity: 0; transform: scale(0.92); }
      to   { opacity: 1; transform: scale(1); }
    }
    /* 꼬리 — 왼쪽 (말풍선이 캐릭터의 오른쪽에 있을 때, 꼬리는 왼쪽으로 캐릭터 가리킴) */
    .bubble-cute.tail-left::before,
    .bubble-cute.tail-left::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-style: solid;
    }
    .bubble-cute.tail-left::before {
      left: -12px;
      border-width: 9px 12px 9px 0;
      border-color: transparent #1A1A1A transparent transparent;
    }
    .bubble-cute.tail-left::after {
      left: -8px;
      border-width: 7px 10px 7px 0;
      border-color: transparent #FFFDF7 transparent transparent;
    }
    /* 꼬리 — 오른쪽 (말풍선이 캐릭터의 왼쪽에 있을 때) */
    .bubble-cute.tail-right::before,
    .bubble-cute.tail-right::after {
      content: '';
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 0; height: 0;
      border-style: solid;
    }
    .bubble-cute.tail-right::before {
      right: -12px;
      border-width: 9px 0 9px 12px;
      border-color: transparent transparent transparent #1A1A1A;
    }
    .bubble-cute.tail-right::after {
      right: -8px;
      border-width: 7px 0 7px 10px;
      border-color: transparent transparent transparent #FFFDF7;
    }

    /* 부드럽게 떠오르는 fade — 장식 최소화 */
    @keyframes softFadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .anim-fade-in { animation: softFadeIn 0.28s ease-out; }

    /* 숨겨진 진짜 file input (자리만) */
    .file-input-hidden { position: absolute; inset: 0; opacity: 0; cursor: pointer; }

    /* wordmark 트래킹 */
    .wordmark { letter-spacing: 0.18em; }

    /* number 텍스트 — 모노스페이스 느낌 */
    .num { font-feature-settings: 'tnum' 1; font-variant-numeric: tabular-nums; }

    /* 인라인 텍스트 편집 호버 */
    .editable:hover { box-shadow: inset 0 -1px 0 0 #C97B63; }

    /* 캐릭터 talking 애니메이션 — subtle bob */
    @keyframes talkBob {
      0%, 100% { transform: translateY(0) scale(1);   }
      50%      { transform: translateY(-4px) scale(1.02); }
    }
    .avatar-talking { animation: talkBob 0.42s ease-in-out infinite; transform-origin: center bottom; }

    /* 입 모양 — 말할 때 살짝 벌어지는 효과 */
    @keyframes mouthTalk {
      0%, 100% { transform: scaleY(1);   }
      50%      { transform: scaleY(0.45); }
    }
    .mouth-talking { animation: mouthTalk 0.32s ease-in-out infinite; transform-origin: center; transform-box: fill-box; }

    /* idle breathing — 재생 중 아닌 캐릭터에게 미세 호흡 */
    @keyframes breathe {
      0%, 100% { transform: scale(1); }
      50%      { transform: scale(1.008); }
    }
    .avatar-idle { animation: breathe 3.2s ease-in-out infinite; transform-origin: center bottom; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    // ========================================
    // React Hooks Destructuring
    // ========================================
    const { useState, useMemo, useCallback, useEffect, useRef } = React;

    // ========================================
    // 더미 데이터 / 상수
    // ========================================
    const DUMMY_SEGMENTS = [
      { id: 1, start: 0.0,  end: 2.5,  text: "우리 아기 잘 잤어?",        speaker: "A" },
      { id: 2, start: 2.6,  end: 4.2,  text: "응애에에",                  speaker: "B" },
      { id: 3, start: 4.3,  end: 6.8,  text: "배고프구나~ 우유 줄게",     speaker: "A" },
      { id: 4, start: 6.9,  end: 8.5,  text: "꺄르륵",                    speaker: "B" },
      { id: 5, start: 8.6,  end: 10.5, text: "아빠도 같이 먹을까?",       speaker: "C" },
      { id: 6, start: 10.6, end: 12.0, text: "옹알옹알",                  speaker: "B" },
    ];

    const ROLES = [
      { key: "dad",  label: "Father" , kr: "아빠" },
      { key: "mom",  label: "Mother" , kr: "엄마" },
      { key: "baby", label: "Baby"   , kr: "아기" },
    ];

    const SPEAKER_KEYS = ["A", "B", "C"];

    // 화자별 — 모노톤 명도 변형(액센트 톤 변형) 으로 절제된 구분
    const SPEAKER_COLORS = {
      A: { dot: "bg-[#C97B63]",   chip: "bg-[#F2DDD3] text-[#7A3A28]", bar: "bg-[#C97B63]" },
      B: { dot: "bg-[#9CAF88]",   chip: "bg-[#E5EAD9] text-[#48553A]", bar: "bg-[#9CAF88]" },
      C: { dot: "bg-[#7B7470]",   chip: "bg-[#E8E4DD] text-[#3A3530]", bar: "bg-[#7B7470]" },
    };

    const BABY_ONOMATOPOEIA = ["응애", "꺄르륵", "옹알옹알", "꺅", "헤헤", "아바바"];

    const STEPS = [
      { id: 1, key: "upload",    label: "Upload",     kr: "업로드"   },
      { id: 2, key: "label",     label: "Label",      kr: "라벨"     },
      { id: 3, key: "character", label: "Character",  kr: "캐릭터"   },
      { id: 4, key: "preview",   label: "Preview",    kr: "미리보기" },
      { id: 5, key: "export",    label: "Export",     kr: "내보내기" },
    ];

    // 시간(초)을 mm:ss.s 형식으로 변환
    const fmtTime = (sec) => {
      const m = Math.floor(sec / 60);
      const s = (sec - m * 60).toFixed(1);
      return `${m}:${s.padStart(4, "0")}`;
    };

    // ========================================
    // Inline SVG Icons — stroke 1.5, 16~20px
    // ========================================
    const Icon = {
      upload: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M12 4v12"/><path d="m7 9 5-5 5 5"/><path d="M5 20h14"/>
        </svg>
      ),
      file: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||18} height={p.size||18} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M14 3H7a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V8z"/><path d="M14 3v5h5"/>
        </svg>
      ),
      arrowRight: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M5 12h14"/><path d="m13 5 7 7-7 7"/>
        </svg>
      ),
      arrowLeft: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M19 12H5"/><path d="m11 19-7-7 7-7"/>
        </svg>
      ),
      check: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M20 6 9 17l-5-5"/>
        </svg>
      ),
      lock: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <rect width="14" height="10" x="5" y="11" rx="1.5"/><path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        </svg>
      ),
      play: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <polygon points="6 4 20 12 6 20 6 4" fill="currentColor" stroke="none"/>
        </svg>
      ),
      pause: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <rect x="6" y="5" width="4" height="14" fill="currentColor" stroke="none"/>
          <rect x="14" y="5" width="4" height="14" fill="currentColor" stroke="none"/>
        </svg>
      ),
      download: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><path d="M7 10l5 5 5-5"/><path d="M12 15V3"/>
        </svg>
      ),
      share: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||16} height={p.size||16} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><path d="m16 6-4-4-4 4"/><path d="M12 2v13"/>
        </svg>
      ),
      clock: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||14} height={p.size||14} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/>
        </svg>
      ),
      // 사람 흉상 silhouette (캐릭터 placeholder용)
      bust: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||32} height={p.size||32} viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <circle cx="32" cy="22" r="10"/>
          <path d="M14 54c0-10 8-16 18-16s18 6 18 16"/>
        </svg>
      ),
      // 작은 아기 (조금 더 둥근 머리 — 그래도 모노크롬 라인)
      bustSmall: (p) => (
        <svg xmlns="http://www.w3.org/2000/svg" width={p.size||32} height={p.size||32} viewBox="0 0 64 64" fill="none" stroke="currentColor" strokeWidth="1.25" strokeLinecap="round" strokeLinejoin="round" className={p.className}>
          <circle cx="32" cy="26" r="11"/>
          <path d="M18 56c0-8 6-14 14-14s14 6 14 14"/>
        </svg>
      ),
    };

    // ========================================
    // Avatar — 카툰 캐릭터 (역할별 + variant별 컬러 팔레트)
    //   role: 'dad' | 'mom' | 'baby'
    //   variant: 1~5 (피부톤·머리색 변형)
    //   talking: bool — 말하는 동안 bob + 입 벌어짐 애니메이션
    //   idle: bool — talking이 아닐 때도 살짝 호흡
    // 향후 실제 PNG로 교체할 때는 이 컴포넌트만 갈아끼우면 됨.
    // ========================================
    const PALETTE = {
      dad: [
        { skin: '#F4D8C5', hair: '#3A2E26', cheek: '#E8B5A0' },
        { skin: '#E8C8B0', hair: '#5C4030', cheek: '#D9A38A' },
        { skin: '#F0CFB8', hair: '#7A5C42', cheek: '#E0AC95' },
        { skin: '#D4A98A', hair: '#1F1815', cheek: '#B88B6F' },
        { skin: '#F8E2D0', hair: '#9C6F44', cheek: '#EFC5AB' },
      ],
      mom: [
        { skin: '#F8DDD0', hair: '#4A3325', cheek: '#EAB6A0' },
        { skin: '#F2D2C0', hair: '#6B4A2F', cheek: '#DEAA92' },
        { skin: '#FBE3D2', hair: '#A47147', cheek: '#F1C5AB' },
        { skin: '#E5C4AC', hair: '#2C1F18', cheek: '#CC9A82' },
        { skin: '#FCE4D6', hair: '#8B5E3F', cheek: '#F2C4A7' },
      ],
      baby: [
        { skin: '#FBE3D6', hair: '#5C3F2D', cheek: '#F4B5A1' },
        { skin: '#F8DDD0', hair: '#735544', cheek: '#EFAA92' },
        { skin: '#FCE7DA', hair: '#3F2C20', cheek: '#F4B6A2' },
        { skin: '#EFD2BE', hair: '#9C7855', cheek: '#E2A990' },
        { skin: '#FBDFCE', hair: '#5E412F', cheek: '#F2B19E' },
      ],
    };

    // 5가지 그림체 스타일 메타
    const CHAR_STYLES = [
      { key: 'current',  label: '소프트 일러스트', hint: '지금 그림체' },
      { key: 'stickman', label: '졸라맨 코믹',     hint: '단순선' },
      { key: 'disney',   label: '디즈니풍',         hint: '3D 카툰' },
      { key: 'webtoon',  label: '웹툰풍',           hint: '한국 만화' },
      { key: 'chimchak', label: '침착맨풍',         hint: '굵은선 만화' },
    ];

    function Avatar({ role = 'dad', variant = 1, talking = false, idle = false, size = 96, fill = false, style = 'current' }) {
      const wrapCls = talking ? 'avatar-talking' : (idle ? 'avatar-idle' : '');
      const wrapStyle = fill
        ? { display: 'block', width: '100%', height: '100%', lineHeight: 0 }
        : { display: 'inline-block', width: size, height: size, lineHeight: 0 };

      // PNG 기반 스타일 (디즈니/웹툰/침착맨) — public/characters/{style}/{role}.png
      if (['disney', 'webtoon', 'chimchak'].includes(style)) {
        return <ImageAvatar style={style} role={role} wrapCls={wrapCls} wrapStyle={wrapStyle} />;
      }

      // 졸라맨 SVG
      if (style === 'stickman') {
        return (
          <div className={wrapCls} style={wrapStyle}>
            <svg
              xmlns="http://www.w3.org/2000/svg"
              width={fill ? '100%' : size}
              height={fill ? '100%' : size}
              viewBox="0 0 200 200"
              preserveAspectRatio="xMidYMid meet"
              aria-hidden="true"
            >
              <rect width="200" height="200" rx="24" fill="#FFFDF7" />
              <StickmanContent role={role} talking={talking} />
            </svg>
          </div>
        );
      }

      // current — 기존 소프트 일러스트
      const palette = PALETTE[role] || PALETTE.dad;
      const c = palette[Math.min(Math.max(variant - 1, 0), palette.length - 1)];
      const mouthCls = talking ? 'mouth-talking' : '';

      // 공통 배경 둥근 카드
      const bg = (
        <>
          <rect width="200" height="200" rx="24" fill="#FFF6EE" />
          <circle cx="100" cy="200" r="120" fill="#F5E5D6" opacity="0.55" />
        </>
      );

      let content = null;

      if (role === 'baby') {
        // 큰 머리 / 작은 몸통 / 머리카락 한 가닥 / 큰 눈
        content = (
          <g>
            {/* 몸통 (작게) */}
            <ellipse cx="100" cy="172" rx="44" ry="22" fill={c.skin} />
            <rect x="62" y="158" width="76" height="32" rx="14" fill="#C8DACF" />
            {/* 머리 — 매우 둥글게 */}
            <circle cx="100" cy="100" r="60" fill={c.skin} />
            {/* 머리카락 한 가닥 (위로 삐친) */}
            <path d="M100 38 q-4 -10 0 -16 q4 6 0 16 z" fill={c.hair} />
            <path d="M70 60 q8 -14 30 -16" stroke={c.hair} strokeWidth="3" fill="none" strokeLinecap="round" />
            {/* 볼 발그레 */}
            <circle cx="68" cy="115" r="9" fill={c.cheek} opacity="0.65" />
            <circle cx="132" cy="115" r="9" fill={c.cheek} opacity="0.65" />
            {/* 눈 — 크고 동그란 점 */}
            <circle cx="78" cy="98" r="5.5" fill="#1A1A1A" />
            <circle cx="122" cy="98" r="5.5" fill="#1A1A1A" />
            <circle cx="79.5" cy="96" r="1.6" fill="#FFF" />
            <circle cx="123.5" cy="96" r="1.6" fill="#FFF" />
            {/* 입 — 작은 O */}
            <ellipse className={mouthCls} cx="100" cy="128" rx="6" ry="5" fill="#7A3A28" />
          </g>
        );
      } else if (role === 'mom') {
        content = (
          <g>
            {/* 몸통 + 옷 */}
            <ellipse cx="100" cy="178" rx="60" ry="20" fill="#D9C5DA" />
            <path d="M50 178 q-2 -28 16 -34 h68 q18 6 16 34 z" fill="#D9C5DA" />
            {/* 머리카락 (어깨 길이) — 머리 뒤 */}
            <path d="M44 110 q-2 -52 56 -56 q58 4 56 56 q-2 28 -10 42 q-8 -8 -10 -22 q-6 18 -36 22 q-30 -4 -36 -22 q-2 14 -10 22 q-8 -14 -10 -42 z" fill={c.hair} />
            {/* 얼굴 */}
            <ellipse cx="100" cy="100" rx="44" ry="48" fill={c.skin} />
            {/* 앞머리 — 살짝 가린 */}

    // 긴 자막을 "말하는 듯한" 청크로 쪼개기
    // - 문장부호 우선, 그 다음 공백
    // - 한 청크당 약 14자 이내 목표 (너무 짧지도 길지도 않게)
    function chunkSpokenText(text, maxChars = 14) {
      if (!text) return [];
      const trimmed = String(text).trim();
      if (trimmed.length <= maxChars) return [trimmed];
      // 문장부호로 1차 분할
      const parts = trimmed.split(/(?<=[.!?,~…])\s*/g).filter(Boolean);
      const chunks = [];
      for (const part of parts) {
        const p = part.trim();
        if (!p) continue;
        if (p.length <= maxChars) {
          chunks.push(p);
        } else {
          // 공백 기준 누적
          const words = p.split(/\s+/);
          let cur = '';
          for (const w of words) {
            const next = cur ? cur + ' ' + w : w;
            if (next.length > maxChars && cur) {
              chunks.push(cur);
              cur = w;
            } else {
              cur = next;
            }
          }
          if (cur) chunks.push(cur);
          // 단일 어절이 maxChars보다 길면 글자수로 강제 분할
          for (let i = chunks.length - 1; i >= 0; i--) {
            if (chunks[i].length > maxChars + 4) {
              const big = chunks.splice(i, 1)[0];
              const sliced = [];
              for (let j = 0; j < big.length; j += maxChars) {
                sliced.push(big.slice(j, j + maxChars));
              }
              chunks.splice(i, 0, ...sliced);
            }
          }
        }
      }
      return chunks.length > 0 ? chunks : [trimmed];
    }

    // 단어별 타임스탬프 → 청크 + 정확한 start/end
    // 단어 데이터 없거나 텍스트가 편집된 경우엔 글자수 비례로 fallback
    function buildTimedChunks(segment, displayText, maxChars = 14) {
      if (!segment) return [];
      const words = segment.words || [];
      const isEdited = displayText !== undefined && displayText !== segment.text;

      // Fallback: 글자수 비례 분배 (단어 데이터 없거나 편집된 경우)
      if (words.length === 0 || isEdited) {
        const chunks = chunkSpokenText(displayText !== undefined ? displayText : segment.text, maxChars);
        const totalChars = chunks.reduce((s, c) => s + c.length, 0) || 1;
        const dur = Math.max(0.001, segment.end - segment.start);
        const result = [];
        let cum = 0;
        for (const c of chunks) {
          const start = segment.start + (cum / totalChars) * dur;
          cum += c.length;
          const end = segment.start + (cum / totalChars) * dur;
          result.push({ text: c, start, end });
        }
        return result;
      }

      // 정확 모드: 단어 단위로 누적해서 청크 빌드
      const result = [];
      let buf = [];
      let bufLen = 0;
      const flush = () => {
        if (buf.length === 0) return;
        result.push({
          text: buf.map((x) => x.text).join(' '),
          start: buf[0].start,
          end: buf[buf.length - 1].end,
        });
        buf = [];
        bufLen = 0;
      };
      for (const w of words) {
        const wText = (w.text || '').trim();
        if (!wText) continue;
        const wLen = wText.length;
        // maxChars 초과 시 flush (다만 buf가 비어있지 않을 때만)
        if (bufLen + wLen + (buf.length > 0 ? 1 : 0) > maxChars && buf.length > 0) {
          flush();
        }
        buf.push(w);
        bufLen += wLen + (buf.length > 1 ? 1 : 0);
        // 문장부호로 끝나는 단어 → 자연스러운 청크 경계
        if (/[.!?,~…]$/.test(wText)) flush();
      }
      flush();
      // 마지막 청크의 end를 segment.end로 확장 — 단어 타임스탬프가 segment.end보다 짧을 때 자막이 뚝 끊기는 거 방지
      if (result.length > 0) {
        const last = result[result.length - 1];
        if (last.end < segment.end) last.end = segment.end;
      }
      return result;
    }

    // currentTime이 어느 청크에 있는지 찾기
    function findActiveChunk(timedChunks, currentTime) {
      if (!timedChunks || timedChunks.length === 0) return '';
      // currentTime 범위에 들어가는 청크
      for (const c of timedChunks) {
        if (currentTime >= c.start && currentTime <= c.end) return c.text;
      }
      // 갭 구간이면 직전 청크 유지 (없으면 빈 문자열)
      let last = '';
      for (const c of timedChunks) {
        if (c.end <= currentTime) last = c.text;
        else break;
      }
      return last;
    }

    // 캐릭터 id ("dad-3") → { role, variant } 파싱
    function parseCharId(charId) {
      if (!charId || typeof charId !== 'string') return { role: 'dad', variant: 1 };
      const [role, vStr] = charId.split('-');
      const variant = parseInt(vStr, 10);
      return {
        role: ['dad', 'mom', 'baby'].includes(role) ? role : 'dad',
        variant: Number.isInteger(variant) && variant >= 1 && variant <= 5 ? variant : 1,
      };
    }

      const variants = {

        accent:    "bg-accent text-white hover:bg-[#B96A52]",
        secondary: "bg-paper text-ink border border-hairline hover:border-ink/40",
        ghost:     "bg-transparent text-ink hover:bg-hairline/60",
        outline:   "bg-transparent text-ink border border-ink/80 hover:bg-ink hover:text-cream",
      };
      return (
        <button type={type} disabled={disabled} onClick={onClick}
          className={`${base} ${sizes[size]} ${variants[variant]} ${className}`}>

          <Card className="!p-4">

              AssemblyAI에서 음성을 분석합니다. 원본은 1시간 후 자동 삭제됩니다.
            </Checkbox>
          </Card>

          {/* 분석 시작 버튼 */}
          <Button
            variant="accent"
            size="lg"
            disabled={!fileName || !consent || loading}
            className="w-full"
            onClick={onAnalyze}
          >
            {loading ? (loadingPhase || '분석 중...') : <>분석 시작 <Icon.arrowRight /></>}
          </Button>

          {errorMsg && (
            <Card className="!p-3 !border-accent/40 !bg-accentSoft/40">
              <p className="text-[12px] text-[#7A3A28] leading-relaxed">{errorMsg}</p>
            </Card>
          )}

          {!loading && !errorMsg && (!fileName || !consent) && (
            <p className="text-center text-[11px] text-faint">
              파일과 동의가 필요합니다.
            </p>
          )}

          {loading && (
            <p className="text-center text-[11px] text-muted">
              발화자 구분에는 보통 30초~2분 정도 걸려요. 페이지를 닫지 마세요.
            </p>
          )}
        </div>
      );
    }

    // ========================================
    // Page — LabelStep
    // ========================================
    function LabelStep({ segments, roleMapping, setRoleMapping, transcriptMeta }) {
      const totalDuration = useMemo(
        () => segments.reduce((max, s) => Math.max(max, s.end), 0),
        [segments]
      );

      const speakerSegments = useMemo(() => {
        const map = { A: [], B: [], C: [] };
        segments.forEach((s) => { if (map[s.speaker]) map[s.speaker].push(s); });
        return map;
      }, [segments]);

      // 중복 체크는 실제 segments가 있는 화자만 — 유령 화자(C가 데이터에 없는데 default에 박혀있는 경우) 제외
      const activeSpeakers = SPEAKER_KEYS.filter((k) => speakerSegments[k] && speakerSegments[k].length > 0);
      const usedRoles = activeSpeakers.map((sp) => roleMapping[sp]).filter(Boolean);
      const hasDuplicate = usedRoles.length !== new Set(usedRoles).size;

      return (
        <div className="px-6 py-7 space-y-5 anim-fade-in">
          <div className="space-y-1.5">
            <div className="text-[10px] uppercase tracking-[0.18em] text-accent num">02 — Label</div>
            <h2 className="font-serif text-[26px] leading-[1.15] text-ink">
              누가 누구인지<br/>알려주세요.
            </h2>
            <p className="text-[13px] text-muted leading-relaxed pt-1">
              AI가 사람 A · B · C로 자동 분리했어요. 각 화자가 누구인지 매칭하세요.
            </p>
          </div>

          {/* 발화자 구분 진단 — 정확도 검증용 */}
          {transcriptMeta && (
            <div className="px-4 py-3 rounded-lg border border-hairline bg-paper text-[12px] text-ink/80 flex items-center justify-between gap-3 num">
              <span>
                <span className="text-ink font-medium">{transcriptMeta.speakerCount ?? '-'}</span>
                <span className="text-muted">명 감지</span>
              </span>
              <span className="text-faint">·</span>
              <span>
                <span className="text-muted">길이 </span>
                <span className="text-ink">{transcriptMeta.audioDurationSec != null ? fmtTime(transcriptMeta.audioDurationSec) : '-'}</span>
              </span>
              <span className="text-faint">·</span>
              <span>
                <span className="text-muted">신뢰도 </span>
                <span className="text-ink">{transcriptMeta.confidence != null ? `${Math.round(transcriptMeta.confidence * 100)}%` : '-'}</span>
              </span>
            </div>
          )}

          {/* timeline visualization */}
          <Card>
            <div className="flex items-baseline justify-between mb-2">
              <span className="text-[10px] uppercase tracking-[0.16em] text-muted">Timeline</span>
              <span className="text-[10px] num text-faint">{fmtTime(totalDuration)}</span>
            </div>
            <div className="relative h-2 w-full rounded-full bg-hairline overflow-hidden">
              {segments.map((s) => {
                const left = (s.start / totalDuration) * 100;
                const width = ((s.end - s.start) / totalDuration) * 100;
                const sp = SPEAKER_COLORS[s.speaker] || SPEAKER_COLORS.C;
                return (
                  <div
                    key={s.id}
                    title={`${s.speaker}: ${s.text}`}
                    className={`absolute top-0 bottom-0 ${sp.bar} opacity-90`}
                    style={{ left: `${left}%`, width: `${width}%` }}
                  />
                );
              })}
            </div>
            <div className="flex items-center gap-4 mt-3 text-[11px]">
              {SPEAKER_KEYS.map((k) => (
                <div key={k} className="flex items-center gap-1.5">
                  <span className={`w-2 h-2 rounded-full ${SPEAKER_COLORS[k].dot}`} />
                  <span className="text-muted">사람 {k}</span>
                </div>
              ))}
            </div>
          </Card>

          {/* speaker mapping cards */}
          {SPEAKER_KEYS.map((sp) => {
            const segs = speakerSegments[sp];
            if (!segs || segs.length === 0) return null;
            const sc = SPEAKER_COLORS[sp];
            return (
              <Card key={sp}>
                <div className="flex items-center justify-between mb-3">
                  <div className="flex items-center gap-2">
                    <span className={`w-2 h-2 rounded-full ${sc.dot}`} />
                    <span className="text-[13px] font-medium text-ink">사람 {sp}</span>
                  </div>
                  <span className="text-[10px] uppercase tracking-[0.14em] text-faint num">{segs.length}개 발화</span>
                </div>

                {/* segment 미리보기 */}
                <div className="space-y-1 mb-4">
                  {segs.slice(0, 2).map((s) => (
                    <div key={s.id} className="text-[12px] text-ink/80 leading-relaxed flex gap-3">
                      <span className="num text-faint shrink-0">{fmtTime(s.start)}</span>
                      <span>"{s.text}"</span>
                    </div>
                  ))}
                  {segs.length > 2 && (
                    <div className="text-[11px] text-faint">+ {segs.length - 2}개 더</div>
                  )}
                </div>

                {/* 역할 선택 — segmented buttons */}
                <div>
                  <div className="text-[11px] uppercase tracking-[0.14em] text-muted mb-2">Role</div>
                  <div className="grid grid-cols-3 gap-1.5">
                    {ROLES.map((r) => {
                      const selected = roleMapping[sp] === r.key;
                      return (
                        <button
                          key={r.key}
                          type="button"
                          onClick={() => {
                            // 다른 화자에서 같은 역할이 이미 쓰이고 있으면 자동 해제 (유령 매핑도 같이 정리)
                            const next = { ...roleMapping };
                            Object.keys(next).forEach((k) => {
                              if (k !== sp && next[k] === r.key) delete next[k];
                            });
                            next[sp] = r.key;
                            setRoleMapping(next);
                          }}
                          className={`py-2.5 rounded-lg text-[12px] font-medium border transition
                            ${selected
                              ? 'bg-ink text-cream border-ink'
                              : 'bg-paper text-ink/70 border-hairline hover:border-ink/30'}`}
                        >
                          {r.kr}
                        </button>
                      );
                    })}
                  </div>
                </div>
              </Card>
            );
          })}

          {hasDuplicate && (
            <div className="px-4 py-3 rounded-lg border border-accent/40 bg-accentSoft/40 text-[12px] text-[#7A3A28] text-center">
              같은 역할은 두 명에게 매길 수 없어요.
            </div>
          )}
        </div>
      );
    }

    // ========================================
    // Page — CharacterStep (5스타일 세트 — 아빠/엄마/아기 1세트로 묶음)
    // ========================================
    function CharacterStep({ roleMapping, characterStyle, setCharacterStyle }) {
      return (
        <div className="px-6 py-7 space-y-5 anim-fade-in">
          <div className="space-y-1.5">
            <div className="text-[10px] uppercase tracking-[0.18em] text-accent num">03 — Style</div>
            <h2 className="font-serif text-[26px] leading-[1.15] text-ink">
              그림체를<br/>골라주세요.
            </h2>
            <p className="text-[13px] text-muted leading-relaxed pt-1">
              5가지 그림체 중 1개. 아빠 · 엄마 · 아기가 같은 화풍의 한 세트로 묶입니다.
            </p>
          </div>

          <div className="space-y-3">
            {CHAR_STYLES.map((s) => {
              const isSelected = characterStyle === s.key;
              return (
                <button
                  key={s.key}
                  type="button"
                  onClick={() => setCharacterStyle(s.key)}
                  className={`relative w-full text-left rounded-xl border-2 p-3 transition
                    ${isSelected
                      ? 'border-ink bg-cream'
                      : 'border-hairline bg-paper hover:border-ink/30'}`}
                  aria-pressed={isSelected}
                >
                  <div className="flex items-center gap-3">
                    {/* 3-캐릭터 미리보기 */}
                    <div className="flex gap-1.5 flex-shrink-0">
                      {['dad', 'mom', 'baby'].map((r) => (
                        <div key={r} className="w-14 h-14 rounded-md bg-paper border border-hairline overflow-hidden flex items-center justify-center">
                          <Avatar role={r} style={s.key} size={56} />
                        </div>
                      ))}
                    </div>
                    <div className="flex-1 min-w-0">
                      <div className="flex items-baseline gap-2">
                        <h3 className="text-[14px] font-medium text-ink">{s.label}</h3>
                        <span className="text-[10px] uppercase tracking-[0.14em] text-faint">{s.hint}</span>
                      </div>
                      <p className="text-[11px] text-muted mt-0.5 leading-snug">
                        {s.key === 'current' && '부드러운 파스텔톤 · 둥근 도형'}
                        {s.key === 'stickman' && '얇은 검정선 · 흰 배경'}
                        {s.key === 'disney' && '3D 카툰 · 부드러운 색감'}
                        {s.key === 'webtoon' && '한국 웹툰 라인아트'}
                        {s.key === 'chimchak' && '굵은 검정선 · 코믹'}
                      </p>
                    </div>
                    {isSelected && (
                      <div className="w-6 h-6 rounded-full bg-ink text-cream flex items-center justify-center flex-shrink-0">
                        <Icon.check size={14} />
                      </div>
                    )}
                  </div>
                </button>
              );
            })}
          </div>

          <div className="px-3 py-2 rounded-lg border border-hairline text-[11px] text-muted leading-relaxed">
            ⓘ 디즈니/웹툰/침착맨 스타일은 AI 이미지 — 처음 한 번 생성 후 캐시됩니다. 이미지가 안 보이면 곧 준비될 거예요.
          </div>
        </div>
      );
    }

    // ========================================
    // Page — PreviewStep
    //   진짜 오디오 재생 + 시간 동기화 + 화자별 캐릭터 talking 애니메이션
    // ========================================
    // 텍스트 스타일 프리셋 — Reels/Shorts 가독성 우선 (강한 외곽선 + 굵은 폰트)
    // 색상은 별도 colorScheme로 분리 (스타일 × 컬러 = 12가지 조합)
    const TEXT_STYLES = {
      hook: {
        label: '후킹',
        sub: '굵고 임팩트',
        family: '"Black Han Sans", "Noto Sans KR", sans-serif',
        weight: 900,
        letterSpacing: '-0.01em',
        // 후킹은 더 큼직하게
        titleScale: 1.15,
        subtitleScale: 0.7,
      },
      bold: {
        label: '강조',
        sub: '두꺼운 산세리프',
        family: '"Noto Sans KR", system-ui, sans-serif',
        weight: 900,
        letterSpacing: '-0.005em',
        titleScale: 1,
        subtitleScale: 0.75,
      },
      magazine: {
        label: '매거진',
        sub: '세리프 클래식',
        family: '"Noto Serif KR", serif',
        weight: 900,
        letterSpacing: '-0.005em',
        titleScale: 0.95,
        subtitleScale: 0.78,
      },
      hand: {
        label: '손글씨',
        sub: '귀여운 캐주얼',
        family: '"Gaegu", "Gowun Dodum", cursive',
        weight: 700,
        letterSpacing: '0',
        titleScale: 1.1,
        subtitleScale: 0.78,
      },
    };

    // 컬러 프리셋 — 가독성 우선 (외곽선 stroke 필수)
    const COLOR_SCHEMES = {
      darkOnLight: {
        label: '검정글씨',
        sub: '흰 외곽선',
        color: '#1A1612',
        stroke: '#FFFFFF',
      },
      whiteOnDark: {
        label: '흰글씨',
        sub: '검정 외곽선',
        color: '#FFFFFF',
        stroke: '#000000',
      },
      yellow: {
        label: '노랑',
        sub: 'YouTube 후킹 컬러',
        color: '#FFE100',
        stroke: '#000000',
      },
      pink: {
        label: '핑크',
        sub: '말랑 톤',
        color: '#FF7AA8',
        stroke: '#FFFFFF',
      },
    };

    // 사이즈 — Z축은 슬라이더로 연속 조절 (제목/부제목 각각)
    //   원본 1080×1920 출력 기준 px. 미리보기(360px)는 0.42배율로 자동 축소.
    //   Reels/Shorts 안전영역에서 충분히 커질 수 있도록 max를 넉넉하게 (100/70).
    const SIZE_DEFAULTS = { title: 36, subtitle: 22 };
    const SIZE_RANGE = { titleMin: 16, titleMax: 110, subMin: 10, subMax: 72 };

    // 데코레이션 — 마리안웨딩 땡큐카드 풍 (4개 모서리에 1개씩)
    //   key는 위치, emoji는 표시할 이모지
    const DECORATIONS = {
      heart:     { emoji: '💕', label: '하트',   defaultPos: 'tl' },
      sparkle:   { emoji: '✨', label: '반짝',   defaultPos: 'tr' },
      music:     { emoji: '🎵', label: '음표',   defaultPos: 'bl' },
      subscribe: { emoji: '🔔', label: '구독벨', defaultPos: 'br' },
    };
    const DECO_POSITIONS = {
      tl: { top: '4%',    left: '5%',           right: 'auto', bottom: 'auto' },
      tr: { top: '4%',    right: '5%',          left: 'auto',  bottom: 'auto' },
      bl: { bottom: '4%', left: '5%',           top: 'auto',   right: 'auto' },
      br: { bottom: '4%', right: '5%',          top: 'auto',   left: 'auto'  },
    };

    // 글자에 외곽선(stroke)을 깔끔하게 — 8방향 text-shadow로 webkit-text-stroke보다 자연스러움
    function buildTextStroke(strokeColor, width = 2) {
      const w = width;
      const offsets = [
        [-w, -w], [0, -w], [w, -w],
        [-w,  0],          [w,  0],
        [-w,  w], [0,  w], [w,  w],
      ];
      return offsets.map(([x, y]) => `${x}px ${y}px 0 ${strokeColor}`).join(', ')
        + `, 0 2px 6px rgba(0,0,0,0.25)`;
    }

    // 플랫폼 프리셋 — 9:16 공통, 안전영역만 다름
    //   Reels (Instagram): 상단 14% (UI/사운드 라벨), 하단 22% (캡션/좋아요/공유)
    //   Shorts (YouTube):  상단 11% (제목/뒤로), 하단 17% (채널/좋아요/댓글)
    // 플랫폼별 안전영역 + 권장 텍스트 기본값
    //   출처(2026): Instagram Reels는 상단 108–200px·하단 280–320px 버퍼, 제목 200–600px from top.
    //              YouTube Shorts는 상단 180–288px·하단 350–672px(채널명/제목 바), 우측 120px(액션).
    //   1080×1920 기준 → 미리보기 360×640으로 0.333 배율.
    const PLATFORM_PRESETS = {
      reels: {
        label: '릴스',
        sub: 'Instagram Reels',
        topUnsafe: 0.14,    // 269px from top — Reels 제목 권장 영역 시작 (200–600px)
        bottomUnsafe: 0.22, // 422px from bottom — 좋아요/공유/캡션 영역 보호
        titlePlaceholder: '오늘 아기가 처음 부른 노래 🎶',
        subtitlePlaceholder: '#육아 #육아일상 #아기 #육아툰',
        // 권장 기본 크기 (미리보기 px 기준 — 360 width)
        defaults: {
          titleSize: 36,        // Reels는 캡션 가독성 우선 → 중간 크기
          subSize: 22,
          titleY: 0,            // 안전영역 바로 안쪽이 권장
          subY: 0,
        },
      },
      shorts: {
        label: '쇼츠',
        sub: 'YouTube Shorts',
        topUnsafe: 0.12,    // 230px from top — Shorts 상단 chrome (180–288px)
        bottomUnsafe: 0.19, // 365px from bottom — 채널명/제목 바 (350px+) 안 걸리게
        titlePlaceholder: '아기가 처음 한 말!?',
        subtitlePlaceholder: '구독 + 좋아요 부탁해요',
        // Shorts는 더 임팩트 있게 — 제목 크게, 부제도 약간 크게
        defaults: {
          titleSize: 50,
          subSize: 26,
          titleY: 8,            // 살짝 안쪽으로 밀어 시선 집중
          subY: -4,
        },
      },
    };

    function PreviewStep({ jobId, segments, roleMapping, setRoleMapping, segmentRoleOverrides, setSegmentRoleOverrides, characterStyle, editedSegments, setEditedSegments }) {
      const audioRef = useRef(null);
      const stageRef = useRef(null);              // 녹화 대상 9:16 스테이지
      const recCanvasRef = useRef(null);          // 녹화용 hidden canvas
      const [recording, setRecording] = useState(false);
      const [recProgress, setRecProgress] = useState(0); // 0~1
      const [editingId, setEditingId] = useState(null);
      const [isPlaying, setIsPlaying] = useState(false);
      const [currentTime, setCurrentTime] = useState(0);
      const [duration, setDuration] = useState(0);
      const [audioError, setAudioError] = useState("");
      // 플랫폼/제목/부제목
      const [platform, setPlatform] = useState('reels');  // 'reels' | 'shorts'
      const [overlayTitle, setOverlayTitle] = useState('');
      const [overlaySubtitle, setOverlaySubtitle] = useState('');
      const preset = PLATFORM_PRESETS[platform];

      // 텍스트 스타일 — 폰트(X) × 컬러(Y) × 사이즈(Z, 슬라이더로 제목/부제목 각각)
      const [textStyle, setTextStyle] = useState('hook');               // X: 폰트
      const [colorScheme, setColorScheme] = useState('darkOnLight');     // Y: 컬러 (검정이 가독성 좋음 → 기본)
      const [titleSizePx, setTitleSizePx] = useState(SIZE_DEFAULTS.title);
      const [subSizePx, setSubSizePx] = useState(SIZE_DEFAULTS.subtitle);
      // 드래그 위치 — 미리보기 360px 좌표계 기준 px. 기본 위치(중앙·안전영역 끝)에서의 상대 오프셋.
      const [titleOffset, setTitleOffset] = useState({ x: 0, y: 0 });
      const [subOffset, setSubOffset] = useState({ x: 0, y: 0 });
      const [decoOffsets, setDecoOffsets] = useState({
        heart:     { x: 0, y: 0 },
        sparkle:   { x: 0, y: 0 },
        music:     { x: 0, y: 0 },
        subscribe: { x: 0, y: 0 },
      });
      const [decorations, setDecorations] = useState({
        heart: false, sparkle: false, music: false, subscribe: false,
      });
      // 드래그 상태 — 어느 요소를 끌고 있고 어떤 스냅 가이드가 활성인지
      const dragRef = useRef(null); // { key, startClientX, startClientY, startOffX, startOffY }
      const [dragging, setDragging] = useState(null);                    // 현재 드래그 중인 키
      const [snaps, setSnaps] = useState({ vCenter: false, hCenter: false }); // 스냅 가이드 활성 여부
      const tStyle = TEXT_STYLES[textStyle];
      const tColor = COLOR_SCHEMES[colorScheme];

      // 플랫폼 바뀔 때 그 플랫폼 권장 크기/위치로 자동 세팅
      //   사용자가 텍스트는 유지하지만 사이즈/위치는 플랫폼 표준으로 맞춰주는 게 일반적인 UX
      useEffect(() => {
        const d = PLATFORM_PRESETS[platform].defaults;
        setTitleSizePx(d.titleSize);
        setSubSizePx(d.subSize);
        setTitleOffset({ x: 0, y: d.titleY });
        setSubOffset({ x: 0, y: d.subY });
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [platform]);
      // 음성 모드 — 'tuned' (화자별 정규화 + EQ + denoise + loudnorm) / 'original'
      const [audioMode, setAudioMode] = useState('tuned');
      const [tunedPreparing, setTunedPreparing] = useState(false);
      // 침묵 자르기 — 'keep' (그대로) / 'trim' (긴 침묵 0.3초로 단축)
      const [silenceMode, setSilenceMode] = useState('keep');
      const [maxGapSec, setMaxGapSec] = useState(0.3);
      const [compactInfo, setCompactInfo] = useState(null); // { segments, totalNewDuration, savedSec }
      const [compactLoading, setCompactLoading] = useState(false);

      // 침묵 자르기 모드 켜질 때 / maxGap 바뀔 때 — 서버에 새 segments 요청
      useEffect(() => {
        if (silenceMode !== 'trim' || !jobId) {
          setCompactInfo(null);
          return;
        }
        let cancelled = false;
        setCompactLoading(true);
        fetch(`/api/jobs/${jobId}/compact-info?maxGap=${maxGapSec}`)
          .then((r) => r.json())
          .then((data) => {
            if (cancelled) return;
            if (data.ok) {
              setCompactInfo(data);
            } else {
              setCompactInfo(null);
              setAudioError(data.message || '침묵 자르기 계산 실패');
            }
          })
          .catch((err) => { if (!cancelled) setAudioError('침묵 자르기 요청 실패: ' + err.message); })
          .finally(() => { if (!cancelled) setCompactLoading(false); });
        return () => { cancelled = true; };
      }, [silenceMode, maxGapSec, jobId]);

      // 효과적 segments / audio URL — 모드에 따라 결정
      //   trim 모드면 compact-info의 새 segments + audio-tuned?compact=1 사용
      const effectiveSegments = (silenceMode === 'trim' && compactInfo?.segments) ? compactInfo.segments : segments;
      const effectiveAudioUrl = useMemo(() => {
        if (!jobId) return '';
        if (silenceMode === 'trim') {
          return `/api/jobs/${jobId}/audio-tuned?compact=1&maxGap=${maxGapSec}`;
        }
        return audioMode === 'tuned'
          ? `/api/jobs/${jobId}/audio-tuned`
          : `/api/jobs/${jobId}/audio`;
      }, [jobId, audioMode, silenceMode, maxGapSec]);

      // jobId / 모드 변경 시 element 리마운트하지 않고 src만 갱신
      //   element 그대로 유지 → AudioContext source 끊기지 않음 = 싱크 일관성 유지
      useEffect(() => {
        const audio = audioRef.current;
        if (!audio || !effectiveAudioUrl) return;
        const newSrc = `${window.location.origin}${effectiveAudioUrl}`;
        if (audio.src === newSrc) return;
        audio.src = newSrc;
        audio.load();
        try { audio.currentTime = 0; } catch (_) {}
        setIsPlaying(false);
        setCurrentTime(0);
        setAudioLevel(0);
      }, [effectiveAudioUrl]);
      // 오디오 진폭 (0~1) — 무음 구간이라도 노래/옹알이로 소리가 있으면 입 움직이도록
      const [audioLevel, setAudioLevel] = useState(0);
      const audioCtxRef = useRef(null);
      const analyserRef = useRef(null);
      // 진폭이 큰 시점에 segment가 없으면 기본 화자(보통 '아기')로 입 움직임 처리
      const [voiceFallbackRole, setVoiceFallbackRole] = useState('baby');

      const getText = (s) => editedSegments[s.id] !== undefined ? editedSegments[s.id] : s.text;
      // 우선순위: segment override → speaker mapping
      const getRoleForSegment = (s) => segmentRoleOverrides[s.id] || roleMapping[s.speaker];
      const getRoleForSpeaker = (sp) => roleMapping[sp];

      // 한 segment의 역할만 변경 (다른 segment에 영향 없음)
      const setSegmentRole = (segmentId, roleKey) => {
        setSegmentRoleOverrides({ ...segmentRoleOverrides, [segmentId]: roleKey });
      };
      // 오버라이드 해제 — speaker 기본값으로 복귀
      const clearSegmentRole = (segmentId) => {
        const next = { ...segmentRoleOverrides };
        delete next[segmentId];
        setSegmentRoleOverrides(next);
      };

      const onTextChange = (id, val) => {
        setEditedSegments({ ...editedSegments, [id]: val });
      };

      // 현재 재생 시간에 해당하는 segment 찾기 (silenceMode에 따라 effectiveSegments 사용)
      const currentSegment = useMemo(() => {
        const segs = effectiveSegments;
        if (!segs.length) return null;
        const found = segs.find((s) => currentTime >= s.start && currentTime < s.end);
        if (found) return found;
        const prev = [...segs].reverse().find((s) => s.end <= currentTime);
        return prev || null;
      }, [effectiveSegments, currentTime]);

      // segment.end 직후 0.12초 버퍼 — 자연스러움과 자막 늦음 사이의 균형
      const speakingNow = useMemo(() => {
        if (!currentSegment) return false;
        return isPlaying && currentTime >= currentSegment.start && currentTime < currentSegment.end + 0.12;
      }, [currentSegment, isPlaying, currentTime]);

      // 노래/옹알이/긴 침묵 등으로 segment가 없어도 소리가 있으면 입을 움직이게
      // (RMS > 0.08 정도면 사람이 듣기에 명확한 소리)
      const audioActive = isPlaying && audioLevel > 0.08;
      const fallbackSpeaking = audioActive && !speakingNow;

      // 오디오 이벤트 바인딩 — currentTime은 rAF로 60fps 폴링
      //   + AnalyserNode로 매 프레임 RMS (노래/옹알이용 입 움직임)
      //   + audioContext.outputLatency만큼 보정 → 사용자가 실제로 듣는 시점에 자막이 일치
      useEffect(() => {
        const audio = audioRef.current;
        if (!audio) return;
        let rafId = 0;
        let running = false;

        // AudioContext / Analyser — 같은 element에 한 번만 createMediaElementSource 가능
        // element를 리마운트하지 않게 했으므로 이 effect는 1회만 동작 (deps [])
        const ensureAnalyser = () => {
          if (analyserRef.current) return;
          try {
            const Ctx = window.AudioContext || window.webkitAudioContext;
            if (!Ctx) return;
            const ctx = new Ctx({ latencyHint: 'interactive' });
            const src = ctx.createMediaElementSource(audio);
            const analyser = ctx.createAnalyser();
            analyser.fftSize = 1024;
            analyser.smoothingTimeConstant = 0.6;
            src.connect(analyser);
            analyser.connect(ctx.destination);
            audioCtxRef.current = ctx;
            analyserRef.current = analyser;
            console.log('[AudioCtx] outputLatency=', ctx.outputLatency?.toFixed(4), 'baseLatency=', ctx.baseLatency?.toFixed(4));
          } catch (e) {
            console.warn('[AudioCtx] init 실패', e.message);
          }
        };

        const buf = new Uint8Array(1024);
        const computeLevel = () => {
          const an = analyserRef.current;
          if (!an) return 0;
          an.getByteTimeDomainData(buf);
          let sumSq = 0;
          for (let i = 0; i < buf.length; i++) {
            const v = (buf[i] - 128) / 128;
            sumSq += v * v;
          }
          const rms = Math.sqrt(sumSq / buf.length);
          return Math.min(1, rms * 4);
        };

        // 출력 지연 보정 — 사용자가 실제 듣는 시점은 audio.currentTime - latency
        const getCompensatedTime = () => {
          const ctx = audioCtxRef.current;
          // outputLatency: 시스템 오디오 큐 → 스피커. baseLatency: AudioContext 자체 처리 지연.
          // Bluetooth/USB 헤드폰 등에서 outputLatency가 100ms 이상 나올 수 있음 → 자막이 음성보다 살짝 빨라짐 → 보정으로 정렬
          const latency = ctx ? ((ctx.outputLatency || 0) + (ctx.baseLatency || 0)) : 0;
          return Math.max(0, audio.currentTime - latency);
        };

        const tick = () => {
          if (!running) return;
          setCurrentTime(getCompensatedTime());
          setAudioLevel(computeLevel());
          rafId = requestAnimationFrame(tick);
        };
        const startTick = () => {
          if (running) return;
          ensureAnalyser();
          if (audioCtxRef.current && audioCtxRef.current.state === 'suspended') {
            audioCtxRef.current.resume().catch(() => {});
          }
          running = true;
          rafId = requestAnimationFrame(tick);
        };
        const stopTick = () => {
          running = false;
          if (rafId) cancelAnimationFrame(rafId);
          rafId = 0;
          setCurrentTime(getCompensatedTime());
          setAudioLevel(0);
        };
        const onLoaded = () => { setDuration(audio.duration || 0); setAudioError(""); };
        const onPlay = () => { setIsPlaying(true); startTick(); };
        const onPause = () => { setIsPlaying(false); stopTick(); };
        const onEnded = () => { setIsPlaying(false); stopTick(); };
        const onSeeked = () => setCurrentTime(audio.currentTime);
        const onErr = () => setAudioError("오디오를 불러오지 못했습니다. 다시 분석을 시도해주세요.");
        audio.addEventListener('loadedmetadata', onLoaded);
        audio.addEventListener('play', onPlay);
        audio.addEventListener('pause', onPause);
        audio.addEventListener('ended', onEnded);
        audio.addEventListener('seeked', onSeeked);
        audio.addEventListener('error', onErr);
        return () => {
          stopTick();
          audio.removeEventListener('loadedmetadata', onLoaded);
          audio.removeEventListener('play', onPlay);
          audio.removeEventListener('pause', onPause);
          audio.removeEventListener('ended', onEnded);
          audio.removeEventListener('seeked', onSeeked);
          audio.removeEventListener('error', onErr);
        };
      }, []);

      const togglePlay = () => {
        const audio = audioRef.current;
        if (!audio) return;
        if (audio.paused) {
          // AudioContext가 suspended 상태면 resume — 일관된 재생을 위해 매번 시도
          const ctx = audioCtxRef.current;
          if (ctx && ctx.state === 'suspended') {
            ctx.resume().catch(() => {});
          }
          audio.play().catch((err) => setAudioError(`재생 오류: ${err.message}`));
        } else {
          audio.pause();
        }
      };

      const seekTo = (sec) => {
        const audio = audioRef.current;
        if (!audio) return;
        audio.currentTime = Math.max(0, Math.min(audio.duration || sec, sec));
      };

      // 드래그로 자유 위치 이동 + 점선 자석 가이드라인
      //   key: 'title' | 'subtitle' | `deco:${decoKey}`
      //   stage 좌표계(현재 보이는 px) 기준으로 dx, dy 누적 → state에 저장
      const SNAP_THRESHOLD = 6; // px 이내면 스냅
      const getOffsetFor = (key) => {
        if (key === 'title') return titleOffset;
        if (key === 'subtitle') return subOffset;
        if (key.startsWith('deco:')) return decoOffsets[key.slice(5)];
        return { x: 0, y: 0 };
      };
      const setOffsetFor = (key, off) => {
        if (key === 'title') setTitleOffset(off);
        else if (key === 'subtitle') setSubOffset(off);
        else if (key.startsWith('deco:')) {
          const k = key.slice(5);
          setDecoOffsets((d) => ({ ...d, [k]: off }));
        }
      };

      const onDragStart = (key) => (e) => {
        e.preventDefault();
        e.stopPropagation();
        const stage = stageRef.current;
        if (!stage) return;
        const rect = stage.getBoundingClientRect();
        const off = getOffsetFor(key);
        dragRef.current = {
          key,
          startClientX: e.clientX,
          startClientY: e.clientY,
          startOffX: off.x,
          startOffY: off.y,
          stageWidth: rect.width,
          stageHeight: rect.height,
        };
        setDragging(key);
        // pointer capture 대신 window 레벨로 listen — 빠르게 움직여도 놓치지 않음
        window.addEventListener('pointermove', onDragMove);
        window.addEventListener('pointerup', onDragEnd);
        window.addEventListener('pointercancel', onDragEnd);
      };

      // 매 프레임 드래그 — useCallback 없이 함수 참조 유지하기 위해 useRef 패턴
      const dragHandlersRef = useRef({});
      const onDragMove = (e) => dragHandlersRef.current.move?.(e);
      const onDragEnd = (e) => dragHandlersRef.current.end?.(e);

      // dragHandlersRef를 매 렌더 갱신 — 클로저 안의 setState가 최신 state 못 잡는 문제 방지
      useEffect(() => {
        dragHandlersRef.current.move = (e) => {
          const drag = dragRef.current;
          if (!drag) return;
          const dx = e.clientX - drag.startClientX;
          const dy = e.clientY - drag.startClientY;
          let newX = drag.startOffX + dx;
          let newY = drag.startOffY + dy;

          // 가로 중앙 스냅 — newX 절대값이 임계 이하면 0으로 (정확히 중앙)
          let vCenter = false;
          if (Math.abs(newX) <= SNAP_THRESHOLD) {
            newX = 0;
            vCenter = true;
          }
          // 세로 중앙 스냅 — 실제 stage 중앙 기준이 아니라 요소 기본 위치 기준
          //   요소의 기본 위치에서 stageHeight/2 - element.basePosY 만큼 떨어진 곳이 중앙
          //   여기선 단순히 dy=0인 곳이 기본 위치라 가정. 별도 가운데 스냅은 생략 (제목/부제목 각각 다른 base).
          //   대신 데코는 자기 모서리 기본 위치로 돌아갈 때 스냅 (newY 0 근처).
          let hCenter = false;
          if (drag.key.startsWith('deco:') && Math.abs(newY) <= SNAP_THRESHOLD) {
            newY = 0;
            hCenter = true;
          }

          setSnaps({ vCenter, hCenter });
          setOffsetFor(drag.key, { x: newX, y: newY });
        };
        dragHandlersRef.current.end = () => {
          dragRef.current = null;
          setDragging(null);
          setSnaps({ vCenter: false, hCenter: false });
          window.removeEventListener('pointermove', onDragMove);
          window.removeEventListener('pointerup', onDragEnd);
          window.removeEventListener('pointercancel', onDragEnd);
        };
      });

      // 더블클릭으로 위치 리셋 — 드래그 후 원위치 복귀 빠르게
      const onDragDoubleClick = (key) => () => {
        setOffsetFor(key, { x: 0, y: 0 });
      };

      // 비디오 다운로드 — 미리보기 stage를 매 프레임 html2canvas로 그려서 canvas 캡처,
      //   audio element의 trackStream을 같이 묶어 MediaRecorder로 녹화 → webm 파일로 저장.
      // 단점: html2canvas 비용으로 30fps 정도가 한계. 5분 이내 영상이라 충분히 동작함.
      const downloadVideo = async () => {
        const audio = audioRef.current;
        const stage = stageRef.current;
        const canvas = recCanvasRef.current;
        if (!audio || !stage || !canvas) {
          setAudioError('녹화 준비가 되지 않았습니다.');
          return;
        }
        if (typeof window.html2canvas !== 'function') {
          setAudioError('녹화 라이브러리(html2canvas)가 아직 로드되지 않았어요. 잠시 후 다시 시도해주세요.');
          return;
        }
        if (!('captureStream' in HTMLCanvasElement.prototype)) {
          setAudioError('이 브라우저는 캔버스 녹화를 지원하지 않습니다. (Chrome/Edge 권장)');
          return;
        }
        // 9:16 — 1080x1920 출력
        const W = 1080, H = 1920;
        canvas.width = W;
        canvas.height = H;
        const ctx = canvas.getContext('2d');
        // 첫 프레임 칠해서 canvas가 실제 데이터 가지도록
        ctx.fillStyle = '#FDF8F1'; ctx.fillRect(0, 0, W, H);

        // 녹화 시작 — 처음으로 돌리고 재생
        try { audio.pause(); } catch (e) {}
        audio.currentTime = 0;
        // 오디오 캡처 — videoElement.captureStream()은 비디오/오디오 트랙 둘 다 줌. 우린 오디오만 사용.
        let audioStream;
        if (typeof audio.captureStream === 'function') {
          audioStream = audio.captureStream();
        } else if (typeof audio.mozCaptureStream === 'function') {
          audioStream = audio.mozCaptureStream();
        } else {
          setAudioError('이 브라우저는 오디오 캡처를 지원하지 않습니다.');
          return;
        }
        const audioTracks = audioStream.getAudioTracks();
        const videoStream = canvas.captureStream(30);
        const combined = new MediaStream([...videoStream.getVideoTracks(), ...audioTracks]);

        // MediaRecorder 코덱 — webm/vp9 우선, 호환성 떨어지면 webm/vp8, 마지막으로 webm
        const candidates = [
          'video/webm;codecs=vp9,opus',
          'video/webm;codecs=vp8,opus',
          'video/webm',
        ];
        const mime = candidates.find((m) => MediaRecorder.isTypeSupported(m)) || '';
        const recorder = new MediaRecorder(combined, mime ? { mimeType: mime, videoBitsPerSecond: 6_000_000 } : undefined);
        const chunks = [];
        recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        recorder.onstop = () => {
          const blob = new Blob(chunks, { type: mime || 'video/webm' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          const stamp = new Date().toISOString().replace(/[:.]/g, '-').slice(0, 19);
          a.download = `${platform}-${stamp}.webm`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          setTimeout(() => URL.revokeObjectURL(url), 5000);
        };

        setRecording(true);
        setRecProgress(0);

        // 매 프레임 stage를 html2canvas로 그려서 녹화 canvas에 그리기
        let stopped = false;
        const drawLoop = async () => {
          if (stopped) return;
          try {
            // html2canvas — backgroundColor null로 하면 transparent 처리
            //   useCORS true: 외부 이미지(없지만 안전하게)
            const tmp = await window.html2canvas(stage, {
              backgroundColor: null,
              scale: W / stage.offsetWidth,
              logging: false,
              useCORS: true,
            });
            ctx.fillStyle = '#FDF8F1';
            ctx.fillRect(0, 0, W, H);
            ctx.drawImage(tmp, 0, 0, W, H);
          } catch (e) {
            // 한 프레임 실패해도 다음 프레임 계속
          }
          if (!stopped) requestAnimationFrame(drawLoop);
        };
        drawLoop();

        // 진행률 갱신
        const progressInterval = setInterval(() => {
          if (audio.duration > 0) setRecProgress(Math.min(1, audio.currentTime / audio.duration));
        }, 250);

        // 재생 종료 시 녹화 종료
        const onEnded = () => {
          stopped = true;
          clearInterval(progressInterval);
          // 마지막 프레임이 들어가도록 살짝 지연
          setTimeout(() => {
            try { recorder.stop(); } catch (e) {}
            audioTracks.forEach((t) => t.stop());
            videoStream.getVideoTracks().forEach((t) => t.stop());
            audio.removeEventListener('ended', onEnded);
            setRecording(false);
            setRecProgress(1);
          }, 300);
        };
        audio.addEventListener('ended', onEnded);

        recorder.start(1000); // 1초마다 청크
        try {
          await audio.play();
        } catch (e) {
          stopped = true;
          clearInterval(progressInterval);
          try { recorder.stop(); } catch (_) {}
          setRecording(false);
          setAudioError('녹화 중 재생을 시작할 수 없습니다: ' + e.message);
        }
      };

      // 현재 segment에 매칭된 역할
      const currentRoleKey = currentSegment ? getRoleForSegment(currentSegment) : null;
      const currentText = currentSegment ? getText(currentSegment) : "";

      // 청크 타이밍 — segment/편집 텍스트 바뀔 때만 재계산 (rAF 60fps에서 매번 다시 만들면 낭비)
      const activeChunks = useMemo(() => {
        if (!currentSegment) return [];
        return buildTimedChunks(currentSegment, getText(currentSegment));
      }, [currentSegment, editedSegments]);

      // 등장 인물 (역할 기준) — segment 오버라이드 포함, dad → mom → baby 순서
      // + voiceFallbackRole(노래/옹알이용 기본 화자)도 항상 포함 — 영상에 그 사람이 안 보이면 어색
      const uniqueRoles = useMemo(() => {
        const present = new Set();
        for (const s of effectiveSegments) {
          const r = segmentRoleOverrides[s.id] || roleMapping[s.speaker];
          if (r) present.add(r);
        }
        if (voiceFallbackRole) present.add(voiceFallbackRole);
        return ROLES.map(r => r.key).filter(k => present.has(k));
        // eslint-disable-next-line react-hooks/exhaustive-deps
      }, [effectiveSegments, segmentRoleOverrides, roleMapping, voiceFallbackRole]);
      const totalDur = duration || effectiveSegments.reduce((m, s) => Math.max(m, s.end), 0) || 0;
      const progressPct = totalDur > 0 ? Math.min(100, (currentTime / totalDur) * 100) : 0;

      return (
        <div className="px-6 py-7 space-y-5 anim-fade-in">
          <div className="space-y-1.5">
            <div className="text-[10px] uppercase tracking-[0.18em] text-accent num">04 — Preview</div>
            <h2 className="font-serif text-[26px] leading-[1.15] text-ink">
              미리 보고<br/>다듬어보세요.
            </h2>
          </div>

                    title={s.sub}
                    style={textStyle === key ? {} : { fontFamily: s.family, fontWeight: s.weight }}

                    {s.label}
                  </button>

              </div>
            </div>

            {/* Y축 — 컬러 */}
            <div className="space-y-1.5">
              <div className="text-[9px] uppercase tracking-[0.14em] text-ink/40 num">Y · 컬러</div>
              <div className="grid grid-cols-4 gap-1.5">
                {Object.entries(COLOR_SCHEMES).map(([key, c]) => (
                  <button
                    key={key}
                    type="button"

                    <span className="text-[9px] num text-ink/30">{subSizePx}px</span>
                    <button
                      type="button"
                      onClick={() => setSubSizePx(SIZE_DEFAULTS.subtitle)}

                  </div>
                </div>
                <input
                  type="range"
                  min={SIZE_RANGE.subMin}
                  max={SIZE_RANGE.subMax}

              </div>
            </div>

            {/* 데코레이션 — 4개 모서리 */}

              <div className="text-[9px] uppercase tracking-[0.14em] text-ink/40 num">데코</div>

                    onClick={() => setDecorations({ ...decorations, [key]: !decorations[key] })}

                      decorations[key] ? 'border-ink bg-ink/5' : 'border-hairline bg-paper hover:border-ink/40 opacity-50'

                    <span>{d.emoji}</span>
                    <span className="text-[9px] text-ink/50 num">{d.label}</span>

              <div className="flex items-baseline justify-between">

              </div>
              <div className="grid grid-cols-2 gap-3">
                <div className="space-y-1">
                  <div className="flex items-baseline justify-between">

                    <span className="text-[9px] num text-ink/30">{titleOffset.x}px</span>

                  <input type="range" min={-120} max={120} step={1} value={titleOffset.x}
                    onChange={(e) => setTitleOffset({ ...titleOffset, x: parseInt(e.target.value, 10) })}

                </div>
                <div className="space-y-1">
                  <div className="flex items-baseline justify-between">
                    <span className="text-[10px] text-ink/60">제목 Y</span>
                    <span className="text-[9px] num text-ink/30">{titleOffset.y}px</span>
                  </div>
                  <input type="range" min={-200} max={200} step={1} value={titleOffset.y}
                    onChange={(e) => setTitleOffset({ ...titleOffset, y: parseInt(e.target.value, 10) })}
                    className="w-full h-1 accent-ink" />
                </div>
                <div className="space-y-1">
                  <div className="flex items-baseline justify-between">
                    <span className="text-[10px] text-ink/60">부제 X</span>
                    <span className="text-[9px] num text-ink/30">{subOffset.x}px</span>
                  </div>

                  </div>
                  <input type="range" min={-200} max={200} step={1} value={subOffset.y}
                    onChange={(e) => setSubOffset({ ...subOffset, y: parseInt(e.target.value, 10) })}
                    className="w-full h-1 accent-ink" />
                </div>
              </div>
              <button
                type="button"
                onClick={() => {
                  setTitleOffset({ x: 0, y: 0 });
                  setSubOffset({ x: 0, y: 0 });
                  setDecoOffsets({ heart: {x:0,y:0}, sparkle: {x:0,y:0}, music: {x:0,y:0}, subscribe: {x:0,y:0} });
                }}
                className="text-[9px] text-ink/40 hover:text-ink underline-offset-2 hover:underline"
              >
                위치 전체 리셋
              </button>
            </div>

            {/* 노래/옹알이 fallback 화자 */}
            <div className="pt-1 border-t border-hairline">
              <div className="flex items-center justify-between gap-2">

                  <div className="text-[9px] normal-case tracking-normal text-ink/30 mt-0.5">자막 없는 구간 진폭 감지</div>

                <div className="inline-flex items-center rounded-full border border-hairline bg-paper p-0.5 select-none">
                  {ROLES.map(r => (
                    <button
                      key={r.key}

                      onClick={() => setVoiceFallbackRole(r.key)}
                      className={`px-2.5 py-1 rounded-full text-[10px] font-medium transition ${
                        voiceFallbackRole === r.key ? 'bg-ink text-cream' : 'text-ink/60 hover:text-ink'
                      }`}
                    >
                      {r.kr}
                    </button>
                  ))}
                  <button
                    type="button"
                    onClick={() => setVoiceFallbackRole(null)}
                    className={`px-2.5 py-1 rounded-full text-[10px] font-medium transition ${
                      !voiceFallbackRole ? 'bg-ink text-cream' : 'text-ink/40 hover:text-ink'
                    }`}
                    title="자동 입모양 끄기"
                  >
                    OFF
                  </button>
                </div>
              </div>
            </div>
          </Card>

          {/* Preview surface — 9:16 (Reels/Shorts 공통) + 안전영역 */}
          <Card className="!p-0 overflow-hidden">
            <div
              ref={stageRef}
              className="relative bg-cream border-b border-hairline overflow-hidden mx-auto"
              style={{ aspectRatio: '9 / 16', maxWidth: 360 }}
            >
              {/* 배경 톤 */}
              <div className="absolute inset-0 bg-gradient-to-b from-[#FDF8F1] to-[#F2E5D6]" />

              {/* 상단 제목 — 드래그 가능 + 입력 비어있으면 가제목(placeholder) 미리보기
                  녹화 중엔 빈 텍스트는 안 그림 (가제목이 영상에 들어가지 않게) */}
              {(overlayTitle || (!recording && preset.titlePlaceholder)) && (
                <div
                  className="absolute inset-x-0 flex items-start justify-center px-4 z-20"
                  style={{ top: `${preset.topUnsafe * 100}%`, paddingTop: '6px' }}
                >
                  <div
                    onPointerDown={onDragStart('title')}
                    onDoubleClick={onDragDoubleClick('title')}
                    className={`text-center select-none ${recording ? '' : 'cursor-move'} ${dragging === 'title' ? 'ring-2 ring-accent/50' : ''}`}
                    style={{
                      fontFamily: tStyle.family,
                      fontWeight: tStyle.weight,
                      letterSpacing: tStyle.letterSpacing,
                      fontSize: `${titleSizePx * tStyle.titleScale * 0.42}px`,
                      lineHeight: 1.15,
                      color: tColor.color,
                      textShadow: buildTextStroke(tColor.stroke, 1.5),
                      maxWidth: '94%',
                      WebkitTextStroke: '0',
                      transform: `translate(${titleOffset.x}px, ${titleOffset.y}px)`,
                      touchAction: 'none',
                      padding: '4px 8px',
                      borderRadius: '6px',
                      opacity: overlayTitle ? 1 : 0.38, // 가제목은 흐리게
                    }}
                    title={overlayTitle ? '드래그로 위치 이동 · 더블클릭 리셋' : '가제목 미리보기 (입력 시 대체)'}
                  >
                    {overlayTitle || preset.titlePlaceholder}
                  </div>
                </div>
              )}

              {/* 하단 부제목 — 드래그 가능 + placeholder 미리보기 */}
              {(overlaySubtitle || (!recording && preset.subtitlePlaceholder)) && (
                <div
                  className="absolute inset-x-0 flex items-end justify-center px-4 z-20"
                  style={{ bottom: `${preset.bottomUnsafe * 100}%`, paddingBottom: '6px' }}
                >
                  <div
                    onPointerDown={onDragStart('subtitle')}
                    onDoubleClick={onDragDoubleClick('subtitle')}
                    className={`text-center select-none ${recording ? '' : 'cursor-move'} ${dragging === 'subtitle' ? 'ring-2 ring-accent/50' : ''}`}
                    style={{
                      fontFamily: tStyle.family,
                      fontWeight: Math.max(700, tStyle.weight - 100),
                      letterSpacing: tStyle.letterSpacing,
                      fontSize: `${subSizePx * tStyle.subtitleScale * 0.45}px`,
                      lineHeight: 1.3,
                      color: tColor.color,
                      textShadow: buildTextStroke(tColor.stroke, 1.2),
                      maxWidth: '94%',
                      transform: `translate(${subOffset.x}px, ${subOffset.y}px)`,
                      touchAction: 'none',
                      padding: '4px 8px',
                      borderRadius: '6px',
                      opacity: overlaySubtitle ? 1 : 0.38, // 가부제목 흐리게
                    }}
                    title={overlaySubtitle ? '드래그로 위치 이동 · 더블클릭 리셋' : '가부제목 미리보기 (입력 시 대체)'}
                  >
                    {overlaySubtitle || preset.subtitlePlaceholder}
                  </div>
                </div>
              )}

              {/* 데코레이션 — 4개 모서리 기본 위치, 드래그로 자유 이동 */}
              {Object.entries(DECORATIONS).map(([key, d]) => {
                if (!decorations[key]) return null;
                const pos = DECO_POSITIONS[d.defaultPos];
                const off = decoOffsets[key];
                const dragKey = `deco:${key}`;
                return (
                  <div
                    key={key}
                    onPointerDown={onDragStart(dragKey)}
                    onDoubleClick={onDragDoubleClick(dragKey)}
                    className={`absolute z-20 select-none ${recording ? '' : 'cursor-move'} ${dragging === dragKey ? 'ring-2 ring-accent/50 rounded-md' : ''}`}
                    style={{
                      ...pos,
                      fontSize: '22px',
                      filter: 'drop-shadow(0 2px 4px rgba(0,0,0,0.18))',
                      animation: dragging === dragKey ? 'none' : 'avatar-idle 2.5s ease-in-out infinite',
                      transform: `translate(${off.x}px, ${off.y}px)`,
                      touchAction: 'none',
                      padding: '4px',
                    }}
                    title={`${d.label} · 드래그로 위치 이동 · 더블클릭 리셋`}
                  >
                    {d.emoji}
                  </div>
                );
              })}

              {/* 스냅 가이드라인 — 드래그 중 정렬되면 점선 표시 (자석 효과) */}
              {dragging && !recording && (
                <>
                  {/* 가로 중앙 (세로 점선) — vCenter 활성 시 진한 색 */}
                  <div
                    className="absolute pointer-events-none z-30"
                    style={{
                      left: '50%',
                      top: 0,
                      bottom: 0,
                      width: 0,
