<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가계부 📒</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; }
    .coach-prose { font-size: 0.875rem; color: #334155; line-height: 1.6; }
    .coach-prose h2 { display: none; }
    .coach-prose h3 { font-weight: 600; font-size: 0.95rem; margin: 0.75rem 0 0.4rem; color: #1e293b; }
    .coach-prose p { margin: 0.4rem 0; }
    .coach-prose ul { list-style: disc; padding-left: 1.1rem; margin: 0.3rem 0; }
    .coach-prose ol { list-style: decimal; padding-left: 1.3rem; margin: 0.3rem 0; }
    .coach-prose li { margin: 0.2rem 0; }
    .coach-prose strong { color: #0f172a; font-weight: 600; }
    .coach-prose table { width: 100%; font-size: 0.8rem; border-collapse: collapse; margin: 0.5rem 0; }
    .coach-prose th, .coach-prose td { border: 1px solid #e2e8f0; padding: 0.35rem 0.5rem; text-align: left; }
    .coach-prose th { background: #f8fafc; font-weight: 600; }
    .coach-prose code { background: #f1f5f9; padding: 0.05rem 0.3rem; border-radius: 3px; font-size: 0.8rem; }
    .coach-prose hr { margin: 0.75rem 0; border-color: #e2e8f0; }
  </style>
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const CATEGORY_EMOJI = {
      "식비": "🍚", "교통": "🚌", "주거": "🏠", "구독료": "📺",
      "경조사": "🎁", "쇼핑": "🛍️", "문화/여가": "🎬", "의료": "💊", "기타지출": "💸",
      "급여": "💼", "용돈": "🤑", "부수입": "📈", "이자": "🏦", "기타수입": "✨",
    };

    const formatKRW = (n) => Number(n).toLocaleString("ko-KR") + "원";
    const api = (path, opts = {}) => fetch(path, {
      headers: { "Content-Type": "application/json" },
      ...opts,
    }).then(async (r) => {
      const body = await r.json().catch(() => ({}));
      if (!r.ok) throw new Error(body.error || `HTTP ${r.status}`);
      return body;
    });

    // 소비습관 분석 응답의 마크다운을 4섹션으로 분리
    // 각 섹션 본문은 "## 헤더"를 제외한 나머지 텍스트
    const SECTION_KEYS = [
      { key: "status",     test: (h) => h.includes("현황") },
      { key: "insights",   test: (h) => h.includes("인사이트") },
      { key: "tips",       test: (h) => h.includes("절약") },
      { key: "simulation", test: (h) => h.includes("시뮬레이션") || h.includes("시뮬") },
    ];
    function parseCoachSections(markdown) {
      const out = { status: "", insights: "", tips: "", simulation: "" };
      if (!markdown) return out;
      const lines = markdown.split("\n");
      let current = null;
      for (const line of lines) {
        const h2 = line.match(/^##\s+(.+?)\s*$/);
        if (h2) {
          const header = h2[1];
          const match = SECTION_KEYS.find((s) => s.test(header));
          current = match ? match.key : null;
          continue;
        }
        if (current) out[current] += line + "\n";
      }
      return out;
    }

    function mdToHtml(md) {
      if (!md || !window.marked) return { __html: (md || "").replace(/\n/g, "<br/>") };
      try {
        return { __html: window.marked.parse(md.trim()) };
      } catch {
        return { __html: md.trim() };
      }
    }

    function App() {
      const [entries, setEntries] = useState([]);
      const [stats, setStats] = useState({ totals: { income: 0, expense: 0, balance: 0 }, categoryStats: { income: [], expense: [] } });
      const [categories, setCategories] = useState({ income: [], expense: [] });
      const [loading, setLoading] = useState(true);
      const [submitting, setSubmitting] = useState(false);

      const [type, setType] = useState("expense");
      const [date, setDate] = useState(new Date().toISOString().slice(0, 10));
      const [amount, setAmount] = useState("");
      const [category, setCategory] = useState("");
      const [memo, setMemo] = useState("");

      // AI 챗 상태
      const [chat, setChat] = useState([]); // [{role:'user'|'assistant', text, queries?}]
      const [question, setQuestion] = useState("");
      const [asking, setAsking] = useState(false);

      // 소비습관 분석 상태
      const [analysis, setAnalysis] = useState(null); // { answer, month, range, queries }
      const [analyzing, setAnalyzing] = useState(false);
      const [analyzeMonth, setAnalyzeMonth] = useState(""); // YYYY-MM (빈값이면 서버가 최근월 선택)

      const refresh = useCallback(async () => {
        try {
          const [e, s] = await Promise.all([api("/api/entries"), api("/api/stats")]);
          setEntries(e);
          setStats(s);
        } catch (err) {
          console.error(err);
          alert("데이터를 불러오지 못했습니다: " + err.message);
        }
      }, []);

      useEffect(() => {
        (async () => {
          try {
            const cats = await api("/api/categories");
            setCategories(cats);
            setCategory(cats.expense[0]);
            await refresh();
          } finally {
            setLoading(false);
          }
        })();
      }, []);

      useEffect(() => {
        const list = type === "expense" ? categories.expense : categories.income;
        if (list.length && !list.includes(category)) setCategory(list[0]);
      }, [type, categories]);

      const handleSubmit = async (e) => {
        e.preventDefault();
        const n = Number(String(amount).replace(/,/g, ""));
        if (!date || !n || n <= 0) return alert("날짜와 금액을 올바르게 입력해주세요.");

        setSubmitting(true);
        try {
          await api("/api/entries", {
            method: "POST",
            body: JSON.stringify({ type, date, amount: n, category, memo: memo.trim() }),
          });
          setAmount("");
          setMemo("");
          await refresh();
        } catch (err) {
          alert("등록 실패: " + err.message);
        } finally {
          setSubmitting(false);
        }
      };

      const handleDelete = async (id) => {
        if (!confirm("이 내역을 삭제할까요?")) return;
        try {
          await api(`/api/entries/${id}`, { method: "DELETE" });
          await refresh();
        } catch (err) {
          alert("삭제 실패: " + err.message);
        }
      };

      const handleAnalyze = async () => {
        if (analyzing) return;
        setAnalyzing(true);
        try {
          const body = analyzeMonth ? { month: analyzeMonth } : {};
          const result = await api("/api/analyze", {
            method: "POST",
            body: JSON.stringify(body),
          });
          setAnalysis(result);
          if (result.month && !analyzeMonth) setAnalyzeMonth(result.month);
        } catch (err) {
          alert("분석 실패: " + err.message);
        } finally {
          setAnalyzing(false);
        }
      };

      const handleAsk = async (e) => {
        e?.preventDefault();
        const q = question.trim();
        if (!q || asking) return;
        setChat((prev) => [...prev, { role: "user", text: q }]);
        setQuestion("");
        setAsking(true);
        try {
          const { answer, queries } = await api("/api/ask", {
            method: "POST",
            body: JSON.stringify({ question: q }),
          });
          setChat((prev) => [...prev, { role: "assistant", text: answer, queries }]);
        } catch (err) {
          setChat((prev) => [...prev, {
            role: "assistant", text: `❌ ${err.message}`, error: true
          }]);
        } finally {
          setAsking(false);
        }
      };

      const SAMPLE_QUESTIONS = [
        "이번 달 총 지출 얼마야?",
        "지출 많이 한 카테고리 3개 알려줘",
        "구독료 아낄 수 있는 게 있을까?",
        "식비 얼마나 썼어?",
      ];

      const categoryOptions = type === "expense" ? categories.expense : categories.income;
      const { income, expense, balance } = stats.totals;
      const maxExpense = stats.categoryStats.expense[0]?.total || 1;

      if (loading) {
        return <div className="min-h-screen flex items-center justify-center text-slate-400">불러오는 중…</div>;
      }

      return (
        <div className="max-w-5xl mx-auto p-4 sm:p-8">
          <header className="mb-8 flex items-center justify-between">
            <div>
              <h1 className="text-3xl font-bold text-slate-800">📒 가계부</h1>
              <p className="text-slate-500 text-sm mt-1">수입·지출을 기록하고 카테고리별 소비를 확인하세요 (Supabase 저장)</p>
            </div>
            <span className="text-xs text-slate-400">Express + PostgreSQL + Gemini</span>
          </header>

          {/* 요약 카드 */}
          <section className="grid grid-cols-1 sm:grid-cols-3 gap-4 mb-8">
            <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100">
              <div className="text-sm text-slate-500 mb-1">총 수입</div>
              <div className="text-2xl font-bold text-blue-600">{formatKRW(income)}</div>
            </div>
            <div className="bg-white rounded-xl p-5 shadow-sm border border-slate-100">
              <div className="text-sm text-slate-500 mb-1">총 지출</div>
              <div className="text-2xl font-bold text-rose-600">{formatKRW(expense)}</div>
            </div>
            <div className={`rounded-xl p-5 shadow-sm border ${balance >= 0 ? "bg-emerald-50 border-emerald-200" : "bg-amber-50 border-amber-200"}`}>
              <div className="text-sm text-slate-500 mb-1">잔액</div>
              <div className={`text-2xl font-bold ${balance >= 0 ? "text-emerald-700" : "text-amber-700"}`}>
                {formatKRW(balance)}
              </div>
            </div>
          </section>

          {/* 소비습관 분석 (spending-coach) */}
          <section className="bg-white rounded-xl p-6 shadow-sm border border-slate-100 mb-8">
            <div className="flex items-center justify-between mb-4 flex-wrap gap-2">
              <h2 className="text-lg font-semibold text-slate-800">
                📊 소비습관 분석
                <span className="text-xs text-slate-500 font-normal ml-2">월별 코치 피드백 — 잘한 점 + 개선 제안</span>
              </h2>
              <div className="flex items-center gap-2">
                <input
                  type="month"
                  value={analyzeMonth}
                  onChange={(e) => setAnalyzeMonth(e.target.value)}
                  className="text-xs border border-slate-200 rounded-lg px-2 py-1.5 text-slate-600"
                />
                <button
                  onClick={handleAnalyze}
                  disabled={analyzing}
                  className="bg-emerald-600 text-white rounded-lg px-4 py-2 text-sm font-medium hover:bg-emerald-700 disabled:opacity-50"
                >{analyzing ? "분석 중…" : analysis ? "다시 분석" : "분석하기"}</button>
              </div>
            </div>

            {!analysis && !analyzing && (
              <div className="text-center py-8 text-slate-400 text-sm">
                <p>월을 선택하고 <span className="font-medium text-emerald-600">"분석하기"</span> 버튼을 눌러주세요.</p>
                <p className="text-xs mt-1 text-slate-300">월을 비워두면 가장 최근 데이터가 있는 달을 자동 분석합니다.</p>
              </div>
            )}

            {analyzing && !analysis && (
              <div className="text-center py-10 text-slate-500 text-sm">
                <div className="animate-pulse">🔍 가계부를 읽고 분석 중이에요… (보통 10~20초)</div>
              </div>
            )}

            {analysis && (() => {
              const sections = parseCoachSections(analysis.answer);
              const hasAnySection = sections.status || sections.insights || sections.tips || sections.simulation;
              const cards = [
                { key: "status",     title: "📊 현황",     body: sections.status,     bg: "bg-blue-50",    border: "border-blue-200",    accent: "text-blue-700" },
                { key: "insights",   title: "💡 인사이트", body: sections.insights,   bg: "bg-amber-50",   border: "border-amber-200",   accent: "text-amber-700" },
                { key: "tips",       title: "✂️ 절약 포인트", body: sections.tips,     bg: "bg-emerald-50", border: "border-emerald-200", accent: "text-emerald-700" },
                { key: "simulation", title: "📈 시뮬레이션", body: sections.simulation, bg: "bg-purple-50", border: "border-purple-200", accent: "text-purple-700" },
              ];

              return (
                <div>
                  <div className="text-xs text-slate-500 mb-3">
                    분석 대상: <span className="font-medium text-slate-700">{analysis.month}</span>
                    {analysis.range && (
                      <span className="text-slate-400"> ({analysis.range.start} ~ {analysis.range.end})</span>
                    )}
                  </div>

                  {hasAnySection ? (
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                      {cards.map((c) => c.body.trim() && (
                        <div key={c.key} className={`${c.bg} border ${c.border} rounded-xl p-4`}>
                          <h3 className={`font-semibold text-sm mb-2 ${c.accent}`}>{c.title}</h3>
                          <div className="coach-prose" dangerouslySetInnerHTML={mdToHtml(c.body)} />
                        </div>
                      ))}
                    </div>
                  ) : (
                    <div className="coach-prose bg-slate-50 rounded-lg p-4" dangerouslySetInnerHTML={mdToHtml(analysis.answer)} />
                  )}

                  {analysis.queries && analysis.queries.length > 0 && (
                    <details className="mt-4 text-xs text-slate-400">
                      <summary className="cursor-pointer hover:text-slate-600">실행된 SQL {analysis.queries.length}개 보기</summary>
                      <ul className="mt-2 space-y-1">
                        {analysis.queries.map((q, j) => (
                          <li key={j} className="font-mono text-[11px] bg-slate-50 p-2 rounded border border-slate-200 text-slate-600">
                            {q.sql} <span className="text-slate-400">— {q.rowCount}행</span>
                          </li>
                        ))}
                      </ul>
                    </details>
                  )}
                </div>
              );
            })()}
          </section>

          {/* AI 자연어 분석 */}
          <section className="bg-gradient-to-br from-indigo-50 to-purple-50 rounded-xl p-6 shadow-sm border border-indigo-100 mb-8">
            <div className="flex items-center justify-between mb-3">
              <h2 className="text-lg font-semibold text-slate-800">
                🤖 AI 분석 <span className="text-xs text-slate-500 font-normal ml-2">내 가계부에 자연어로 질문하기</span>
              </h2>
              {chat.length > 0 && (
                <button
                  onClick={() => setChat([])}
                  className="text-xs text-slate-500 hover:text-slate-800 underline"
                >대화 초기화</button>
              )}
            </div>

            {chat.length === 0 && (
              <div className="mb-3">
                <p className="text-sm text-slate-600 mb-2">예시 질문:</p>
                <div className="flex flex-wrap gap-2">
                  {SAMPLE_QUESTIONS.map((s) => (
                    <button
                      key={s}
                      onClick={() => setQuestion(s)}
                      className="text-xs bg-white border border-indigo-200 text-indigo-700 px-3 py-1.5 rounded-full hover:bg-indigo-100"
                    >{s}</button>
                  ))}
                </div>
              </div>
            )}

            {chat.length > 0 && (
              <div className="mb-3 space-y-3 max-h-96 overflow-y-auto">
                {chat.map((msg, i) => (
                  <div key={i} className={`flex ${msg.role === "user" ? "justify-end" : "justify-start"}`}>
                    <div className={`max-w-[85%] rounded-2xl px-4 py-2.5 text-sm ${
                      msg.role === "user"
                        ? "bg-indigo-600 text-white"
                        : msg.error
                          ? "bg-rose-50 text-rose-700 border border-rose-200"
                          : "bg-white text-slate-700 border border-slate-200"
                    }`}>
                      <div className="whitespace-pre-wrap leading-relaxed">{msg.text}</div>
                      {msg.queries && msg.queries.length > 0 && (
                        <details className="mt-2 text-xs text-slate-400">
                          <summary className="cursor-pointer hover:text-slate-600">
                            실행된 SQL {msg.queries.length}개 보기
                          </summary>
                          <ul className="mt-1 space-y-1">
                            {msg.queries.map((q, j) => (
                              <li key={j} className="font-mono text-[11px] bg-slate-50 p-2 rounded border border-slate-200 text-slate-600">
                                {q.sql} <span className="text-slate-400">— {q.rowCount}행</span>
                              </li>
                            ))}
                          </ul>
                        </details>
                      )}
                    </div>
                  </div>
                ))}
                {asking && (
                  <div className="flex justify-start">
                    <div className="bg-white border border-slate-200 rounded-2xl px-4 py-2.5 text-sm text-slate-400">
                      분석 중<span className="inline-block animate-pulse">...</span>
                    </div>
                  </div>
                )}
              </div>
            )}

            <form onSubmit={handleAsk} className="flex gap-2">
              <input
                type="text"
                value={question}
                onChange={(e) => setQuestion(e.target.value)}
                disabled={asking}
                placeholder="예: 이번 달 구독료 얼마 나갔어?"
                className="flex-1 border border-indigo-200 rounded-lg px-4 py-2.5 text-sm bg-white focus:outline-none focus:ring-2 focus:ring-indigo-400"
              />
              <button
                type="submit"
                disabled={asking || !question.trim()}
                className="bg-indigo-600 text-white rounded-lg px-5 py-2.5 text-sm font-medium hover:bg-indigo-700 disabled:opacity-40 disabled:cursor-not-allowed"
              >{asking ? "분석 중" : "질문"}</button>
            </form>
          </section>

          {/* 입력 폼 */}
          <section className="bg-white rounded-xl p-6 shadow-sm border border-slate-100 mb-8">
            <h2 className="text-lg font-semibold text-slate-800 mb-4">내역 등록</h2>
            <form onSubmit={handleSubmit} className="grid grid-cols-1 sm:grid-cols-12 gap-3">
              <div className="sm:col-span-2">
                <label className="block text-xs text-slate-500 mb-1">구분</label>
                <div className="flex rounded-lg overflow-hidden border border-slate-200">
                  <button
                    type="button"
                    onClick={() => setType("expense")}
                    className={`flex-1 py-2 text-sm font-medium ${type === "expense" ? "bg-rose-500 text-white" : "bg-white text-slate-600"}`}
                  >지출</button>
                  <button
                    type="button"
                    onClick={() => setType("income")}
                    className={`flex-1 py-2 text-sm font-medium ${type === "income" ? "bg-blue-500 text-white" : "bg-white text-slate-600"}`}
                  >수입</button>
                </div>
              </div>
              <div className="sm:col-span-2">
                <label className="block text-xs text-slate-500 mb-1">날짜</label>
                <input
                  type="date" value={date} onChange={(e) => setDate(e.target.value)}
                  className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
                />
              </div>
              <div className="sm:col-span-2">
                <label className="block text-xs text-slate-500 mb-1">금액 (원)</label>
                <input
                  type="text" inputMode="numeric" placeholder="10,000"
                  value={amount ? Number(String(amount).replace(/,/g, "")).toLocaleString("ko-KR") : ""}
                  onChange={(e) => setAmount(e.target.value.replace(/[^0-9]/g, ""))}
                  className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
                />
              </div>
              <div className="sm:col-span-2">
                <label className="block text-xs text-slate-500 mb-1">카테고리</label>
                <select
                  value={category} onChange={(e) => setCategory(e.target.value)}
                  className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
                >
                  {categoryOptions.map((c) => (
                    <option key={c} value={c}>{CATEGORY_EMOJI[c] || ""} {c}</option>
                  ))}
                </select>
              </div>
              <div className="sm:col-span-3">
                <label className="block text-xs text-slate-500 mb-1">메모</label>
                <input
                  type="text" placeholder="내용을 입력하세요"
                  value={memo} onChange={(e) => setMemo(e.target.value)}
                  className="w-full border border-slate-200 rounded-lg px-3 py-2 text-sm"
                />
              </div>
              <div className="sm:col-span-1 flex items-end">
                <button
                  type="submit" disabled={submitting}
                  className="w-full bg-slate-800 text-white rounded-lg py-2 text-sm font-medium hover:bg-slate-900 disabled:opacity-50"
                >{submitting ? "..." : "등록"}</button>
              </div>
            </form>
          </section>

          {/* 카테고리별 합계 */}
          <section className="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
              <h2 className="text-lg font-semibold text-slate-800 mb-4">카테고리별 지출</h2>
              {stats.categoryStats.expense.length === 0 ? (
                <p className="text-sm text-slate-400">지출 내역이 없습니다.</p>
              ) : (
                <ul className="space-y-3">
                  {stats.categoryStats.expense.map((s) => {
                    const pct = expense ? Math.round((s.total / expense) * 100) : 0;
                    const barPct = Math.max(3, Math.round((s.total / maxExpense) * 100));
                    return (
                      <li key={s.category}>
                        <div className="flex items-center justify-between text-sm mb-1">
                          <span className="font-medium text-slate-700">
                            {CATEGORY_EMOJI[s.category]} {s.category}
                            <span className="text-slate-400 ml-2">{pct}% · {s.count}건</span>
                          </span>
                          <span className="text-rose-600 font-semibold">{formatKRW(s.total)}</span>
                        </div>
                        <div className="h-2 bg-slate-100 rounded-full overflow-hidden">
                          <div className="h-full bg-rose-400" style={{ width: barPct + "%" }} />
                        </div>
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>
            <div className="bg-white rounded-xl p-6 shadow-sm border border-slate-100">
              <h2 className="text-lg font-semibold text-slate-800 mb-4">카테고리별 수입</h2>
              {stats.categoryStats.income.length === 0 ? (
                <p className="text-sm text-slate-400">수입 내역이 없습니다.</p>
              ) : (
                <ul className="space-y-3">
                  {stats.categoryStats.income.map((s) => {
                    const pct = income ? Math.round((s.total / income) * 100) : 0;
                    return (
                      <li key={s.category} className="flex items-center justify-between text-sm">
                        <span className="font-medium text-slate-700">
                          {CATEGORY_EMOJI[s.category]} {s.category}
                          <span className="text-slate-400 ml-2">{pct}% · {s.count}건</span>
                        </span>
                        <span className="text-blue-600 font-semibold">{formatKRW(s.total)}</span>
                      </li>
                    );
                  })}
                </ul>
              )}
            </div>
          </section>

          {/* 내역 목록 */}
          <section className="bg-white rounded-xl shadow-sm border border-slate-100 overflow-hidden">
            <div className="p-6 border-b border-slate-100 flex items-center justify-between">
              <h2 className="text-lg font-semibold text-slate-800">전체 내역</h2>
              <span className="text-sm text-slate-500">{entries.length}건</span>
            </div>
            {entries.length === 0 ? (
              <p className="p-6 text-sm text-slate-400 text-center">등록된 내역이 없습니다. 위에서 추가해보세요.</p>
            ) : (
              <ul className="divide-y divide-slate-100">
                {entries.map((e) => (
                  <li key={e.id} className="flex items-center px-6 py-3 hover:bg-slate-50">
                    <div className="w-24 text-sm text-slate-500">{e.date.slice(5)}</div>
                    <div className="w-20">
                      <span className={`inline-block text-xs px-2 py-0.5 rounded-full font-medium ${e.type === "expense" ? "bg-rose-50 text-rose-600" : "bg-blue-50 text-blue-600"}`}>
                        {e.type === "expense" ? "지출" : "수입"}
                      </span>
                    </div>
                    <div className="w-28 text-sm text-slate-600">{CATEGORY_EMOJI[e.category] || ""} {e.category}</div>
                    <div className="flex-1 text-sm text-slate-700 truncate">{e.memo || <span className="text-slate-300">-</span>}</div>
                    <div className={`w-32 text-right text-sm font-semibold ${e.type === "expense" ? "text-rose-600" : "text-blue-600"}`}>
                      {e.type === "expense" ? "-" : "+"}{formatKRW(e.amount)}
                    </div>
                    <button
                      onClick={() => handleDelete(e.id)}
                      className="ml-3 text-slate-300 hover:text-rose-500 text-lg"
                      aria-label="삭제"
                    >×</button>
                  </li>
                ))}
              </ul>
            )}
          </section>

          <footer className="mt-8 text-center text-xs text-slate-400">
            🗄️ Supabase PostgreSQL · schema <code>ledger.entries</code>
          </footer>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
