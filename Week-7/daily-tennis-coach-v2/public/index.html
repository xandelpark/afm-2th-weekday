<!doctype html>
<html lang="ko"><head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>데일리테니스 자세분석</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin=""></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin=""></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!--
    MediaPipe Tasks Vision은 ESM 전용 → type="module"로 로드 후 window 전역에 노출.
    React/Babel 영역에서는 window.__MediaPipe + 'mediapipe-ready' 이벤트로 감지.
  -->
  <script type="module">
    import { PoseLandmarker, FilesetResolver, DrawingUtils } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

    const MODEL_URLS = {
      lite:  "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/latest/pose_landmarker_lite.task",
      full:  "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_full/float16/latest/pose_landmarker_full.task",
      heavy: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_heavy/float16/latest/pose_landmarker_heavy.task",
    };

    async function createLandmarker(modelKey = "full") {
      const filesetResolver = await FilesetResolver.forVisionTasks(
        "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
      );
      return await PoseLandmarker.createFromOptions(filesetResolver, {
        baseOptions: {
          modelAssetPath: MODEL_URLS[modelKey],
          delegate: "GPU",
        },
        runningMode: "VIDEO",
        numPoses: 1,
        minPoseDetectionConfidence: 0.5,
        minPosePresenceConfidence: 0.5,
        minTrackingConfidence: 0.5,
      });
    }

    window.__MediaPipe = {
      createLandmarker,
      DrawingUtils,
      POSE_CONNECTIONS: PoseLandmarker.POSE_CONNECTIONS,
      ready: true,
    };
    window.dispatchEvent(new Event("mediapipe-ready"));
  </script>

  <style>
    /* video와 canvas 정확한 겹침 — demo.html 와 동일 전략 */
    .video-stack {
      position: relative;
      line-height: 0;
      background: #000;
      border-radius: 12px;
      overflow: hidden;
      width: 100%;
    }
    .video-stack > video {
      display: block;
      width: 100%;
      height: auto;
    }
    .video-stack > canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    /* 9:16 인스타 카드 — 다크 그라디언트 + 라임 글로우 */
    .insta-card {
      width: 540px;
      height: 960px;
      aspect-ratio: 9 / 16;
      background:
        radial-gradient(ellipse at 30% 0%, rgba(163, 230, 53, 0.18), transparent 55%),
        radial-gradient(ellipse at 70% 100%, rgba(132, 204, 22, 0.14), transparent 55%),
        linear-gradient(160deg, #020617 0%, #0c1a14 50%, #0a0f08 100%);
      color: #f8fafc;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      box-shadow:
        0 30px 80px -20px rgba(0, 0, 0, 0.7),
        0 0 60px rgba(163, 230, 53, 0.18);
    }
    /* 카드 외곽 라임 보더(테두리 안쪽) */
    .insta-card::before {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: 18px;
      border: 1px solid rgba(163, 230, 53, 0.25);
      pointer-events: none;
      z-index: 1;
    }
    .insta-card > * { position: relative; z-index: 2; }

    /* 다운로드 시 html2canvas는 1080x1920 픽셀로 렌더링 */
    .insta-card.capture-mode {
      width: 1080px !important;
      height: 1920px !important;
      transform: none !important;
      font-size: 200%; /* 모든 em/rem 단위 콘텐츠 비례 확대 */
    }
    .insta-card .insta-video-stack {
      position: relative;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }
    .insta-card .insta-video-stack > video {
      display: block;
      width: 100%;
      height: 100%;
      /* contain: 박스 안에 비율 유지로 fit (전신 보장, 좌우/상하 letterbox) */
      object-fit: contain;
      background: #000;
    }
    .insta-card .insta-video-stack > canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      /* canvas도 contain으로 — video와 동일한 letterbox 영역에 그려져 정규화 좌표 정렬 유지 */
      object-fit: contain;
      pointer-events: none;
    }
    /* 베스트 샷 컨테이너 — 카드 가로의 100%, 1:1, 큰 영상 우위 레이아웃 */
    .insta-card .best-shot {
      width: 100%;
      aspect-ratio: 1 / 1;
    }

    .accent-lime { color: #a3e635; }
    .bg-accent-lime { background-color: #a3e635; }
    .star-yellow { color: #fbbf24; }
    .star-dim { color: #475569; }

    /* 결과 카드 점수 강조 — 라임 글로우 */
    .score-mega {
      font-weight: 900;
      letter-spacing: -0.04em;
      line-height: 0.9;
      text-shadow:
        0 0 22px rgba(163, 230, 53, 0.45),
        0 0 6px rgba(163, 230, 53, 0.6);
    }

    /* QR 컨테이너 박스 */
    .qr-shell {
      background: #f8fafc;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 10px 30px -8px rgba(0,0,0,0.5);
    }

    /* 모바일 업로드 페이지 — 큰 버튼 */
    .mobile-pick {
      border: 3px dashed #475569;
      border-radius: 20px;
      padding: 36px 16px;
      text-align: center;
      transition: border-color 0.15s, background-color 0.15s;
    }
    .mobile-pick:active { border-color: #a3e635; background: rgba(163, 230, 53, 0.08); }

    /* 펄스 애니메이션 (대기/업로드 진행) */
    @keyframes pulse-soft {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.55; }
    }
    .pulse-soft { animation: pulse-soft 1.6s ease-in-out infinite; }

    /* 진행률 바 */
    .progress-track { background: #1e293b; border-radius: 999px; overflow: hidden; height: 10px; }
    .progress-fill { background: linear-gradient(90deg, #a3e635, #84cc16); height: 100%; transition: width 0.2s; }

    /* 인스타 Reels 안전 영역 오버레이 — 디자인 검수용
       상단 240px / 하단 300px / 좌우 64px 기준 (1080x1920 캔버스 좌표) */
    .insta-safe-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 30;
    }
    .insta-safe-overlay > .safe-band {
      position: absolute;
      background: rgba(244, 63, 94, 0.10);
      border-color: rgba(244, 63, 94, 0.7);
      border-style: dashed;
    }
    .insta-safe-overlay > .safe-top {
      top: 0; left: 0; right: 0;
      height: 12.5%; /* 240/1920 — Reels 상단 액션바 */
      border-bottom-width: 1.5px;
    }
    .insta-safe-overlay > .safe-bottom {
      bottom: 0; left: 0; right: 0;
      height: 17.7%; /* 340/1920 — Reels 액션바·캡션·음원 영역 */
      border-top-width: 1.5px;
    }
    .insta-safe-overlay > .safe-left,
    .insta-safe-overlay > .safe-right {
      top: 12.5%;
      bottom: 17.7%;
      width: 5.9%; /* 64/1080 */
    }
    .insta-safe-overlay > .safe-left {
      left: 0;
      border-right-width: 1.5px;
    }
    .insta-safe-overlay > .safe-right {
      right: 0;
      border-left-width: 1.5px;
    }

    /* 카운트업 애니메이션 */
    @keyframes score-pop {
      0% { transform: scale(0.7); opacity: 0; }
      60% { transform: scale(1.08); opacity: 1; }
      100% { transform: scale(1); opacity: 1; }
    }
    .score-pop { animation: score-pop 0.85s cubic-bezier(0.34, 1.56, 0.64, 1) both; }

    /* 헥사곤 fade-in */
    @keyframes hex-fade {
      from { opacity: 0; transform: scale(0.92); }
      to { opacity: 1; transform: scale(1); }
    }
    .hex-fade { animation: hex-fade 0.9s ease-out 0.4s both; }

    /* 렌더링 오버레이 */
    .render-overlay {
      position: absolute;
      inset: 0;
      background: rgba(2, 6, 23, 0.78);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      z-index: 50;
      border-radius: 24px;
    }

    /* ──────────────────────────────────────────
       디버그 콘솔 박스 (모바일 진단용)
       /upload 페이지에서만 표시. 토글로 펼침/접힘.
       모든 console.log/warn/error를 캡처해서 사용자가 폰에서 직접 읽음.
       ────────────────────────────────────────── */
    #debug-box {
      position: fixed;
      left: 8px;
      right: 8px;
      bottom: 8px;
      max-width: 720px;
      margin: 0 auto;
      background: rgba(2, 6, 23, 0.96);
      border: 1px solid #1e293b;
      border-radius: 14px;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 11px;
      color: #e2e8f0;
      z-index: 9999;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
    }
    #debug-box.hidden { display: none; }
    #debug-header {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      border-bottom: 1px solid #1e293b;
      cursor: pointer;
      user-select: none;
    }
    #debug-header .dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: #a3e635;
      box-shadow: 0 0 6px #a3e635;
      flex-shrink: 0;
    }
    #debug-header .title {
      flex: 1; font-weight: 700; color: #a3e635;
      letter-spacing: 0.05em;
    }
    #debug-header .count {
      color: #94a3b8;
      font-size: 10px;
    }
    #debug-header .arrow {
      color: #94a3b8;
      transition: transform 0.15s;
    }
    #debug-box.collapsed #debug-header .arrow { transform: rotate(-90deg); }
    #debug-body { display: flex; flex-direction: column; }
    #debug-box.collapsed #debug-body { display: none; }
    #debug-log {
      max-height: 38vh;
      overflow-y: auto;
      padding: 6px 10px;
      line-height: 1.45;
      word-break: break-all;
      white-space: pre-wrap;
    }
    #debug-log .line { padding: 2px 0; }
    #debug-log .line .ts { color: #64748b; margin-right: 6px; }
    #debug-log .line.log   { color: #f1f5f9; }
    #debug-log .line.warn  { color: #facc15; }
    #debug-log .line.error { color: #f87171; }
    #debug-log .line.info  { color: #60a5fa; }
    #debug-actions {
      display: flex; gap: 6px;
      padding: 6px 10px 8px;
      border-top: 1px solid #1e293b;
    }
    #debug-actions button {
      flex: 1;
      background: #1e293b;
      border: 1px solid #334155;
      color: #e2e8f0;
      font-size: 11px;
      font-family: inherit;
      padding: 6px 8px;
      border-radius: 8px;
      cursor: pointer;
    }
    #debug-actions button:active { background: #334155; }
    #debug-actions button.primary {
      background: #a3e635;
      color: #0f172a;
      border-color: #a3e635;
      font-weight: 700;
    }
  </style>

<body class="bg-slate-900 text-slate-100 font-sans min-h-screen">
  <!-- 디버그 콘솔 박스 — ?debug=1 쿼리스트링이 있을 때만 setupDebugBox가 hidden을 떼서 표시 -->
  <div id="debug-box" class="hidden">
    <div id="debug-header">
      <span class="dot"></span>
      <span class="title">DEBUG LOG</span>
      <span class="count" id="debug-count">0</span>
      <span class="arrow">▾</span>
    </div>
    <div id="debug-body">
      <div id="debug-log"></div>
      <div id="debug-actions">
        <button id="debug-copy">📋 복사</button>
        <button id="debug-clear">🗑 지우기</button>
        <button id="debug-toggle-pin" class="primary">📌 항상 보기</button>
      </div>
    </div>
  </div>

  <script>
    // ────────────────────────────────────────────────────────────────
    // 디버그 로그 캡처 — console.log/warn/error/info를 후킹해서 화면에 표시
    // /upload 페이지에서만 박스를 보이게 한다 (PC 본 화면에는 숨김).
    // ────────────────────────────────────────────────────────────────
    (function setupDebugBox() {
      var box = document.getElementById("debug-box");
      var logEl = document.getElementById("debug-log");
      var countEl = document.getElementById("debug-count");
      var headerEl = document.getElementById("debug-header");
      var copyBtn = document.getElementById("debug-copy");
      var clearBtn = document.getElementById("debug-clear");

      // ?debug=1 또는 ?debug=true 쿼리스트링이 있을 때만 표시 (운영 화면은 깔끔하게)
      var qs = new URLSearchParams(window.location.search);
      var debugQs = (qs.get("debug") || "").toLowerCase();
      var forceDebug = debugQs === "1" || debugQs === "true";
      if (!forceDebug) return;
      box.classList.remove("hidden");

      var entries = [];
      var maxEntries = 500;

      function pad2(n) { return n < 10 ? "0" + n : "" + n; }
      function pad3(n) { return n < 10 ? "00" + n : n < 100 ? "0" + n : "" + n; }
      function nowStamp() {
        var d = new Date();
        return pad2(d.getMinutes()) + ":" + pad2(d.getSeconds()) + "." + pad3(d.getMilliseconds());
      }
      function fmt(arg) {
        if (arg === null) return "null";
        if (arg === undefined) return "undefined";
        if (typeof arg === "string") return arg;
        if (arg instanceof Error) {
          return arg.name + ": " + arg.message + (arg.stack ? "\n" + arg.stack : "");
        }
        try {
          return JSON.stringify(arg, function (k, v) {
            if (v instanceof Error) return v.name + ": " + v.message;
            if (typeof v === "function") return "[fn]";
            return v;
          });
        } catch (e) {
          return String(arg);
        }
      }

      function appendLine(level, args) {
        var ts = nowStamp();
        var msg = Array.prototype.slice.call(args).map(fmt).join(" ");
        entries.push({ ts: ts, level: level, msg: msg });
        if (entries.length > maxEntries) entries.shift();

        var line = document.createElement("div");
        line.className = "line " + level;
        var tsSpan = document.createElement("span");
        tsSpan.className = "ts";
        tsSpan.textContent = ts;
        line.appendChild(tsSpan);
        line.appendChild(document.createTextNode(msg));
        logEl.appendChild(line);

        // 너무 많으면 앞에서 잘라냄
        while (logEl.childNodes.length > maxEntries) {
          logEl.removeChild(logEl.firstChild);
        }
        countEl.textContent = entries.length;
        // 자동 스크롤
        logEl.scrollTop = logEl.scrollHeight;
      }

      // console 메서드 후킹 (원본 보존 + 박스에도 출력)
      ["log", "warn", "error", "info"].forEach(function (level) {
        var orig = console[level] ? console[level].bind(console) : function () {};
        console[level] = function () {
          try { appendLine(level, arguments); } catch (e) { /* never throw from console */ }
          orig.apply(null, arguments);
        };
      });

      // 전역 에러도 캡처
      window.addEventListener("error", function (e) {
        appendLine("error", ["[window.error]", e.message, e.filename + ":" + e.lineno + ":" + e.colno]);
      });
      window.addEventListener("unhandledrejection", function (e) {
        var reason = e.reason && (e.reason.stack || e.reason.message) ? (e.reason.stack || e.reason.message) : String(e.reason);
        appendLine("error", ["[unhandledrejection]", reason]);
      });

      // 토글
      headerEl.addEventListener("click", function () {
        box.classList.toggle("collapsed");
      });

      // 복사
      copyBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        var text = entries.map(function (en) {
          return "[" + en.ts + "] " + en.level.toUpperCase() + " " + en.msg;
        }).join("\n");
        var ua = navigator.userAgent || "";
        var meta = "ua=" + ua + "\nurl=" + window.location.href + "\n";
        var full = meta + "\n" + text;
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(full).then(function () {
            copyBtn.textContent = "✅ 복사됨";
            setTimeout(function () { copyBtn.textContent = "📋 복사"; }, 1500);
          }).catch(function () {
            fallbackCopy(full);
          });
        } else {
          fallbackCopy(full);
        }
      });
      function fallbackCopy(text) {
        var ta = document.createElement("textarea");
        ta.value = text;
        ta.style.position = "fixed";
        ta.style.left = "-9999px";
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand("copy"); copyBtn.textContent = "✅ 복사됨"; }
        catch (e) { copyBtn.textContent = "❌ 복사실패"; }
        document.body.removeChild(ta);
        setTimeout(function () { copyBtn.textContent = "📋 복사"; }, 1500);
      }

      // 지우기
      clearBtn.addEventListener("click", function (e) {
        e.stopPropagation();
        entries.length = 0;
        logEl.innerHTML = "";
        countEl.textContent = "0";
      });

      // 초기 진단 정보
      appendLine("info", ["[debug] 박스 시작", "ua=" + (navigator.userAgent || "?")]);
      appendLine("info", ["[debug] url=" + window.location.href]);
    })();
  </script>

    // ─────────────────────────────────────────────────────────────
    // 업로드 — Vercel 배포판
    //  1) ffmpeg.wasm (브라우저)로 자동 변환: 1080p / H.264 / 1분 트림
    //  2) Vercel Blob에 클라이언트 직접 업로드 (함수 페이로드 제한 우회)
    //  3) /api/sessions/:id/attach 로 Blob URL을 DB에 첨부
    //  변환은 첫 실행 시 ffmpeg-core(WASM) 약 30MB를 로드. 이후 캐시됨.
    // ─────────────────────────────────────────────────────────────

    // V1.1: 클라이언트 압축 (MediaRecorder + canvas, ffmpeg 없이)
    //  10MB 초과면 720p / 1Mbps + 4배속 재생으로 빠르게 압축. 30초 영상이 ~7초 만에 압축 + 업로드.
    //  ⚠️ 4배속은 Blob에 저장되는 "백업본"이 4배속 영상이 된다는 의미. 분석/결과 다운로드는 폰의 로컬 원본을 쓰므로 영향 없음.
    const MAX_UPLOAD_BYTES_CLIENT = 200 * 1024 * 1024;     // 200MB까지 직접 업로드 허용
    const COMPRESS_THRESHOLD_BYTES = 10 * 1024 * 1024;     // 10MB 초과 시 자동 압축
    const COMPRESS_PLAYBACK_RATE = 4;                       // 4배속 재생으로 압축 속도 ×4 (iOS는 자체 클램프할 수도 있음)
    const COMPRESS_MAX_LONG_SIDE = 720;                    // 긴 변 720px (16:9 → 1280x720)
    const COMPRESS_BITRATE = 1_000_000;                    // 1 Mbps (백업 용도라 더 줄임)
    const COMPRESS_MAX_DURATION_SEC = 60;                  // 60초 트림

    // 압축 — 원본 영상 → 720p 캔버스 실시간 그리기 → MediaRecorder 녹화
    //  반환: { file: 압축된 File, ratio: 압축률 }
    async function compressVideoForUpload(srcFile, { onProgress } = {}) {
      const srcUrl = URL.createObjectURL(srcFile);
      const video = document.createElement('video');
      video.muted = true;
      video.playsInline = true;
      video.crossOrigin = 'anonymous';
      video.preload = 'auto';
      video.src = srcUrl;

      try {
        await new Promise((resolve, reject) => {
          const onMeta = () => { video.removeEventListener('error', onErr); resolve(); };
          const onErr = () => { video.removeEventListener('loadedmetadata', onMeta); reject(new Error('영상 로딩 실패')); };
          video.addEventListener('loadedmetadata', onMeta, { once: true });
          video.addEventListener('error', onErr, { once: true });
        });

        const srcW = video.videoWidth;
        const srcH = video.videoHeight;
        if (!srcW || !srcH) throw new Error('영상 해상도를 읽을 수 없습니다');

        // 긴 변을 COMPRESS_MAX_LONG_SIDE로 다운스케일 (비율 유지, 2의 배수)
        const scale = Math.min(1, COMPRESS_MAX_LONG_SIDE / Math.max(srcW, srcH));
        const dstW = Math.max(2, Math.round((srcW * scale) / 2) * 2);
        const dstH = Math.max(2, Math.round((srcH * scale) / 2) * 2);

        const canvas = document.createElement('canvas');
        canvas.width = dstW;
        canvas.height = dstH;
        const ctx = canvas.getContext('2d');

        const stream = canvas.captureStream(30);
        const mimeCandidates = [
          'video/mp4; codecs="avc1.42E01E,mp4a.40.2"',
          'video/mp4; codecs="avc1.42E01E"',
          'video/mp4',
          'video/webm;codecs=h264',
          'video/webm;codecs=vp9',
          'video/webm;codecs=vp8',
          'video/webm',
        ];
        const mimeType = mimeCandidates.find((m) => window.MediaRecorder && MediaRecorder.isTypeSupported(m));
        if (!mimeType) throw new Error('이 브라우저는 영상 녹화를 지원하지 않습니다');

        const recorder = new MediaRecorder(stream, { mimeType, videoBitsPerSecond: COMPRESS_BITRATE });
        const chunks = [];
        recorder.ondataavailable = (e) => { if (e.data && e.data.size > 0) chunks.push(e.data); };
        const stopPromise = new Promise((r) => { recorder.onstop = r; });

        // 4배속 재생으로 압축 속도 가속. iOS Safari는 자체 클램프(보통 ≤2x)할 수 있지만 그래도 2배 빨라짐.
        try { video.playbackRate = COMPRESS_PLAYBACK_RATE; } catch (_) {}
        // 모바일 사파리는 user-gesture가 async 경계를 넘어가면 play()를 거부함.
        // play()가 reject되면 그대로 throw → 호출부의 catch가 raw 업로드로 폴백.
        const playResult = await video.play().then(() => true).catch((e) => e);
        if (playResult !== true) {
          throw new Error('영상 재생을 시작할 수 없음 (자동재생 차단)');
        }
        recorder.start();

        const totalMs = Math.min(COMPRESS_MAX_DURATION_SEC, video.duration || COMPRESS_MAX_DURATION_SEC) * 1000;
        let stopped = false;

        // 진척 정체 감지: 3초간 currentTime이 안 늘면 폴백 발동.
        let lastT = 0;
        let lastAdvanceAt = performance.now();
        const STALL_TIMEOUT_MS = 3000;
        const HARD_TIMEOUT_MS = 60000;
        const startedAt = performance.now();
        let stallError = null;

        await new Promise((resolveLoop) => {
          const loop = () => {
            if (stopped) return;
            const tMs = video.currentTime * 1000;
            const now = performance.now();
            if (tMs > lastT + 1) { lastT = tMs; lastAdvanceAt = now; }
            if (now - lastAdvanceAt > STALL_TIMEOUT_MS) {
              stallError = new Error('압축 진척 정체 (자동재생 차단 가능성)');
              stopped = true; resolveLoop(); return;
            }
            if (now - startedAt > HARD_TIMEOUT_MS) {
              stallError = new Error('압축 타임아웃 (60초)');
              stopped = true; resolveLoop(); return;
            }
            if (video.ended || tMs >= totalMs) {
              stopped = true;
              resolveLoop();
              return;
            }
            try { ctx.drawImage(video, 0, 0, dstW, dstH); } catch (_) { /* CORS / not ready */ }
            if (typeof onProgress === 'function') {
              onProgress(Math.min(99, Math.round((tMs / totalMs) * 100)));
            }
            requestAnimationFrame(loop);
          };
          requestAnimationFrame(loop);
        });

        if (stallError) {
          try { recorder.stop(); } catch (_) {}
          try { video.pause(); } catch (_) {}
          throw stallError;
        }

        try { recorder.stop(); } catch (_) {}
        try { video.pause(); } catch (_) {}
        await stopPromise;

        if (typeof onProgress === 'function') onProgress(100);

        const ext = mimeType.startsWith('video/mp4') ? 'mp4' : 'webm';
        const outBlob = new Blob(chunks, { type: cleanMime(mimeType) });
        const outFile = new File([outBlob], (srcFile.name || 'input').replace(/\.[^.]+$/, '') + '.' + ext, { type: cleanMime(mimeType) });
        const ratio = srcFile.size > 0 ? outFile.size / srcFile.size : 1;
        return { file: outFile, ratio };
      } finally {
        try { URL.revokeObjectURL(srcUrl); } catch (_) {}
      }
    }

    // Vercel Blob 클라이언트 업로드 프로토콜 — 직접 구현 (외부 ESM 의존 제거)
    //  1) /api/blob/upload-url 에 generate-client-token POST → clientToken 받음
    //  2) PUT https://vercel.com/api/blob/?pathname=<encoded> with Bearer clientToken
    //  3) 응답 JSON의 url 반환
    async function uploadToBlob({ pathname, file, contentType, onProgress }) {
      const callbackUrl = `${window.location.origin}${API_BASE_URL}/blob/upload-url`;

      // Step 1: 토큰 발급
      const tokenRes = await fetch(`${API_BASE_URL}/blob/upload-url`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          type: 'blob.generate-client-token',
          payload: {
            pathname,
            callbackUrl,
            clientPayload: null,
            multipart: false,
          },
        }),
      });
      if (!tokenRes.ok) {
        const text = await tokenRes.text();
        throw new Error(`Blob 토큰 발급 실패 (${tokenRes.status}): ${text.slice(0, 200)}`);
      }
      const tokenBody = await tokenRes.json();
      const clientToken = tokenBody.clientToken;
      if (!clientToken) throw new Error('Blob clientToken 누락');

      // Step 2: Blob 스토리지에 PUT (XHR로 progress 추적)
      const uploadUrl = `https://vercel.com/api/blob/?pathname=${encodeURIComponent(pathname)}`;
      const requestId = `${Date.now()}-${Math.random().toString(16).slice(2, 10)}`;

      const responseJson = await new Promise((resolve, reject) => {
        const xhr = new XMLHttpRequest();
        xhr.open('PUT', uploadUrl, true);
        xhr.setRequestHeader('authorization', `Bearer ${clientToken}`);
        xhr.setRequestHeader('x-api-version', '12');
        xhr.setRequestHeader('x-api-blob-request-id', requestId);
        xhr.setRequestHeader('x-api-blob-request-attempt', '0');
        xhr.setRequestHeader('x-vercel-blob-access', 'public');
        xhr.setRequestHeader('x-content-type', contentType || file.type || 'application/octet-stream');
        if (file.size) {
          xhr.setRequestHeader('x-content-length', String(file.size));
        }

        // 진척 정체 감지: 20초간 progress 이벤트 없으면 abort (모바일 네트워크 stall 대비)
        let lastProgressAt = Date.now();
        const stallChecker = setInterval(() => {
          if (Date.now() - lastProgressAt > 20000) {
            try { xhr.abort(); } catch (_) {}
            clearInterval(stallChecker);
            reject(new Error('업로드 무응답 — 네트워크 확인 후 다시 시도'));
          }
        }, 2000);
        const clearStall = () => { clearInterval(stallChecker); };

        xhr.upload.addEventListener('progress', (e) => {
          lastProgressAt = Date.now();
          if (e.lengthComputable && typeof onProgress === 'function') {
            onProgress(Math.round((e.loaded / e.total) * 100));
          }
        });
        xhr.addEventListener('load', () => {
          clearStall();
          if (xhr.status >= 200 && xhr.status < 300) {
            try { resolve(JSON.parse(xhr.responseText)); }
            catch (e) { reject(new Error('Blob 응답 파싱 실패: ' + xhr.responseText.slice(0, 200))); }
          } else {
            reject(new Error(`Blob 업로드 실패 (${xhr.status}): ${xhr.responseText.slice(0, 200)}`));
          }
        });
        xhr.addEventListener('error', () => { clearStall(); reject(new Error('Blob 네트워크 오류')); });
        xhr.addEventListener('abort', () => { clearStall(); reject(new Error('Blob 업로드 취소됨')); });
        xhr.send(file);
      });

      return responseJson; // { url, downloadUrl, pathname, contentType, contentDisposition, etag }
    }

    // MIME에서 codec 부분 제거 — 'video/webm; codecs="vp9"' → 'video/webm'
    function cleanMime(mime) {
      if (!mime) return null;
      return mime.split(';')[0].trim().toLowerCase();
    }

    // 모바일 raw 영상 업로드 — 큰 파일은 자동 압축 후 Blob 직접 업로드
    async function apiUploadVideo(sessionId, file, onProgress) {
      // 1) 압축 필요 여부 판정 (크기 기준)
      let workingFile = file;
      const origSizeMb = (file.size / 1024 / 1024).toFixed(0);
      if (file.size > COMPRESS_THRESHOLD_BYTES) {
        console.log(`[upload] 압축 시작 (${origSizeMb}MB > ${COMPRESS_THRESHOLD_BYTES / 1024 / 1024}MB 임계)`);
        if (typeof onProgress === 'function') onProgress(0, `화질 줄이는 중 (${origSizeMb}MB → 1MB대)`);
        try {
          const { file: compressed, ratio } = await compressVideoForUpload(file, {
            onProgress: (pct) => onProgress && onProgress(Math.round(pct * 0.7), '화질 줄이는 중'),
          });
          workingFile = compressed;
          const newMb = (compressed.size / 1024 / 1024).toFixed(1);
          console.log(`[compress] ${origSizeMb}MB → ${newMb}MB (${(ratio * 100).toFixed(0)}%)`);
        } catch (err) {
          console.warn('[compress] 실패, 원본 업로드로 폴백:', err.message);
          if (typeof onProgress === 'function') onProgress(5, '압축 건너뜀, 원본 업로드 중');
        }
      }

      // 2) 최종 크기 안전망
      if (workingFile.size > MAX_UPLOAD_BYTES_CLIENT) {
        const sizeMb = (workingFile.size / 1024 / 1024).toFixed(0);
        throw new Error(`영상이 너무 큽니다 (${sizeMb}MB). 60초 이내로 잘라서 다시 올려주세요.`);
      }

      // 3) 업로드
      const ext = (workingFile.name && workingFile.name.split('.').pop()) || 'mp4';
      const mime = cleanMime(workingFile.type) || 'video/mp4';
      if (typeof onProgress === 'function') onProgress(70, '업로드 중');
      const blobMeta = await uploadToBlob({
        pathname: `raw/${sessionId}.${ext}`,
        file: workingFile,
        contentType: mime,
        onProgress: (pct) => onProgress && onProgress(70 + Math.round(pct * 0.27), '업로드 중'),
      });

      if (typeof onProgress === 'function') onProgress(97, '마무리 중');
      const attachRes = await fetch(`${API_BASE_URL}/sessions/${sessionId}/attach`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ blobUrl: blobMeta.url, mime }),
      });
      const attachBody = await attachRes.json().catch(() => ({}));
      if (!attachRes.ok) throw new Error(attachBody.error || '업로드 첨부 실패');

      if (typeof onProgress === 'function') onProgress(100, '완료');
      return { ok: true, sessionId, videoUrl: blobMeta.url };
    }

    // PC 합성 결과 영상 업로드 — 원본(webm) 그대로 Blob 직접 업로드 (V1: 변환 없음)
    //  iOS 손님은 "Files 앱 → 비디오 저장" 흐름으로 다운로드 (다운로드 페이지에서 안내)
    async function apiUploadResultVideo(sessionId, blob, ext, onProgress) {
      const finalExt = ext || (blob.type ? cleanMime(blob.type).split('/')[1] : null) || 'webm';
      const contentType = cleanMime(blob.type) || `video/${finalExt}`;

      if (typeof onProgress === 'function') onProgress(0, '업로드 중');
      const blobMeta = await uploadToBlob({
        pathname: `result/${sessionId}.${finalExt}`,
        file: blob,

        onProgress: (pct) => onProgress && onProgress(Math.round(pct * 0.95), '업로드 중'),

      if (typeof onProgress === 'function') onProgress(95, '마무리 중');
      const attachRes = await fetch(`${API_BASE_URL}/sessions/${sessionId}/attach-result`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ blobUrl: blobMeta.url, mime: contentType, ext: finalExt }),
      });
      const attachBody = await attachRes.json().catch(() => ({}));
      if (!attachRes.ok) throw new Error(attachBody.error || '결과 영상 첨부 실패');

      if (typeof onProgress === 'function') onProgress(100, '완료');
      return {
        ok: true,
        sessionId,
        resultVideoUrl: blobMeta.url,
        downloadUrl: `/d/${sessionId}`,
        publicDownloadUrl: `${window.location.origin}/d/${sessionId}`,

    }

    // 운영 상수
    const PC_TOKEN_REFRESH_MS = 3 * 1000;      // 3초마다 토큰 회전 체크 (손님 완료 후 즉시 QR 갱신)
    const PC_QUEUE_POLL_MS = 1000;              // 1초마다 큐 폴링
    const RESULT_AUTO_TIMEOUT_MS = 5 * 60 * 1000; // 결과 화면 5분 자동 타임아웃

    // ========================================
    // 🎨 Design System Components
    // ========================================
    function Card({ className = "", children }) {

    // ========================================
    // 🧩 Pose Engine — MediaPipe ready 감지
    // ========================================
    function useMediaPipeReady() {
      const [ready, setReady] = useState(!!window.__MediaPipe?.ready);
      useEffect(() => {
        if (ready) return;
        const onReady = () => setReady(true);
        window.addEventListener("mediapipe-ready", onReady);
        if (window.__MediaPipe?.ready) setReady(true);
        return () => window.removeEventListener("mediapipe-ready", onReady);
      }, [ready]);
      return ready;
    }

    // ========================================
    // 🦴 Pose Constants — 33 키포인트 + 부위별 색상
    // ========================================
    const KP = {
      NOSE: 0,
      LEFT_SHOULDER: 11, RIGHT_SHOULDER: 12,
      LEFT_ELBOW: 13, RIGHT_ELBOW: 14,
      LEFT_WRIST: 15, RIGHT_WRIST: 16,
      LEFT_HIP: 23, RIGHT_HIP: 24,
      LEFT_KNEE: 25, RIGHT_KNEE: 26,
      LEFT_ANKLE: 27, RIGHT_ANKLE: 28,
      LEFT_HEEL: 29, RIGHT_HEEL: 30,
      LEFT_FOOT_INDEX: 31, RIGHT_FOOT_INDEX: 32,
    };

    const KP_COLORS = (() => {
      const map = new Array(33);
      for (let i = 0; i <= 10; i++) map[i] = "#fbcfe8";
      map[11] = "#bfdbfe"; map[12] = "#bfdbfe";
      for (let i = 13; i <= 22; i++) map[i] = "#bef264";
      map[23] = "#fde68a"; map[24] = "#fde68a";
      for (let i = 25; i <= 32; i++) map[i] = "#ddd6fe";
      return map;
    })();

    // 스켈레톤 직접 그리기
    function drawPoseSkeleton(ctx, landmarks, connections) {
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      ctx.strokeStyle = "rgba(255,255,255,0.6)";
      ctx.lineWidth = 2.5;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      for (const conn of connections) {
        if (conn.start <= 10 || conn.end <= 10) continue;
        const a = landmarks[conn.start];
        const b = landmarks[conn.end];
        if (!a || !b) continue;
        if ((a.visibility ?? 1) < 0.3 || (b.visibility ?? 1) < 0.3) continue;
        ctx.beginPath();
        ctx.moveTo(a.x * w, a.y * h);
        ctx.lineTo(b.x * w, b.y * h);
        ctx.stroke();
      }
      for (let i = 0; i < landmarks.length; i++) {
        if (i <= 10) continue;
        const p = landmarks[i];
        if (!p) continue;
        if ((p.visibility ?? 1) < 0.3) continue;
        const x = p.x * w;
        const y = p.y * h;
        const color = KP_COLORS[i] || "#ffffff";
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(x, y, 5.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.85)";
        ctx.lineWidth = 1.2;
        ctx.beginPath();
        ctx.arc(x, y, 5.5, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // ========================================
    // 🎾 Racket Tip Estimation + Trail Drawing
    // ========================================
    const RACKET_LENGTH_MULTIPLIER = 4.0;
    const TRAIL_DURATION_MS = 1300;
    const TRAIL_SUBSTEPS = 8;
    const TRAIL_SMOOTH_WINDOW = 3;

    function estimateRacketTip(landmarks, hand) {
      if (!landmarks) return null;
      const wristIdx = hand === "right" ? 16 : 15;
      const pinkyIdx = hand === "right" ? 18 : 17;
      const indexIdx = hand === "right" ? 20 : 19;
      const wrist = landmarks[wristIdx];
      const pinky = landmarks[pinkyIdx];
      const index = landmarks[indexIdx];
      if (!wrist || !pinky || !index) return null;
      const visMin = Math.min(
        wrist.visibility ?? 0,
        pinky.visibility ?? 0,
        index.visibility ?? 0
      );
      if (visMin < 0.3) return null;
      const handCx = (pinky.x + index.x) / 2;
      const handCy = (pinky.y + index.y) / 2;
      const dirX = handCx - wrist.x;
      const dirY = handCy - wrist.y;
      let tipX = wrist.x + dirX * RACKET_LENGTH_MULTIPLIER;
      let tipY = wrist.y + dirY * RACKET_LENGTH_MULTIPLIER;
      tipX = Math.max(-0.1, Math.min(1.1, tipX));
      tipY = Math.max(-0.1, Math.min(1.1, tipY));
      return { x: tipX, y: tipY };
    }

    function smoothTrail(points, windowSize = TRAIL_SMOOTH_WINDOW) {
      if (!points || points.length < 3) return points || [];
      const half = Math.floor(windowSize / 2);
      const n = points.length;
      const out = new Array(n);
      out[0] = points[0];
      out[n - 1] = points[n - 1];
      for (let i = 1; i < n - 1; i++) {
        let sx = 0, sy = 0, c = 0;
        for (let j = -half; j <= half; j++) {
          const k = i + j;
          if (k < 0 || k >= n) continue;
          sx += points[k].x;
          sy += points[k].y;
          c += 1;
        }
        out[i] = { x: sx / c, y: sy / c, t: points[i].t };
      }
      return out;
    }

    function catmullRomPoint(p0, p1, p2, p3, t) {
      const t2 = t * t;
      const t3 = t2 * t;
      const x = 0.5 * (
        2 * p1.x +
        (-p0.x + p2.x) * t +
        (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 +
        (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3
      );
      const y = 0.5 * (
        2 * p1.y +
        (-p0.y + p2.y) * t +
        (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 +
        (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3
      );
      return { x, y };
    }

    function drawRacketTrail(ctx, trail, nowMs) {
      if (!trail || trail.length < 2) return;
      const w = ctx.canvas.width;
      const h = ctx.canvas.height;
      const FADE_MS = TRAIL_DURATION_MS;
      const sm = smoothTrail(trail, TRAIL_SMOOTH_WINDOW);
      const n = sm.length;
      if (n < 2) return;

      ctx.save();
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      ctx.lineWidth = 5.5;
      ctx.shadowColor = "rgba(103, 232, 249, 0.4)";
      ctx.shadowBlur = 8;

      for (let i = 0; i < n - 1; i++) {
        const p1 = sm[i];
        const p2 = sm[i + 1];
        const p0 = i === 0 ? p1 : sm[i - 1];
        const p3 = i + 2 < n ? sm[i + 2] : p2;
        const ageA = nowMs - p1.t;
        const ageB = nowMs - p2.t;
        if (ageA > FADE_MS && ageB > FADE_MS) continue;

        const P0 = { x: p0.x * w, y: p0.y * h };
        const P1 = { x: p1.x * w, y: p1.y * h };
        const P2 = { x: p2.x * w, y: p2.y * h };
        const P3 = { x: p3.x * w, y: p3.y * h };

        let prev = P1;
        let prevAlpha = Math.max(0, 1 - ageA / FADE_MS);
        for (let s = 1; s <= TRAIL_SUBSTEPS; s++) {
          const t = s / TRAIL_SUBSTEPS;
          const cur = catmullRomPoint(P0, P1, P2, P3, t);
          const ageT = ageA * (1 - t) + ageB * t;
          const curAlpha = Math.max(0, 1 - ageT / FADE_MS);
          const segAlpha = (prevAlpha + curAlpha) * 0.5;
          if (segAlpha > 0.01) {
            ctx.strokeStyle = `rgba(103, 232, 249, ${segAlpha.toFixed(3)})`;
            ctx.beginPath();
            ctx.moveTo(prev.x, prev.y);
            ctx.lineTo(cur.x, cur.y);
            ctx.stroke();
          }
          prev = cur;
          prevAlpha = curAlpha;
        }
      }
      ctx.shadowBlur = 0;
      ctx.shadowColor = "transparent";

      const last = sm[n - 1];
      const lastAge = nowMs - last.t;
      if (lastAge <= FADE_MS) {
        const x = last.x * w;
        const y = last.y * h;
        ctx.shadowColor = "#67e8f9";
        ctx.shadowBlur = 14;
        ctx.fillStyle = "#67e8f9";
        ctx.beginPath();
        ctx.arc(x, y, 6, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "#ffffff";
        ctx.beginPath();
        ctx.arc(x, y, 2.5, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    // ========================================
    // 🧮 Geometry helpers
    // ========================================
    function angleAt(p1, p2, p3) {
      if (!p1 || !p2 || !p3) return NaN;
      const v1x = p1.x - p2.x, v1y = p1.y - p2.y;
      const v2x = p3.x - p2.x, v2y = p3.y - p2.y;
      const dot = v1x * v2x + v1y * v2y;
      const m1 = Math.hypot(v1x, v1y);
      const m2 = Math.hypot(v2x, v2y);
      if (m1 === 0 || m2 === 0) return NaN;
      const c = Math.max(-1, Math.min(1, dot / (m1 * m2)));
      return Math.acos(c) * 180 / Math.PI;
    }

    function clampScore(v, fallback = 50) {
      if (!Number.isFinite(v)) return fallback;
      return Math.max(0, Math.min(100, Math.round(v)));
    }

    // ========================================
    // 🏃 Swing Detection — 손목 속도 → 피크 → 포/백 분류
    // ========================================
    function computeWristSpeeds(frames, hand) {
      const wristIdx = hand === "right" ? KP.RIGHT_WRIST : KP.LEFT_WRIST;
      const speeds = [];
      for (let i = 0; i < frames.length; i++) {
        if (i === 0) {
          speeds.push({ t: frames[i].t, v: 0 });
          continue;
        }
        const a = frames[i - 1].landmarks?.[wristIdx];
        const b = frames[i].landmarks?.[wristIdx];
        const dt = (frames[i].t - frames[i - 1].t) / 1000;
        if (!a || !b || dt <= 0) {
          speeds.push({ t: frames[i].t, v: 0 });
          continue;
        }
        const dx = b.x - a.x;
        const dy = b.y - a.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        speeds.push({ t: frames[i].t, v: dist / dt });
      }
      return speeds;
    }

    function smooth(values, windowSize = 3) {
      const out = [];
      for (let i = 0; i < values.length; i++) {
        let sum = 0, n = 0;
        for (let j = Math.max(0, i - windowSize); j <= Math.min(values.length - 1, i + windowSize); j++) {
          sum += values[j].v; n++;
        }
        out.push({ t: values[i].t, v: sum / n });
      }
      return out;
    }

    function detectPeaks(speeds, { minGapMs = 500, kStd = 1.5 } = {}) {
      if (speeds.length < 3) return [];
      const vs = speeds.map(s => s.v);
      const mean = vs.reduce((a, b) => a + b, 0) / vs.length;
      const variance = vs.reduce((a, b) => a + (b - mean) ** 2, 0) / vs.length;
      const std = Math.sqrt(variance);
      const threshold = mean + kStd * std;
      const candidates = [];
      for (let i = 1; i < speeds.length - 1; i++) {
        if (
          speeds[i].v >= threshold &&
          speeds[i].v >= speeds[i - 1].v &&
          speeds[i].v >= speeds[i + 1].v
        ) {
          candidates.push({ idx: i, t: speeds[i].t, v: speeds[i].v });
        }
      }
      candidates.sort((a, b) => b.v - a.v);
      const kept = [];
      for (const c of candidates) {
        if (kept.every(k => Math.abs(k.t - c.t) >= minGapMs)) kept.push(c);
      }
      kept.sort((a, b) => a.t - b.t);
      return kept;
    }

    // 포/백 분류 (어깨 벡터 투영 기반 다중 신호 가중 투표)
    function classifySwing(frames, peakIdx, hand, slowMoFactor = 1) {
      const wristIdx = hand === "right" ? KP.RIGHT_WRIST : KP.LEFT_WRIST;
      const peakFrame = frames[peakIdx];
      if (!peakFrame?.landmarks) return { type: "unknown", confidence: 0 };

      const windowMs = 400 * slowMoFactor;
      const tStart = peakFrame.t - windowMs;
      let startIdx = peakIdx;
      for (let i = peakIdx; i >= 0; i--) {
        if (frames[i].t <= tStart) { startIdx = i; break; }
        if (i === 0) startIdx = 0;
      }
      const tEnd = peakFrame.t + windowMs;
      let endIdx = peakIdx;
      for (let i = peakIdx; i < frames.length; i++) {
        if (frames[i].t >= tEnd) { endIdx = i; break; }
        if (i === frames.length - 1) endIdx = i;
      }

      function projectOnPlayerRight(frame) {
        if (!frame?.landmarks) return null;
        const lm = frame.landmarks;
        const ls = lm[KP.LEFT_SHOULDER];
        const rs = lm[KP.RIGHT_SHOULDER];
        const lh = lm[KP.LEFT_HIP];
        const rh = lm[KP.RIGHT_HIP];
        const w = lm[wristIdx];
        if (!ls || !rs || !lh || !rh || !w) return null;
        const minVis = 0.4;
        if ((ls.visibility ?? 1) < minVis || (rs.visibility ?? 1) < minVis ||
            (lh.visibility ?? 1) < minVis || (rh.visibility ?? 1) < minVis ||
            (w.visibility  ?? 1) < minVis) return null;
        const hipMid = { x: (lh.x + rh.x) / 2, y: (lh.y + rh.y) / 2 };
        const playerRight = { x: rs.x - ls.x, y: rs.y - ls.y };
        const prLen = Math.hypot(playerRight.x, playerRight.y) || 1;
        if (prLen < 0.05) return null;
        const offset = { x: w.x - hipMid.x, y: w.y - hipMid.y };
        const proj = (offset.x * playerRight.x + offset.y * playerRight.y) / prLen;
        return { proj, prLen };
      }

      function avgProj(from, to) {
        const projs = [];
        let prSum = 0, prN = 0;
        for (let i = from; i <= to; i++) {
          const r = projectOnPlayerRight(frames[i]);
          if (r) { projs.push(r.proj); prSum += r.prLen; prN++; }
        }
        if (projs.length === 0) return null;
        return {
          proj: projs.reduce((a, b) => a + b, 0) / projs.length,
          prLen: prN > 0 ? prSum / prN : 0,
          n: projs.length,
        };
      }

      const FRAME_AVG = 3;
      const startAvg = avgProj(startIdx, Math.min(startIdx + FRAME_AVG, peakIdx));
      const endAvg = avgProj(Math.max(endIdx - FRAME_AVG, peakIdx), endIdx);
      const peakInfo = projectOnPlayerRight(frames[peakIdx]);

      // image-X fallback
      if (!startAvg && !endAvg && !peakInfo) {
        const w0 = frames[startIdx]?.landmarks?.[wristIdx];
        const w1 = frames[endIdx]?.landmarks?.[wristIdx];
        if (!w0 || !w1) return { type: "unknown", confidence: 0 };
        const dx = w1.x - w0.x;
        const type = (hand === "right")
          ? (dx < 0 ? "forehand" : "backhand")
          : (dx > 0 ? "forehand" : "backhand");
        const confidence = Math.min(0.5, Math.abs(dx) / 0.15);
        return { type, confidence };
      }

      const sign = (hand === "right") ? 1 : -1;
      const signals = [];
      if (startAvg) signals.push({ name: "start", value: startAvg.proj * sign, weight: 1.0 });
      if (endAvg) signals.push({ name: "end", value: -endAvg.proj * sign, weight: 1.0 });
      if (startAvg && endAvg) {
        const dProj = endAvg.proj - startAvg.proj;
        signals.push({ name: "displacement", value: -dProj * sign, weight: 1.5 });
      }

      if (signals.length === 0) {
        const w0 = frames[startIdx]?.landmarks?.[wristIdx];
        const w1 = frames[endIdx]?.landmarks?.[wristIdx];
        if (!w0 || !w1) return { type: "unknown", confidence: 0 };
        const dx = w1.x - w0.x;
        const type = (hand === "right")
          ? (dx < 0 ? "forehand" : "backhand")
          : (dx > 0 ? "forehand" : "backhand");
        const confidence = Math.min(0.5, Math.abs(dx) / 0.15);
        return { type, confidence };
      }

      let weighted = 0, totalWeight = 0;
      for (const s of signals) {
        weighted += s.value * s.weight;
        totalWeight += s.weight;
      }
      const score = weighted / totalWeight;
      const type = score > 0 ? "forehand" : "backhand";
      const shoulderWidth = peakInfo?.prLen ?? startAvg?.prLen ?? endAvg?.prLen ?? 0.3;
      const confidence = Math.min(1, Math.abs(score) / Math.max(0.05, shoulderWidth * 0.6));
      return { type, confidence };
    }

    // 카메라 각도 추정 (어깨 X거리 기반)
    function detectCameraView(frames) {
      const valid = (frames || []).filter(f => {
        if (!f.landmarks) return false;
        const ls = f.landmarks[KP.LEFT_SHOULDER];
        const rs = f.landmarks[KP.RIGHT_SHOULDER];
        if (!ls || !rs) return false;
        return (ls.visibility ?? 1) >= 0.5 && (rs.visibility ?? 1) >= 0.5;
      });
      if (valid.length < 5) return { view: 'unknown', avgShoulderX: 0, validCount: valid.length };
      const dists = valid.map(f =>
        Math.abs(f.landmarks[KP.RIGHT_SHOULDER].x - f.landmarks[KP.LEFT_SHOULDER].x)
      );
      const avg = dists.reduce((a, b) => a + b, 0) / dists.length;
      let view;
      if (avg <= 0.08) view = 'side';
      else if (avg >= 0.15) view = 'front';
      else view = 'oblique';
      return { view, avgShoulderX: avg, validCount: valid.length };
    }

    function buildDiagnostics(frames, speeds, swings, hand) {
      const totalFrames = frames.length;
      const wristIdx = hand === 'right' ? KP.RIGHT_WRIST : KP.LEFT_WRIST;
      let detected = 0;
      let confSum = 0, confCount = 0;
      let wristVisFrames = 0;
      for (const f of frames) {
        if (!f.landmarks) continue;
        let visSum = 0, visN = 0;
        for (const lm of f.landmarks) {
          const v = lm.visibility;
          if (typeof v === 'number') {
            visSum += v; visN++;
            confSum += v; confCount++;
          }
        }
        const visAvg = visN > 0 ? visSum / visN : 0;
        if (visAvg >= 0.3) detected++;
        const wrist = f.landmarks[wristIdx];
        if (wrist && (wrist.visibility ?? 1) >= 0.5) wristVisFrames++;
      }
      const avgConf = confCount > 0 ? confSum / confCount : 0;
      const speedVals = (speeds || []).map(s => s.v).filter(Number.isFinite);
      const speedMax = speedVals.length ? Math.max(...speedVals) : 0;
      const speedMean = speedVals.length ? speedVals.reduce((a, b) => a + b, 0) / speedVals.length : 0;
      const variance = speedVals.length
        ? speedVals.reduce((a, b) => a + (b - speedMean) ** 2, 0) / speedVals.length
        : 0;
      const speedStd = Math.sqrt(variance);
      const peakThreshold = speedMean + 1.5 * speedStd;
      const camera = detectCameraView(frames);
      return {
        totalFrames,
        detectedFrames: detected,
        detectedRatio: totalFrames > 0 ? detected / totalFrames : 0,
        avgConfidence: avgConf,
        wristVisibleFrames: wristVisFrames,
        wristVisibleRatio: totalFrames > 0 ? wristVisFrames / totalFrames : 0,
        swingCount: swings.length,
        speedMax, speedMean, speedStd, peakThreshold,
        cameraView: camera.view,
        cameraShoulderX: camera.avgShoulderX,
      };
    }

    // ─────────────────────────────────────────────────────────────
    // 🎯 진짜 스윙(임팩트) 검증 — false positive(연습 스윙/걷는 동작) 필터링
    //   손목 속도 피크만으로는 "공 안 친" 후보도 잡힘. 4가지 단계적 자세를 검증:
    //     (a) 백스윙: 임팩트 -500ms ~ -200ms 동안 손목이 어깨 위/뒤로 들렸는지
    //     (b) 팔로스루: 임팩트 +200ms ~ +400ms 동안 손목이 임팩트 위치에서 멀리 이동
    //     (c) 회전 변화: 임팩트 ±400ms 동안 어깨 라인이 회전했는지
    //     (d) 속도 임계: peak 속도가 평균 + 2σ 이상 (단순 빠른 움직임이 아닌 진짜 스윙 강도)
    //   각 0~1, 평균이 validityScore. < 0.40면 베스트샷 후보에서 제외.
    // ─────────────────────────────────────────────────────────────
    function computeSwingValidity(frames, peakIdx, hand, slowMoFactor, peakSpeed, speedMean, speedStd) {
      const wristIdx = hand === "right" ? KP.RIGHT_WRIST : KP.LEFT_WRIST;
      const shoulderIdx = hand === "right" ? KP.RIGHT_SHOULDER : KP.LEFT_SHOULDER;
      const peakLm = frames[peakIdx]?.landmarks;
      const peakWrist = peakLm?.[wristIdx];
      if (!peakWrist) return { validity: 0, reason: 'no_peak_wrist' };

      // (a) 백스윙 단계 — 임팩트 -350ms 부근 손목 위치
      const backIdx = findFrameIdxAt(frames, peakIdx, -350 * slowMoFactor);
      const backLm = frames[backIdx]?.landmarks;
      let backScore = 0;
      if (backLm) {
        const backWrist = backLm[wristIdx];
        const backShoulder = backLm[shoulderIdx];
        if (backWrist && backShoulder) {
          // 백스윙은 손목이 어깨 위로(또는 뒤로) 빠져있어야
          const wristAboveShoulder = backShoulder.y - backWrist.y;        // 양수=위
          const wristAwayFromImpact = Math.hypot(backWrist.x - peakWrist.x, backWrist.y - peakWrist.y);
          // 위로 0.05+ OR 임팩트에서 0.15+ 떨어져 있으면 백스윙 단계 인정
          backScore = Math.max(
            wristAboveShoulder > 0 ? Math.min(1, wristAboveShoulder / 0.10) : 0,
            Math.min(1, wristAwayFromImpact / 0.20)
          );
        }
      }

      // (b) 팔로스루 단계 — 임팩트 +300ms 부근 손목 이동
      const followIdx = findFrameIdxAt(frames, peakIdx, 300 * slowMoFactor);
      const followLm = frames[followIdx]?.landmarks;
      let followScore = 0;
      if (followLm && followIdx > peakIdx) {
        const followWrist = followLm[wristIdx];
        if (followWrist) {
          const wristTravel = Math.hypot(followWrist.x - peakWrist.x, followWrist.y - peakWrist.y);
          // 0.15+ 이동했으면 팔로스루 인정
          followScore = Math.min(1, wristTravel / 0.20);
        }
      }

      // (c) 회전 변화 — 임팩트 -300ms ~ +200ms 어깨 라인 각도 변화
      const rotStartIdx = findFrameIdxAt(frames, peakIdx, -300 * slowMoFactor);
      const rotEndIdx = findFrameIdxAt(frames, peakIdx, 200 * slowMoFactor);
      const angleAt = (idx) => {
        const lm = frames[idx]?.landmarks;
        if (!lm) return null;
        const ls = lm[KP.LEFT_SHOULDER], rs = lm[KP.RIGHT_SHOULDER];
        if (!ls || !rs) return null;
        return Math.atan2(rs.y - ls.y, rs.x - ls.x) * 180 / Math.PI;
      };
      const startAng = angleAt(rotStartIdx);
      const endAng = angleAt(rotEndIdx);
      let rotScore = 0;
      if (Number.isFinite(startAng) && Number.isFinite(endAng)) {
        let dAng = Math.abs(endAng - startAng);
        if (dAng > 180) dAng = 360 - dAng;
        // 회전 5° 이상이면 인정 (시작), 25°+ 만점 (강한 회전)
        rotScore = Math.min(1, Math.max(0, (dAng - 5) / 20));
      }

      // (d) 속도 임계 — peak가 평균 + 2σ 이상인지
      let speedScore = 0;
      if (peakSpeed && speedMean !== undefined && speedStd) {
        const z = (peakSpeed - speedMean) / Math.max(0.01, speedStd);
        // z >= 1.5 → 0.5, z >= 3.0 → 1.0 (강한 스윙)
        speedScore = Math.min(1, Math.max(0, (z - 1.5) / 1.5));
      }

      // 평균 — 4개 모두 어느 정도 만족해야 진짜 스윙
      const validity = (backScore + followScore + rotScore + speedScore) / 4;
      return {
        validity: +validity.toFixed(3),
        backScore: +backScore.toFixed(2),
        followScore: +followScore.toFixed(2),
        rotScore: +rotScore.toFixed(2),
        speedScore: +speedScore.toFixed(2),
      };
    }

    function detectSwings(frames, hand, slowMoFactor = 1) {
      if (frames.length < 5) {
        const diag = buildDiagnostics(frames, [], [], hand);
        return { swings: [], speeds: [], diagnostics: diag };
      }
      const rawSpeeds = computeWristSpeeds(frames, hand);
      const speeds = smooth(rawSpeeds, 2);
      const peaks = detectPeaks(speeds, { minGapMs: 500 * slowMoFactor, kStd: 1.5 });
      // 속도 통계 (validity 계산에 사용)
      const speedVals = speeds.map(s => s.v).filter(Number.isFinite);
      const speedMean = speedVals.length ? speedVals.reduce((a, b) => a + b, 0) / speedVals.length : 0;
      const speedStd = (() => {
        if (speedVals.length < 2) return 0;
        const variance = speedVals.reduce((a, b) => a + (b - speedMean) ** 2, 0) / speedVals.length;
        return Math.sqrt(variance);
      })();

      const allCandidates = peaks.map((p, i) => {
        const cls = classifySwing(frames, p.idx, hand, slowMoFactor);
        const v = computeSwingValidity(frames, p.idx, hand, slowMoFactor, p.v, speedMean, speedStd);
        return {
          index: i + 1,
          peakIdx: p.idx,
          time: p.t,
          speed: p.v,
          autoType: cls.type,
          type: cls.type,
          classifyConfidence: cls.confidence,
          validity: v.validity,
          validityDetails: v,
        };
      });
      // validity dump for debugging
      console.log('[detectSwings] candidates', allCandidates.map(s => ({
        time: s.time, speed: +s.speed.toFixed(3), type: s.type,
        validity: s.validity, ...s.validityDetails,
      })));
      // validity ≥ 0.40 만 진짜 스윙으로 인정 (false positive 필터)
      const swings = allCandidates.filter(s => s.validity >= 0.40);
      console.log(`[detectSwings] ${allCandidates.length}개 후보 → ${swings.length}개 통과 (validity ≥ 0.40)`);

      const diagnostics = buildDiagnostics(frames, speeds, swings, hand);
      return { swings, speeds, diagnostics, rejectedCandidates: allCandidates.filter(s => s.validity < 0.40) };
    }

    // ========================================
    // 🦶 Stance Detection (다중 프레임 + 다중 신호 가중평균)
    // ========================================
    const visOf = (p) => (p ? (p.visibility ?? p.score ?? 1) : 0);

    // ─────────────────────────────────────────────────────────────
    // 🦶 스탠스 4신호 (closeness ∈ [0, 1])
    //   각 신호는 "닫힘(closed) 정도"를 0~1로 정량화. 4개 가중 평균을 기준으로
    //   open(<0.30) / semi-open(0.30~0.60) / closed(>0.60) 분류.
    //
    //   테니스 코칭 표준 정의:
    //     - open      : 양 발이 베이스라인과 평행 (네트 향함)
    //     - semi-open : 발이 살짝 사선 (45° 정도)
    //     - closed    : 양 발이 베이스라인과 직각에 가까움 (옆을 봄)
    //
    //   각 신호가 측정하는 것 + 임계치 근거:
    //     A. 어깨–발목 각도차: closed면 어깨/발목이 모두 옆을 향해 평행
    //                          (각도차 작음). open이면 어깨는 옆이고 발은 정면이라
    //                          각도차 큼 (40°+). 임계치 15°/40°는 평균적인
    //                          "옆서기/앞서기" 사이의 분기점.
    //     B. 발목/어깨 X 비율: open이면 발이 어깨 너비 이상으로 벌어짐 (≥1.0).
    //                         closed면 발이 일렬에 가까워서 X 거리 작음 (≤0.4).
    //     C. 발목 Y 거리:    closed에서 앞발/뒷발이 앞뒤로 빠져 Y가 다름.
    //                         open에선 양 발이 같은 Y에 있음. 0.02~0.10은 키 대비 ratio.
    //     D. 두 발이 가리키는 방향각:
    //                         두 발이 같은 방향(open)이면 각도 차이 ≈0°,
    //                         양 발이 서로 다른 방향을 가리키면(closed) 50°+.
    //                         가중 1.2로 가장 중요한 신호.
    // ─────────────────────────────────────────────────────────────
    function sigShoulderAnkleAngleDiff(lm) {
      const lA = lm[KP.LEFT_ANKLE], rA = lm[KP.RIGHT_ANKLE];
      const lS = lm[KP.LEFT_SHOULDER], rS = lm[KP.RIGHT_SHOULDER];
      if (visOf(lA) < 0.5 || visOf(rA) < 0.5 || visOf(lS) < 0.5 || visOf(rS) < 0.5) return null;
      const shoulderAngle = Math.atan2(rS.y - lS.y, rS.x - lS.x);
      const ankleAngle = Math.atan2(rA.y - lA.y, rA.x - lA.x);
      let diff = Math.abs(shoulderAngle - ankleAngle) * 180 / Math.PI;
      if (diff > 90) diff = 180 - diff;
      // 백스윙 중 어깨가 발목 라인과 얼마나 어긋나는지 측정.
      //   diff ≤ 15° → 어깨와 발목이 평행 (몸이 일관됨, 회전 적음) = open (0.0)
      //   diff ≥ 40° → 어깨가 발목 라인에서 크게 벗어남 (강한 상체 회전) = closed (1.0)
      // closed 스탠스는 어깨를 더 회전시키는 경향이 있어 임팩트 직전 diff가 큼.
      if (diff <= 15) return 0;
      if (diff >= 40) return 1;
      return (diff - 15) / 25;
    }

    function sigAnkleShoulderXRatio(lm) {
      const lA = lm[KP.LEFT_ANKLE], rA = lm[KP.RIGHT_ANKLE];
      const lS = lm[KP.LEFT_SHOULDER], rS = lm[KP.RIGHT_SHOULDER];
      if (visOf(lA) < 0.5 || visOf(rA) < 0.5 || visOf(lS) < 0.5 || visOf(rS) < 0.5) return null;
      const ankleXDist = Math.abs(rA.x - lA.x);
      const shoulderXDist = Math.max(0.05, Math.abs(rS.x - lS.x));
      const ratio = ankleXDist / shoulderXDist;
      // ratio ≥ 1.0 → 발이 어깨보다 더 벌어짐 = open (0.0)
      // ratio ≤ 0.4 → 발이 어깨 너비의 40% 이하로 좁음 = closed (1.0)
      if (ratio >= 1.0) return 0;
      if (ratio <= 0.4) return 1;
      return (1.0 - ratio) / 0.6;
    }

    function sigAnkleYDist(lm) {
      const lA = lm[KP.LEFT_ANKLE], rA = lm[KP.RIGHT_ANKLE];
      if (visOf(lA) < 0.5 || visOf(rA) < 0.5) return null;
      const dy = Math.abs(rA.y - lA.y);
      // dy ≤ 0.02 → 양 발이 거의 같은 Y 라인 = open (0.0)
      // dy ≥ 0.10 → 한쪽 발이 뚜렷하게 앞에 있음 = closed (1.0)
      if (dy <= 0.02) return 0;
      if (dy >= 0.10) return 1;
      return (dy - 0.02) / 0.08;
    }

    function sigFootDirectionAngle(lm) {
      const lH = lm[KP.LEFT_HEEL], lF = lm[KP.LEFT_FOOT_INDEX];
      const rH = lm[KP.RIGHT_HEEL], rF = lm[KP.RIGHT_FOOT_INDEX];
      if (!lH || !lF || !rH || !rF) return null;
      if (visOf(lH) < 0.5 || visOf(lF) < 0.5 || visOf(rH) < 0.5 || visOf(rF) < 0.5) return null;
      const lvx = lF.x - lH.x, lvy = lF.y - lH.y;
      const rvx = rF.x - rH.x, rvy = rF.y - rH.y;
      const lLen = Math.hypot(lvx, lvy);
      const rLen = Math.hypot(rvx, rvy);
      if (lLen < 1e-4 || rLen < 1e-4) return null;
      const cos = (lvx * rvx + lvy * rvy) / (lLen * rLen);
      const clamped = Math.max(-1, Math.min(1, cos));
      const angleDeg = Math.acos(clamped) * 180 / Math.PI;
      // angleDeg ≤ 10° → 두 발이 거의 같은 방향 = open (0.0)
      // angleDeg ≥ 50° → 두 발이 서로 다른 방향 (옆으로 벌어짐) = closed (1.0)
      if (angleDeg <= 10) return 0;
      if (angleDeg >= 50) return 1;
      return (angleDeg - 10) / 40;
    }

    // sigF: 양 발의 z 좌표(깊이) 차이 ★★
    //   MediaPipe pose landmark는 z 좌표(상대 깊이)를 제공.
    //   z 단위는 어깨/엉덩이 중심점 기준 정규화. 양수=카메라에서 멀어짐, 음수=가까움.
    //   대각선 카메라에서 한 발이 뒤로 빠져 있으면 z 차이가 분명히 잡힘 — 2D X/Y만으로
    //   놓치는 케이스를 정확히 보완.
    //
    //   임계치 (절대값):
    //     |dz| ≤ 0.05  → 두 발 같은 깊이 = open (0.0)
    //     |dz| ≥ 0.30  → 한 발이 뚜렷하게 뒤 = closed (1.0)
    //   MediaPipe z는 절대 거리가 아니라 상대 깊이라 노이즈 있음 → 임계 너그럽게.
    function sigAnkleZDepth(lm) {
      const lA = lm[KP.LEFT_ANKLE], rA = lm[KP.RIGHT_ANKLE];
      if (visOf(lA) < 0.5 || visOf(rA) < 0.5) return null;
      if (typeof lA.z !== 'number' || typeof rA.z !== 'number') return null;
      const dz = Math.abs(lA.z - rA.z);
      if (dz <= 0.05) return 0;
      if (dz >= 0.30) return 1;
      return (dz - 0.05) / 0.25;
    }

    // sigE: 어깨 라인 직각 투영 — 카메라 각도 무관 핵심 신호 ★
    //   원리: 어깨 라인을 X축으로 하는 플레이어 좌표계에서, 양 발을 어깨 직각 방향(네트 방향)에 투영.
    //         두 발의 투영값 차이가 클수록 "앞발-뒷발이 멀리 분리"됨 = 클로즈드 스탠스.
    //         어깨 너비로 정규화해 키/줌과 무관. 카메라가 어디서 찍든 어깨 라인은 같이 회전하므로
    //         이 측정은 카메라 각도에 독립적이다.
    //
    //   해석 (튜닝됨 — 세미오픈도 잘 잡히도록 더 민감하게):
    //     ratio (= 발-앞뒤 분리 / 어깨 너비)
    //       ≤ 0.20  → 두 발이 어깨 라인에 거의 평행 = open (0.0)
    //       0.20~0.85 → 사선~크게 분리 = semi-open ~ closed (선형)
    //       ≥ 0.85  → 한 발이 어깨 너비의 85% 이상 앞으로 = closed (1.0)
    //
    //   visibility 0.6 이상 요구 — 발이 가려지면 신뢰 안 함.
    function sigShoulderPerpFootProjection(lm) {
      const lA = lm[KP.LEFT_ANKLE], rA = lm[KP.RIGHT_ANKLE];
      const lS = lm[KP.LEFT_SHOULDER], rS = lm[KP.RIGHT_SHOULDER];
      if (visOf(lA) < 0.6 || visOf(rA) < 0.6 || visOf(lS) < 0.6 || visOf(rS) < 0.6) return null;

      // 어깨 라인 벡터 + 길이
      const sx = rS.x - lS.x;
      const sy = rS.y - lS.y;
      const sLen = Math.hypot(sx, sy);
      if (sLen < 0.05) return null; // 어깨가 너무 가까우면 (거의 정면) 신호 약함 → null

      // 어깨 직각 단위 벡터 (네트 방향, 부호는 모호하지만 abs로 처리)
      const nx = -sy / sLen;
      const ny = sx / sLen;

      // 어깨 중심
      const cx = (lS.x + rS.x) / 2;
      const cy = (lS.y + rS.y) / 2;

      // 양 발을 어깨 직각 방향에 투영
      const lProj = (lA.x - cx) * nx + (lA.y - cy) * ny;
      const rProj = (rA.x - cx) * nx + (rA.y - cy) * ny;
      const projDiff = Math.abs(lProj - rProj);
      const ratio = projDiff / sLen;

      if (ratio >= 0.85) return 1;
      if (ratio <= 0.20) return 0;
      return (ratio - 0.20) / 0.65;
    }

    function frameStanceCloseness(lm) {
      if (!lm) return null;
      const sigA = sigShoulderAnkleAngleDiff(lm);
      const sigB = sigAnkleShoulderXRatio(lm);
      const sigC = sigAnkleYDist(lm);
      const sigD = sigFootDirectionAngle(lm);
      const sigE = sigShoulderPerpFootProjection(lm);
      const sigF = sigAnkleZDepth(lm);
      // 가중치 (재조정):
      //   F(z 깊이)         = 2.0 ★★ 카메라 깊이 방향 발 분리 — 대각선 시점에서 결정적
      //   E(어깨 직각 투영) = 1.5 ★ 2D 평면 발 분리 — F의 보완
      //   D(발 방향각)      = 1.2  발 가리키는 방향
      //   A(어깨-발목)      = 1.0  상하체 정렬
      //   B(발 너비)        = 1.0  발 너비
      //   C(발 Y차이)       = 0.6  카메라 각도에 가장 의존적 (가중 낮음)
      const weights = { A: 1.0, B: 1.0, C: 0.6, D: 1.2, E: 1.5, F: 2.0 };
      const signals = [
        { name: 'A', v: sigA, w: weights.A },
        { name: 'B', v: sigB, w: weights.B },
        { name: 'C', v: sigC, w: weights.C },
        { name: 'D', v: sigD, w: weights.D },
        { name: 'E', v: sigE, w: weights.E },
        { name: 'F', v: sigF, w: weights.F },
      ].filter(s => s.v !== null && Number.isFinite(s.v));
      if (signals.length === 0) return { closeness: null, signalsUsed: 0 };
      const sum = signals.reduce((acc, s) => acc + s.v * s.w, 0);
      const totalW = signals.reduce((acc, s) => acc + s.w, 0);
      return {
        closeness: sum / totalW,
        signalsUsed: signals.length,
        sigA, sigB, sigC, sigD, sigE, sigF,
      };
    }

    function findFrameIdxAt(frames, peakIdx, offsetMs) {
      const target = frames[peakIdx].t + offsetMs;
      let bestI = peakIdx, bestD = Infinity;
      for (let i = 0; i < frames.length; i++) {
        const d = Math.abs(frames[i].t - target);
        if (d < bestD) { bestD = d; bestI = i; }
      }
      return bestI;
    }

    // 카메라 각도별 closeness 임계치
    //   세미오픈을 오픈으로 잘못 분류하는 케이스가 많아 open 임계치 더 낮춤.
    //   semi 영역(open~semi 사이)을 넓게 잡아 사선 발 위치를 잘 잡도록.
    //   - diagonal: 표준. open<0.22, semi 0.22~0.50, closed≥0.50
    //   - front:    sigB(발 너비)가 더 잘 보여 신호 과대평가 → 살짝 올려 보정.
    const STANCE_THRESHOLDS = {
      diagonal: { open: 0.22, semi: 0.50 },
      front:    { open: 0.26, semi: 0.55 },
    };

    function detectStance(frames, peakIdx, slowMoFactor = 1, cameraAngle = 'diagonal') {
      if (!Array.isArray(frames) || frames.length === 0 || peakIdx == null) {
        return { stance: 'unknown', reason: 'invalid_input' };
      }
      // 백스윙 정점 부근(임팩트 -600ms ~ -200ms) 윈도우에서 closeness 평균.
      // 이 시점이 스탠스가 가장 안정되어 있는 구간 (이미 발 위치 잡힌 후, 회전 직전).
      const startIdx = findFrameIdxAt(frames, peakIdx, -600 * slowMoFactor);
      const endIdx = findFrameIdxAt(frames, peakIdx, -200 * slowMoFactor);
      const lo = Math.min(startIdx, endIdx);
      const hi = Math.max(startIdx, endIdx);
      const closenessVals = [];
      const sigSums = { A: 0, B: 0, C: 0, D: 0, E: 0, F: 0, nA: 0, nB: 0, nC: 0, nD: 0, nE: 0, nF: 0 };
      for (let i = lo; i <= hi; i++) {
        const lm = frames[i]?.landmarks;
        if (!lm) continue;
        const r = frameStanceCloseness(lm);
        if (!r || !Number.isFinite(r.closeness)) continue;
        closenessVals.push(r.closeness);
        if (Number.isFinite(r.sigA)) { sigSums.A += r.sigA; sigSums.nA++; }
        if (Number.isFinite(r.sigB)) { sigSums.B += r.sigB; sigSums.nB++; }
        if (Number.isFinite(r.sigC)) { sigSums.C += r.sigC; sigSums.nC++; }
        if (Number.isFinite(r.sigD)) { sigSums.D += r.sigD; sigSums.nD++; }
        if (Number.isFinite(r.sigE)) { sigSums.E += r.sigE; sigSums.nE++; }
        if (Number.isFinite(r.sigF)) { sigSums.F += r.sigF; sigSums.nF++; }
      }
      if (closenessVals.length < 3) {
        return { stance: 'unknown', reason: 'too_few_frames', n: closenessVals.length };
      }
      const closeness = closenessVals.reduce((a, b) => a + b, 0) / closenessVals.length;
      const th = STANCE_THRESHOLDS[cameraAngle] || STANCE_THRESHOLDS.diagonal;
      let stance;
      let reasoning;
      if (closeness < th.open) {
        stance = 'open';
        reasoning = `closeness ${closeness.toFixed(3)} < open 임계 ${th.open}`;
      } else if (closeness < th.semi) {
        stance = 'semi-open';
        reasoning = `closeness ${closeness.toFixed(3)} ∈ [${th.open}, ${th.semi})`;
      } else {
        stance = 'closed';
        reasoning = `closeness ${closeness.toFixed(3)} ≥ semi 임계 ${th.semi}`;
      }

      return {
        stance,
        closeness: +closeness.toFixed(3),
        framesUsed: closenessVals.length,
        thresholds: th,
        cameraAngle,
        reasoning,
        // 신호별 평균 — 클로즈가 오픈으로 잘못 분류될 때 어떤 신호가 약한지 확인용
        // sigE가 핵심 신호(가중 1.5, 카메라 각도 무관). 다른 신호가 강한데 sigE만 약하면
        // 어깨 visibility 또는 어깨 라인이 너무 짧음(거의 정면) 가능성.
        avgSigs: {
          A_shoulderAnkle:  sigSums.nA ? +(sigSums.A / sigSums.nA).toFixed(2) : null,
          B_footWidth:      sigSums.nB ? +(sigSums.B / sigSums.nB).toFixed(2) : null,
          C_footYDist:      sigSums.nC ? +(sigSums.C / sigSums.nC).toFixed(2) : null,
          D_footDirection:  sigSums.nD ? +(sigSums.D / sigSums.nD).toFixed(2) : null,
          E_perpProjection: sigSums.nE ? +(sigSums.E / sigSums.nE).toFixed(2) : null,
          F_zDepth:         sigSums.nF ? +(sigSums.F / sigSums.nF).toFixed(2) : null,
        },
      };
    }

    function stanceLabel(stance) {
      if (stance === 'open') return '오픈';
      if (stance === 'semi-open') return '세미오픈';
      if (stance === 'closed') return '클로즈';
      return '미상';
    }

    // ─────────────────────────────────────────────────────────────
    // 🤲 한손/양손 백핸드 자동 구분
    //   임팩트 ±100ms 윈도우에서 양 손목 거리 평균을 측정.
    //   - 거리 < 0.08 (정규화) → two-handed (두 손이 그립에 모임)
    //   - 거리 ≥ 0.12          → one-handed (비활성 손이 떨어져 있음)
    //   - 사이                  → ambiguous (사용자 선택 fallback)
    //   기준 정규화 좌표: 어깨 너비 보통 0.15~0.20 → 0.08은 어깨 너비의 절반.
    //   visibility 낮으면(< 0.5) 신뢰 불가 → 'unknown' 반환.
    // ─────────────────────────────────────────────────────────────
    function detectBackhandStyle(frames, peakIdx, slowMoFactor = 1) {
      if (!Array.isArray(frames) || frames.length === 0 || peakIdx == null) {
        return { style: 'unknown', reason: 'invalid_input' };
      }
      const startIdx = findFrameIdxAt(frames, peakIdx, -100 * slowMoFactor);
      const endIdx = findFrameIdxAt(frames, peakIdx, 100 * slowMoFactor);
      const dists = [];
      let visTotal = 0, visN = 0;
      for (let i = startIdx; i <= endIdx; i++) {
        const lm = frames[i]?.landmarks;
        if (!lm) continue;
        const lW = lm[KP.LEFT_WRIST];
        const rW = lm[KP.RIGHT_WRIST];
        if (!lW || !rW) continue;
        const lVis = lW.visibility ?? 1;
        const rVis = rW.visibility ?? 1;
        visTotal += (lVis + rVis) / 2;
        visN++;
        if (lVis < 0.4 || rVis < 0.4) continue;
        dists.push(Math.hypot(lW.x - rW.x, lW.y - rW.y));
      }
      const avgVis = visN > 0 ? visTotal / visN : 0;
      if (dists.length < 3 || avgVis < 0.5) {
        return { style: 'unknown', reason: 'low_visibility', avgVis: +avgVis.toFixed(2), n: dists.length };
      }
      const avgDist = dists.reduce((a, b) => a + b, 0) / dists.length;
      let style;
      if (avgDist < 0.08) style = 'two-handed';
      else if (avgDist >= 0.12) style = 'one-handed';
      else style = 'ambiguous';
      return {
        style,
        avgWristDist: +avgDist.toFixed(3),
        framesUsed: dists.length,
        avgVis: +avgVis.toFixed(2),
      };
    }

    function backhandStyleLabel(style) {
      if (style === 'one-handed') return '한손 백핸드';
      if (style === 'two-handed') return '양손 백핸드';
      return null;
    }

    // ─────────────────────────────────────────────────────────────
    // 🌀 스윙 궤도 분류 (스핀/플랫/슬라이스)
    //   임팩트 ±150ms 윈도우의 racketTip Y 좌표 변화에 선형 회귀.
    //   y 좌표는 화면 좌표 (위가 작음, 아래가 큼).
    //   slope (per second):
    //     < -0.4  → 위로 강하게 쓸어 올림 = 스핀(탑스핀)
    //     [-0.4, 0.2] → 거의 수평 = 플랫
    //     > 0.2   → 아래로 강하게 = 슬라이스 (특히 백핸드)
    //   임계치 근거: 정규화 좌표 0~1. 임팩트 ±150ms = 300ms 동안
    //   라켓 헤드가 0.12 위로(=spin) 또는 0.06 아래로(=slice) 이동하면
    //   각각 -0.4/+0.2 slope에 해당.
    // ─────────────────────────────────────────────────────────────
    function detectShotShape(frames, peakIdx, slowMoFactor = 1) {
      if (!Array.isArray(frames) || frames.length === 0 || peakIdx == null) {
        return { shape: 'unknown', reason: 'invalid_input' };
      }
      const startIdx = findFrameIdxAt(frames, peakIdx, -150 * slowMoFactor);
      const endIdx = findFrameIdxAt(frames, peakIdx, 150 * slowMoFactor);
      const samples = [];
      for (let i = startIdx; i <= endIdx; i++) {
        const f = frames[i];
        if (!f?.racketTip) continue;
        samples.push({ t: f.t, y: f.racketTip.y });
      }
      if (samples.length < 5) {
        return { shape: 'unknown', reason: 'too_few_samples', n: samples.length };
      }

      // 선형 회귀: y = a*t + b. slowMoFactor로 시간 정규화 → 실제 시간 단위 기울기.
      const t0 = samples[0].t;
      let sumT = 0, sumY = 0, sumTT = 0, sumTY = 0;
      const n = samples.length;
      for (const s of samples) {
        const dt = (s.t - t0) / 1000 / slowMoFactor; // seconds (실제 시간)
        sumT += dt;
        sumY += s.y;
        sumTT += dt * dt;
        sumTY += dt * s.y;
      }
      const meanT = sumT / n;
      const meanY = sumY / n;
      const denom = sumTT - n * meanT * meanT;
      if (Math.abs(denom) < 1e-6) return { shape: 'unknown', reason: 'degenerate' };
      const slope = (sumTY - n * meanT * meanY) / denom; // per second

      let shape;
      if (slope < -0.4) shape = 'spin';
      else if (slope > 0.2) shape = 'slice';
      else shape = 'flat';

      return {
        shape,
        slopePerSec: +slope.toFixed(3),
        samplesUsed: n,
      };
    }

    function shotShapeLabel(shape) {
      if (shape === 'spin') return '탑스핀';
      if (shape === 'flat') return '플랫';
      if (shape === 'slice') return '슬라이스';
      return null;
    }

    function pelvisCenterX(lm) {
      const lh = lm[KP.LEFT_HIP], rh = lm[KP.RIGHT_HIP];
      if (!lh || !rh) return NaN;
      return (lh.x + rh.x) / 2;
    }

    function pelvisAngle(lm) {
      if (!lm) return NaN;
      const lh = lm[KP.LEFT_HIP], rh = lm[KP.RIGHT_HIP];
      if (!lh || !rh) return NaN;
      return Math.atan2(rh.y - lh.y, rh.x - lh.x) * 180 / Math.PI;
    }

    // ========================================
    // 🎯 6축 점수 (룰베이스 휴리스틱)
    // ========================================
    // ─────────────────────────────────────────────────────────────
    // 📐 카메라 각도 프로파일 — 매장 촬영 시나리오에 맞춘 임계치
    //   매장에서 손님은 보통 정면(0°) 또는 대각선(30~45°)에서 촬영.
    //   측면(90°)/후면은 거의 없으므로 제거.
    //
    //   각도별 2D 투영 특성:
    //   - front(정면, 0°):     어깨 dy/dx≈0, 골반 x-shift 거의 안 보임 (z축이라)
    //                           → 어깨/골반 회전 가시성으로 대체.
    //   - diagonal(대각선,30~45°): 어깨 dy/dx 중간, 골반 x-shift 어느 정도 보임 (가장 자연스런 자기촬영 각도, 기본값)
    // ─────────────────────────────────────────────────────────────
    const ANGLE_PROFILES = {
      diagonal: {
        label: '대각선',
        // ─ Backswing ──────────────────────────────────────────
        // 대각선은 어깨 dy/dx가 정면(0°)보다 크게 보임.
        backWristAboveIdeal: 0.06,    // 손목이 어깨보다 6% 위면 충분
        backShoulderRotMin: 12,       // 어깨 회전 최소 12° (정면 6° / 측면 18°의 중간)
        backShoulderRotIdeal: 24,     // 어깨 회전 이상값 24°
        backArmAngleIdeal: 110,       // 살짝 굽힌 자세
        backArmAngleTolerance: 47,
        // ─ Weight transfer ────────────────────────────────────
        weightShiftIdeal: 0.04,       // 골반 좌우 이동 4% (대각선이라 정면보다 잘 보임)
        weightShiftMin: 0.018,
        weightUseRotation: false,     // 시프트가 어느 정도 보이므로 시프트 위주
        // ─ Kinetic chain ──────────────────────────────────────
        chainTimingIdeal: 100,        // 어깨-골반 회전 시간차 이상값 100ms
        chainTimingTolerance: 105,
        // ─ Impact ─────────────────────────────────────────────
        spineTiltTolerance: 20,       // 대각선 시야 보정
        // ─ Follow-through ─────────────────────────────────────
        followDistIdeal: 0.21,        // 손목 이동거리 21%
        followAcrossBonus: 0.08,      // 반대편 어깨 위로 손목 가면 보너스
      },
      front: {
        label: '정면',
        backWristAboveIdeal: 0.08,    // 정면에선 손목이 더 들려야 백스윙으로 인식
        backShoulderRotMin: 6,        // 정면에선 어깨 dy/dx 변화 작음 → 임계 낮춤
        backShoulderRotIdeal: 14,
        backArmAngleIdeal: 105,
        backArmAngleTolerance: 50,
        weightShiftIdeal: 0.025,      // 정면에선 좌우 시프트 작음 (앞뒤는 z축)
        weightShiftMin: 0.01,
        weightUseRotation: true,      // 골반 회전을 더 가중
        chainTimingIdeal: 90,
        chainTimingTolerance: 110,
        spineTiltTolerance: 22,       // 정면에선 척추 각도가 입체적이라 더 너그럽게
        followDistIdeal: 0.18,        // 정면에선 손목 이동이 짧아 보임
        followAcrossBonus: 0.06,
      },
    };

    function getAngleProfile(angle) {
      return ANGLE_PROFILES[angle] || ANGLE_PROFILES.diagonal;
    }

    // 부드러운 점수 매핑: 이상값(ideal) 부근은 90~100점, sweet 범위 안은 75~95,
    //   harsh까지는 base까지 선형 감점, 그 밖은 base 유지. 너무 박한 0점 방지.
    function softScore(value, ideal, sweet, harsh, { peak = 100, base = 35 } = {}) {
      const diff = Math.abs(value - ideal);
      if (diff <= sweet) {
        // sweet 안: peak~peak-12 사이 (살짝 차이 있어도 거의 만점)
        return clampScore(peak - (diff / Math.max(0.0001, sweet)) * 12);
      }
      if (diff <= harsh) {
        const t = (diff - sweet) / Math.max(0.0001, harsh - sweet);
        return clampScore((peak - 12) - t * ((peak - 12) - base));
      }
      return clampScore(base);
    }

    // 한쪽 방향만 의미 있을 때 (예: 손목 위 = 좋음, 아래 = 나쁨)
    function softMonotonic(value, threshold, peak = 100, baseAtZero = 50) {
      // value <=0 이면 baseAtZero, value >= threshold 면 peak
      if (value <= 0) return clampScore(baseAtZero - Math.min(15, -value * 200));
      if (value >= threshold) return clampScore(peak);
      return clampScore(baseAtZero + (value / threshold) * (peak - baseAtZero));
    }

    function scoreReadyPosition(frames, peakIdx, slowMoFactor = 1, cameraAngle = 'diagonal') {
      // 준비자세 = (a) 무릎 굽힘 + (b) 어깨 수평 + (c) 스플릿스텝 활성도 ★
      //   (a/b)는 임팩트 –500ms 부근 단일 시점 자세, (c)는 -1000ms ~ -300ms 풋워크 움직임.
      //   가만히 서 있어도 (a/b)는 만점 가능 → (c)가 페널티 부여 (가중 0.50).
      const startIdx = findFrameIdxAt(frames, peakIdx, -600 * slowMoFactor);
      const endIdx = findFrameIdxAt(frames, peakIdx, -400 * slowMoFactor);
      const lms = [];
      for (let i = startIdx; i <= endIdx; i++) {
        if (frames[i]?.landmarks) lms.push(frames[i].landmarks);
      }
      if (!lms.length) return { score: 50, raw: { reason: 'no_landmarks' } };

      // (a) 무릎 평균 각도 — 무릎이 살짝 굽은 게 이상값 (155°)
      const kneeAvgs = lms.map(lm => {
        const lk = angleAt(lm[KP.LEFT_HIP], lm[KP.LEFT_KNEE], lm[KP.LEFT_ANKLE]);
        const rk = angleAt(lm[KP.RIGHT_HIP], lm[KP.RIGHT_KNEE], lm[KP.RIGHT_ANKLE]);
        const valid = [lk, rk].filter(Number.isFinite);
        return valid.length ? valid.reduce((a, b) => a + b) / valid.length : NaN;
      }).filter(Number.isFinite);
      const kneeAvg = kneeAvgs.length ? kneeAvgs.reduce((a, b) => a + b) / kneeAvgs.length : 175;
      const kneeScore = softScore(kneeAvg, 155, 18, 45, { base: 45 });

      // (b) 어깨 수평 — y 차이가 작으면 좋음
      const dys = lms.map(lm => {
        const ls = lm[KP.LEFT_SHOULDER], rs = lm[KP.RIGHT_SHOULDER];
        return ls && rs ? Math.abs(ls.y - rs.y) : NaN;
      }).filter(Number.isFinite);
      const dy = dys.length ? dys.reduce((a, b) => a + b) / dys.length : 0.05;
      const dyTol = cameraAngle === 'front' ? 0.05 : 0.07;
      const shoulderScore = softScore(dy, 0, dyTol, dyTol * 2.2, { base: 50 });

      // (c) 스플릿스텝 활성도 ★ — 일정한 리듬으로 발이 위/아래 반복 움직이는지 측정
      //   진짜 좋은 준비자세는 단순히 "한 번 크게 움직임"이 아니라
      //   "주기적으로 작은 점프 = 스플릿스텝"으로 매 순간 다음 공에 대비.
      //
      //   2개 측정 결합:
      //     ① 변화량 (range): 양 발 X+Y 변동 폭 — 너무 작으면 정지
      //     ② 리듬 (rhythm): 발 Y가 평균선 기준으로 위/아래 몇 번 교차했는지 (zero-crossing)
      //                       = 한 번 큰 움직임이 아닌 "반복성" 검증
      //
      //   임계치 (정규화 좌표 + 700ms 윈도우 ~21프레임 기준):
      //     변화량 < 0.005 OR 리듬 < 1회  → 정지/단순 자세 (페널티 30)
      //     변화량 ≥ 0.025 AND 리듬 ≥ 4회 → 활발한 리드미컬 스텝 (100)
      const stepStartIdx = findFrameIdxAt(frames, peakIdx, -1000 * slowMoFactor);
      const stepEndIdx = findFrameIdxAt(frames, peakIdx, -300 * slowMoFactor);
      const ankleSeries = { Lx: [], Ly: [], Rx: [], Ry: [] };
      for (let i = stepStartIdx; i <= stepEndIdx; i++) {
        const lm = frames[i]?.landmarks;
        if (!lm) continue;
        const lA = lm[KP.LEFT_ANKLE], rA = lm[KP.RIGHT_ANKLE];
        if (lA && (lA.visibility ?? 1) >= 0.5) {
          ankleSeries.Lx.push(lA.x); ankleSeries.Ly.push(lA.y);
        }
        if (rA && (rA.visibility ?? 1) >= 0.5) {
          ankleSeries.Rx.push(rA.x); ankleSeries.Ry.push(rA.y);
        }
      }
      const rangeOf = (arr) => arr.length ? (Math.max(...arr) - Math.min(...arr)) : 0;
      const ankleMovement = (
        rangeOf(ankleSeries.Lx) +
        rangeOf(ankleSeries.Ly) +
        rangeOf(ankleSeries.Rx) +
        rangeOf(ankleSeries.Ry)
      ) / 4;

      // zero-crossing 카운트 — 시간 시리즈가 평균선을 위/아래로 몇 번 교차했는지
      //   리듬감 있는 스텝이면 발 Y가 작은 점프로 평균선을 자주 교차함.
      //   noise floor: 0.005 미만 변동은 무시 (visibility 떨림 등 잡음).
      function countZeroCrossings(values, noiseFloor = 0.005) {
        if (values.length < 4) return 0;
        const mean = values.reduce((a, b) => a + b, 0) / values.length;
        let count = 0;
        let prevSign = 0;
        for (const v of values) {
          const d = v - mean;
          if (Math.abs(d) < noiseFloor) continue; // 노이즈 무시
          const sign = d > 0 ? 1 : -1;
          if (prevSign !== 0 && sign !== prevSign) count++;
          prevSign = sign;
        }
        return count;
      }
      const rhythmL = countZeroCrossings(ankleSeries.Ly);
      const rhythmR = countZeroCrossings(ankleSeries.Ry);
      const totalRhythm = rhythmL + rhythmR;

      // 두 조건 모두 만족해야 만점 (둘 중 하나만이면 페널티)
      let stepScore;
      const moveScore = softMonotonic(ankleMovement, 0.025, 100, 0);
      const rhythmScore = softMonotonic(totalRhythm, 6, 100, 0);
      if (ankleMovement < 0.005 && totalRhythm === 0) {
        stepScore = 30; // 완전 정지
      } else {
        // 둘의 평균 — 변화량만 크고 리듬 없으면 (한 번 움직임) 페널티
        // Math.max로 floor=30 보장
        stepScore = Math.max(30, Math.min(100, (moveScore + rhythmScore) / 2));
      }

      // 가중치: knee 0.30 + shoulder 0.20 + splitStep 0.50
      return {
        score: clampScore(kneeScore * 0.30 + shoulderScore * 0.20 + stepScore * 0.50),
        raw: {
          kneeAvg: +kneeAvg.toFixed(1),
          shoulderDy: +dy.toFixed(3),
          ankleMovement: +ankleMovement.toFixed(4),
          rhythmCrossings: totalRhythm,
          stepWindowFrames: ankleSeries.Lx.length + ankleSeries.Rx.length,
