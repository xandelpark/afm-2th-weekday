<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>비밀 메시지</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20%, 60% { transform: translateX(-8px); }
      40%, 80% { transform: translateX(8px); }
    }
    .fade-in { animation: fadeIn 0.6s ease-out forwards; }
    .shake { animation: shake 0.4s ease-in-out; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Input({ type = 'text', value, onChange, placeholder, error, className = '', ...props }) {
      return (
        <input
          type={type}
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          className={`w-full px-4 py-3 rounded-xl border-2 text-center text-2xl tracking-[0.5em] font-mono transition-all duration-200 outline-none
            ${error
              ? 'border-red-400 bg-red-50 focus:border-red-500'
              : 'border-gray-200 bg-white focus:border-indigo-400 focus:ring-4 focus:ring-indigo-100'}
            ${className}`}
          {...props}
        />
      );
    }

    function Button({ children, onClick, variant = 'primary', size = 'md', disabled, className = '' }) {
      const variants = {
        primary: 'bg-indigo-600 hover:bg-indigo-700 text-white shadow-lg shadow-indigo-200 hover:shadow-indigo-300',
        secondary: 'bg-gray-100 hover:bg-gray-200 text-gray-700',
        ghost: 'bg-transparent hover:bg-gray-100 text-gray-600',
      };
      const sizes = {
        sm: 'px-4 py-2 text-sm',
        md: 'px-6 py-3 text-base',
        lg: 'px-8 py-4 text-lg',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`rounded-xl font-semibold transition-all duration-200 disabled:opacity-50 disabled:cursor-not-allowed ${variants[variant]} ${sizes[size]} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-2xl shadow-xl p-8 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 📄 Page Components
    // ========================================

    function SecretApp() {
      const [password, setPassword] = useState('');
      const [unlocked, setUnlocked] = useState(false);
      const [error, setError] = useState(false);
      const [attempts, setAttempts] = useState(0);
      const inputRef = useRef(null);

      const SECRET_PASSWORD = '1234';

      const handleSubmit = (e) => {
        e.preventDefault();
        if (password === SECRET_PASSWORD) {
          setUnlocked(true);
          setError(false);
        } else {
          setError(true);
          setAttempts(prev => prev + 1);
          setPassword('');
          if (inputRef.current) {
            inputRef.current.classList.add('shake');
            setTimeout(() => inputRef.current?.classList.remove('shake'), 400);
          }
        }
      };

      const handleReset = () => {
        setUnlocked(false);
        setPassword('');
        setError(false);
        setAttempts(0);
      };

      if (unlocked) {
        return (
          <div className="min-h-screen bg-gradient-to-br from-emerald-50 via-teal-50 to-cyan-50 flex items-center justify-center p-4">
            <Card className="max-w-md w-full text-center fade-in">
              <div className="text-6xl mb-4">🎉</div>
              <h2 className="text-2xl font-bold text-gray-800 mb-2">비밀 메시지</h2>
              <div className="bg-gradient-to-r from-indigo-50 to-purple-50 rounded-xl p-6 my-6 border border-indigo-100">
                <p className="text-lg text-gray-700 leading-relaxed font-medium">
                  축하합니다!<br />
                  당신은 비밀 메시지를 해독했습니다.<br /><br />
                  <span className="text-indigo-600 font-bold text-xl">
                    "끝까지 포기하지 않는 사람이 결국 해내는 법이다."
                  </span>
                </p>
              </div>
              <Button variant="ghost" onClick={handleReset} className="mt-2">
                🔒 다시 잠그기
              </Button>
            </Card>
          </div>
        );
      }

      return (
        <div className="min-h-screen bg-gradient-to-br from-slate-50 via-indigo-50 to-purple-50 flex items-center justify-center p-4">
          <Card className="max-w-md w-full text-center">
            <div className="text-6xl mb-4">🔐</div>
            <h1 className="text-2xl font-bold text-gray-800 mb-2">비밀 메시지</h1>
            <p className="text-gray-500 mb-8">비밀번호를 입력하면 숨겨진 메시지가 나타납니다</p>

            <form onSubmit={handleSubmit} className="space-y-4">
              <div ref={inputRef}>
                <Input
                  type="password"
                  value={password}
                  onChange={(e) => { setPassword(e.target.value); setError(false); }}
                  placeholder="••••"
                  maxLength={4}
                  error={error}
                  aria-label="비밀번호 입력"
                />
              </div>

              {error && (
                <p className="text-red-500 text-sm font-medium fade-in">
                  비밀번호가 틀렸습니다. 다시 시도해주세요.
                  {attempts >= 3 && <span className="block text-gray-400 mt-1 text-xs">힌트: 숫자 4자리</span>}
                </p>
              )}

              <Button type="submit" disabled={password.length === 0} className="w-full">
                🔓 잠금 해제
              </Button>
            </form>

            <div className="mt-6 flex justify-center gap-2">
              {[...Array(4)].map((_, i) => (
                <div
                  key={i}
                  className={`w-3 h-3 rounded-full transition-all duration-200 ${
                    i < password.length ? 'bg-indigo-500 scale-110' : 'bg-gray-200'
                  }`}
                />
              ))}
            </div>
          </Card>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      return <SecretApp />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
