<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>기리고 (Wish Your Death) — Netflix Series</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800;900&family=Noto+Serif+KR:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050505;
      --bg-soft: #0a0a0a;
      --blood: #7c1d1d;
      --blood-bright: #9b1c1c;
      --ash: #c9bfb6;
    }
    html, body {
      background-color: var(--bg-deep);
      color: var(--ash);
      font-family: 'Noto Serif KR', serif;
      -webkit-font-smoothing: antialiased;
    }
    .font-display {
      font-family: 'Cinzel', 'Noto Serif KR', serif;
      letter-spacing: 0.18em;
    }
    .font-serif-kr {
      font-family: 'Noto Serif KR', serif;
    }
    /* 그레인 노이즈 */
    .grain::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 50;
      opacity: 0.08;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='240' height='240'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.6  0 0 0 0 0.6  0 0 0 0 0.6  0 0 0 1 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
      mix-blend-mode: overlay;
    }
    /* 스캔라인 */
    .scanlines::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 49;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255,255,255,0.018) 0px,
        rgba(255,255,255,0.018) 1px,
        transparent 1px,
        transparent 3px
      );
    }
    .blood-text {
      color: var(--blood-bright);
      text-shadow: 0 0 24px rgba(155, 28, 28, 0.45);
    }
    .vignette {
      background:
        radial-gradient(ellipse at center, transparent 0%, transparent 45%, rgba(0,0,0,0.75) 100%),
        linear-gradient(180deg, #0a0a0a 0%, #050505 60%, #000 100%);
    }
    .hero-title {
      font-weight: 900;
      letter-spacing: 0.35em;
      text-shadow:
        0 0 1px rgba(255,255,255,0.2),
        0 0 30px rgba(155,28,28,0.25),
        2px 0 0 rgba(155,28,28,0.35),
       -2px 0 0 rgba(0, 80, 120, 0.18);
    }
    /* 깜빡임 (아주 미세) */
    @keyframes flicker {
      0%, 19.999%, 22%, 62.999%, 64%, 64.999%, 70%, 100% { opacity: 1; }
      20%, 21.999%, 63%, 63.999%, 65%, 69.999% { opacity: 0.78; }
    }
    .flicker { animation: flicker 6s infinite; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .reveal {
      opacity: 0;
      transform: translateY(24px);
      transition: opacity 1.1s ease, transform 1.1s ease;
    }
    .reveal.in {
      opacity: 1;
      transform: translateY(0);
    }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(155,28,28,0.6), transparent);
    }
    .cta-btn {
      transition: all 0.3s ease;
      border: 1px solid rgba(201,191,182,0.35);
    }
    .cta-btn:hover {
      background: var(--blood);
      border-color: var(--blood);
      color: #f5e9e2;
      box-shadow: 0 0 40px rgba(155,28,28,0.5);
    }
    .cast-card {
      transition: transform 0.5s ease, box-shadow 0.5s ease;
    }
    .cast-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 30px 60px -20px rgba(155,28,28,0.35);
    }
    /* 스크롤바 다크 */
    ::-webkit-scrollbar { width: 8px; background: #050505; }
    ::-webkit-scrollbar-thumb { background: #1a1010; }
    ::-webkit-scrollbar-thumb:hover { background: var(--blood); }
    /* 작은 점 깜빡임 */
    @keyframes pulseDot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.7); }
    }
    .pulse-dot { animation: pulseDot 1.6s infinite; }
  </style>
</head>
<body class="grain scanlines">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function MetaPill({ children }) {
      return (
        <span className="font-display text-[10px] sm:text-xs tracking-[0.3em] text-[#c9bfb6]/70 uppercase">
          {children}
        </span>
      );
    }

    function SectionLabel({ number, children }) {
      return (
        <div className="flex items-center gap-4 mb-8">
          <span className="font-display text-xs tracking-[0.4em] blood-text">{number}</span>
          <span className="h-px flex-1 bg-gradient-to-r from-[#7c1d1d]/60 to-transparent"></span>
          <span className="font-display text-xs tracking-[0.4em] text-[#c9bfb6]/60 uppercase">{children}</span>
        </div>
      );
    }

    // 이름 이니셜 + 그라디언트 placeholder
    function CastPortrait({ name, role, accent = false, special = false }) {
      // 이름 첫 글자
      const initial = name?.charAt(0) ?? "?";
      const grad = accent
        ? "from-[#3a0d0d] via-[#1a0606] to-[#050505]"
        : "from-[#1a1212] via-[#0d0808] to-[#050505]";

      return (
        <div className="cast-card group">
          <div className={`relative aspect-[3/4] overflow-hidden bg-gradient-to-br ${grad} border border-[#c9bfb6]/10`}>
            {/* 어두운 배경 텍스처 */}
            <svg className="absolute inset-0 w-full h-full opacity-30" viewBox="0 0 100 130" preserveAspectRatio="xMidYMid slice">
              <defs>
                <radialGradient id={`g-${name}`} cx="50%" cy="35%" r="60%">
                  <stop offset="0%" stopColor={accent ? "#9b1c1c" : "#3a2828"} stopOpacity="0.6"/>
                  <stop offset="100%" stopColor="#000" stopOpacity="0"/>
                </radialGradient>
              </defs>
              <rect width="100" height="130" fill={`url(#g-${name})`}/>
            </svg>
            {/* 큰 이니셜 */}
            <div className="absolute inset-0 flex items-center justify-center">
              <span className="font-display text-[120px] sm:text-[140px] font-bold text-[#c9bfb6]/15 group-hover:text-[#9b1c1c]/30 transition-colors duration-700">
                {initial}
              </span>
            </div>
            {/* 하단 오버레이 */}
            <div className="absolute inset-x-0 bottom-0 h-2/3 bg-gradient-to-t from-[#050505] via-[#050505]/80 to-transparent"></div>
            {/* 특별 출연 라벨 */}
            {special && (
              <div className="absolute top-3 left-3">
                <span className="font-display text-[9px] tracking-[0.3em] px-2 py-1 bg-[#7c1d1d]/80 text-[#f5e9e2]">
                  SPECIAL
                </span>
              </div>
            )}
            {/* 이름 / 역할 */}
            <div className="absolute inset-x-0 bottom-0 p-4 sm:p-5">
              <div className="font-serif-kr text-base sm:text-xl font-semibold text-[#f5e9e2] tracking-wide">
                {name}
              </div>
              {role && (
                <div className="font-display text-[10px] tracking-[0.25em] text-[#9b1c1c] mt-1 uppercase">
                  {role}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    function Reveal({ children, delay = 0 }) {
      const ref = useRef(null);
      useEffect(() => {
        const el = ref.current;
        if (!el) return;
        const io = new IntersectionObserver((entries) => {
          entries.forEach((e) => {
            if (e.isIntersecting) {
              setTimeout(() => el.classList.add('in'), delay);
              io.unobserve(el);
            }
          });
        }, { threshold: 0.15 });
        io.observe(el);
        return () => io.disconnect();
      }, [delay]);
      return <div ref={ref} className="reveal">{children}</div>;
    }

    // ========================================
    // 🎬 Hero Section
    // ========================================

    function Hero() {
      const handleTrailer = () => {
        alert("📺 트레일러는 넷플릭스 공식 페이지에서 확인하세요.");
      };

      return (
        <section className="relative min-h-screen vignette flex flex-col items-center justify-center px-6 py-24 overflow-hidden">
          {/* 백그라운드 큰 한자 같은 장식 */}
          <div className="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div className="font-display text-[28vw] font-black text-[#7c1d1d]/[0.04] select-none tracking-[0.2em]">
              祈
            </div>
          </div>

          {/* 상단 메타 */}
          <div className="relative z-10 mb-10 flex items-center gap-3 flicker">
            <span className="inline-block w-2 h-2 bg-[#9b1c1c] pulse-dot"></span>
            <span className="font-display text-[10px] sm:text-xs tracking-[0.5em] text-[#c9bfb6]/70 uppercase">
              Netflix Original Series · 2026
            </span>
          </div>

          {/* 메인 타이틀 */}
          <h1 className="relative z-10 font-serif-kr hero-title text-[18vw] sm:text-[14vw] md:text-[11vw] lg:text-[9rem] xl:text-[11rem] leading-none text-[#f5e9e2] mb-8 text-center">
            기 리 고
          </h1>

          {/* 영문 부제 */}
          <div className="relative z-10 flex items-center gap-6 mb-12">
            <span className="h-px w-12 bg-[#9b1c1c]"></span>
            <h2 className="font-display text-sm sm:text-base md:text-lg tracking-[0.6em] text-[#9b1c1c] uppercase font-light">
              Wish Your Death
            </h2>
            <span className="h-px w-12 bg-[#9b1c1c]"></span>
          </div>

          {/* 호러 카피 */}
          <p className="relative z-10 font-serif-kr text-lg sm:text-xl md:text-2xl text-[#c9bfb6]/85 italic text-center max-w-2xl mb-14 leading-relaxed">
            "소원을 빌면, <span className="blood-text font-medium">죽음이 응답한다.</span>"
          </p>

          {/* 메타 라인 */}
          <div className="relative z-10 flex flex-wrap justify-center items-center gap-3 sm:gap-5 mb-14 text-center">
            <MetaPill>NETFLIX SERIES</MetaPill>
            <span className="text-[#9b1c1c]">·</span>
            <MetaPill>2026.04.24</MetaPill>
            <span className="text-[#9b1c1c]">·</span>
            <MetaPill>8 EPISODES</MetaPill>
            <span className="text-[#9b1c1c]">·</span>
            <MetaPill>Korean YA Horror</MetaPill>
            <span className="text-[#9b1c1c]">·</span>
            <MetaPill>19+</MetaPill>
          </div>

          {/* CTA */}
          <button
            onClick={handleTrailer}
            className="cta-btn relative z-10 font-display text-xs sm:text-sm tracking-[0.4em] px-10 py-4 text-[#c9bfb6] uppercase"
          >
            ▶  Watch Trailer
          </button>

          {/* 스크롤 인디케이터 */}
          <div className="absolute bottom-8 left-1/2 -translate-x-1/2 flex flex-col items-center gap-2 opacity-60">
            <span className="font-display text-[10px] tracking-[0.4em] text-[#c9bfb6]/60">SCROLL</span>
            <div className="w-px h-12 bg-gradient-to-b from-[#c9bfb6]/60 to-transparent"></div>
          </div>
        </section>
      );
    }

    // ========================================
    // 📜 Synopsis Section
    // ========================================

    function Synopsis() {
      return (
        <section className="relative px-6 py-24 sm:py-32 max-w-5xl mx-auto">
          <Reveal>
            <SectionLabel number="01">Synopsis · 시놉시스</SectionLabel>
          </Reveal>
          <Reveal delay={150}>
            <blockquote className="relative">
              <span className="absolute -top-12 -left-2 font-display text-[8rem] blood-text leading-none opacity-40 select-none">"</span>
              <p className="font-serif-kr text-2xl sm:text-3xl md:text-4xl leading-[1.65] text-[#f5e9e2]/90 font-light tracking-wide pl-4 sm:pl-8">
                소원을 이뤄주는 애플리케이션{" "}
                <span className="blood-text font-medium">'기리고'</span>의 저주로 인해
                갑작스러운 죽음을 예고 받은 고등학생들이,
                <br className="hidden sm:block" />
                그 저주의 사슬을 끊기 위해 고군분투하는 이야기.
              </p>
            </blockquote>
          </Reveal>
          <Reveal delay={300}>
            <div className="mt-16 divider"></div>
          </Reveal>
        </section>
      );
    }

    // ========================================
    // 🎭 Cast Section
    // ========================================

    const LEADS = [
      { name: "전소영", role: "Lead 01" },
      { name: "강미나", role: "Lead 02" },
      { name: "백선호", role: "Lead 03" },
      { name: "현우석", role: "Lead 04" },
      { name: "이효제", role: "Lead 05" },
    ];

    const SUPPORTS = [
      { name: "전소니", role: "무당 '햇살'" },
      { name: "이상희", role: "무당 '업순'" },
    ];

    function Cast() {
      return (
        <section className="relative px-6 py-24 sm:py-32 max-w-7xl mx-auto">
          <Reveal>
            <SectionLabel number="02">Cast · 출연</SectionLabel>
          </Reveal>

          {/* 주연 5인 */}
          <Reveal delay={100}>
            <div className="mb-10">
              <h3 className="font-serif-kr text-3xl sm:text-4xl md:text-5xl text-[#f5e9e2] mb-3 font-light tracking-wider">
                주연 <span className="blood-text">五</span>인
              </h3>
              <p className="font-display text-xs tracking-[0.3em] text-[#c9bfb6]/50 uppercase">
                Five Newcomers · 신예 캐스팅
              </p>
            </div>
          </Reveal>

          <div className="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-5 gap-4 sm:gap-6 mb-24">
            {LEADS.map((c, i) => (
              <Reveal key={c.name} delay={i * 100}>
                <CastPortrait name={c.name} role={c.role} accent={i === 2} />
              </Reveal>
            ))}
          </div>

          {/* 조연 - 무당 2인 */}
          <Reveal>
            <div className="mb-10">
              <h3 className="font-serif-kr text-3xl sm:text-4xl md:text-5xl text-[#f5e9e2] mb-3 font-light tracking-wider">
                특별 출연
              </h3>
              <p className="font-display text-xs tracking-[0.3em] text-[#c9bfb6]/50 uppercase">
                Shamans · 저주의 실체를 쫓는 두 무당
              </p>
            </div>
          </Reveal>

          <div className="grid grid-cols-2 md:grid-cols-2 gap-4 sm:gap-6 max-w-3xl">
            {SUPPORTS.map((c, i) => (
              <Reveal key={c.name} delay={i * 150}>
                <CastPortrait name={c.name} role={c.role} accent={true} special={true} />
              </Reveal>
            ))}
          </div>
        </section>
      );
    }

    // ========================================
    // 🎬 Crew Section
    // ========================================

    function Crew() {
      return (
        <section className="relative px-6 py-24 sm:py-32 max-w-5xl mx-auto">
          <Reveal>
            <SectionLabel number="03">Crew · 제작</SectionLabel>
          </Reveal>

          <div className="grid grid-cols-1 md:grid-cols-2 gap-12 md:gap-20 mt-12">
            <Reveal delay={100}>
              <div className="border-l border-[#7c1d1d]/40 pl-8 py-4">
                <div className="font-display text-xs tracking-[0.5em] text-[#9b1c1c] mb-3 uppercase">
                  Director · 감독
                </div>
                <div className="font-serif-kr text-5xl sm:text-6xl md:text-7xl text-[#f5e9e2] font-light tracking-wider">
                  박윤서
                </div>
                <div className="font-display text-xs tracking-[0.3em] text-[#c9bfb6]/40 mt-3 uppercase">
                  Park Yoonseo
                </div>
              </div>
            </Reveal>
            <Reveal delay={250}>
              <div className="border-l border-[#7c1d1d]/40 pl-8 py-4">
                <div className="font-display text-xs tracking-[0.5em] text-[#9b1c1c] mb-3 uppercase">
                  Screenplay · 각본
                </div>
                <div className="font-serif-kr text-5xl sm:text-6xl md:text-7xl text-[#f5e9e2] font-light tracking-wider">
                  박충섭
                </div>
                <div className="font-display text-xs tracking-[0.3em] text-[#c9bfb6]/40 mt-3 uppercase">
                  Park Choongseop
                </div>
              </div>
            </Reveal>
          </div>
        </section>
      );
    }

    // ========================================
    // 🔥 Talking Points Section
    // ========================================

    const POINTS = [
      {
        no: "01",
        title: "디지털 시대의 저주",
        desc: "소원을 이뤄주는 애플리케이션이라는 오컬트 장치. 손바닥 안의 작은 화면이 죽음을 예고하는 순간, 우리는 일상 속 모든 알림에 다시 오싹해진다.",
      },
      {
        no: "02",
        title: "신예 다섯의 케미와 무게중심",
        desc: "전소영·강미나·백선호·현우석·이효제. 익숙하지 않은 얼굴들이기에 더 또렷한 공포. 그 위로 전소니가 무당 '햇살'을 얹어 작품의 무게를 잡는다.",
      },
      {
        no: "03",
        title: "공개 이틀 만에, 한국 1위",
        desc: "2026년 4월 24일 공개. 단 48시간 만에 넷플릭스 한국 시리즈 차트 정상. 한국형 YA 호러가 처음으로 메인스트림에 진입한 순간.",
      },
      {
        no: "04",
        title: "무당 vs 알고리즘",
        desc: "한지(韓紙)에 부적을 그리는 두 무당, 그리고 푸시 알림을 보내는 저주의 앱. Black Mirror식 기술 공포의 한국적 변주가 여기서 완성된다.",
      },
    ];

    function TalkingPoints() {
      return (
        <section className="relative px-6 py-24 sm:py-32 max-w-6xl mx-auto">
          <Reveal>
            <SectionLabel number="04">Why Watch · 관전 포인트</SectionLabel>
          </Reveal>

          <div className="space-y-px mt-12">
            {POINTS.map((p, i) => (
              <Reveal key={p.no} delay={i * 80}>
                <div className="group grid grid-cols-12 gap-4 sm:gap-8 py-10 sm:py-14 border-t border-[#c9bfb6]/10 hover:border-[#9b1c1c]/40 transition-colors duration-500">
                  <div className="col-span-12 sm:col-span-2">
                    <span className="font-display text-5xl sm:text-6xl md:text-7xl font-bold text-[#1a1010] group-hover:blood-text transition-all duration-700">
                      {p.no}
                    </span>
                  </div>
                  <div className="col-span-12 sm:col-span-10">
                    <h4 className="font-serif-kr text-2xl sm:text-3xl md:text-4xl text-[#f5e9e2] font-light mb-4 tracking-wide">
                      {p.title}
                    </h4>
                    <p className="font-serif-kr text-base sm:text-lg text-[#c9bfb6]/70 leading-relaxed max-w-3xl">
                      {p.desc}
                    </p>
                  </div>
                </div>
              </Reveal>
            ))}
            <div className="border-t border-[#c9bfb6]/10"></div>
          </div>
        </section>
      );
    }

    // ========================================
    // 📜 Footer
    // ========================================

    function Footer() {
      return (
        <footer className="relative px-6 py-20 sm:py-28 border-t border-[#7c1d1d]/20 mt-12">
          <div className="max-w-5xl mx-auto">
            <div className="text-center mb-12">
              <div className="font-display text-xs tracking-[0.5em] blood-text mb-6 uppercase">
                Wish Your Death
              </div>
              <div className="font-serif-kr text-4xl sm:text-5xl text-[#f5e9e2] font-light tracking-[0.3em] mb-3">
                기 리 고
              </div>
              <p className="font-serif-kr text-sm text-[#c9bfb6]/50 italic">
                "소원을 빌면, 죽음이 응답한다."
              </p>
            </div>

            <div className="divider mb-10"></div>

            <div className="grid grid-cols-1 md:grid-cols-2 gap-10 text-sm">
              <div>
                <div className="font-display text-[10px] tracking-[0.4em] text-[#9b1c1c] mb-4 uppercase">
                  Sources · 출처
                </div>
                <ul className="font-serif-kr text-[#c9bfb6]/60 space-y-2 text-xs sm:text-sm">
