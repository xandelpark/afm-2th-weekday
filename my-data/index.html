<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    .todo-enter { animation: slideIn 0.2s ease-out; }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useCallback } = React;

    // ========================================
    // 🎨 Design System Components
    // ========================================

    function Button({ children, variant = 'primary', size = 'md', disabled = false, onClick, className = '' }) {
      const base = 'inline-flex items-center justify-center font-medium rounded-lg transition-colors focus:outline-none focus:ring-2 focus:ring-offset-2';
      const variants = {
        primary: 'bg-blue-600 text-white hover:bg-blue-700 focus:ring-blue-500',
        secondary: 'bg-gray-200 text-gray-700 hover:bg-gray-300 focus:ring-gray-400',
        danger: 'bg-red-500 text-white hover:bg-red-600 focus:ring-red-400',
        ghost: 'bg-transparent text-gray-500 hover:bg-gray-100 focus:ring-gray-300',
      };
      const sizes = {
        sm: 'px-2.5 py-1 text-sm',
        md: 'px-4 py-2 text-sm',
        lg: 'px-6 py-3 text-base',
      };
      return (
        <button
          onClick={onClick}
          disabled={disabled}
          className={`${base} ${variants[variant]} ${sizes[size]} ${disabled ? 'opacity-50 cursor-not-allowed' : ''} ${className}`}
        >
          {children}
        </button>
      );
    }

    function Input({ label, value, onChange, placeholder, className = '', ...props }) {
      return (
        <input
          value={value}
          onChange={onChange}
          placeholder={placeholder}
          className={`w-full px-4 py-2.5 border border-gray-300 rounded-lg text-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition ${className}`}
          {...props}
        />
      );
    }

    function Card({ children, className = '' }) {
      return (
        <div className={`bg-white rounded-xl shadow-sm border border-gray-100 ${className}`}>
          {children}
        </div>
      );
    }

    // ========================================
    // 🧩 Common Components
    // ========================================

    function TodoItem({ todo, onToggle, onDelete }) {
      return (
        <div className="todo-enter flex items-center gap-3 px-4 py-3 group hover:bg-gray-50 transition-colors">
          <button
            onClick={() => onToggle(todo.id)}
            className={`flex-shrink-0 w-5 h-5 rounded-full border-2 transition-colors flex items-center justify-center ${
              todo.done ? 'bg-blue-600 border-blue-600' : 'border-gray-300 hover:border-blue-400'
            }`}
            aria-label={todo.done ? '완료 취소' : '완료 처리'}
          >
            {todo.done && (
              <svg className="w-3 h-3 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={3}>
                <path strokeLinecap="round" strokeLinejoin="round" d="M5 13l4 4L19 7" />
              </svg>
            )}
          </button>
          <span className={`flex-1 text-sm ${todo.done ? 'line-through text-gray-400' : 'text-gray-700'}`}>
            {todo.text}
          </span>
          <button
            onClick={() => onDelete(todo.id)}
            className="opacity-0 group-hover:opacity-100 text-gray-400 hover:text-red-500 transition-all p-1"
            aria-label="삭제"
          >
            <svg className="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={2}>
              <path strokeLinecap="round" strokeLinejoin="round" d="M6 18L18 6M6 6l12 12" />
            </svg>
          </button>
        </div>
      );
    }

    function EmptyState() {
      return (
        <div className="py-12 text-center text-gray-400">
          <svg className="w-12 h-12 mx-auto mb-3 text-gray-300" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth={1.5}>
            <path strokeLinecap="round" strokeLinejoin="round" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
          <p className="text-sm">할 일이 없습니다</p>
          <p className="text-xs mt-1">위에서 새로운 할 일을 추가해보세요!</p>
        </div>
      );
    }

    // ========================================
    // 📄 Page Components
    // ========================================

    function TodoPage() {
      const [todos, setTodos] = useState([
        { id: 1, text: '프로젝트 기획안 작성하기', done: false },
        { id: 2, text: '데이터베이스 설계하기', done: false },
        { id: 3, text: 'API 엔드포인트 구현하기', done: false },
        { id: 4, text: '프론트엔드 화면 개발하기', done: false },
        { id: 5, text: '테스트 및 배포하기', done: false },
      ]);
      const [input, setInput] = useState('');
      const [filter, setFilter] = useState('all');

      const addTodo = useCallback(() => {
        const text = input.trim();
        if (!text) return;
        setTodos(prev => [...prev, { id: Date.now(), text, done: false }]);
        setInput('');
      }, [input]);

      const toggleTodo = useCallback((id) => {
        setTodos(prev => prev.map(t => t.id === id ? { ...t, done: !t.done } : t));
      }, []);

      const deleteTodo = useCallback((id) => {
        setTodos(prev => prev.filter(t => t.id !== id));
      }, []);

      const filtered = todos.filter(t => {
        if (filter === 'active') return !t.done;
        if (filter === 'done') return t.done;
        return true;
      });

      const doneCount = todos.filter(t => t.done).length;

      return (
        <div className="min-h-screen bg-gray-50 py-8 px-4">
          <div className="max-w-lg mx-auto">
            {/* Header */}
            <div className="mb-6 text-center">
              <h1 className="text-2xl font-bold text-gray-800">Todo</h1>
              <p className="text-sm text-gray-500 mt-1">
                {todos.length}개 중 {doneCount}개 완료
              </p>
            </div>

            {/* Input */}
            <Card className="p-4 mb-4">
              <form
                onSubmit={(e) => { e.preventDefault(); addTodo(); }}
                className="flex gap-2"
              >
                <Input
                  value={input}
                  onChange={(e) => setInput(e.target.value)}
                  placeholder="새로운 할 일을 입력하세요"
                />
                <Button onClick={addTodo} className="flex-shrink-0">추가</Button>
              </form>
            </Card>

            {/* Filter */}
            <div className="flex gap-1 mb-3">
              {[
                { key: 'all', label: '전체' },
                { key: 'active', label: '진행중' },
                { key: 'done', label: '완료' },
              ].map(f => (
                <Button
                  key={f.key}
                  variant={filter === f.key ? 'primary' : 'ghost'}
                  size="sm"
                  onClick={() => setFilter(f.key)}
                >
                  {f.label}
                </Button>
              ))}
            </div>

            {/* Todo List */}
            <Card>
              {filtered.length === 0 ? (
                <EmptyState />
              ) : (
                <div className="divide-y divide-gray-100">
                  {filtered.map(todo => (
                    <TodoItem
                      key={todo.id}
                      todo={todo}
                      onToggle={toggleTodo}
                      onDelete={deleteTodo}
                    />
                  ))}
                </div>
              )}
            </Card>

            {/* Clear Done */}
            {doneCount > 0 && (
              <div className="mt-3 text-right">
                <Button
                  variant="ghost"
                  size="sm"
                  onClick={() => setTodos(prev => prev.filter(t => !t.done))}
                >
                  완료 항목 삭제 ({doneCount})
                </Button>
              </div>
            )}
          </div>
        </div>
      );
    }

    // ========================================
    // 🚀 App Component
    // ========================================

    function App() {
      return <TodoPage />;
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
