                      transform: 'translateX(-0.5px)',
                      transition: 'border-color 80ms',
                    }}
                  />
                  {/* 세로 중앙 (가로 점선) — 데코 드래그 + hCenter 활성 시 진한 색 */}
                  {dragging.startsWith('deco:') && (
                    <div
                      className="absolute pointer-events-none z-30"
                      style={{
                        top: '50%',
                        left: 0,
                        right: 0,
                        height: 0,
                        borderTop: `1px dashed ${snaps.hCenter ? '#C57854' : 'rgba(26,22,18,0.18)'}`,
                        transform: 'translateY(-0.5px)',
                        transition: 'border-color 80ms',
                      }}
                    />
                  )}
                  {/* 안전영역 경계선 — 가이드용 점선 (제목/부제 정렬에 도움) */}
                  <div className="absolute pointer-events-none z-30 inset-x-0" style={{ top: `${preset.topUnsafe * 100}%`, height: 0, borderTop: '1px dashed rgba(26,22,18,0.18)' }} />
                  <div className="absolute pointer-events-none z-30 inset-x-0" style={{ bottom: `${preset.bottomUnsafe * 100}%`, height: 0, borderTop: '1px dashed rgba(26,22,18,0.18)' }} />
                </>
              )}

              {/* 안전영역 가이드 — 플랫폼별 다름 (녹화 중엔 hidden) */}
              {!recording && (
                <>
                  <div
                    className="absolute inset-x-0 top-0 bg-ink/[0.025] border-b border-dashed border-ink/10 pointer-events-none flex items-center justify-center"
                    style={{ height: `${preset.topUnsafe * 100}%` }}
                  >
                    <span className="text-[8px] uppercase tracking-[0.18em] text-ink/30 num">UNSAFE — top · {preset.label}</span>
                  </div>
                  <div
                    className="absolute inset-x-0 bottom-0 bg-ink/[0.025] border-t border-dashed border-ink/10 pointer-events-none flex items-center justify-center"
                    style={{ height: `${preset.bottomUnsafe * 100}%` }}
                  >
                    <span className="text-[8px] uppercase tracking-[0.18em] text-ink/30 num">UNSAFE — bottom · {preset.label}</span>
                  </div>
                </>
              )}

              {/* 안전영역 내부 — N분할 (좌/우 교차) */}
              <div className="absolute left-[4%] right-[4%] flex flex-col gap-2" style={{ top: `${preset.topUnsafe * 100}%`, bottom: `${preset.bottomUnsafe * 100}%` }}>
                {uniqueRoles.length === 0 ? (
                  <div className="flex-1 flex flex-col items-center justify-center text-faint">
                    <div className="w-12 h-12 mb-2 rounded-full border border-hairline flex items-center justify-center text-ink/40 bg-paper/70">
                      <Icon.play size={18} />
                    </div>
                    <div className="text-[11px] uppercase tracking-[0.16em]">재생을 눌러 미리보기</div>
                  </div>
                ) : (
                  uniqueRoles.map((roleKey, idx) => {
                    const isSegmentSpeaker = currentRoleKey === roleKey && speakingNow;
                    // segment가 비어있는 구간(노래/옹알이 등)에 진폭이 있으면 voiceFallbackRole로 입 움직임
                    const isFallbackSpeaker = fallbackSpeaking && roleKey === voiceFallbackRole;
                    const isSpeaking = isSegmentSpeaker || isFallbackSpeaker;
                    const roleLabel = ROLES.find(r => r.key === roleKey)?.kr || roleKey;
                    // 짝수 index = 캐릭터 왼쪽 / 말풍선 오른쪽, 홀수 = 반대
                    const avatarOnLeft = idx % 2 === 0;
                    const activeChunk = isSpeaking ? findActiveChunk(activeChunks, currentTime) : '';
                    return (
                      <div
                        key={roleKey}
                        className={`flex-1 min-h-0 flex items-center gap-2 ${avatarOnLeft ? '' : 'flex-row-reverse'}`}
                      >
                        {/* 캐릭터 — 정사각형 비율 유지하면서 패널의 짧은 변에 맞춰 채우기 */}
                        <div
                          className={`relative transition-opacity ${currentRoleKey && currentRoleKey !== roleKey ? 'opacity-60' : ''}`}
                          style={{
                            height: '100%',
                            aspectRatio: '1 / 1',
                            maxWidth: uniqueRoles.length === 1 ? '70%' : '48%',
                            flexShrink: 0
                          }}
                        >
                          <Avatar
                            role={roleKey}
                            style={characterStyle}
                            talking={isSpeaking}
                            idle={!isSpeaking}
                            fill={true}
                          />
                          {/* role 라벨 */}
                          <span className={`absolute top-1 ${avatarOnLeft ? 'left-1' : 'right-1'} px-1.5 py-0.5 rounded text-[9px] uppercase tracking-[0.14em] z-10 ${
                            isSpeaking ? 'bg-ink text-cream' : 'bg-paper/80 text-ink/60 border border-hairline'
                          }`}>
                            {roleLabel}
                          </span>
                        </div>

                        {/* 말풍선 자리 — 말하고 있을 때만 등장 */}
                        <div className="flex-1 min-w-0 h-full flex items-center justify-center">
                          {activeChunk && (
                            <div className={`bubble-cute ${avatarOnLeft ? 'tail-left' : 'tail-right'}`} key={activeChunk}>
                              {activeChunk}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })
                )}
              </div>

              {/* 비율 가이드 — 우상단 (녹화 중엔 hidden) */}
              {!recording && (
                <div className="absolute top-1 right-1 px-1.5 py-0.5 rounded text-[8px] uppercase tracking-[0.14em] text-ink/30 num bg-paper/60 z-10">
                  9:16 · {preset.label}
                </div>
              )}
            </div>

            {/* 진행 바 — 클릭으로 seek */}
            <div className="px-4 pt-3">
              <div
                className="relative h-1.5 w-full rounded-full bg-hairline overflow-hidden cursor-pointer"
                onClick={(e) => {
                  const rect = e.currentTarget.getBoundingClientRect();
                  const ratio = (e.clientX - rect.left) / rect.width;
                  seekTo(ratio * totalDur);
                }}
              >
                <div className="absolute top-0 left-0 h-full bg-accent transition-[width] duration-100" style={{ width: `${progressPct}%` }} />
              </div>
              <div className="flex justify-between mt-1.5 text-[10px] num text-faint">
                <span>{fmtTime(currentTime)}</span>
                <span>{fmtTime(totalDur)}</span>
              </div>
            </div>

            <div className="p-4 flex items-center justify-between gap-3">
              <Button variant={isPlaying ? "secondary" : "primary"} size="md" onClick={togglePlay} disabled={!jobId || recording}>
                {isPlaying ? <><Icon.pause /> 일시정지</> : <><Icon.play /> 재생</>}
              </Button>
              <Button variant="accent" size="md" onClick={downloadVideo} disabled={!jobId || recording || tunedPreparing}>
                {recording
                  ? <>녹화 중 {Math.round(recProgress * 100)}%</>
                  : <>📥 {preset.label}용 영상 다운로드</>
                }
              </Button>
            </div>

            {recording && (
              <div className="px-4 pb-3">
                <div className="h-1 bg-hairline rounded-full overflow-hidden">
                  <div className="h-full bg-accent transition-[width] duration-200" style={{ width: `${recProgress * 100}%` }} />
                </div>
                <div className="text-[10px] text-faint mt-1 text-center">
                  녹화가 끝날 때까지 이 탭을 활성 상태로 두세요
                </div>
              </div>
            )}

            {audioError && (
              <div className="px-4 pb-3 text-[11px] text-[#7A3A28]">{audioError}</div>
            )}

            {/* 녹화용 hidden canvas (1080x1920 9:16) */}
            <canvas ref={recCanvasRef} style={{ display: 'none' }} />

            {/* 숨겨진 video element — element는 항상 같은 인스턴스 유지 (key 없음)
                → audioMode 바뀌어도 AudioContext source 끊기지 않음 = 싱크 정밀도 ↑
                src 변경은 useEffect에서 수동 처리 (load() 호출). */}
            {jobId && (
              <video
                ref={audioRef}
                preload="auto"
                playsInline
                crossOrigin="anonymous"
                onLoadStart={() => audioMode === 'tuned' && setTunedPreparing(true)}
                onCanPlay={() => setTunedPreparing(false)}
                style={{ display: 'none' }}
              />
            )}
          </Card>

          {/* 자막 리스트 */}
          <div>
            <div className="flex items-baseline justify-between mb-1 px-1">
              <h3 className="text-[13px] font-medium text-ink">자막</h3>
              <span className="text-[11px] text-faint">탭하면 자막 편집</span>
            </div>
            <p className="text-[11px] text-muted px-1 mb-3 leading-relaxed">
              라벨은 <span className="text-ink/80">한 발화씩 개별 변경</span>됩니다 — 같은 화자의 다른 발화엔 영향 없음. 변경된 발화엔 <span className="text-accent">↺ 복원</span> 버튼이 생겨요.
            </p>
            <div className="bg-paper border border-hairline rounded-xl divide-y divide-hairline">
              {effectiveSegments.map((s) => {
                const isEditing = editingId === s.id;
                const sp = SPEAKER_COLORS[s.speaker] || SPEAKER_COLORS.C;
                const role = getRoleForSegment(s);
                const speakerDefaultRole = roleMapping[s.speaker];
                const isOverridden = segmentRoleOverrides[s.id] !== undefined;
                const isBaby = role === "baby";
                const isCurrent = currentSegment && currentSegment.id === s.id;
                return (
                  <div key={s.id} className={`px-4 py-3.5 transition-colors ${isCurrent ? 'bg-accentSoft/30' : ''}`}>
                    <div className="flex items-center gap-2 mb-2">
                      <span className={`w-1.5 h-1.5 rounded-full ${sp.dot}`} />
                      <span className="text-[10px] uppercase tracking-[0.14em] text-faint">사람 {s.speaker}</span>
                      {isOverridden && (
                        <button
                          type="button"
                          onClick={() => clearSegmentRole(s.id)}
                          className="text-[10px] px-1.5 py-0.5 rounded border border-accent/40 text-accent hover:bg-accent/10 transition"
                          title="이 발화 라벨을 기본값으로 복원"
                        >
                          ↺ 복원
                        </button>
                      )}
                      <button
                        type="button"
                        onClick={() => seekTo(s.start)}
                        className="text-[10px] text-faint num ml-auto hover:text-ink transition"
                        title="이 구간으로 이동"
                      >
                        ▸ {fmtTime(s.start)} — {fmtTime(s.end)}
                      </button>
                    </div>

                    {/* 역할 인라인 선택 — 이 발화 한 개만 변경 (다른 segment 영향 없음) */}
                    <div className="flex gap-1 mb-2">
                      {ROLES.map((r) => {
                        const selected = role === r.key;
                        const isSpeakerDefault = speakerDefaultRole === r.key && !isOverridden;
                        return (
                          <button
                            key={r.key}
                            type="button"
                            onClick={() => setSegmentRole(s.id, r.key)}
                            className={`text-[11px] px-2.5 py-1 rounded-full border transition
                              ${selected
                                ? (isOverridden
                                    ? 'bg-accent text-cream border-accent'
                                    : 'bg-ink text-cream border-ink')
                                : 'bg-paper text-ink/60 border-hairline hover:border-ink/40'}`}
                            title={isSpeakerDefault ? `사람 ${s.speaker} 기본값` : `이 발화만 ${r.kr}로`}
                          >
                            {r.kr}
                          </button>
                        );
                      })}
                    </div>

                    {isEditing ? (
                      <input
                        type="text"
                        autoFocus
                        value={getText(s)}
                        onChange={(e) => onTextChange(s.id, e.target.value)}
                        onBlur={() => setEditingId(null)}
                        onKeyDown={(e) => { if (e.key === "Enter") setEditingId(null); }}
                        className="w-full pb-1 text-[14px] text-ink bg-transparent border-b border-accent focus:outline-none"
                      />
                    ) : (
                      <button
                        type="button"
                        onClick={() => setEditingId(s.id)}
                        className="block w-full text-left text-[14px] text-ink leading-relaxed editable transition pb-px"
                      >
                        {getText(s)}
                      </button>
                    )}
                    {isBaby && (
                      <div className="mt-2.5 flex flex-wrap items-center gap-1.5">
                        <span className="text-[10px] uppercase tracking-[0.14em] text-faint mr-1">의성어</span>
                        {BABY_ONOMATOPOEIA.slice(0, 4).map((w) => (
                          <button
                            key={w}
                            type="button"
                            onClick={() => onTextChange(s.id, w)}
                            className="text-[11px] px-2 py-0.5 rounded-full border border-hairline text-ink/70 hover:bg-ink hover:text-cream hover:border-ink transition"
                          >
                            {w}
                          </button>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Page — ExportStep
    // ========================================
    function ExportStep() {
      const [progress, setProgress] = useState(0);
      const [rendering, setRendering] = useState(false);
      const [done, setDone] = useState(false);

      const startRender = useCallback(() => {
        setRendering(true);
        setProgress(0);
        setDone(false);
        const iv = setInterval(() => {
          setProgress((p) => {
            if (p >= 100) {
              clearInterval(iv);
              setRendering(false);
              setDone(true);
              return 100;
            }
            return p + 5;
          });
        }, 150);
      }, []);

      return (
        <div className="px-6 py-7 space-y-5 anim-fade-in">
          <div className="space-y-1.5">
            <div className="text-[10px] uppercase tracking-[0.18em] text-accent num">05 — Export</div>
            <h2 className="font-serif text-[26px] leading-[1.15] text-ink">
              완성된 영상을<br/>받아가세요.
            </h2>
            <p className="text-[13px] text-muted leading-relaxed pt-1">
              MP4로 저장하거나 SNS로 바로 공유할 수 있습니다.
            </p>
          </div>

          {/* 합성 영역 */}
          <Card>
            {!rendering && !done && (
              <Button variant="accent" size="lg" className="w-full" onClick={startRender}>
                영상 합성 시작 <Icon.arrowRight />
              </Button>
            )}
            {rendering && (
              <div className="space-y-3">
                <div className="flex items-baseline justify-between">
                  <span className="text-[11px] uppercase tracking-[0.14em] text-muted">Rendering</span>
                  <span className="text-[12px] num text-ink">{progress}%</span>
                </div>
                <div className="h-1 w-full bg-hairline rounded-full overflow-hidden">
                  <div
                    className="h-full bg-ink transition-all duration-200"
                    style={{ width: `${progress}%` }}
                  />
                </div>
                <p className="text-[11px] text-muted">
                  카툰 캐릭터와 자막을 입히는 중입니다.
                </p>
              </div>
            )}
            {done && (
              <div className="space-y-3">
                <div className="flex items-baseline justify-between">
                  <span className="text-[11px] uppercase tracking-[0.14em] text-accent">Complete</span>
                  <span className="text-[12px] num text-ink">100%</span>
                </div>
                <div className="h-1 w-full bg-hairline rounded-full overflow-hidden">
                  <div className="h-full bg-accent" style={{ width: '100%' }} />
                </div>
                <p className="text-[11px] text-muted">
                  합성이 완료되었습니다. 아래에서 받아가세요.
                </p>
              </div>
            )}
          </Card>

          {/* Actions */}
          <div className="space-y-2.5">
            <Button
              variant="primary"
              size="lg"
              disabled={!done}
              className="w-full"
              onClick={() => {/* Day 5 다운로드 */}}
            >
              <Icon.download /> MP4 다운로드
            </Button>
            <Button
              variant="secondary"
              size="lg"
              disabled={!done}
              className="w-full"
              onClick={() => {/* Day 6 Web Share */}}
            >
              <Icon.share /> 공유하기
            </Button>
            <Button
              variant="ghost"
              size="lg"
              disabled
              className="w-full"
            >
              유튜브 업로드 (준비 중)
            </Button>
          </div>

          {/* 자동 삭제 안내 — 조용히 */}
          <div className="flex items-start gap-2 px-1 pt-2 text-[11px] text-muted leading-relaxed">
            <Icon.clock size={13} className="mt-0.5 shrink-0" />
            <span>업로드 원본과 결과물 모두 1시간 후 자동 삭제됩니다.</span>
          </div>
        </div>
      );
    }

    // ========================================
    // App — 루트 컴포넌트
    // ========================================
    function App() {
      const [step, setStep] = useState(1);

      const [file, setFile] = useState(null);
      const [fileName, setFileName] = useState("");
      const [consent, setConsent] = useState(false);
      const [roleMapping, setRoleMapping] = useState({});
      const [characterStyle, setCharacterStyle] = useState("current");
      const [editedSegments, setEditedSegments] = useState({});
      // per-segment 역할 오버라이드 — AssemblyAI 발화자 구분이 틀린 segment 개별 정정
      const [segmentRoleOverrides, setSegmentRoleOverrides] = useState({});

      // Day 2-6: 실제 백엔드 연동 상태
      const [segments, setSegments] = useState([]);
      const [jobId, setJobId] = useState(null);
      const [loading, setLoading] = useState(false);
      const [loadingPhase, setLoadingPhase] = useState("");
      const [errorMsg, setErrorMsg] = useState("");
      const [transcriptMeta, setTranscriptMeta] = useState(null); // { speakerCount, audioDurationSec, confidence }

      // Day 3: 매핑 저장 진행 상태
      const [saving, setSaving] = useState(false);

      const canAdvance = useMemo(() => {
        if (step === 1) return segments.length > 0;
        if (step === 2) {
          const usedSpeakers = SPEAKER_KEYS.filter(
            (k) => segments.some((s) => s.speaker === k)
          );
          const allMapped = usedSpeakers.every((k) => !!roleMapping[k]);
          const used = usedSpeakers.map((k) => roleMapping[k]).filter(Boolean);
          const noDup = used.length === new Set(used).size;
          return allMapped && noDup;
        }
        if (step === 3) {
          // 스타일은 항상 기본값이 있으므로 추가 검증 없이 통과
          return !!characterStyle;
        }
        return true;
      }, [step, segments, roleMapping, characterStyle]);

      const handleAnalyze = useCallback(async () => {
        if (!file || !consent) return;
        setLoading(true);
        setErrorMsg("");
        try {
          // 1) 업로드
          setLoadingPhase("업로드 중...");
          const fd = new FormData();
          fd.append("file", file);
          const upRes = await fetch("/api/upload", { method: "POST", body: fd });
          const upJson = await upRes.json().catch(() => ({}));
          if (!upRes.ok || !upJson.success) {
            throw new Error(upJson.message || `업로드 실패 (HTTP ${upRes.status})`);
          }
          const newJobId = upJson.data.jobId;
          setJobId(newJobId);

          // 2) AssemblyAI 발화자 구분
          setLoadingPhase("발화자 분석 중... (최대 2분)");
          const trRes = await fetch("/api/transcribe", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ jobId: newJobId }),
          });
          const trJson = await trRes.json().catch(() => ({}));
          if (!trRes.ok || !trJson.success) {
            throw new Error(trJson.message || `발화자 구분 실패 (HTTP ${trRes.status})`);
          }
          const segs = Array.isArray(trJson.data.segments) ? trJson.data.segments : [];
          if (segs.length === 0) {
            throw new Error("발화자가 감지되지 않았습니다. 더 또렷하게 녹음된 파일로 다시 시도해주세요.");
          }
          setSegments(segs);
          setTranscriptMeta({
            speakerCount: trJson.data.speakerCount ?? null,
            audioDurationSec: trJson.data.audioDurationSec ?? null,
            confidence: trJson.data.confidence ?? null,
          });
          setStep(2);
        } catch (err) {
          console.error("[handleAnalyze]", err);
          setErrorMsg(err.message || "분석 중 오류가 발생했습니다. 다시 시도해주세요.");
        } finally {
          setLoading(false);
          setLoadingPhase("");
        }
      }, [file, consent]);

      const onPrev = (reset = false) => {
        if (reset === true) {
          setStep(1);
          setSegments([]);
          setJobId(null);
          setFile(null);
          setFileName("");
          setConsent(false);
          setEditedSegments({});
          setSegmentRoleOverrides({});
          setErrorMsg("");
          setTranscriptMeta(null);
          return;
        }
        setErrorMsg("");
        setStep((s) => Math.max(1, s - 1));
      };
      // step 2 → 3 (roleMapping), step 3 → 4 (characterMapping),
      // step 4 → 5 (프리뷰에서 라벨 바꾼 경우 roleMapping 재저장)
      const handleNext = useCallback(async () => {
        if (jobId && (step === 2 || step === 3 || step === 4)) {
          setSaving(true);
          setErrorMsg("");
          try {
            let body;
            if (step === 2) body = { roleMapping };
            else if (step === 3) body = { characterStyle };
            else body = { roleMapping }; // step 4 → 5
            const res = await fetch(`/api/jobs/${jobId}`, {
              method: "PATCH",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify(body),
            });
            const json = await res.json().catch(() => ({}));
            if (!res.ok || !json.success) {
              throw new Error(json.message || `저장 실패 (HTTP ${res.status})`);
            }
          } catch (err) {
            console.error("[handleNext]", err);
            setErrorMsg(err.message || "저장 중 오류가 발생했습니다.");
            setSaving(false);
            return;
          }
          setSaving(false);
        }
        setStep((s) => Math.min(STEPS.length, s + 1));
      }, [step, jobId, roleMapping, characterStyle]);
      const onStepClick = (n) => {
        // 1단계는 항상 갈 수 있고, 그 외 단계는 segments가 있어야 갈 수 있음
        if (n > 1 && segments.length === 0) return;
        setStep(n);
      };

      const nextLabel =
        step === 1 ? "분석 단계로" :
        step === 2 ? "캐릭터 고르기" :
        step === 3 ? "미리보기" :
        step === 4 ? "내보내기" : "다음";

      return (
        <div className="min-h-screen w-full flex justify-center bg-cream">
          <div className="w-full max-w-md bg-cream min-h-screen flex flex-col">
            <Header currentStep={step} />
            <StepNav currentStep={step} onStepClick={onStepClick} />

            <main className="flex-1">
              {step === 1 && (
                <UploadStep
                  fileName={fileName}
                  setFileName={setFileName}
                  setFile={setFile}
                  consent={consent}
                  setConsent={setConsent}
                  loading={loading}
                  loadingPhase={loadingPhase}
                  errorMsg={errorMsg}
                  onAnalyze={handleAnalyze}
                />
              )}
              {step === 2 && (
                <LabelStep
                  segments={segments}
                  roleMapping={roleMapping}
                  setRoleMapping={setRoleMapping}
                  transcriptMeta={transcriptMeta}
                />
              )}
              {step === 3 && (
                <CharacterStep
                  roleMapping={roleMapping}
                  characterStyle={characterStyle}
                  setCharacterStyle={setCharacterStyle}
                />
              )}
              {step === 4 && (
                <PreviewStep
                  jobId={jobId}
                  segments={segments}
                  roleMapping={roleMapping}
                  setRoleMapping={setRoleMapping}
                  segmentRoleOverrides={segmentRoleOverrides}
                  setSegmentRoleOverrides={setSegmentRoleOverrides}
                  characterStyle={characterStyle}
                  editedSegments={editedSegments}
                  setEditedSegments={setEditedSegments}
                />
              )}
              {step === 5 && <ExportStep />}
            </main>

            {/* Day 3: step 2/3 저장 에러 배너 */}
            {step > 1 && errorMsg && (
              <div className="mx-6 mb-3 px-4 py-3 rounded-lg border border-accent/40 bg-accentSoft/40 text-[12px] text-[#7A3A28]">
                {errorMsg}
              </div>
            )}

            <StepFooter
              currentStep={step}
              onPrev={onPrev}
              onNext={handleNext}
              nextLabel={saving ? "저장 중..." : nextLabel}
              nextDisabled={!canAdvance || saving}
            />

            {/* 푸터 — 절제된 사인 */}
            <div className="text-center pb-5 pt-2 text-[10px] uppercase tracking-[0.18em] text-faint">
              Soft Studio · Prototype v1
            </div>
          </div>
        </div>
      );
    }

    // ========================================
    // Rendering
    // ========================================
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
